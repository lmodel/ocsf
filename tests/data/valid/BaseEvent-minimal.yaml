# Smallest valid BaseEvent — every slot OCSF marks `required` (directly or
# via the cloud/osint/host/datetime/security_control profiles that base_event
# `$include`s) is present. Class-scoped enums are restricted to the values
# baked in to the dictionary slot's range — see notes in
# Authentication-success.yaml.
class_uid: BASE_EVENT
category_uid: UNCATEGORIZED
activity_id: UNKNOWN
type_uid: 0
severity_id: INFORMATIONAL
time: 1700000000000
metadata:
  version: "1.4.0"
  product:
    name: TestProduct
cloud:
  provider: aws
osint:
  - type_id: HOSTNAME
    value: example.com
