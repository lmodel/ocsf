id: https://w3id.org/lmodel/ocsf/events
name: ocsf-events
description: OCSF event class definitions across every category. BaseEvent is the abstract root; each category root (e.g. SystemEvent, NetworkEvent) extends BaseEvent and is itself extended by concrete event classes.
license: Apache-2.0
source: https://github.com/ocsf/ocsf-schema/tree/main/events
version: 1.9.0-dev
annotations:
  copyright: © OCSF a Series of LF Projects, LLC
prefixes:
  ocsf: https://w3id.org/lmodel/ocsf/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  xsd: http://www.w3.org/2001/XMLSchema#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
  attack: https://lmodel.github.io/attack/
  stix: https://lmodel.github.io/stix/
  uco_master: https://lmodel.github.io/uco-master/
  capec: https://w3id.org/lmodel/capec/
  cve: https://w3id.org/lmodel/cve/
  cwe: https://w3id.org/lmodel/cwe/
  iso27001: https://w3id.org/lmodel/iso27001/
  kev_catalog: https://w3id.org/lmodel/kev-catalog/
  nvd: https://w3id.org/lmodel/nist-nvd/
  core: https://w3id.org/lmodel/vulnerability-core/
default_prefix: ocsf
default_range: string
imports:
- linkml:types
- ./dictionary
- ./enums
- ./categories
- ./profiles
- ./objects
classes:
  BaseEvent:
    description: The base event is a generic and concrete event. It also defines a set of attributes available in most event classes. As a generic event that does not belong to any event category, it could be used to log events that are not otherwise defined by the schema.
    aliases:
    - Base Event
    mixins:
    - CloudProfile
    - DatetimeProfile
    - HostProfile
    - OsintProfile
    - SecurityControlProfile
    slots:
    - activity_id
    - activity_name
    - category_name
    - category_uid
    - class_name
    - class_uid
    - count
    - duration
    - end_time
    - enrichments
    - message
    - metadata
    - observables
    - raw_data
    - raw_data_hash
    - raw_data_size
    - severity
    - severity_id
    - start_time
    - status
    - status_code
    - status_detail
    - status_id
    - time
    - timezone_offset
    - type_name
    - type_uid
    - unmapped
    slot_usage:
      activity_id:
        required: true
        range: BaseEventActivityIdEnum
        annotations:
          group: classification
      activity_name:
        annotations:
          group: classification
      category_name:
        annotations:
          group: classification
      category_uid:
        required: true
        range: BaseEventCategoryUidEnum
        annotations:
          group: classification
      class_name:
        annotations:
          group: classification
      class_uid:
        required: true
        range: BaseEventClassUidEnum
        annotations:
          group: classification
      count:
        annotations:
          group: occurrence
      duration:
        description: The event duration or aggregate time, the amount of time the event covers from <code>start_time</code> to <code>end_time</code> in milliseconds.
        annotations:
          group: occurrence
      end_time:
        description: The end time of a time period, or the time of the most recent event included in the aggregate event.
        annotations:
          group: occurrence
      enrichments:
        annotations:
          group: context
      message:
        recommended: true
        annotations:
          group: primary
      metadata:
        required: true
        annotations:
          group: context
      observables:
        recommended: true
        annotations:
          group: primary
      raw_data:
        annotations:
          group: context
      raw_data_hash:
        annotations:
          group: context
      raw_data_size:
        annotations:
          group: context
      severity:
        annotations:
          group: classification
      severity_id:
        required: true
        annotations:
          group: classification
      start_time:
        description: The start time of a time period, or the time of the least recent event included in the aggregate event.
        annotations:
          group: occurrence
      status:
        recommended: true
        annotations:
          group: primary
      status_code:
        recommended: true
        annotations:
          group: primary
      status_detail:
        recommended: true
        annotations:
          group: primary
      status_id:
        recommended: true
        annotations:
          group: primary
      time:
        required: true
        annotations:
          group: occurrence
      timezone_offset:
        recommended: true
        annotations:
          group: occurrence
      type_name:
        annotations:
          group: classification
      type_uid:
        required: true
        annotations:
          group: classification
      unmapped:
        annotations:
          group: context
    annotations:
      category: other
  ApplicationEvent:
    aliases:
    - Application Activity
    is_a: BaseEvent
    annotations:
      category: application
  ApiActivity:
    description: API events describe general CRUD (Create, Read, Update, Delete) API activities, e.g. (AWS Cloudtrail)
    aliases:
    - API Activity
    is_a: ApplicationEvent
    mixins:
    - TraceProfile
    - AiOperationProfile
    slots:
    - activity_id
    - actor
    - api
    - dst_endpoint
    - http_request
    - http_response
    - resources
    - src_endpoint
    slot_usage:
      activity_id:
        range: ApiActivityActivityIdEnum
      actor:
        required: true
        annotations:
          group: primary
      api:
        required: true
        annotations:
          group: primary
      dst_endpoint:
        recommended: true
        annotations:
          group: primary
      http_request:
        description: Details about the underlying http request.
        recommended: true
        annotations:
          group: primary
      http_response:
        description: Details about the underlying http response.
        recommended: true
        annotations:
          group: primary
      resources:
        description: Details about resources that were affected by the activity/event.
        recommended: true
        annotations:
          group: primary
      src_endpoint:
        description: Details about the source of the activity.
        required: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 3
  ApplicationError:
    description: Application Error events describe issues with an applications. The error message should be put in the event's <code>message</code> attribute. The <code>metadata.product</code> attribute can be used to capture the originating application information. The <code>host</code> profile can used to include the generating device information. This class is helpful for applications that generate or handle OCSF events and can also be used for errors in upstream products and services.
    aliases:
    - Application Error
    is_a: ApplicationEvent
    slots:
    - activity_id
    - message
    slot_usage:
      activity_id:
        range: ApplicationErrorActivityIdEnum
      message:
        description: The error message as reported by the application.
    annotations:
      ocsf_event_uid: 8
  ApplicationLifecycle:
    description: Application Lifecycle events report installation, removal, start, stop of an application or service.
    aliases:
    - Application Lifecycle
    is_a: ApplicationEvent
    slots:
    - activity_id
    - app
    slot_usage:
      activity_id:
        required: true
        range: ApplicationLifecycleActivityIdEnum
      app:
        description: The application that was affected by the lifecycle event.  This also applies to self-updating application systems.
        required: true
        annotations:
          group: primary
    see_also:
    - https://d3fend.mitre.org/event/d3f:ApplicationEvent/
    notes:
    - D3FEND™ Ontology d3f:ApplicationEvent — https://d3fend.mitre.org/event/d3f:ApplicationEvent/
    annotations:
      ocsf_event_uid: 2
  DatastoreActivity:
    description: Datastore events describe general activities (Read, Update, Query, Delete, etc.) which affect datastores or data within those datastores, e.g. (AWS RDS, AWS S3).
    aliases:
    - Datastore Activity
    is_a: ApplicationEvent
    mixins:
    - AiOperationProfile
    slots:
    - activity_id
    - actor
    - database
    - databucket
    - dst_endpoint
    - http_request
    - http_response
    - query_info
    - src_endpoint
    - table
    - type
    - type_id
    slot_usage:
      activity_id:
        range: DatastoreActivityActivityIdEnum
      actor:
        required: true
        annotations:
          group: primary
      database:
        recommended: true
        annotations:
          group: primary
      databucket:
        recommended: true
        annotations:
          group: primary
      dst_endpoint:
        description: Details about the endpoint hosting the datastore application or service.
        recommended: true
        annotations:
          group: primary
      http_request:
        description: Details about the underlying http request.
        recommended: true
        annotations:
          group: primary
      http_response:
        description: Details about the underlying http response.
        recommended: true
        annotations:
          group: primary
      query_info:
        recommended: true
        annotations:
          group: primary
      src_endpoint:
        description: Details about the source of the activity.
        required: true
        annotations:
          group: primary
      table:
        recommended: true
        annotations:
          group: primary
      type:
        description: The datastore resource type (e.g. database, datastore, or table).
      type_id:
        description: The normalized datastore resource type identifier.
        recommended: true
        range: DatastoreActivityTypeIdEnum
    rules:
    - description: 'OCSF at_least_one: at least one of [''database'', ''databucket'', ''table''] must be set.'
      postconditions:
        any_of:
        - slot_conditions:
            database:
              required: true
        - slot_conditions:
            databucket:
              required: true
        - slot_conditions:
            table:
              required: true
    annotations:
      ocsf_constraints: '{"at_least_one": ["database", "databucket", "table"]}'
      ocsf_event_uid: 5
  FileHosting:
    description: File Hosting Activity events report the actions taken by file management applications, including file sharing servers like Sharepoint and services such as Box, MS OneDrive, Google Drive, or network file share services.
    aliases:
    - File Hosting Activity
    is_a: ApplicationEvent
    slots:
    - access_list
    - access_mask
    - access_result
    - activity_id
    - actor
    - connection_info
    - dst_endpoint
    - expiration_time
    - file
    - file_result
    - http_request
    - http_response
    - share
    - share_type
    - share_type_id
    - src_endpoint
    slot_usage:
      access_list:
        annotations:
          group: context
      access_mask:
        description: The sum of hexadecimal values of requested access rights.
        annotations:
          group: context
      access_result:
        annotations:
          group: context
      activity_id:
        range: FileHostingActivityIdEnum
      actor:
        description: The actor that performed the activity on the target file.
        required: true
        annotations:
          group: primary
      connection_info:
        annotations:
          group: context
      dst_endpoint:
        description: The endpoint that received the activity on the target file.
        recommended: true
      expiration_time:
        description: The share expiration time.
        annotations:
          group: context
      file:
        description: The file that is the target of the activity.
        required: true
        annotations:
          group: primary
      file_result:
        description: The resulting file object when the activity was allowed and successful.
        annotations:
          group: context
      http_request:
        description: Details about the underlying HTTP request.
        recommended: true
        annotations:
          group: context
      http_response:
        description: Details about the HTTP response, if available.
        annotations:
          group: context
      share:
        description: The share name.
        annotations:
          group: context
      share_type:
        annotations:
          group: context
      share_type_id:
        annotations:
          group: context
      src_endpoint:
        description: The endpoint that performed the activity on the target file.
        required: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 6
  ScanActivity:
    description: Scan events report the start, completion, and results of a scan job. The scan event includes the number of items that were scanned and the number of detections that were resolved.
    aliases:
    - Scan Activity
    is_a: ApplicationEvent
    slots:
    - activity_id
    - command_uid
    - duration
    - end_time
    - num_detections
    - num_files
    - num_folders
    - num_network_items
    - num_processes
    - num_registry_items
    - num_resolutions
    - num_skipped_items
    - num_trusted_items
    - policy
    - scan
    - schedule_uid
    - start_time
    - total
    slot_usage:
      activity_id:
        range: ScanActivityActivityIdEnum
      command_uid:
        description: The command identifier that is associated with this scan event.  This ID uniquely identifies the proactive scan command, e.g., if remotely initiated.
        recommended: true
        annotations:
          group: primary
      duration:
        description: The duration of the scan
        recommended: true
      end_time:
        description: The end time of the scan job.
        recommended: true
      num_detections:
        recommended: true
        annotations:
          group: primary
      num_files:
        recommended: true
        annotations:
          group: primary
      num_folders:
        recommended: true
        annotations:
          group: primary
      num_network_items:
        recommended: true
        annotations:
          group: primary
      num_processes:
        recommended: true
        annotations:
          group: primary
      num_registry_items:
        recommended: true
        annotations:
          group: primary
      num_resolutions:
        recommended: true
        annotations:
          group: primary
      num_skipped_items:
        recommended: true
        annotations:
          group: primary
      num_trusted_items:
        recommended: true
        annotations:
          group: primary
      policy:
        description: The policy associated with this Scan event; required if the scan was initiated by a policy.
        recommended: true
        annotations:
          group: primary
      scan:
        description: The Scan object describes characteristics of the scan job.
        required: true
        annotations:
          group: primary
      schedule_uid:
        recommended: true
        annotations:
          group: primary
      start_time:
        description: The start time of the scan job.
        recommended: true
      total:
        description: The total number of items that were scanned; zero if no items were scanned.
        recommended: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 7
  WebResourceAccessActivity:
    description: Web Resource Access Activity events describe successful/failed attempts to access a web resource over HTTP.
    aliases:
    - Web Resource Access Activity
    deprecated: Use the <code>Web Resources Activity</code> class with the <code>Security Control</code> and/or <code>Network Proxy</code> profile instead. (since 1.1.0)
    is_a: ApplicationEvent
    mixins:
    - NetworkProxyProfile
    slots:
    - activity_id
    - http_request
    - http_response
    - proxy
    - src_endpoint
    - tls
    - web_resources
    slot_usage:
      activity_id:
        range: WebResourceAccessActivityActivityIdEnum
      http_request:
        description: Details about the underlying HTTP request.
        required: true
        annotations:
          group: context
      http_response:
        description: Details about the HTTP response, if available.
        annotations:
          group: context
      proxy:
        description: Details about the proxy service, if available.
        annotations:
          group: context
      src_endpoint:
        description: Details about the source endpoint of the request.
        recommended: true
        annotations:
          group: primary
      tls:
        description: The Transport Layer Security (TLS) attributes, if available.
        annotations:
          group: context
      web_resources:
        description: Details about the resource that is the target of the activity.
        required: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 4
  WebResourcesActivity:
    description: Web Resources Activity events describe actions executed on a set of Web Resources.
    aliases:
    - Web Resources Activity
    is_a: ApplicationEvent
    mixins:
    - NetworkProxyProfile
    slots:
    - activity_id
    - dst_endpoint
    - http_request
    - http_response
    - src_endpoint
    - tls
    - web_resources
    - web_resources_result
    slot_usage:
      activity_id:
        range: WebResourcesActivityActivityIdEnum
      dst_endpoint:
        description: Details about server providing the web resources.
        recommended: true
        annotations:
          group: primary
      http_request:
        description: Details about the underlying HTTP request.
        recommended: true
        annotations:
          group: context
      http_response:
        description: Details about the HTTP response, if available.
        annotations:
          group: context
      src_endpoint:
        description: Details about the endpoint from which the request originated.
        recommended: true
        annotations:
          group: primary
      tls:
        description: The Transport Layer Security (TLS) attributes, if available.
        annotations:
          group: context
      web_resources:
        required: true
        annotations:
          group: primary
      web_resources_result:
        recommended: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 1
  DiscoveryEvent:
    description: The Discovery event is a generic event that defines a set of attributes available in Discovery category events. As a generic event, it could be used to log events that are not otherwise defined by the Discovery specific event classes.
    aliases:
    - Discovery
    is_a: BaseEvent
    slots:
    - activity_id
    slot_usage:
      activity_id:
        range: DiscoveryEventActivityIdEnum
    annotations:
      category: discovery
  AdminGroupQuery:
    description: Admin Group Query events report information about administrative groups.
    aliases:
    - Admin Group Query
    deprecated: Use the <code>Live Evidence Info</code> class. (since 1.5.0)
    is_a: DiscoveryResult
    slots:
    - group
    - users
    slot_usage:
      group:
        description: The administrative group.
        required: true
        annotations:
          group: primary
      users:
        description: The users that belong to the administrative group.
        recommended: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 9
  CloudResourcesInventoryInfo:
    description: Cloud Resources Inventory Info events report cloud asset inventory data. This data can be either logged or proactively collected. For example, use this event class when creating an inventory of cloud resource information from a Configuration Management Database (CMDB), Cyber Asset Attack Surface Management (CAASM), direct public cloud service provider APIs, Software-as-a-Service (SaaS) APIs, or otherwise.
    aliases:
    - Cloud Resources Inventory Info
    is_a: DiscoveryEvent
    slots:
    - cloud
    - container
    - database
    - databucket
    - idp
    - region
    - resources
    - table
    slot_usage:
      cloud:
        description: Cloud service provider or SaaS platform metadata about the cloud resource(s) that are being discovered by an inventory process.
        recommended: true
        annotations:
          group: primary
      container:
        description: A cloud-based container image or running container discovered by an inventory process.
        recommended: true
        annotations:
          group: primary
      database:
        description: A cloud-based database discovered by an inventory process.
        recommended: true
        annotations:
          group: primary
      databucket:
        description: A cloud-based data bucket or other object storage discovered by an inventory process.
        recommended: true
        annotations:
          group: primary
      idp:
        description: The Identity Provider that is being discovered by an inventory process, or that is related to the cloud resource(s) being discovered by an inventory process.
        recommended: true
        annotations:
          group: primary
      region:
        description: The cloud region where the resource is located, e.g., <code>us-isof-south-1</code>, <code>eastus2</code>, <code>us-central1</code>, etc.
        recommended: true
        annotations:
          group: context
      resources:
        description: The cloud resource(s) that are being discovered by an inventory process. Use this object if there is not a direct object match in the class.
        recommended: true
        annotations:
          group: primary
      table:
        description: A cloud-based database table discovered by an inventory process.
        recommended: true
        annotations:
          group: primary
    rules:
    - description: 'OCSF at_least_one: at least one of [''cloud'', ''container'', ''database'', ''databucket'', ''idp'', ''resources'', ''table''] must be set.'
      postconditions:
        any_of:
        - slot_conditions:
            cloud:
              required: true
        - slot_conditions:
            container:
              required: true
        - slot_conditions:
            database:
              required: true
        - slot_conditions:
            databucket:
              required: true
        - slot_conditions:
            idp:
              required: true
        - slot_conditions:
            resources:
              required: true
        - slot_conditions:
            table:
              required: true
    annotations:
      ocsf_constraints: '{"at_least_one": ["cloud", "container", "database", "databucket", "idp", "resources", "table"]}'
      ocsf_event_uid: 23
  ConfigState:
    description: Device Config State events report device configuration data, device assessments, and/or CIS Benchmark results.
    aliases:
    - Device Config State
    deprecated: Use <code>Compliance Finding</code> class. (since 1.5.0)
    is_a: DiscoveryEvent
    slots:
    - actor
    - assessments
    - cis_benchmark_result
    - device
    slot_usage:
      actor:
        annotations:
          group: context
      assessments:
        description: A list of assessments associated with the device.
        annotations:
          group: context
      cis_benchmark_result:
        recommended: true
        annotations:
          group: primary
      device:
        description: The device that is being discovered by an inventory process.
        required: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 2
  DeviceConfigStateChange:
    description: Device Config State Change events report state changes that impact the security of the device.
    aliases:
    - Device Config State Change
    is_a: DiscoveryEvent
    slots:
    - actor
    - device
    - prev_security_level
    - prev_security_level_id
    - prev_security_states
    - security_level
    - security_level_id
    - security_states
    - state
    - state_id
    slot_usage:
      actor:
        annotations:
          group: context
      device:
        description: The device that is impacted by the state change.
        required: true
        annotations:
          group: primary
      prev_security_level:
        recommended: true
        annotations:
          group: primary
      prev_security_level_id:
        recommended: true
        annotations:
          group: primary
      prev_security_states:
        description: The previous security states of the device.
        recommended: true
        annotations:
          group: primary
      security_level:
        recommended: true
        annotations:
          group: primary
      security_level_id:
        recommended: true
        annotations:
          group: primary
      security_states:
        description: The current security states of the device.
        recommended: true
        annotations:
          group: primary
      state:
        description: The Config Change Stat, normalized to the caption of the state_id value. In the case of 'Other', it is defined by the source.
      state_id:
        description: The Config Change State of the managed entity.
        recommended: true
        range: DeviceConfigStateChangeStateIdEnum
    annotations:
      ocsf_event_uid: 19
  DiscoveryResult:
    description: Discovery Result events report the results of a discovery request.
    aliases:
    - Discovery Result
    is_a: BaseEvent
    slots:
    - activity_id
    - query_info
    - query_result
    - query_result_id
    slot_usage:
      activity_id:
        range: DiscoveryResultActivityIdEnum
      query_info:
        description: The search details associated with the query request.
        recommended: true
        annotations:
          group: primary
      query_result:
        recommended: true
        annotations:
          group: primary
      query_result_id:
        required: true
        annotations:
          group: primary
    annotations:
      category: discovery
  EvidenceInfo:
    description: Data collected directly from devices that represents forensic information pulled, queried, or discovered from devices that may indicate malicious activity. It contains a number of child objects, each representing a distinct evidence domain (network connections, file artifacts, registry entries, etc.). When mapping raw telemetry data users should select Query Evidence and then the appropriate child object that best matches the evidence type.
    aliases:
    - Live Evidence Info
    is_a: DiscoveryResult
    slots:
    - device
    - query_evidence
    slot_usage:
      device:
        description: An addressable device, computer system or host from which evidence was collected.
        required: true
        annotations:
          group: primary
      query_evidence:
        description: The specific resulting evidence information that was queried or discovered based on the query type. Contains various child objects corresponding to the query_type_id values.
        required: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 40
  FileQuery:
    description: File Query events report information about files that are present on the system.
    aliases:
    - File Query
    deprecated: Use the <code>Live Evidence Info</code> class. (since 1.5.0)
    is_a: DiscoveryResult
    slots:
    - file
    slot_usage:
      file:
        description: The file that is the target of the query.
        required: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 7
  FolderQuery:
    description: Folder Query events report information about folders that are present on the system.
    aliases:
    - Folder Query
    deprecated: Use the <code>Live Evidence Info</code> class. (since 1.5.0)
    is_a: DiscoveryResult
    slots:
    - folder
    slot_usage:
      folder:
        description: The folder that is the target of the query.
        required: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 8
  InventoryInfo:
    description: Device Inventory Info events report device inventory data that is either logged or proactively collected. For example, when collecting device information from a CMDB or running a network sweep of connected devices.
    aliases:
    - Device Inventory Info
    is_a: DiscoveryEvent
    slots:
    - actor
    - device
    slot_usage:
      actor:
        annotations:
          group: context
      device:
        description: The device that is being discovered by an inventory process.
        required: true
        annotations:
          group: primary
    annotations:
