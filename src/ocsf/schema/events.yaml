        description: 'The event status code, as reported by the event source.<br />Example: <code>0</code>, <code>8</code>, or <code>21</code> for <a target=''_blank'' href=''https://learn.microsoft.com/en-us/previous-versions/windows/desktop/eventlogprov/cleareventlog-method-in-class-win32-nteventlogfile''>Windows ClearEventLog</a>.'
        recommended: true
        annotations:
          group: primary
      status_detail:
        description: 'The status detail contains additional information about the event outcome.<br />Example: <code>Success</code>, <code>Privilege Missing</code>, or <code>Invalid Parameter</code> for <a target=''_blank'' href=''https://learn.microsoft.com/en-us/previous-versions/windows/desktop/eventlogprov/cleareventlog-method-in-class-win32-nteventlogfile''>Windows ClearEventLog</a>.'
        recommended: true
        annotations:
          group: primary
    rules:
    - description: 'OCSF at_least_one: at least one of [''log_file'', ''log_name'', ''log_provider'', ''log_type'', ''log_type_id''] must be set.'
      postconditions:
        any_of:
        - slot_conditions:
            log_file:
              required: true
        - slot_conditions:
            log_name:
              required: true
        - slot_conditions:
            log_provider:
              required: true
        - slot_conditions:
            log_type:
              required: true
        - slot_conditions:
            log_type_id:
              required: true
    annotations:
      ocsf_constraints: '{"at_least_one": ["log_file", "log_name", "log_provider", "log_type", "log_type_id"]}'
      ocsf_event_uid: 8
    see_also:
    - https://d3fend.mitre.org/event/d3f:EventLogEvent/
    notes:
    - D3FEND™ Ontology d3f:EventLogEvent — https://d3fend.mitre.org/event/d3f:EventLogEvent/
  FileActivity:
    description: File System Activity events report when a process performs an action on a file or folder.
    aliases:
    - File System Activity
    is_a: SystemEvent
    slots:
    - access_mask
    - activity_id
    - actor
    - component
    - connection_uid
    - create_mask
    - file
    - file_diff
    - file_result
    slot_usage:
      access_mask:
        annotations:
          group: context
      activity_id:
        range: FileActivityActivityIdEnum
      actor:
        description: The actor that performed the activity on the <code>file</code> object
        required: true
      component:
        description: '<p>The name or relative pathname of a sub-component of the data object, if applicable. </p>For example: <code>attachment.doc</code>, <code>attachment.zip/bad.doc</code>, or <code>part.mime/part.cab/part.uue/part.doc</code>.'
        recommended: true
        annotations:
          group: primary
      connection_uid:
        annotations:
          group: context
      create_mask:
        recommended: true
        annotations:
          group: primary
      file:
        description: The file that is the target of the activity.
        required: true
        annotations:
          group: primary
      file_diff:
        recommended: true
        annotations:
          group: primary
      file_result:
        description: The resulting file object when the activity was allowed and successful.
        recommended: true
        annotations:
          group: primary
    see_also:
    - https://d3fend.mitre.org/event/d3f:FileEvent/
    notes:
    - D3FEND™ Ontology d3f:FileEvent — https://d3fend.mitre.org/event/d3f:FileEvent/
    annotations:
      ocsf_event_uid: 1
  KernelActivity:
    description: Kernel Activity events report when an process creates, reads, or deletes a kernel resource.
