  NetworkEvent:
    description: Network event is a generic event that defines a set of attributes available in the Network category.
    aliases:
    - Network
    is_a: BaseEvent
    mixins:
    - NetworkProxyProfile
    - LoadBalancerProfile
    slots:
    - app_name
    - app_protocol_name
    - connection_info
    - cumulative_traffic
    - dst_endpoint
    - ja4_fingerprint_list
    - network_observation_point
    - observation_point
    - observation_point_id
    - packet_list
    - proxy
    - src_endpoint
    - tls
    - traffic
    slot_usage:
      app_name:
        description: The network application name identified by tools such as NBAR or App ID (e.g., youtube, facebook, webex). This represents a specific network application that uses standard protocols (such as https or quic) to deliver its service.
        annotations:
          group: context
      app_protocol_name:
        description: |-
          The application-layer (Layer 7) protocol name identified by deep packet inspection or packet parsing (e.g., <code>https</code>, <code>quic</code>, <code>ssh</code>, <code>dns</code>), expressed as an IANA-registered service name from the IANA Service Name and Transport Protocol Port Number Registry.

          <p><b>Note:</b> Port numbers alone are not always a reliable indicator of the actual application protocol in use.</p>
        annotations:
          group: context
      connection_info:
        recommended: true
        annotations:
          group: primary
      cumulative_traffic:
        description: 'The cumulative (running total) network traffic aggregated from the start of a flow or session. Use when reporting: (1) total accumulated bytes/packets since flow initiation, (2) combined aggregation models where both incremental deltas and running totals are reported together (populate both <code>traffic</code> for the delta and this attribute for the cumulative total), or (3) final summary metrics when a long-lived connection closes. This represents the sum of all activity from flow start to the current observation, not a delta or point-in-time value.'
        annotations:
          group: context
      dst_endpoint:
        description: The responder (server) in a network connection.
        recommended: true
        annotations:
          group: primary
      ja4_fingerprint_list:
        annotations:
          group: context
      network_observation_point:
        description: The network endpoint that observes or inspects network traffic as a third-party system, used when the observer is neither the source nor the destination of the communication (when <code>observation_point_id</code> = 3). Examples include network taps, span ports, inline security devices, or packet capture systems that monitor traffic between other endpoints.
        annotations:
          group: context
      observation_point:
        description: Indicates whether the source network endpoint, destination network endpoint, or neither served as the observation point for the activity. The value is normalized to the caption of the <code>observation_point_id</code>.
      observation_point_id:
        description: The normalized identifier of the observation point. The observation point identifier indicates whether the source network endpoint, destination network endpoint, or neither served as the observation point for the activity.
        range: NetworkEventObservationPointIdEnum
      packet_list:
        annotations:
          group: context
      proxy:
        recommended: true
        annotations:
          group: primary
      src_endpoint:
        description: The initiator (client) of the network connection.
        recommended: true
        annotations:
          group: primary
      tls:
        annotations:
          group: context
      traffic:
        description: 'The network traffic for this observation period. Use when reporting: (1) delta values (bytes/packets transferred since the last observation), (2) instantaneous measurements at a specific point in time, or (3) standalone single-event metrics. This attribute represents a point-in-time measurement or incremental change, not a running total. For accumulated totals across multiple observations or the lifetime of a flow, use <code>cumulative_traffic</code> instead.'
        recommended: true
        annotations:
          group: primary
    rules:
    - description: 'OCSF at_least_one: at least one of [''dst_endpoint'', ''src_endpoint''] must be set.'
      postconditions:
        any_of:
        - slot_conditions:
            dst_endpoint:
              required: true
        - slot_conditions:
            src_endpoint:
              required: true
    annotations:
      ocsf_constraints: '{"at_least_one": ["dst_endpoint", "src_endpoint"]}'
      category: network
    see_also:
    - https://d3fend.mitre.org/event/d3f:NetworkEvent/
    notes:
    - D3FEND™ Ontology d3f:NetworkEvent — https://d3fend.mitre.org/event/d3f:NetworkEvent/
