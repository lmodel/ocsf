    - D3FEND™ Ontology d3f:LoadLibraryEvent — https://d3fend.mitre.org/event/d3f:LoadLibraryEvent/
    - D3FEND™ Ontology d3f:UnloadLibraryEvent — https://d3fend.mitre.org/event/d3f:UnloadLibraryEvent/
    annotations:
      ocsf_event_uid: 5
  PeripheralActivity:
    description: Peripheral Activity events log a system's interactions with external, connectable, and detachable hardware. These events provide visibility into the external devices connected to and used by a system.
    aliases:
    - Peripheral Activity
    is_a: SystemEvent
    slots:
    - activity_id
    - peripheral_device
    slot_usage:
      activity_id:
        range: PeripheralActivityActivityIdEnum
      peripheral_device:
        description: The peripheral device that is the subject of the activity.
        required: true
        annotations:
          group: primary
    annotations:
      ocsf_event_uid: 10
  ProcessActivity:
    description: Process Activity events report when a process launches, injects, opens or terminates another process, successful or otherwise.
    aliases:
