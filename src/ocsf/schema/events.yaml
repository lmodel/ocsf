    mixins:
    - AiOperationProfile
    slots:
    - activity_id
    - actor
    - actual_permissions
    - exit_code
    - injection_type
    - injection_type_id
    - launch_type
    - launch_type_id
    - module
    - process
    - requested_permissions
    slot_usage:
      activity_id:
        range: ProcessActivityActivityIdEnum
      actor:
        description: The actor that performed the activity on the target <code>process</code>. For example, the process that started a new process or injected code into another process.
      actual_permissions:
        description: The permissions that were granted to the process in a platform-native format.
        recommended: true
        annotations:
          group: primary
      exit_code:
        recommended: true
        annotations:
          group: primary
      injection_type:
        recommended: true
        annotations:
          group: primary
      injection_type_id:
        recommended: true
        annotations:
          group: primary
      launch_type:
        recommended: true
        annotations:
          group: primary
      launch_type_id:
        recommended: true
        annotations:
          group: primary
      module:
        description: The module that was injected by the actor process.
        recommended: true
        annotations:
          group: primary
      process:
        description: The process that was launched, injected into, opened, or terminated.
        required: true
        annotations:
          group: primary
      requested_permissions:
        description: The permissions mask that was requested by the process.
        recommended: true
        annotations:
          group: primary
    see_also:
    - https://d3fend.mitre.org/event/d3f:ProcessEvent/
    notes:
    - D3FEND™ Ontology d3f:ProcessEvent — https://d3fend.mitre.org/event/d3f:ProcessEvent/
    annotations:
      ocsf_event_uid: 7
  ScheduledJobActivity:
