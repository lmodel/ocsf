id: https://w3id.org/lmodel/ocsf/dictionary
name: ocsf-dictionary
description: Slot definitions derived from the OCSF Attribute Dictionary (dictionary.json).
license: Apache-2.0
source: https://github.com/ocsf/ocsf-schema/tree/main
version: 1.9.0-dev

annotations:
  copyright: © OCSF a Series of LF Projects, LLC

prefixes:
  ocsf: https://w3id.org/lmodel/ocsf/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  xsd: http://www.w3.org/2001/XMLSchema#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
  attack: https://lmodel.github.io/attack/
  stix: https://lmodel.github.io/stix/
  uco_master: https://lmodel.github.io/uco-master/
  capec: https://w3id.org/lmodel/capec/
  cve: https://w3id.org/lmodel/cve/
  cwe: https://w3id.org/lmodel/cwe/
  iso27001: https://w3id.org/lmodel/iso27001/
  kev_catalog: https://w3id.org/lmodel/kev-catalog/
  nvd: https://w3id.org/lmodel/nist-nvd/
  core: https://w3id.org/lmodel/vulnerability-core/
default_prefix: ocsf
default_range: string

imports:
  - linkml:types
  - ./types
  - ./enums

slots:

  access_analysis_result:
    description: |-
      Describes access relationships and pathways between identities, resources,
      focusing on who can access what and through which mechanisms. This evaluates
      access levels (read/write/admin), access types (direct, cross-account, public,
      federated), and the conditions under which access is granted. Use this for
      resource-centric security assessments such as external access discovery, public
      exposure analysis, etc.
    range: AccessAnalysisResult
    aliases:
      - Access Analysis Result

  access_level:
    description: The access level of an entity. See specific usage.
    range: string
    aliases:
      - Access Level

  access_list:
    description: The list of requested access rights.
    range: string
    multivalued: true
    aliases:
      - Access List

  access_mask:
    description: The access mask in a platform-native format.
    range: integer
    aliases:
      - Access Mask

  access_result:
    description: The list of access check results.
    range: string
    aliases:
      - Access Check Result

  access_type:
    description: |-
      The type or category of access being granted to the identity. See specific
      usage.
    range: string
    aliases:
      - Access Type

  accessed_time:
    description: The time when the file was last accessed.
    range: TimestampT
    aliases:
      - Accessed Time

  accessor:
    description: The name of the user who last accessed the object.
    range: User
    aliases:
      - Accessor

  accessors:
    description: A list of users who have access to an entity. See specific usage.
    range: User
    multivalued: true
    aliases:
      - Accessors

  account:
    description: |-
      The account object describes details about the account that was the source or
      target of the activity. See specific usage.
    range: Account
    aliases:
      - Account

  account_switch_type:
    description: |-
      The account switch method, normalized to the caption of the
      account_switch_type_id value. In the case of 'Other', it is defined by the
      event source.
    range: string
    aliases:
      - Account Switch Type

  account_switch_type_id:
    description: The normalized identifier of the account switch method.
    range: AccountSwitchTypeIdEnum
    aliases:
      - Account Switch Type ID
    annotations:
      sibling: account_switch_type

  ack_reason:
    description: |-
      An integer that provides a reason code or additional information about the
      acknowledgment result.
    range: integer
    aliases:
      - Acknowledgement Reason

  ack_result:
    description: An integer that denotes the acknowledgment result of the DCE/RPC call.
    range: integer
    aliases:
      - Acknowledgement Result

  action:
    description: The normalized caption of 'action_id' or the source specific action.
    range: string
    aliases:
      - Action

  action_id:
    description: |-
      The normalized action taken by a control or other policy-based system leading
      to an outcome or disposition.
    range: ActionIdEnum
    aliases:
      - Action ID
    annotations:
      sibling: action

  activity_id:
    description: The normalized identifier of the activity that triggered the event.
    range: ActivityIdEnum
    aliases:
      - Activity ID
    annotations:
      sibling: activity_name
      suppress_checks: sibling_convention

  activity_name:
    description: The event activity name, as defined by the activity_id.
    range: string
    aliases:
      - Activity

  actor:
    description: |-
      The actor object describes details about the user/role/process that was the
      source of the activity. Note that this is not the threat actor of a campaign
      but may be part of a campaign.
    range: Actor
    aliases:
      - Actor

  actual_permissions:
    description: |-
      The permissions that were granted in a platform-native format. See specific
      usage.
    range: integer
    aliases:
      - Actual Permissions

  additional_restrictions:
    description: |-
      The supplementary restrictions that may apply to an entity, by the virtue of a
      policy. See specific usage.
    range: AdditionalRestriction
    multivalued: true
    aliases:
      - Additional Restrictions

  advisory:
    description: |-
      Detail about the security advisory, that is used to publicly disclose
      cybersecurity vulnerabilities by a vendor.
    range: Advisory
    aliases:
      - Security Advisory

  aerial_height:
    description: |-
      Expressed as either height above takeoff location or height above ground level
      (AGL) for a UAS current location. This value is provided in meters and must
      have a minimum resolution of 1 m. Special Values: <code>Invalid</code>,
      <code>No Value</code>, or <code>Unknown: -1000 m</code>.
    range: string
    aliases:
      - Aerial Height

  affected_code:
    description: |-
      List of Affected Code objects that describe details about code blocks
      identified as vulnerable.
    range: AffectedCode
    multivalued: true
    aliases:
      - Affected Code

  affected_packages:
    description: |-
      List of software packages identified as affected by a
      vulnerability/vulnerabilities.
    range: AffectedPackage
    multivalued: true
    aliases:
      - Affected Software Packages

  agent:
    description: |-
      An Agent (also known as a Sensor) is typically installed on an Operating System
      (OS) and serves as a specialized software component that can be designed to
      monitor, detect, collect, archive, or take action. These activities and
      possible actions are defined by the upstream system controlling the Agent and
      its intended purpose. For instance, an Agent can include Endpoint Detection &
      Response (EDR) agents, backup/disaster recovery sensors, Application
      Performance Monitoring or profiling sensors, and similar software.
    range: Agent
    aliases:
      - Agent

  agent_list:
    description: |-
      A list of <code>agent</code> objects associated with a device, endpoint, or
      resource.
    range: Agent
    multivalued: true
    aliases:
      - Agent List

  ai_model:
    description: |-
      The AI Model object describes the characteristics of an AI/ML model. Examples
      include language models like GPT-4, embedding models like
      text-embedding-ada-002, and computer vision models like CLIP.
    range: AiModel
    aliases:
      - AI Model

  ai_provider:
    description: AI service provider or organization name.
    range: string
    aliases:
      - AI Provider

  ai_role:
    description: The normalized caption of the <code>ai_role_id</code>.
    range: string
    aliases:
      - AI Role

  ai_role_id:
    description: The originator or target role of the message.
    range: integer
    aliases:
      - AI Role ID
    annotations:
      sibling: ai_role

  aircraft:
    description: |-
      The Aircraft object represents any aircraft or otherwise airborne asset such as
      an unmanned system, airplane, balloon, spacecraft, or otherwise. The Aircraft
      object is intended to normalized data captured or otherwise logged from active
      radar, passive radar, multi-spectral systems, or the Automatic Dependant
      Broadcast - Surveillance (ADS-B), and/or Mode S systems.
    range: Aircraft
    aliases:
      - Aircraft

  alert:
    description: |-
      The integer value of TLS alert if present. The alerts are defined in the TLS
      specification in <a target='_blank'
      href='https://datatracker.ietf.org/doc/html/rfc2246'>RFC-2246</a>.
    range: integer
    aliases:
      - Client TLS Alert

  algorithm:
    description: |-
      The applicable algorithm, normalized to the caption of 'algorithm_id'. See
      specific usage.
    range: string
    aliases:
      - Algorithm

  algorithm_id:
    description: The normalized identifier of the algorithm. See specific usage.
    range: AlgorithmIdEnum
    aliases:
      - Algorithm ID
    annotations:
      sibling: algorithm

  all_privileges_unused:
    description: |-
      Indicates whether all privileges in a set, list, collection or group are
      unused. See specific usage.
    range: boolean
    aliases:
      - All Privileges Unused

  altitude_ceiling:
    description: |-
      Maximum altitude (WGS-84 HAE) for a group or an Intent-Based Network
      Participant. Measured in meters. Special Values: <code>Invalid</code>, <code>No
      Value</code>, or <code>Unknown: -1000 m</code>.
    range: string
    aliases:
      - Altitude Ceiling

  altitude_floor:
    description: |-
      Minimum altitude (WGS-84 HAE) for a group or an Intent-Based Network
      Participant. Measured in meters. Special Values: <code>Invalid</code>, <code>No
      Value</code>, or <code>Unknown: -1000 m</code>.
    range: string
    aliases:
      - Altitude Floor

  analysis_targets:
    description: |-
      The specific dimensions, components, or aspects of the system that are the
      targets of the analysis. See specific usage.
    range: AnalysisTarget
    multivalued: true
    aliases:
      - Analysis Targets

  analytic:
    description: |-
      The analytic technique used to analyze and derive insights from the data or
      information that led to the finding or conclusion.
    range: Analytic
    aliases:
      - Analytic

  analyzed_privileges_count:
    description: The total count of privileges that were analyzed. See specific usage.
    range: integer
    aliases:
      - Analyzed Privileges Count

  ancestry:
    description: |-
      An array of Process Entities describing the extended parentage of this process
      object. Direct parent information should be expressed through the
      <code>parent_process</code> attribute. The first array element is the direct
      parent of this process object. Subsequent list elements go up the process
      parentage hierarchy. That is, the array is sorted from newest to oldest
      process. It is recommended to only populate this field for the top-level
      process object.
    range: ProcessEntity
    multivalued: true
    aliases:
      - Ancestry
    see_also:
      - https://github.com/ocsf/ocsf-docs/blob/main/articles/representing-process-parentage.md
    notes:
      - |-
        Guidance on Representing Process Parentage —
        https://github.com/ocsf/ocsf-docs/blob/main/articles/representing-process-parentage.md

  anomalies:
    description: |-
      A list of detected anomalies or deviations from expected behavior patterns. See
      specific usage.
    range: Anomaly
    multivalued: true
    aliases:
      - Anomalies

  anomaly_analyses:
    description: |-
      A list of anomaly analysis results that examine and characterize patterns of
      activity or usage over time to identify normal vs abnormal activities. See
      specific usage.
    range: AnomalyAnalysis
    multivalued: true
    aliases:
      - Anomaly Analyses

  answers:
    description: The Domain Name System (DNS) answers.
    range: DnsAnswer
    multivalued: true
    aliases:
      - DNS Answer

  api:
    description: Describes details about a typical API (Application Programming Interface) call.
    range: Api
    aliases:
      - API Details

  app:
    description: The application that reported the event.
    range: Product
    aliases:
      - Application

  app_name:
    description: The name of the application associated with the event or object.
    range: string
    aliases:
      - Application Name

  app_protocol_name:
    description: The application protocol name. See specific usage.
    range: string
    aliases:
      - Application Protocol Name

  app_uid:
    description: The unique ID of the application associated with the event or object.
    range: string
    aliases:
      - Application ID

  application:
    description: |-
      An Application describes the details for an inventoried application as reported
      by an Application Security tool or other Developer-centric tooling.
      Applications can be defined as Kubernetes resources, Containerized resources,
      or application hosting-specific cloud sources such as AWS Elastic BeanStalk,
      AWS Lightsail, or Azure Logic Apps.
    range: ApplicationObject
    aliases:
      - Application

  applications:
    description: A list of application objects. See specific usage.
    range: ApplicationObject
    multivalued: true
    aliases:
      - Applications

  architecture:
    description: |-
      Architecture is a shorthand name describing the type of computer hardware the
      packaged software is meant to run on.
    range: string
    aliases:
      - Architecture

  args:
    description: The arguments sent along with the HTTP request.
    range: string
    aliases:
      - HTTP Arguments

  assessment:
    description: |-
      The Assessment object describes a point-in-time assessment, check, or
      evaluation of a specific configuration or signal against an asset, entity,
      person, or otherwise. For example, this can encapsulate <code>os_signals</code>
      from CrowdStrike Falcon Zero Trust Assessments, or account for
      <code>Datastore</code> configurations from Cyera.
    range: Assessment
    aliases:
      - Assessment

  assessments:
    description: A list of <code>assessment</code> objects. See specific usage.
    range: Assessment
    multivalued: true
    aliases:
      - Assessments

  assignee:
    description: The details of the user assigned to an Incident.
    range: User
    aliases:
      - Assignee

  assignee_group:
    description: The details of the group assigned to an Incident.
    range: Group
    aliases:
      - Assignee Group

  attack:
    description: The MITRE ATT&CK® object describing the tactic, technique, and sub-technique.
    range: Attack
    aliases:
      - MITRE ATT&CK® Details

  attack_graph:
    description: |-
      An Attack Graph describes possible routes an attacker could take through an
      environment. It describes relationships between resources and their findings,
      such as malware detections, vulnerabilities, misconfigurations, and other
      security actions.
    range: Graph
    aliases:
      - Attack Graph
    see_also:
      - https://learn.microsoft.com/en-us/azure/defender-for-cloud/how-to-manage-attack-path
      - https://www.sentinelone.com/cybersecurity-101/cybersecurity/attack-path-analysis/
    notes:
      - |-
        MS Defender description of Attack Path —
        https://learn.microsoft.com/en-us/azure/defender-for-cloud/how-to-manage-attack-path
      - |-
        SentinelOne Attack Path documentation —
        https://www.sentinelone.com/cybersecurity-101/cybersecurity/attack-path-analysis/

  attacks:
    description: |-
      An array of MITRE ATT&CK® objects describing identified tactics, techniques &
      sub-techniques. The objects are compatible with MITRE ATLAS™ tactics,
      techniques & sub-techniques.
    range: Attack
    multivalued: true
    aliases:
      - MITRE ATT&CK® and ATLAS™ Details
    see_also:
      - https://attack.mitre.org
      - https://atlas.mitre.org/matrices/ATLAS
    notes:
      - MITRE ATT&CK® — https://attack.mitre.org
      - MITRE ATLAS — https://atlas.mitre.org/matrices/ATLAS

  attempt:
    description: The delivery attempt.
    range: integer
    aliases:
      - Attempt

  attributes:
    description: The bitmask value that represents the file attributes.
    range: integer
    aliases:
      - Attributes

  auid:
    description: The audit user assigned at login by the audit subsystem.
    range: integer
    aliases:
      - Audit User ID

  auth_factors:
    description: |-
      Describes a category of methods used for identity verification. See specific
      usage.
    range: AuthFactor
    multivalued: true
    aliases:
      - Authentication Factors

  auth_protocol:
    description: |-
      The authentication protocol as defined by the caption of
      <code>auth_protocol_id</code>. In the case of <code>Other</code>, it is defined
      by the event source.
    range: string
    aliases:
      - Auth Protocol

  auth_protocol_id:
    description: |-
      The normalized identifier of the authentication protocol used to create the
      user session.
    range: AuthProtocolIdEnum
    aliases:
      - Auth Protocol ID
    annotations:
      sibling: auth_protocol

  auth_type:
    description: |-
      The agreed upon authentication type, normalized to the caption of
      'auth_type_id'. In the case of 'Other', it is defined by the event source.
    range: string
    aliases:
      - Authentication Type

  auth_type_id:
    description: |-
      The normalized identifier of the agreed upon authentication type. See specific
      usage.
    range: AuthTypeIdEnum
    aliases:
      - Authentication Type ID
    annotations:
      sibling: auth_type

  authentication_token:
    description: The authentication token, ticket, or assertion. See specific usage.
    range: AuthenticationToken
    aliases:
      - Authentication Token

  author:
    description: The author(s) who published the software component.
    range: string
    aliases:
      - Author

  authorizations:
    description: |-
      Provides details about an authorization, such as authorization outcome, and any
      associated policies related to the activity/event.
    range: Authorization
    multivalued: true
    aliases:
      - Authorization Information

  autonomous_system:
    description: The Autonomous System details associated with an IP address.
    range: AutonomousSystem
    aliases:
      - Autonomous System

  autoscale_uid:
    description: The unique identifier of the cloud autoscale configuration.
    range: string
    aliases:
      - Autoscale UID

  avg_timespan:
    description: The average time span of an activity.
    range: Timespan
    aliases:
      - Average Timespan

  banner:
    description: |-
      The initial connection response that a messaging server receives after it
      connects to an email server.
    range: string
    aliases:
      - Protocol Banner

  base_address:
    description: The memory address where the module was loaded.
    range: string
    aliases:
      - Base Address

  base_score:
    description: The base score as reported by the event source. See specific usage.
    range: float
    aliases:
      - Base Score

  baselines:
    description: |-
      A list of baseline measurements or normal behavior patterns used as reference
      points for comparison and anomaly detection. See specific usage.
    range: Baseline
    multivalued: true
    aliases:
      - Baselines

  bios_date:
    description: 'The BIOS date. For example: <code>03/31/16</code>.'
    range: string
    aliases:
      - BIOS Date

  bios_manufacturer:
    description: 'The BIOS manufacturer. For example: <code>LENOVO</code>.'
    range: string
    aliases:
      - BIOS Manufacturer

  bios_ver:
    description: 'The BIOS version. For example: <code>LENOVO G5ETA2WW (2.62)</code>.'
    range: string
    aliases:
      - BIOS Version

  body_length:
    description: |-
      The actual length of the HTTP response/request body, in number of bytes,
      independent of a potentially existing Content-Length header.
    range: integer
    aliases:
      - Body Length not including header

  boot_time:
    description: The time when the system was booted.
    range: TimestampT
    aliases:
      - Boot Time

  boot_uid:
    description: |-
      A unique identifier of the device that changes after every reboot. For example,
      the value of <code>/proc/sys/kernel/random/boot_id</code> from Linux's procfs.
    range: string
    aliases:
      - Boot UID
    see_also:
      - https://docs.kernel.org/admin-guide/sysctl/kernel.html#random
    notes:
      - |-
        Linux kernel's documentation —
        https://docs.kernel.org/admin-guide/sysctl/kernel.html#random

  boundary:
    description: |-
      The boundary of the connection, normalized to the caption of 'boundary_id'. In
      the case of 'Other', it is defined by the event source. <p> For cloud
      connections, this translates to the traffic-boundary(same VPC, through IGW,
      etc.). For traditional networks, this is described as Local, Internal, or
      External.</p>
    range: string
    aliases:
      - Boundary

  boundary_id:
    description: |-
      <p>The normalized identifier of the boundary of the connection. </p><p> For
      cloud connections, this translates to the traffic-boundary (same VPC, through
      IGW, etc.). For traditional networks, this is described as Local, Internal, or
      External.</p>
    range: BoundaryIdEnum
    aliases:
      - Boundary ID
    annotations:
      sibling: boundary

  build:
    description: The operating system build number.
    range: string
    aliases:
      - OS Build

  bulletin:
    description: The vendor bulletin identifier.
    range: string
    aliases:
      - Patch Bulletin

  bus_type:
    description: |-
      The attachment bus or interface standard, normalized to the caption of the
      bus_type_id value. In the case of 'Other', it is defined by the event source.
    range: string
    aliases:
      - Bus Type

  bus_type_id:
    description: The normalized identifier of the attachment bus or interface standard.
    range: BusTypeIdEnum
    aliases:
      - Bus Type ID
    annotations:
      sibling: bus_type

  bytes:
    description: The total number of bytes (in and out).
    range: integer
    aliases:
      - Total Bytes

  bytes_in:
    description: The number of bytes sent from the destination to the source.
    range: integer
    aliases:
      - Bytes In

  bytes_missed:
    description: Indicates the number of bytes missed, which is representative of packet loss.
    range: integer
    aliases:
      - Bytes Missed

  bytes_out:
    description: The number of bytes sent from the source to the destination.
    range: integer
    aliases:
      - Bytes Out

  campaign:
    description: |-
      The campaign object describes details about the campaign that was the source of
      the activity.
    range: Campaign
    aliases:
      - Campaign

  capabilities:
    description: A list of RDP capabilities.
    range: string
    multivalued: true
    aliases:
      - Capabilities

  caption:
    description: |-
      A short description or caption of the device. For example: <code>Scanner
      1</code> or <code>Database Manager</code>.
    range: string
    aliases:
      - Caption

  categories:
    description: |-
      The Website categorization names, as defined by <code>category_ids</code> enum
      values.
    range: string
    multivalued: true
    aliases:
      - Website Categorization

  category:
    description: |-
      The object category, normalized to the caption of <code>category_id</code>. See
      specific usage.
    range: string
    aliases:
      - Category

  category_id:
    description: The normalized identifier of the object category. See specific usage.
    range: integer
    aliases:
      - Category ID
    annotations:
      sibling: category

  category_ids:
    description: The Website categorization identifiers.
    range: CategoryIdsEnum
    multivalued: true
    aliases:
      - Website Categorization IDs
    annotations:
      sibling: categories

  category_name:
    description: The event category name, as defined by category_uid value.
    range: string
    aliases:
      - Category

  category_uid:
    description: The category unique identifier of the event.
    range: integer
    aliases:
      - Category ID
    annotations:
      sibling: category_name

  cc:
    description: |-
      The machine-readable email header Cc values, as defined by RFC 5322. For
      example <code>example.user@usersdomain.com</code>.
    range: EmailT
    multivalued: true
    aliases:
      - Cc
    see_also:
      - https://www.rfc-editor.org/rfc/rfc5322
    notes:
      - RFC 5322 — https://www.rfc-editor.org/rfc/rfc5322

  cc_mailboxes:
    description: |-
      The human-readable email header Cc Mailbox values. For example <code>'Example
      User &lt;example.user@usersdomain.com&gt;'</code>.
    range: string
    multivalued: true
    aliases:
      - Cc Mailboxes
    see_also:
      - https://www.rfc-editor.org/rfc/rfc5322#section-3.4
    notes:
      - RFC 5322 — https://www.rfc-editor.org/rfc/rfc5322#section-3.4

  cell_name:
    description: The name of the cell. See specific usage.
    range: string
    aliases:
      - Cell Name

  certificate:
    description: The certificate object containing information about the digital certificate.
    range: Certificate
    aliases:
      - Certificate

  certificate_chain:
    description: |-
      The Chain of Certificate Serial Numbers field provides a chain of Certificate
      Issuer Serial Numbers leading to the Root Certificate Issuer.
    range: string
    multivalued: true
    aliases:
      - Certificate Chain

  chassis:
    description: |-
      The chassis type describes the system enclosure or physical form factor. Such
      as the following examples for Windows <a target='_blank'
      href='https://docs.microsoft.com/en-us/windows/win32/cimwin32prov/win32-systemenclosure'>Windows
      Chassis Types</a>
    range: string
    aliases:
      - Chassis

  checks:
    description: |-
      A list of specific, individual compliance verification checks derived from
      standard or non-standard benchmark rules or requirements.
    range: Check
    multivalued: true
    aliases:
      - Compliance Checks

  chunks:
    description: |-
      A unit of information within an SCTP packet, consisting of a chunk header and
      chunk-specific content. See RFC 4960. This field can be used for the total
      number of chunks (in and out).
    range: integer
    aliases:
      - Chunks

  chunks_in:
    description: |-
      A unit of information within an SCTP packet, consisting of a chunk header and
      chunk-specific content. See RFC 4960. This field can be used for the chunks
      sent from the destination to the source.
    range: integer
