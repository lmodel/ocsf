      - Sequence Number

  serial_number:
    description: The serial number that pertains to the object. See specific usage.
    range: string
    aliases:
      - Serial Number
    annotations:
      observable_id: 37

  server_ciphers:
    description: |-
      The server cipher suites that were exchanged during the TLS handshake
      negotiation.
    range: string
    multivalued: true
    aliases:
      - Server Cipher Suites

  server_hassh:
    description: The Server HASSH fingerprinting object.
    range: Hassh
    aliases:
      - Server HASSH

  service:
    description: The service that pertains to the event.
    range: Service
    aliases:
      - Service

  service_privilege_analysis:
    description: Privilege analysis results for a single cloud service or resource namespace.
    range: ServicePrivilegeAnalysis
    aliases:
      - Service Privilege Analysis

  service_privilege_analysis_list:
    description: A list of privilege analysis results grouped by cloud service or namespace.
    range: ServicePrivilegeAnalysis
    multivalued: true
    aliases:
      - Service Privilege Analysis List

  session:
    description: The authenticated user or service session.
    range: Session
    aliases:
      - Session

  severity:
