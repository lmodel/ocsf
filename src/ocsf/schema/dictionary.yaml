      The event/finding severity, normalized to the caption of the
      <code>severity_id</code> value. In the case of 'Other', it is defined by the
      source.
    range: string
    aliases:
      - Severity

  severity_id:
    description: |-
      <p>The normalized identifier of the event/finding severity.</p>The normalized
      severity is a measurement the effort and expense required to manage and resolve
      an event or incident. Smaller numerical values represent lower impact events,
      and larger numerical values represent higher impact events.
    range: SeverityIdEnum
    aliases:
      - Severity ID
    annotations:
      sibling: severity

  share:
    description: The share name. See specific usage.
    range: string
    aliases:
      - Share

  share_type:
    description: |-
      The share type, normalized to the caption of the share_type_id value. In the
      case of 'Other', it is defined by the event source.
    range: string
    aliases:
      - Share Type

  share_type_id:
    description: The normalized identifier of the share type.
    range: ShareTypeIdEnum
    aliases:
      - Share Type ID
    annotations:
      sibling: share_type

  short_desc:
    description: The short description that pertains to the object or event. See specific usage.
    range: string
    aliases:
      - Short Description

  signature:
    description: The digital signature of the file.
    range: DigitalSignature
    aliases:
      - Digital Signature

  signatures:
    description: A collection of <code>Digital Signature</code> objects.
    range: DigitalSignature
    multivalued: true
    aliases:
      - Digital Signatures

  size:
    description: The size of data, in bytes.
    range: integer
    aliases:
      - Size

  smtp_from:
    description: The value of the SMTP MAIL FROM command.
    range: EmailT
    aliases:
      - SMTP From
    deprecated: Use the <code>from</code> attribute instead. (since 1.4.0)

  smtp_hello:
    description: The value of the SMTP HELO or EHLO command.
    range: string
    aliases:
      - SMTP Hello
    deprecated: Use the <code>command</code> attribute instead. (since 1.4.0)

  smtp_to:
    description: The value of the SMTP envelope RCPT TO command.
    range: EmailT
    multivalued: true
    aliases:
      - SMTP To
    deprecated: Use the <code>to</code> attribute instead. (since 1.4.0)

  sni:
    description: ' The Server Name Indication (SNI) extension sent by the client.'
    range: string
    aliases:
      - Server Name Indication

  software_components:
    description: The list of software components used in the software package.
    range: SoftwareComponent
    multivalued: true
    aliases:
      - Software Components

  source:
    description: |-
      The source, when used with source_id, is normalized to the caption of the
      source_id value. In the case of 'Other', it is defined by the event source. See
      specific usage.
    range: string
    aliases:
      - Source

  source_id:
    description: The normalized identifier of the source. See specific usage.
    range: SourceIdEnum
    aliases:
      - Source ID
    annotations:
      sibling: source

  sp_name:
    description: The name of the latest Service Pack.
    range: string
    aliases:
      - OS Service Pack

  sp_ver:
    description: The version number of the latest Service Pack.
    range: integer
    aliases:
      - OS Service Pack Version

  span:
    description: The information about the span. See specific usage.
    range: Span
    aliases:
      - Span

  speed:
    description: |-
      Ground speed of flight. This value is provided in meters per second with a
      minimum resolution of 0.25 m/s. Special Values: <code>Invalid</code>, <code>No
      Value</code>, or <code>Unknown: 255 m/s</code>.
    range: string
    aliases:
      - Speed

  speed_accuracy:
    description: |-
      Provides quality/containment on horizontal ground speed. Measured in
      meters/second.
    range: string
    aliases:
      - Speed Accuracy

  spf:
    description: The Sender Policy Framework (SPF) status of the email.
    range: string
    aliases:
      - SPF Status

  src_endpoint:
    description: The network source endpoint.
    range: NetworkEndpoint
    aliases:
      - Source Endpoint

  src_url:
    description: The URL pointing towards the source of an entity. See specific usage.
    range: UrlT
    aliases:
      - Source URL

  sso:
    description: |-
      The Single Sign-On (SSO) object provides a structure for normalizing SSO
      attributes, configuration, and/or settings from Identity Providers.
    range: Sso
    aliases:
      - SSO

  standards:
    description: |-
      Compliance standards are a set of criteria organizations can follow to protect
      sensitive and confidential information. e.g. <code>NIST SP 800-53, CIS AWS
      Foundations Benchmark v1.4.0, ISO/IEC 27001</code>
    range: string
    multivalued: true
    aliases:
      - 'Compliance Standards: List'

  start_address:
    description: The start address of the execution.
    range: string
    aliases:
      - Start Address

  start_column:
    description: The start column number. See specific usage.
    range: integer
    aliases:
      - Start Column

  start_line:
    description: The line number of the first line of code block identified as vulnerable.
    range: integer
    aliases:
      - Start Line

  start_offset:
    description: The starting offset. See specific usage.
    range: integer
    aliases:
      - Start Offset

  start_time:
    description: The start time of a time period. See specific usage.
    range: TimestampT
    aliases:
      - Start Time

  start_type:
    description: The start type of a service, driver, or application.
    range: string
    aliases:
      - Start Type

  start_type_id:
    description: The start type ID of a service or application.
    range: StartTypeIdEnum
    aliases:
      - Start Type ID
    annotations:
      sibling: start_type

  startup_item:
    description: |-
      The startup item object describes an application component that has associated
      startup criteria and configurations.
    range: StartupItem
    aliases:
      - Startup Item

  state:
    description: |-
      The state of the event or object, normalized to the caption of the state_id
      value. In the case of 'Other', it is defined by the event source. See specific
      usage.
    range: string
    aliases:
      - State

  state_id:
    description: The normalized state ID of the event or object. See specific usage.
    range: StateIdEnum
    aliases:
      - State ID
    annotations:
      sibling: state

  status:
    description: |-
      The event status, normalized to the caption of the status_id value. In the case
      of 'Other', it is defined by the event source.
    range: string
    aliases:
      - Status

  status_code:
    description: |-
      The event status code, as reported by the event source.<br /><br />For example,
      in a Windows Failed Authentication event, this would be the value of 'Failure
      Code', e.g. 0x18.
    range: string
    aliases:
      - Status Code

  status_detail:
    description: |-
      The status detail contains additional information about the event/finding
      outcome.
    range: string
    aliases:
      - Status Detail

  status_details:
    description: |-
      A list of descriptions, containing additional information about the
      event/finding status.
    range: string
    multivalued: true
    aliases:
      - Status Details

  status_id:
    description: The normalized identifier of the event status.
    range: StatusIdEnum
    aliases:
      - Status ID
    annotations:
      sibling: status

  storage_class:
    description: The storage class of the entity. See specific usage.
    range: string
    aliases:
      - Storage Class

  stratum:
    description: |-
      The stratum level of the NTP server's time source, normalized to the caption of
      the stratum_id value.
    range: string
    aliases:
      - Stratum

  stratum_id:
    description: |-
      The normalized identifier of the stratum level, as defined in <a
      target='_blank'
      href='https://www.rfc-editor.org/rfc/rfc5905.html'>RFC-5905</a>.
    range: StratumIdEnum
    aliases:
      - Stratum ID
    annotations:
      sibling: stratum

  sub_technique:
    description: |-
      The Sub-technique object describes the MITRE ATT&CK® or ATLAS™ Sub-technique ID
      and/or name associated to an attack.
    range: SubTechnique
    aliases:
      - MITRE Sub-technique
    see_also:
      - https://attack.mitre.org
      - https://atlas.mitre.org/matrices/ATLAS
    notes:
      - ATT&CK® Matrix — https://attack.mitre.org
      - ATLAS™ Matrix — https://atlas.mitre.org/matrices/ATLAS

  subdomain:
    description: |-
      The subdomain portion of the URL. For example: <code>sub</code> in
      <code>https://sub.example.com</code> or <code>sub2.sub1</code> in
      <code>https://sub2.sub1.example.com</code>.
    range: string
    aliases:
      - Subdomain

  subdomains:
    description: |-
      An array of subdomain strings. Can be used to collect several subdomains such
      as those from Domain Generation Algorithms (DGAs).
    range: string
    multivalued: true
    aliases:
      - Subdomains

  subgroup:
    description: A subgroup that was added to or removed from the group.
    range: Group
    aliases:
      - Subgroup

  subject:
    description: The identifier of the subject. See specific usage.
    range: string
    aliases:
      - Subject Details

  subnet:
    description: The subnet mask.
    range: SubnetT
    aliases:
      - Subnet

  subnet_prefix:
    description: |-
      The subnet prefix length determines the number of bits used to represent the
      network part of the IP address. The remaining bits are reserved for identifying
      individual hosts within that subnet.
    range: integer
    aliases:
      - Subnet Prefix Length

  subnet_uid:
    description: The unique identifier of a virtual subnet.
    range: string
    aliases:
      - Subnet UID

  supporting_data:
    description: Additional data supporting a finding as provided by security tool
    range: string
    aliases:
      - Supporting Data

  surname:
    description: The last or family name for the user.
    range: string
    aliases:
      - Surname

  svc_name:
    description: |-
      The service name in service-to-service connections. For example, AWS VPC logs
      the pkt-src-aws-service and pkt-dst-aws-service fields identify the connection
      is coming from or going to an AWS service.
    range: string
    aliases:
      - Service Name

  system_call:
    description: The system call that was invoked.
    range: string
    aliases:
      - System Call

  table:
    description: |-
      The table object represents a table within a structured relational database or
      datastore, which contains columns and rows of data that are able to be create,
      updated, deleted and queried.
    range: Table
    aliases:
      - Table

  tactic:
    description: |-
      The Tactic object describes the MITRE ATT&CK® or ATLAS™ Tactic ID and/or name
      that is associated to an attack.
    range: Tactic
    aliases:
      - MITRE Tactic
    see_also:
      - https://attack.mitre.org
      - https://atlas.mitre.org/matrices/ATLAS
    notes:
      - ATT&CK® Matrix — https://attack.mitre.org
      - ATLAS™ Matrix — https://atlas.mitre.org/matrices/ATLAS

  tactics:
    description: |-
      The Tactic object describes the tactic ID and/or tactic name that are
      associated with the attack technique, as defined by <a target='_blank'
      href='https://attack.mitre.org/wiki/ATT&CK_Matrix'>ATT&CK® Matrix</a>.
    range: Tactic
    multivalued: true
    aliases:
      - Tactics
    deprecated: Use the <code>tactic</code> attribute instead. (since 1.1.0)

  tag:
    description: 'The image tag. For example: <code>1.11-alpine</code>.'
    range: string
    aliases:
      - Image Tag
    deprecated: Use the <code>labels or tags</code> attribute instead. (since 1.4.0)

  tags:
    description: |-
      The list of tags; <code>{key:value}</code> pairs attached to an entity. A Tag
      may be used to categorize, filter, and search for entities. For e.g.
      <code>"Environment": "Production"</code>, <code>"Owner": "007"</code>. See
      specific usage.
    range: KeyValueObject
    multivalued: true
    aliases:
      - Tags

  target:
    description: The target of the event or object. See specific usage.
    range: string
    aliases:
      - Target

  tcp_flags:
    description: The network connection TCP header flags (i.e., control bits).
    range: integer
    aliases:
      - TCP Flags

  tcp_state_id:
    description: The state of the TCP socket for the network connection.
    range: TcpStateIdEnum
    aliases:
      - TCP State ID
    see_also:
      - https://datatracker.ietf.org/doc/html/rfc9293
    notes:
      - RFC 9293 — https://datatracker.ietf.org/doc/html/rfc9293

  technique:
    description: |-
      The Technique object describes the MITRE ATT&CK® or ATLAS™ Technique ID and/or
      name associated to an attack.
    range: Technique
    aliases:
      - MITRE Technique
    see_also:
      - https://attack.mitre.org
      - https://atlas.mitre.org/matrices/ATLAS
    notes:
      - ATT&CK® Matrix — https://attack.mitre.org
      - ATLAS™ Matrix — https://atlas.mitre.org/matrices/ATLAS

  tenant_uid:
    description: The unique tenant identifier.
    range: string
    aliases:
      - Tenant UID

  terminal:
    description: 'The Pseudo Terminal. Ex: the tty or pts value.'
    range: string
    aliases:
      - Terminal

  terminated_time:
    description: The time when the entity was terminated. See specific usage.
    range: TimestampT
    aliases:
      - Terminated Time

  threat_actor:
    description: |-
      A threat actor is an individual or group that conducts malicious cyber
      activities, often with financial, political, or ideological motives.
    range: ThreatActor
    aliases:
      - Threat Actor
    see_also:
      - https://stixproject.github.io/data-model/1.2/ta/ThreatActorType/
    notes:
      - |-
        STIX Threat Actor definition —
        https://stixproject.github.io/data-model/1.2/ta/ThreatActorType/

  ticket:
    description: The linked ticket in the ticketing system.
    range: Ticket
    aliases:
      - Ticket

  tickets:
    description: |-
      The associated ticket(s) in the ticketing system. Each ticket contains details
      like ticket ID, status, etc.
    range: Ticket
    multivalued: true
    aliases:
      - Tickets

  tid:
    description: |-
      The identifier of the thread associated with the event, as returned by the
      operating system.
    range: integer
    aliases:
      - Thread ID
    deprecated: |-
      <code>tid</code> is deprecated in favor of <code>ptid</code>. <code>ptid</code>
      has type <code>long_t</code> which can accommodate the thread identifiers
      returned by all platforms (e.g. 64-bit on MacOS). (since 1.6.0)

  time:
    description: The normalized event occurrence time or the finding creation time.
    range: TimestampT
    aliases:
      - Event Time

  timespan:
    description: |-
      The Time Span object represents different time period durations. If a timespan
      is fractional, i.e. crosses one period, e.g. a week and 3 days, more than one
      may be populated since each member is of integral type. In that case
      <code>type_id</code> if present should be set to <code>Other.</code><P>A
      timespan may also be defined by its time interval boundaries,
      <code>start_time</code> and <code>end_time</code>.
    range: Timespan
    aliases:
      - Time Span

  timezone_offset:
    description: |-
      The number of minutes that the reported event <code>time</code> is ahead or
      behind UTC, in the range -1,080 to +1,080.
    range: integer
    aliases:
      - Timezone Offset

  title:
    description: The title of an entity. See specific usage.
    range: string
    aliases:
      - Title

  tlp:
    description: |-
      The <a target='_blank' href='https://www.first.org/tlp/'>Traffic Light
      Protocol</a> was created to facilitate greater sharing of potentially sensitive
      information and more effective collaboration. TLP provides a simple and
      intuitive schema for indicating with whom potentially sensitive information can
      be shared.
    range: string
    aliases:
      - Traffic Light Protocol

  tls:
    description: The Transport Layer Security (TLS) attributes.
    range: Tls
    aliases:
      - TLS

  tls_extension_list:
    description: The list of TLS extensions.
    range: TlsExtension
    multivalued: true
    aliases:
      - TLS Extension List

  to:
    description: |-
      The machine-readable email header To values, as defined by RFC 5322. For
      example <code>example.user@usersdomain.com</code>
    range: EmailT
    multivalued: true
    aliases:
      - To
    see_also:
      - https://www.rfc-editor.org/rfc/rfc5322
    notes:
      - RFC 5322 — https://www.rfc-editor.org/rfc/rfc5322

  to_mailboxes:
    description: |-
      The human-readable email header To Mailbox values. For example <code>'Example
      User &lt;example.user@usersdomain.com&gt;'</code>.
    range: string
    multivalued: true
    aliases:
      - To Mailboxes
    see_also:
      - https://www.rfc-editor.org/rfc/rfc5322#section-3.4
    notes:
      - RFC 5322 — https://www.rfc-editor.org/rfc/rfc5322#section-3.4

  token:
    description: |-
      The Token object is the base object for representing tokens, API keys, and
      authentication credentials. This object provides common attributes for all
      token types and can be used directly in API activity events to represent API
      tokens (type_id: 7) or client tokens (type_id: 6) such as Okta API tokens or
      Microsoft Entra ID Application Registration client secrets. The base
      <code>token</code> object is also extended by <code>authentication_token</code>
      for protocol-specific authentication tokens in authentication events. Note: Use
      <code>authentication_token</code> (which extends <code>token</code>) for
      protocol-specific authentication tokens (Kerberos, OIDC, SAML) in
      authentication events, and <code>programmatic_credential</code> for tracking
      credential lifecycle and usage patterns.
    range: Token
    aliases:
      - Token

  total:
    description: The total number of items. See specific usage.
    range: integer
    aliases:
      - Total

  total_potential_attacks_count:
    description: |-
      The total count of privilege-to-attack technique mappings identified across all
      analyzed privileges.
    range: integer
    aliases:
      - Total Potential Attacks Count

  total_queued_duration:
    description: The amount of time an event spent in a queue awaiting processing.
    range: Timespan
    aliases:
      - Total Queued Duration

  total_tokens:
    description: Total number of tokens used for this message (prompt + completion).
    range: integer
    aliases:
      - Total Tokens

  trace:
    description: The information about the trace. See specific usage.
    range: Trace
    aliases:
      - Trace

  track_direction:
    description: |-
      Direction of flight expressed as a “True North-based” ground track angle. This
      value is provided in clockwise degrees with a minimum resolution of 1 degree.
      If aircraft is not moving horizontally, use the “Unknown” value
    range: string
    aliases:
      - Track Direction

  traffic:
    description: |-
      The network traffic refers to the amount of data moving across a network at a
      given point of time. Intended to be used alongside Network Connection.
    range: NetworkTraffic
    aliases:
      - Traffic

  traits:
    description: |-
      The traits that describe characteristics, features of an entity. See specific
      usage.
    range: Trait
    multivalued: true
    aliases:
      - Traits

  transaction_uid:
    description: The unique identifier of the transaction.
    range: string
    aliases:
      - Transaction UID

  transformation_info_list:
    description: |-
      An array of transformation info that describes the mappings or transforms
      applied to the data.
    range: TransformationInfo
    multivalued: true
    aliases:
      - Transformation Info

  transmit_time:
    description: The event transmission time from one device to another.  See specific usage.
    range: TimestampT
    aliases:
      - Transmission Time

  tree_uid:
    description: |-
      The tree id is a unique SMB identifier which represents an open connection to a
      share.
    range: string
    aliases:
      - Tree UID

  ttl:
    description: |-
      The time interval that the resource record may be cached. Zero value means that
      the resource record can only be used for the transaction in progress, and
      should not be cached.
    range: integer
    aliases:
      - TTL

  tunnel_interface:
    description: The information about the tunnel interface. See specific usage.
    range: NetworkInterface
    aliases:
      - Interface

  tunnel_type:
    description: |-
      The type of tunnel configuration, normalized to the caption of the
      <code>tunnel_type_id</code> value, indicating the scope of traffic routed
      through the connection. See specific usage.
    range: string
    aliases:
      - Tunnel Type

  tunnel_type_id:
    description: |-
      The normalized identifier for the type of tunnel configuration, indicating the
      scope of traffic routed through the connection. See specific usage.
    range: TunnelTypeIdEnum
    aliases:
      - Tunnel Type ID
    annotations:
      sibling: tunnel_type

  type:
    description: |-
      The type of an object or value, normalized to the caption of the type_id value.
      In the case of 'Other', it is defined by the event source. See specific usage.
    range: string
    aliases:
      - Type

  type_id:
    description: The normalized type identifier of an object. See specific usage.
    range: TypeIdEnum
    aliases:
      - Type ID
    annotations:
      sibling: type

  type_name:
    description: The event/finding type name, as defined by the type_uid.
    range: string
    aliases:
      - Type Name

  type_uid:
    description: |-
      The event/finding type ID. It identifies the event's semantics and structure.
      The value is calculated by the logging system as: <code>class_uid * 100 +
      activity_id</code>.
    range: integer
    aliases:
      - Type ID
    annotations:
      sibling: type_name

  types:
    description: The type/s of an entity. See specific usage.
    range: string
    multivalued: true
    aliases:
      - Types

  udid:
    description: |-
      The Apple assigned Unique Device Identifier (UDID). For iOS, iPadOS, tvOS,
      watchOS and visionOS devices, this is the UDID. For macOS devices, it is the
      Provisioning UDID. For example: <code>00008020-008D4548007B4F26</code>
    range: string
    aliases:
      - Unique Device Identifier
    see_also:
      - https://theapplewiki.com/wiki/UDID
    notes:
      - Apple Wiki — https://theapplewiki.com/wiki/UDID

  uid:
    description: The unique identifier. See specific usage.
    range: string
    aliases:
      - Unique ID

  uid_alt:
    description: The alternate unique identifier. See specific usage.
    range: string
    aliases:
      - Alternate ID

  unique_malware_count:
    description: The number of unique malware detected during a scan. See specific usage.
    range: integer
    aliases:
      - Unique Malware Count

  unmanned_aerial_system:
    description: |-
      The Unmanned Aerial System object describes the characteristics, Position
      Location Information (PLI), and other metadata of Unmanned Aerial Systems (UAS)
      and other unmanned and drone systems used in Remote ID. Remote ID is defined in
      the Standard Specification for Remote ID and Tracking (ASTM Designation:
      F3411-22a) <a target='_blank'
      href='https://cdn.standards.iteh.ai/samples/112830/71297057ac42432880a203654f213709/ASTM-F3411-22a.pdf'>ASTM
      F3411-22a</a>.
    range: UnmannedAerialSystem
    aliases:
      - Unmanned Aerial System

  unmanned_system_operating_area:
    description: |-
      The UAS Operating Area object describes details about a precise area of
      operations for a UAS flight or mission.
    range: UnmannedSystemOperatingArea
    aliases:
      - UAS Operating Area

  unmanned_system_operator:
    description: The human or machine operator of an Unmanned System.
    range: User
    aliases:
      - Unmanned Systems Operator

  unmapped:
    description: |-
      The attributes that are not mapped to the event schema. The names and values of
      those attributes are specific to the event source.
    range: Object
    aliases:
      - Unmapped Data

  untruncated_size:
    description: The size in bytes of an attribute before truncation. See specific usage.
    range: integer
    aliases:
      - Untruncated Size

  unused_privileges_count:
    description: The number of unused Privileges. See specific usage.
    range: integer
    aliases:
      - Unused Privileges Count

  unused_services_count:
    description: The number of unused services. See specific usage.
    range: integer
    aliases:
      - Unused Services Count

  uploaded_time:
    description: The timestamp at which an entity was uploaded. See specific usage.
    range: TimestampT
    aliases:
      - Uploaded Time

  uri:
    description: |-
      A Uniform Resource Identifier (URI) is a string of characters that identifies a
      resource on the Internet. URIs can identify physical resources, like webpages
      and documents. See specific usage.
    range: UrlT
    aliases:
      - URI
    see_also:
      - https://datatracker.ietf.org/doc/html/rfc3986
    notes:
      - RFC 3986 — https://datatracker.ietf.org/doc/html/rfc3986

  url:
    description: The URL object that pertains to the event or object. See specific usage.
    range: Url
    aliases:
      - URL

  url_string:
    description: |-
      The URL string. See RFC 1738. For example:
      <code>http://www.example.com/download/trouble.exe</code>.
    range: UrlT
    aliases:
      - URL String

  urls:
    description: The URLs that pertain to the event or object.
    range: Url
    multivalued: true
    aliases:
      - URLs

  user:
    description: The user that pertains to the event or object.
    range: User
    aliases:
      - User

  user_agent:
    description: The request header that identifies the operating system and web browser.
    range: string
    aliases:
      - HTTP User-Agent
    annotations:
      observable_id: 16

  user_result:
    description: |-
      The result of the user account change. It should contain the new values of the
      changed attributes.
    range: User
    aliases:
      - User Result

  users:
    description: The users that pertain to the event or object.
    range: User
    multivalued: true
    aliases:
      - Users

  uuid:
    description: The universally unique identifier. See specific usage.
    range: UuidT
    aliases:
      - UUID

  value:
    description: The value associated to an attribute. See specific usage.
    range: string
    aliases:
      - Value

  values:
    description: An array of values associated to an attribute. See specific usage.
    range: string
    multivalued: true
    aliases:
      - Values

  vector_string:
    description: |-
      The CVSS vector string is a text representation of a set of CVSS metrics. It is
      commonly used to record or transfer CVSS metric information in a concise form.
      For example: <code>3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:H/I:N/A:H</code>.
    range: string
    aliases:
      - Vector String

  vendor_attributes:
    description: |-
      The Vendor Attributes object can be used to represent values of attributes
      populated by the Vendor/Finding Provider. It can help distinguish between the
      vendor-provided values and consumer-updated values, of key attributes like
      <code>severity_id</code>.<br>The original finding producer should not populate
      this object. It should be populated by consuming systems that support data
      mutability.
    range: VendorAttributes
    aliases:
      - Vendor Attributes

  vendor_id_list:
    description: The list of vendor IDs. See specific usage.
    range: string
    multivalued: true
    aliases:
      - Vendor ID List

  vendor_name:
    description: The name of the vendor. See specific usage.
    range: string
    aliases:
      - Vendor Name

  verdict:
    description: The verdict assigned to an Incident finding.
    range: string
    aliases:
      - Verdict

  verdict_id:
    description: The normalized verdict of an Incident.
    range: VerdictIdEnum
    aliases:
      - Verdict ID
    annotations:
      sibling: verdict

  version:
    description: The version that pertains to the event or object. See specific usage.
    range: string
    aliases:
      - Version

  vertical_speed:
    description: |-
      Vertical speed upward relative to the WGS-84 datum, measured in meters per
      second. Special Values: <code>Invalid</code>, <code>No Value</code>, or
      <code>Unknown: 63 m/s</code>.
    range: string
    aliases:
      - Vertical Speed

  vlan_uid:
    description: The Virtual LAN identifier.
    range: string
    aliases:
      - VLAN

  volume:
    description: The volume on the storage device where the file is located. See specific usage.
    range: string
    aliases:
      - Volume

  vpc_uid:
    description: The unique identifier of the Virtual Private Cloud (VPC).
    range: string
    aliases:
      - VPC UID

  vram_mode:
    description: |-
      The video memory attachment mode, indicating how the VRAM hardware is
      integrated with the system (e.g., shared or dedicated), normalized to the
      caption of the vram_mode_id value. For 'Other', the exact attachment mode is
      defined by the event source.
    range: string
    aliases:
      - VRAM Mode

  vram_mode_id:
    description: The normalized identifier of the video memory attachment mode.
    range: VramModeIdEnum
    aliases:
      - VRAM Mode ID
    annotations:
      sibling: vram_mode

  vram_size:
    description: The total amount of installed video RAM.
    range: integer
    aliases:
      - VRAM Size

  vulnerabilities:
    description: This object describes vulnerabilities reported in a security finding.
    range: Vulnerability
    multivalued: true
    aliases:
      - Vulnerabilities

  vulnerability:
    description: |-
      The vulnerability object describes details related to the observed
      vulnerability
    range: Vulnerability
    aliases:
      - Vulnerability

  web_resources:
    description: Describes details about web resources that were affected by an activity/event.
    range: WebResource
    multivalued: true
    aliases:
      - Web Resources

  web_resources_result:
    description: |-
      The results of the activity on web resources. It should contain the new values
      of the changed attributes of the web resources.
    range: WebResource
    multivalued: true
    aliases:
      - Web Resources Result

  whois:
    description: |-
      The resources of a WHOIS record for a given domain. This can include domain
      names, IP address blocks, autonomous system information, and/or contact and
      registration information for a domain.
    range: Whois
    aliases:
      - WHOIS

  working_directory:
    description: The working directory of a process.
    range: string
    aliases:
      - Working Directory

  write_count:
    description: The write count. See specific usage.
    range: integer
    aliases:
      - Write Count

  x_forwarded_for:
    description: |-
      The X-Forwarded-For header identifying the originating IP address(es) of a
      client connecting to a web server through an HTTP proxy or a load balancer.
    range: IpT
    multivalued: true
    aliases:
      - X-Forwarded-For

  x_originating_ip:
    description: The X-Originating-IP header identifying the emails originating IP address(es).
    range: IpT
    multivalued: true
    aliases:
      - X-Originating-IP

  xattributes:
    description: |-
      An unordered collection of zero or more name/value pairs where each pair
      represents a file or folder extended attribute.</p>For example: Windows
      alternate data stream attributes (ADS stream name, ADS size, etc.),
      user-defined or application-defined attributes, ACL, owner, primary group, etc.
      Examples from DCS:
      </p><ul><li><strong>ads_name</strong></li><li><strong>ads_size</strong></li><li><strong>dacl</strong></li><li><strong>owner</strong></li><li><strong>primary_group</strong></li><li><strong>link_name</strong>
      - name of the link associated to the
      file.</li><li><strong>hard_link_count</strong> - the number of links that are
      associated to the file.</li></ul>
    range: Object
    aliases:
      - Extended Attributes

  zone:
    description: The network zone or LAN segment. See specific usage.
    range: string
    aliases:
      - Network Zone
