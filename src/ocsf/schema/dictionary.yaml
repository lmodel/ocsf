    aliases:
      - Image

  ime:
    description: The Input Method Editor (IME) file name.
    range: string
    aliases:
      - IME

  imei:
    description: The International Mobile Equipment Identity that is associated with the device.
    range: string
    aliases:
      - IMEI
    deprecated: Use the <code>imei_list</code> attribute instead. (since 1.4.0)

  imei_list:
    description: |-
      The International Mobile Equipment Identity values that are associated with the
      device.
    range: string
    multivalued: true
    aliases:
      - IMEI List

  impact:
    description: |-
      The impact , normalized to the caption of the impact_id value. In the case of
      'Other', it is defined by the event source.
    range: string
    aliases:
      - Impact

  impact_id:
    description: |-
      The normalized impact of the incident or finding. Per NIST, this is the
      magnitude of harm that can be expected to result from the consequences of
      unauthorized disclosure, modification, destruction, or loss of information or
      information system availability.
    range: ImpactIdEnum
    aliases:
      - Impact ID
    see_also:
      - https://doi.org/10.6028/NIST.FIPS.199
      - https://doi.org/10.6028/NIST.FIPS.199
    notes:
      - NIST SP 800-172 from FIPS 199 — https://doi.org/10.6028/NIST.FIPS.199
      - NIST Computer Security Resource Center — https://doi.org/10.6028/NIST.FIPS.199
    annotations:
      sibling: impact
      ocsf_source: impact value; impact level

  impact_score:
    description: The impact as an integer value of the finding, valid range 0-100.
    range: integer
    aliases:
      - Impact Score

  imported_symbols:
    description: A list of symbols imported by the executable file.
    range: string
    multivalued: true
    aliases:
      - Imported Symbols

  injection_type:
    description: |-
      The process injection method, normalized to the caption of the
      injection_type_id value. In the case of 'Other', it is defined by the event
      source.
    range: string
    aliases:
      - Injection Type

  injection_type_id:
    description: The normalized identifier of the process injection method.
    range: InjectionTypeIdEnum
    aliases:
      - Injection Type ID
    annotations:
      sibling: injection_type

  install_state:
    description: |-
      The install state, normalized to the caption of install_state_id. In the case
      of 'Other', it is defined by the event source.
    range: string
    aliases:
      - Install State

  install_state_id:
    description: The normalized state of the install.
    range: InstallStateIdEnum
    aliases:
      - Install State ID
    annotations:
      sibling: install_state

  instance_uid:
    description: The unique identifier of a VM instance.
    range: string
    aliases:
      - Instance ID

  initiator:
    description: The initiator of an activity or operation. See specific usage.
    range: string
    aliases:
      - Initiator

  initiator_id:
    description: The normalized identifier of the <code>initiator</code>. See specific usage.
    range: InitiatorIdEnum
    aliases:
      - Initiator ID
    annotations:
      sibling: initiator

  integrity:
    description: |-
      The process integrity level, normalized to the caption of the integrity_id
      value. In the case of 'Other', it is defined by the event source (Windows
      only).
    range: string
    aliases:
      - Integrity

  integrity_id:
    description: The normalized identifier of the process integrity level (Windows only).
    range: IntegrityIdEnum
    aliases:
      - Integrity Level
    annotations:
      sibling: integrity

  interface_name:
    description: The name of the network interface (e.g. eth2).
    range: string
    aliases:
      - Network Interface Name

  interface_uid:
    description: The unique identifier of the network interface.
    range: string
    aliases:
      - Network Interface ID

  intermediate_ips:
    description: |-
      The intermediate IP Addresses. For example, the IP addresses in the HTTP
      X-Forwarded-For header.
    range: IpT
    multivalued: true
    aliases:
      - Intermediate IP Addresses

  internal_name:
    description: The name by which a resource identifies itself internally. See specific usage.
    range: string
    aliases:
      - Internal Name

  intrusion_sets:
    description: |-
      A grouping of adversarial behaviors and resources believed to be associated
      with specific threat actors or campaigns. Intrusion sets often encompass
      multiple campaigns and are used to organize related activities under a common
      label.
    range: string
    multivalued: true
    aliases:
      - Intrusion Sets

  invoked_by:
    description: The name of the service that invoked the activity as described in the event.
    range: string
    aliases:
      - Invoked by

  ip:
    description: The IP address, in either IPv4 or IPv6 format.
    range: IpT
    aliases:
      - IP Address

  is_alert:
    description: Indicates that the event is considered to be an alertable signal.
    range: boolean
    aliases:
      - Alert

  is_applied:
    description: A determination if a policy, rule, or enforcement action was applied.
    range: boolean
    aliases:
      - Applied

  is_backed_up:
    description: |-
      Indicates whether the device or resource has a backup enabled, such as an
      automated snapshot or a cloud backup. For example, this is indicated by the
      <code>cloudBackupEnabled</code> value within JAMF Pro mobile devices or the
      registration of an AWS ARN with the AWS Backup service.
    range: boolean
    aliases:
      - Back Ups Configured

  is_cleartext:
    description: |-
      Indicates whether the credentials were passed in clear text.<p><b>Note:</b>
      True if the credentials were passed in a clear text protocol such as FTP or
      TELNET, or if Windows detected that a user's logon password was passed to the
      authentication package in clear text.</p>
    range: boolean
    aliases:
      - Cleartext Credentials

  is_compliant:
    description: The event occurred on a compliant device.
    range: boolean
    aliases:
      - Compliant Device

  is_default:
    description: |-
      The indication of whether the value is from a default value name. For example,
      the value name could be missing.
    range: boolean
    aliases:
      - Default Value

  is_deleted:
    description: Indicates if the entity was deleted. See specific usage.
    range: boolean
    aliases:
      - Deleted

  is_directed:
    description: Indicates if the entity has directionality. See specific usage.
    range: boolean
    aliases:
      - Directed

  is_disabled:
    description: Indicates if the entity is disabled. See specific usage.
    range: boolean
    aliases:
      - Disabled

  is_encrypted:
    description: Indicates if the entity was encrypted. See specific usage.
    range: boolean
    aliases:
      - Encrypted

  is_exploit_available:
    description: |-
      Indicates if an exploit or a PoC (proof-of-concept) is available for the
      reported vulnerability.
    range: boolean
    aliases:
      - Exploit Availability

  is_fix_available:
    description: Indicates if a fix is available for the reported vulnerability.
    range: boolean
    aliases:
      - Fix Availability

  is_group_provisioning_enabled:
    description: |-
      Indicates whether group provisioning is automated (e.g., for a SCIM resource).
      See specific usage.
    range: boolean
    aliases:
      - Group Provisioning Enabled

  is_hotp:
    description: Whether the authentication factor is an HMAC-based One-time Password (HOTP).
    range: boolean
    aliases:
      - HMAC-based One-time Password (HOTP)

  is_http_only:
    description: This attribute prevents the cookie from being accessed via JavaScript.
    range: boolean
    aliases:
      - HTTP Only

  is_locked:
    description: Indicates if the entity is locked. See specific usage.
    range: boolean
    aliases:
      - Locked

  is_managed:
    description: The event occurred on a managed device.
    range: boolean
    aliases:
      - Managed Device

  is_mfa:
    description: Indicates whether Multi Factor Authentication was used during authentication.
    range: boolean
    aliases:
      - Multi Factor Authentication

  is_mobile_account_active:
    description: |-
      Indicates whether the device has an active mobile account. For example, this is
      indicated by the <code>itunesStoreAccountActive</code> value within JAMF Pro
      mobile devices.
    range: boolean
    aliases:
      - Mobile Account Active

  is_new_logon:
    description: Indicates logon is from a device not seen before or a first time account logon.
    range: boolean
    aliases:
      - New Logon

  is_on_premises:
    description: Indicates whether the location is on-premises.
    range: boolean
    aliases:
      - On-Premises

  is_on_premises_sync_enabled:
    description: |-
      Indicates whether synchronization with an on-premises directory service is
      enabled. For example, Microsoft Entra Connect.
    range: boolean
    aliases:
      - On-Premises Sync Enabled

  is_personal:
    description: The event occurred on a personal device.
    range: boolean
    aliases:
      - Personal Device

  is_public:
    description: Determination of the public accessibility. See specific usage.
    range: boolean
    aliases:
      - Public

  is_read:
    description: The indication of whether the email has been read.
    range: boolean
    aliases:
      - Read

  is_readonly:
    description: Indicates that an object cannot be modified. See specific usage
    range: boolean
    aliases:
      - Read-Only

  is_remote:
    description: The indication of whether the session is remote.
    range: boolean
    aliases:
      - Remote

  is_renewable:
    description: The indication of whether something is renewable. See specific usage.
    range: boolean
    aliases:
      - Renewable

  is_renewal:
    description: |-
      The indication of whether the event or object represents a renewal. See
      specific usage.
    range: boolean
    aliases:
      - Renewal

  is_secure:
    description: |-
      The cookie attribute indicates that cookies are sent to the server only when
      the request is encrypted using the HTTPS protocol.
    range: boolean
    aliases:
      - Secure

  is_self_signed:
    description: |-
      Denotes whether a digital certificate is self-signed or signed by a known
      certificate authority (CA).
    range: boolean
    aliases:
      - Certificate Self-Signed

  is_shared:
    description: The event occurred on a shared device.
    range: boolean
    aliases:
      - Shared Device

  is_src_dst_assignment_known:
    description: |-
      <code>true</code> denotes that <code>src_endpoint</code> and
      <code>dst_endpoint</code> correctly identify the initiator and responder
      respectively. <code>false</code> denotes that the event source has arbitrarily
      assigned one peer to <code>src_endpoint</code> and the other to
      <code>dst_endpoint</code>, in other words that initiator and responder are not
      being asserted. This can occur, for example, when the event source is a network
      appliance that has not observed the initiation of a given connection. In the
      absence of this attribute, interpretation of the initiator and responder is
      implementation-specific.
    range: boolean
    aliases:
      - Source/Destination Assignment Known
    deprecated: |-
      Use <code>initiator_id</code> instead, which provides richer semantics for
      bi-flow and asymmetric flow scenarios. (since 1.9.0)

  is_superseded:
    description: The vendor patch has been replaced by another.
    range: boolean
    aliases:
      - The patch is superseded.

  is_supervised:
    description: |-
      The event occurred on a supervised device. Devices that are supervised are
      typically mobile devices managed by a Mobile Device Management solution and are
      restricted from specific behaviors such as Apple AirDrop.
    range: boolean
    aliases:
      - Supervised Device

  is_suspected_breach:
    description: A determination based on analytics as to whether a potential breach was found.
    range: boolean
    aliases:
      - Suspected Breach

  is_system:
    description: The indication of whether the object is part of the operating system.
    range: boolean
    aliases:
      - System

  is_totp:
    description: Whether the authentication factor is a Time-based One-time Password (TOTP).
    range: boolean
    aliases:
      - Time-based One-time Password (TOTP)

  is_truncated:
    description: Indicates that an attribute has been truncated. See specific usage.
    range: boolean
    aliases:
      - Is Truncated

  is_trusted:
    description: The event occurred on a trusted device.
    range: boolean
    aliases:
      - Trusted Device

  is_unused:
    description: Indicates whether an item is unused. See specific usage.
    range: boolean
    aliases:
      - Is Unused

  is_user_provisioning_enabled:
    description: |-
      Indicates whether user provisioning is automated (e.g., for a SCIM resource).
      See specific usage.
    range: boolean
    aliases:
      - User Provisioning Enabled

  is_vpn:
    description: The indication of whether the session is a VPN session.
    range: boolean
    aliases:
      - VPN Session

  isp:
    description: The name of the Internet Service Provider (ISP).
    range: string
    aliases:
      - ISP Name

  isp_org:
    description: |-
      The organization name of the Internet Service Provider (ISP). This represents
      the parent organization or company that owns/operates the ISP. For example,
      Comcast Corporation would be the ISP org for Xfinity internet service. This
      attribute helps identify the ultimate provider when ISPs operate under
      different brand names.
    range: string
    aliases:
      - ISP Org

  issuer:
    description: The identifier of the issuer. See specific usage.
    range: string
    aliases:
      - Issuer Details

  ja3_hash:
    description: The MD5 hash of a JA3 string.
    range: Fingerprint
    aliases:
      - JA3 Hash

  ja3s_hash:
    description: The MD5 hash of a JA3S string.
    range: Fingerprint
    aliases:
      - JA3S Hash

  ja4_fingerprint_list:
    description: A list of the JA4+ network fingerprints.
    range: Ja4Fingerprint
    multivalued: true
    aliases:
      - JA4+ Fingerprints

  job:
    description: The job object that pertains to the event.
    range: Job
    aliases:
      - Job

  job_title:
    description: The user's job title.
    range: string
    aliases:
      - Job Title

  json_path:
    description: The JSON path of the attribute. See specific usage.
    range: string
    aliases:
      - JSON Path

  kb_article_list:
    description: |-
      A list of KB articles or patches related to an endpoint. A KB Article contains
      metadata that describes the patch or an update.
    range: KbArticle
    multivalued: true
    aliases:
      - Knowledgebase Articles

  kb_articles:
    description: |-
      The KB article/s related to the entity. A KB Article contains metadata that
      describes the patch or an update.
    range: string
    multivalued: true
    aliases:
      - Knowledgebase Articles
    deprecated: Use the <code>kb_article_list</code> attribute instead. (since 1.1.0)

  kerberos_flags:
    description: |-
      A bitmask, either in hexadecimal or decimal form, which encodes various
      attributes or permissions associated with a Kerberos ticket. These flags
      delineate specific characteristics of the ticket, such as its renewability or
      forwardability.
    range: string
    aliases:
      - Kerberos Flags
    see_also:
      - https://www.rfc-editor.org/rfc/rfc4120#section-5.2.8
      - https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-10/security/threat-protection/auditing/event-4769
    notes:
      - |-
        RFC 4120: 5.2.8.  KerberosFlags —
        https://www.rfc-editor.org/rfc/rfc4120#section-5.2.8
      - |-
        Microsoft Windows Security 4769 (see 'Ticket Options') —
        https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-10/security/threat-protection/auditing/event-4769

  kernel:
    description: The kernel resource object that pertains to the event.
    range: Kernel
    aliases:
      - Kernel

  kernel_release:
    description: |-
      The kernel release of the operating system. On Unix-based systems, this is
      determined from the <code>uname -r</code> command output, for example
      "5.15.0-122-generic".
    range: string
    aliases:
      - Kernel Release

  key_length:
    description: The length of the encryption key.
    range: integer
    aliases:
      - Key Length

  key_uid:
    description: The unique identifier of the key. See specific usage.
    range: string
    aliases:
      - Key UID

  keyboard_info:
    description: The keyboard detailed information.
    range: KeyboardInfo
    aliases:
      - Keyboard Information

  keyboard_layout:
    description: The keyboard locale identifier name (e.g., en-US).
    range: string
    aliases:
      - Keyboard Layout

  keyboard_subtype:
    description: The keyboard numeric code.
    range: integer
    aliases:
      - Keyboard Subtype

  keyboard_type:
    description: The keyboard type (e.g., xt, ico).
    range: string
    aliases:
      - Keyboard Type

  kill_chain:
    description: |-
      The <a target='_blank'
      href='https://www.lockheedmartin.com/en-us/capabilities/cyber/cyber-kill-chain.html'>Cyber
      Kill Chain®</a> provides a detailed description of each phase and its
      associated activities within the broader context of a cyber attack.
    range: KillChainPhase
    multivalued: true
    aliases:
      - Kill Chain

  labels:
    description: The list of labels attached to an entity. See specific usage.
    range: string
    multivalued: true
    aliases:
      - Labels

  lang:
    description: |-
      The two letter lower case language codes, as defined by <a target='_blank'
      href='https://en.wikipedia.org/wiki/ISO_639-1'>ISO 639-1</a>. For example:
      <code>en</code> (English), <code>de</code> (German), or <code>fr</code>
      (French).
    range: string
    aliases:
      - Language

  last_authentication_time:
    description: |-
      The timestamp when this identity last successfully authenticated to any system
      or service. See specific usage.
    range: TimestampT
    aliases:
      - Last Authentication Time

  last_login_time:
    description: The last time when the user logged in.
    range: TimestampT
    aliases:
      - Last Login

  last_run_time:
    description: The last run time of application or service. See specific usage.
    range: TimestampT
    aliases:
      - Last Run

  last_seen_time:
    description: The most recent detection time of the activity or object. See specific usage.
    range: TimestampT
    aliases:
      - Last Seen

  last_used_time:
    description: The most recent usage time of an entity. See specific usage.
    range: TimestampT
    aliases:
      - Last Used Time

  lat:
    description: |-
      The geographical Latitude coordinate represented in Decimal Degrees (DD). For
      example: <code>42.361145</code>.
    range: float
    aliases:
      - Latitude

  latency:
    description: The HTTP response latency measured in milliseconds.
    range: integer
    aliases:
      - Latency

  launch_type:
    description: |-
      The specific type of <code>Launch</code> activity, normalized to the caption of
      the <code>launch_type_id</code> value. In the case of <code>Other</code> it is
      defined by the event source.
    range: string
    aliases:
      - Launch Type

  launch_type_id:
    description: |-
      The normalized identifier for the specific type of <code>Launch</code>
      activity.
    range: LaunchTypeIdEnum
    aliases:
      - Launch Type ID
    see_also:
      - https://www.man7.org/linux/man-pages/man2/fork.2.html
      - https://www.man7.org/linux/man-pages/man2/execve.2.html
    notes:
      - fork() man page — https://www.man7.org/linux/man-pages/man2/fork.2.html
      - execve() man page — https://www.man7.org/linux/man-pages/man2/execve.2.html
    annotations:
      sibling: launch_type

  ldap_cn:
    description: |-
      The LDAP and X.500 <code>commonName</code> attribute, typically the full name
      of the person. For example, <code>John Doe</code>.
    range: string
    aliases:
      - LDAP Common Name

  ldap_dn:
    description: |-
      The X.500 Distinguished Name (DN) is a structured string that uniquely
      identifies an entry, such as a user, in an X.500 directory service For example,
      <code>cn=John Doe,ou=People,dc=example,dc=com</code>.
    range: string
    aliases:
      - LDAP Distinguished Name

  ldap_person:
    description: The additional LDAP attributes that describe a person.
    range: LdapPerson
    aliases:
      - LDAP Person

  lease_dur:
    description: |-
      This represents the length of the DHCP lease in seconds. This is present in
      DHCP Ack events.
    range: integer
    aliases:
      - Lease Duration

  leave_time:
    description: The timestamp when the user left or will be leaving the organization.
    range: TimestampT
    aliases:
      - Leave Time

  length:
    description: The HTTP response length, in number of bytes.
    range: integer
    aliases:
      - Response Length

  license:
    description: |-
      The name or identifier of the license applied on package or software. See <a
      target='_blank' href='https://spdx.org/licenses/'>SPDX License List</a>.
    range: string
    aliases:
      - Software License

  license_url:
    description: |-
      The URL pointing to the license applied on package or software. This is
      typically a <code>LICENSE.md</code> file within a repository.
    range: UrlT
    aliases:
      - Software License URL

  lineage:
    description: |-
      The lineage of the process, represented by a list of paths for each ancestor
      process. For example: <code>['/usr/sbin/sshd', '/usr/bin/bash',
      '/usr/bin/whoami']</code>.
    range: FilePathT
    multivalued: true
    aliases:
      - Lineage

  load_balancer:
    description: |-
      The Load Balancer object contains information related to the device that is
      distributing incoming traffic to specified destinations.
    range: LoadBalancer
    aliases:
      - Load Balancer

  load_type:
    description: |-
      The load type, normalized to the caption of the load_type_id value. In the case
      of 'Other', it is defined by the event source.
    range: string
    aliases:
      - Load Type

  load_type_id:
    description: The normalized identifier of the load type. See specific usage.
    range: LoadTypeIdEnum
    aliases:
      - Load Type ID
    annotations:
      sibling: load_type

  loaded_modules:
    description: The list of loaded module names.
    range: string
    multivalued: true
    aliases:
      - Loaded Modules

  location:
    description: The detailed geographical location usually associated with an IP address.
    range: Location
    aliases:
      - Geo Location

  locations:
    description: A list of detailed geographical locations.
    range: Location
    multivalued: true
    aliases:
      - Geo Locations

  log_format:
    description: The format of data in the log. See specific usage.
    range: string
    aliases:
      - Log Format

  log_level:
    description: The log specific level at which an event was generated. See specific usage.
    range: string
    aliases:
      - Log Level

  log_name:
    description: The log name. See specific usage.
    range: string
    aliases:
      - Log Name

  log_provider:
    description: |-
      The logging provider or logging service that logged the event. See specific
      usage.
    range: string
    aliases:
      - Log Provider

  log_source:
    description: The log where the data originated. See specific usage.
    range: string
    aliases:
      - Log Source

  log_type:
    description: |-
      The log type, normalized to the caption of the <code>log_type_id</code> value.
      In the case of 'Other', it is defined by the event source.
    range: string
    aliases:
      - Log Type

  log_type_id:
    description: The normalized log type identifier.
    range: LogTypeIdEnum
    aliases:
      - Log Type ID
    annotations:
      sibling: log_type

  log_version:
    description: The log version. See specific usage.
    range: string
    aliases:
      - Log Version

  logged_time:
    description: |-
      <p>The time when the logging system collected and logged the event.</p>This
      attribute is distinct from the event time in that event time typically contain
      the time extracted from the original event. Most of the time, these two times
      will be different.
    range: TimestampT
    aliases:
      - Logged Time

  loggers:
    description: |-
      An array of Logger objects that describe the pipeline of devices and logging
      products between the event source and its eventual destination. Note, this
      attribute can be used when there is a complex end-to-end path of event flow
      and/or to track the chain of custody of the data.
    range: Logger
    multivalued: true
    aliases:
      - Loggers

  login_endpoint:
    description: URL for initiating a login request. See specific usage.
    range: UrlT
    aliases:
      - Login Endpoint

  logon_process:
    description: The trusted process that validated the authentication credentials.
    range: Process
    aliases:
      - Logon Process

  logon_type:
    description: |-
      The logon type, normalized to the caption of the logon_type_id value. In the
      case of 'Other', it is defined by the event source.
    range: string
    aliases:
      - Logon Type

  logon_type_id:
    description: The normalized logon type identifier.
    range: LogonTypeIdEnum
    aliases:
      - Logon Type ID
    annotations:
      sibling: logon_type

  logout_endpoint:
    description: URL for initiating a logout request. See specific usage.
    range: UrlT
    aliases:
      - Logout Endpoint

  long:
    description: |-
      The geographical Longitude coordinate represented in Decimal Degrees (DD). For
      example: <code>-71.057083</code>.
    range: float
    aliases:
      - Longitude

  mac:
    description: |-
      The Media Access Control (MAC) address that is associated with the network
      interface.
    range: MacT
    aliases:
