id: https://w3id.org/lmodel/ocsf/objects
name: ocsf-objects
description: OCSF object class definitions (177 reusable objects from upstream/objects/).
license: Apache-2.0
source: https://github.com/ocsf/ocsf-schema/tree/main/objects
version: 1.9.0-dev

annotations:
  copyright: Source schema © OCSF a Series of LF Projects, LLC

prefixes:
  ocsf: https://w3id.org/lmodel/ocsf/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  xsd: http://www.w3.org/2001/XMLSchema#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
  attack: https://lmodel.github.io/attack/
  stix: https://lmodel.github.io/stix/
  uco_master: https://lmodel.github.io/uco-master/
  capec: https://w3id.org/lmodel/capec/
  cve: https://w3id.org/lmodel/cve/
  cwe: https://w3id.org/lmodel/cwe/
  iso27001: https://w3id.org/lmodel/iso27001/
  kev_catalog: https://w3id.org/lmodel/kev-catalog/
  nvd: https://w3id.org/lmodel/nist-nvd/
  core: https://w3id.org/lmodel/vulnerability-core/
default_prefix: ocsf
default_range: string

imports:
  - linkml:types
  - ./types
  - ./dictionary
  - ./enums

classes:

  OcsfObject:
    description: Abstract root for every OCSF object class.
    abstract: true
    in_subset:
      - objects

  AnalysisTarget:
    description: |-
      The analysis target defines the scope of monitored activities, specifying what
      entity, system or process is analyzed for activity patterns.
    aliases:
      - Analysis Target
    in_subset:
      - objects
    slots:
      - name
      - type
    slot_usage:
      name:
        description: |-
          The specific name or identifier of the analysis target, such as the username of
          a User Account, the name of a Kubernetes Cluster, the identifier of a Network
          Namespace, or the name of an Application Component.
        required: true
      type:
        description: |-
          The category of the analysis target, such as User Account, Kubernetes Cluster,
          Network Namespace, or Application Component.
    is_a: OcsfObject

  AnomalyAnalysis:
    description: |-
      Describes the analysis of activity patterns and anomalies of target entities to
      identify potential security threats, performance issues, or other deviations
      from established baselines. This includes monitoring and analyzing user
      interactions, API usage, resource utilization, access patterns and other
      measured indicators.
    aliases:
      - Anomaly Analysis
    in_subset:
      - objects
    slots:
      - analysis_targets
      - anomalies
      - baselines
    slot_usage:
      analysis_targets:
        description: |-
          The analysis targets define the scope of monitored activities, specifying what
          entities, systems or processes are analyzed for activity patterns.
        required: true
      anomalies:
        description: |-
          List of detected activities that significantly deviate from the established
          baselines. This can include unusual access patterns, unexpected user-agents,
          abnormal API usage, suspicious traffic spikes, unauthorized access attempts,
          and other activities that may indicate potential security threats or system
          issues.
        required: true
      baselines:
        description: |-
          List of established patterns representing normal activity that serve as
          reference points for anomaly detection. This includes typical user interaction
          patterns like common user-agents, expected API access frequencies and patterns,
          standard resource utilization levels, and regular traffic flows. These
          baselines help establish what constitutes 'normal' activity in the system.
        recommended: true
    is_a: OcsfObject

  Object:
    description: |-
      An unordered collection of attributes. It defines a set of attributes available
      in all objects. It can be also used as a generic object to log objects that are
      not otherwise defined by the schema.
    aliases:
      - Object
    is_a: OcsfObject
    in_subset:
      - objects

  Observable:
    description: |-
      The observable object is a pivot element that contains related information
      found in many places in the event.
    aliases:
      - Observable
    is_a: Object
    in_subset:
      - objects
    slots:
      - event_uid
      - name
      - reputation
      - type
      - type_id
      - type_uid
      - value
    slot_usage:
      event_uid:
        description: |-
          The unique identifier (<code>metadata.uid</code>) of the source OCSF event from
          which this observable was extracted. This field enables linking observables
          back to their originating event data when observables are stored in a separate
          location or system.
      name:
        description: |-
          The full name of the observable attribute. The <code>name</code> is a
          pointer/reference to an attribute within the OCSF event data. For example:
          <code>file.name</code>. Array attributes may be represented in one of three
          ways. For example: <code>resources.uid</code>, <code>resources[].uid</code>,
          <code>resources[0].uid</code>.
        recommended: true
      type:
        description: The observable value type name.
      type_id:
        description: The observable value type identifier.
        required: true
        range: ObservableTypeIdEnum
      type_uid:
        description: |-
          The OCSF event type UID (<code>type_uid</code>) of the source event that this
          observable was extracted from. This field enables filtering and categorizing
          observables by their originating event type. For example: <code>300101</code>
          for Network Activity (class_uid 3001) with activity_id 1.
      value:
        description: |-
          The value associated with the observable attribute. The meaning of the value
          depends on the observable type.<br/>If the <code>name</code> refers to a scalar
          attribute, then the <code>value</code> is the value of the attribute.<br/>If
          the <code>name</code> refers to an object attribute, then the
          <code>value</code> is not populated.
    see_also:
      - https://github.com/ocsf/ocsf-docs/blob/main/Articles/Defining%20and%20Using%20Observables.md
    notes:
      - |-
        OCSF Observables FAQ —
        https://github.com/ocsf/ocsf-docs/blob/main/Articles/Defining and Using
        Observables.md
    close_mappings:
      - uco_master:ObservableObject

  Observation:
    description: |-
      A record of an observed value or event that captures the timing and frequency
      of its occurrence. Used to track when values/events were first detected, last
      detected, and their total occurrence count.
    aliases:
      - Observation
    is_a: Object
    in_subset:
      - objects
    slots:
      - count
      - timespan
      - value
    slot_usage:
      count:
        description: |-
          Integer representing the total number of times this specific value/event was
          observed across all occurrences. Helps establish prevalence and patterns.
        recommended: true
      timespan:
        description: |-
          The time window when the value or event was first observed. It is used to
          analyze activity patterns, detect trends, or correlate events within a specific
          timeframe.
        recommended: true
      value:
        description: |-
          The specific value, event, indicator or data point that was observed and
          recorded. This is the core piece of information being tracked.
        required: true
    exact_mappings:
      - uco_master:Observation

  OccurrenceDetails:
    description: |-
      Details about where in the target entity, specified information was discovered.
      Only the attributes, relevant to the target entity type should be populated.
    aliases:
      - Occurrence Details
    is_a: Object
    in_subset:
      - objects
    slots:
      - cell_name
      - column_name
      - column_number
      - end_line
      - json_path
      - page_number
      - record_index_in_array
      - row_number
      - start_line
    slot_usage:
      cell_name:
        description: The cell name/reference in a spreadsheet. e.g <code>A2</code>
      column_name:
        description: The column name in a spreadsheet, where the information was discovered.
      column_number:
        description: |-
          The column number in a spreadsheet or a plain text document, where the
          information was discovered.
      end_line:
        description: |-
          The line number of the last line of the file, where the information was
          discovered.
      json_path:
        description: |-
          The JSON path of the attribute in a json record, where the information was
          discovered
      page_number:
        description: The page number in a document, where the information was discovered.
      record_index_in_array:
        description: |-
          The index of the record in the array of records, where the information was
          discovered. e.g. the index of a record in an array of JSON records in a file.
      row_number:
        description: The row number in a spreadsheet, where the information was discovered.
      start_line:
        description: |-
          The line number of the first line of the file, where the information was
          discovered.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                cell_name:
                  required: true
            - slot_conditions:
                column_name:
                  required: true
            - slot_conditions:
                column_number:
                  required: true
            - slot_conditions:
                end_line:
                  required: true
            - slot_conditions:
                json_path:
                  required: true
            - slot_conditions:
                page_number:
                  required: true
            - slot_conditions:
                record_index_in_array:
                  required: true
            - slot_conditions:
                row_number:
                  required: true
            - slot_conditions:
                start_line:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['cell_name', 'column_name',
          'column_number', 'end_line', 'json_path', 'page_number',
          'record_index_in_array', 'row_number', 'start_line'] must be set.
    annotations:
      ocsf_constraints: |-
        {"at_least_one": ["cell_name", "column_name", "column_number", "end_line",
        "json_path", "page_number", "record_index_in_array", "row_number",
        "start_line"]}

  Os:
    description: |-
      The Operating System (OS) object describes characteristics of an OS, such as
      Linux or Windows.
    aliases:
      - Operating System (OS)
    is_a: Object
    in_subset:
      - objects
    slots:
      - build
      - country
      - cpe_name
      - cpu_bits
      - edition
      - kernel_release
      - lang
      - name
      - sp_name
      - sp_ver
      - type
      - type_id
      - version
    slot_usage:
      country:
        description: |-
          The operating system country code, as defined by the ISO 3166-1 standard
          (Alpha-2 code).<p><b>Note:</b> The two letter country code should be
          capitalized. For example: <code>US</code> or <code>CA</code>.</p>
      name:
        description: The operating system name.
        required: true
      type:
        description: The type of the operating system.
      type_id:
        description: The type identifier of the operating system.
        required: true
        range: OsTypeIdEnum
      version:
        description: |-
          The version of the OS running on the device that originated the event. For
          example: "Windows 10", "OS X 10.7", or "iOS 9".
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:OperatingSystem/
    notes:
      - |-
        D3FEND™ Ontology d3f:OperatingSystem —
        https://d3fend.mitre.org/dao/artifact/d3f:OperatingSystem/
    exact_mappings:
      - uco_master:OperatingSystem
    close_mappings:
      - stix:Software

  Osint:
    description: |-
      The OSINT (Open Source Intelligence) object contains details related to an
      indicator such as the indicator itself, related indicators, geolocation,
      registrar information, subdomains, analyst commentary, and other contextual
      information. This information can be used to further enrich a detection or
      finding by providing decisioning support to other analysts and engineers.
    aliases:
      - OSINT
    is_a: Object
    in_subset:
      - objects
    slots:
      - answers
      - attacks
      - autonomous_system
      - campaign
      - category
      - comment
      - confidence
      - confidence_id
      - created_time
      - creator
      - desc
      - detection_pattern
      - detection_pattern_type
      - detection_pattern_type_id
      - email
      - email_auth
      - expiration_time
      - external_uid
      - file
      - intrusion_sets
      - kill_chain
      - labels
      - location
      - malware
      - modified_time
      - name
      - references
      - related_analytics
      - reputation
      - risk_score
      - script
      - severity
      - severity_id
      - signatures
      - src_url
      - subdomains
      - subnet
      - threat_actor
      - tlp
      - type
      - type_id
      - uid
      - uploaded_time
      - value
      - vendor_name
      - vulnerabilities
      - whois
    slot_usage:
      answers:
        description: |-
          Any pertinent DNS answers information related to an indicator or OSINT
          analysis.
      attacks:
        description: |-
          MITRE ATT&CK Tactics, Techniques, and/or Procedures (TTPs) pertinent to an
          indicator or OSINT analysis.
      autonomous_system:
        description: |-
          Any pertinent autonomous system information related to an indicator or OSINT
          analysis.
      category:
        description: Categorizes the threat indicator based on its functional or operational role.
      comment:
        description: Analyst commentary or source commentary about an indicator or OSINT analysis.
      confidence:
        description: |-
          The confidence of an indicator being malicious and/or pertinent, normalized to
          the caption of the confidence_id value. In the case of 'Other', it is defined
          by the event source or analyst.
      confidence_id:
        description: |-
          The normalized confidence refers to the accuracy of collected information
          related to the OSINT or how pertinent an indicator or analysis is to a specific
          event or finding. A low confidence means that the information collected or
          analysis conducted lacked detail or is not accurate enough to qualify an
          indicator as fully malicious.
        recommended: true
      created_time:
        description: The timestamp when the indicator was initially created or identified.
      creator:
        description: |-
          The identifier of the user, system, or organization that contributed the
          indicator.
      desc:
        description: |-
          A detailed explanation of the indicator, including its context, purpose, and
          relevance.
      detection_pattern:
        description: The specific detection pattern or signature associated with the indicator.
      email:
        description: Any email information pertinent to an indicator or OSINT analysis.
      email_auth:
        description: |-
          Any email authentication information pertinent to an indicator or OSINT
          analysis.
      expiration_time:
        description: |-
          The expiration date of the indicator, after which it is no longer considered
          reliable.
      file:
        description: Any pertinent file information related to an indicator or OSINT analysis.
      kill_chain:
        description: Lockheed Martin Kill Chain Phases pertinent to an indicator or OSINT analysis.
      labels:
        description: Tags or keywords associated with the indicator to enhance searchability.
      location:
        description: |-
          Any pertinent geolocation information related to an indicator or OSINT
          analysis.
      modified_time:
        description: The timestamp of the last modification or update to the indicator.
      name:
        description: |-
          The <code>name</code> is a pointer/reference to an attribute within the OCSF
          event data. For example: file.name.
      references:
        description: |-
          Provides a reference to an external source of information related to the CTI
          being represented. This may include a URL, a document, or some other type of
          reference that provides additional context or information about the CTI.
      related_analytics:
        description: Any analytics related to an indicator or OSINT analysis.
      reputation:
        description: |-
          Related reputational analysis from third-party engines and analysts for a given
          indicator or OSINT analysis.
      risk_score:
        description: A numerical representation of the threat indicator’s risk level.
      script:
        description: Any pertinent script information related to an indicator or OSINT analysis.
      severity:
        description: |-
          Represents the severity level of the threat indicator, typically reflecting its
          potential impact or damage.
      severity_id:
        description: |-
          The normalized severity level of the threat indicator, typically reflecting its
          potential impact or damage.
      signatures:
        description: Any digital signatures or hashes related to an indicator or OSINT analysis.
      src_url:
        description: |-
          The source URL of an indicator or OSINT analysis, e.g., a URL back to a TIP,
          report, or otherwise.
      subdomains:
        description: |-
          Any pertinent subdomain information - such as those generated by a Domain
          Generation Algorithm - related to an indicator or OSINT analysis.
      subnet:
        description: A CIDR or network block related to an indicator or OSINT analysis.
      tlp:
        description: |-
          The <a target='_blank' href='https://www.first.org/tlp/'>Traffic Light
          Protocol</a> was created to facilitate greater sharing of potentially sensitive
          information and more effective collaboration. TLP provides a simple and
          intuitive schema for indicating with whom potentially sensitive information can
          be shared.
        recommended: true
        range: OsintTlpEnum
      type:
        description: The OSINT indicator type.
      type_id:
        description: The OSINT indicator type ID.
        required: true
        range: OsintTypeIdEnum
      uid:
        description: The unique identifier for the OSINT object.
      uploaded_time:
        description: |-
          The timestamp indicating when the associated indicator or intelligence was
          added to the system or repository.
      value:
        description: |-
          The actual indicator value in scope, e.g., a SHA-256 hash hexdigest or a domain
          name.
        required: true
      vendor_name:
        description: The vendor name of a tool which generates intelligence or provides indicators.
      vulnerabilities:
        description: Any vulnerabilities related to an indicator or OSINT analysis.
      whois:
        description: Any pertinent WHOIS information related to an indicator or OSINT analysis.

  Package:
    description: The Software Package object describes details about a software package.
    aliases:
      - Software Package
    is_a: Object
    in_subset:
      - objects
    slots:
      - architecture
      - cpe_name
      - epoch
      - hash
      - license
      - license_url
      - name
      - package_manager
      - package_manager_url
      - purl
      - release
      - src_url
      - type
      - type_id
      - uid
      - vendor_name
      - version
    slot_usage:
      architecture:
        recommended: true
      hash:
        description: |-
          Cryptographic hash to identify the binary instance of a software component.
          This can include any component such file, package, or library.
      license:
        description: The software license applied to this package.
      name:
        description: The software package name.
        required: true
      src_url:
        description: |-
          The link to the specific library or package such as within <code>GitHub</code>,
          this is different from the link to the package manager where the library or
          package is hosted.
      type:
        description: |-
          The type of software package, normalized to the caption of the
          <code>type_id</code> value. In the case of 'Other', it is defined by the
          source.
      type_id:
        description: The type of software package.
        recommended: true
        range: PackageTypeIdEnum
      uid:
        description: |-
          A unique identifier for the package or library reported by the source tool.
          E.g., the <code>libId</code> within the <code>sbom</code> field of an OX
          Security Issue or the SPDX <code>components.*.bom-ref</code>.
      vendor_name:
        description: The name of the vendor who published the software package.
      version:
        description: The software package version.
        required: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:SoftwarePackage/
    notes:
      - |-
        D3FEND™ Ontology d3f:SoftwarePackage. —
        https://d3fend.mitre.org/dao/artifact/d3f:SoftwarePackage/

  Packet:
    description: |-
      The Packet object represents a single captured network packet and its
      associated metadata. It describes where the packet came from, how it is stored
      or encoded, and how it can be located within a capture file or stream. This
      object does not interpret protocol content; it only represents the captured
      packet data and its positioning information.
    aliases:
      - Packet
    is_a: Object
    in_subset:
      - objects
    slots:
      - encoding
      - encoding_id
      - end_offset
      - format
      - format_id
      - sequence_number
      - source
      - source_id
      - start_offset
      - value
    slot_usage:
      encoding:
        description: |-
          The human-readable name of the encoding used to represent the packet data in
          the <code>value</code> field. This should match the caption associated with
          <code>encoding_id</code>. If <code>encoding_id</code> is 99 (Other), this field
          contains the original data source–specific encoding value.
      encoding_id:
        description: |-
          The normalized identifier of the encoding method used to represent the packet
          data as a string.
        recommended: true
        range: PacketEncodingIdEnum
      end_offset:
        description: The ending byte position of this packet within a capture file or stream.
      format:
        description: |-
          The human-readable name of the packet capture file format in which the packet
          is stored. This should match the caption associated with
          <code>format_id</code>. If <code>format_id</code> is 99 (Other), this field
          contains the original data source–specific format value.
      format_id:
        description: The normalized identifier of the packet capture format.
        recommended: true
        range: PacketFormatIdEnum
      sequence_number:
        description: |-
          The relative order number of this packet within its capture context (such as a
          PCAP file, network session, or reconstructed stream). This represents
          chronological capture order, distinct from both protocol-level sequencing (such
          as TCP sequence numbers).
      source:
        description: |-
          The human-readable name describing how or where the packet was obtained. This
          should match the caption associated with <code>source_id</code>. If
          <code>source_id</code> is 99 (Other), this field contains the original data
          source–specific value.
      source_id:
        description: |-
          A normalized numeric identifier that specifies how the packet was obtained or
          generated.
        recommended: true
        range: PacketSourceIdEnum
      start_offset:
        description: The starting byte position of this packet within a capture file or stream.
      value:
        description: |-
          The actual packet data, represented as a string. The format of this string is
          determined by the specified <code>encoding_id</code> (e.g., Base64,
          Hexadecimal, or URL Encoded).
        required: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:NetworkPacket/
      - https://d3fend.mitre.org/dao/artifact/d3f:PacketCaptureFile/
      - https://d3fend.mitre.org/dao/artifact/d3f:PacketLog/
    notes:
      - |-
        D3FEND™ Ontology d3f:NetworkPacket. —
        https://d3fend.mitre.org/dao/artifact/d3f:NetworkPacket/
      - |-
        D3FEND™ Ontology d3f:PacketCaptureFile. —
        https://d3fend.mitre.org/dao/artifact/d3f:PacketCaptureFile/
      - |-
        D3FEND™ Ontology d3f:PacketLog. —
        https://d3fend.mitre.org/dao/artifact/d3f:PacketLog/

  Parameter:
    description: The Parameter object provides details regarding a parameter of a a function.
    aliases:
      - Parameter
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - post_value
      - pre_value
    slot_usage:
      name:
        description: The parameter name.
      post_value:
        description: The parameter value after function execution.
      pre_value:
        description: The parameter value before function execution.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                pre_value:
                  required: true
            - slot_conditions:
                post_value:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['name', 'pre_value', 'post_value'] must be
          set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["name", "pre_value", "post_value"]}'

  PermissionAnalysisResult:
    description: |-
      The Permission Analysis object describes analysis results of permissions,
      policies directly associated with an identity (user, role, or service account).
      This evaluates what permissions an identity has been granted through attached
      policies, which privileges are actively used versus unused, and identifies
      potential over-privileged access. Use this for identity-centric security
      assessments such as privilege audits, dormant permission discovery, and
      least-privilege compliance analysis.
    aliases:
      - Permission Analysis Result
    is_a: Object
    in_subset:
      - objects
    slots:
      - analyzed_privileges_count
      - condition_keys
      - granted_privileges
      - policy
      - service_privilege_analysis_list
      - total_potential_attacks_count
      - unused_privileges_count
      - unused_services_count
    slot_usage:
      analyzed_privileges_count:
        description: The total count of privileges that were analyzed across all services.
      condition_keys:
        description: |-
          The condition keys and their values that were evaluated during policy analysis,
          including contextual constraints that affect permission grants. These
          conditions define when and how permissions are applied. Examples:
          <code>aws:SourceIp:1.2.3.4</code>, <code>aws:RequestedRegion:us-east-1</code>.
      granted_privileges:
        description: |-
          The specific privileges, actions, or permissions that are explicitly granted by
          the analyzed policy. Examples: AWS actions like <code>s3:GetObject</code>,
          <code>ec2:RunInstances</code>, <code>iam:CreateUser</code>; Azure actions like
          <code>Microsoft.Storage/storageAccounts/read</code>; or GCP permissions like
          <code>storage.objects.get</code>.
      policy:
        description: |-
          Detailed information about the policy document that was analyzed, including
          policy metadata, version, type (identity-based, resource-based, etc.), and
          structural details. This provides context for understanding the scope and
          nature of the permission analysis.
        recommended: true
      service_privilege_analysis_list:
        description: The list of privilege analysis results grouped by cloud service or namespace.
      total_potential_attacks_count:
        description: |-
          The total count of privilege-to-attack technique mappings identified across all
          analyzed privileges.
      unused_privileges_count:
        description: |-
          The total count of privileges or actions defined in the policy that have not
          been utilized within the analysis timeframe. This metric helps identify
          over-privileged access and opportunities for privilege reduction to follow the
          principle of least privilege. High counts may indicate policy bloat or
          excessive permissions.
      unused_services_count:
        description: |-
          The total count of cloud services or resource types referenced in the policy
          that have not been accessed or utilized within the analysis timeframe. This
          helps identify unused service permissions that could be removed to reduce
          attack surface. Examples: AWS services like S3, SQS, IAM, Lambda; Azure
          services like Storage, Compute, KeyVault; or GCP services like Cloud Storage,
          Compute Engine, BigQuery.

  PortInfo:
    description: |-
      The Port Information object describes a port and its associated protocol
      details.
    aliases:
      - Port Information
    is_a: Object
    in_subset:
      - objects
    slots:
      - port
      - protocol_name
      - protocol_num
    slot_usage:
      port:
        description: |-
          The port number. For example: <code>80</code>, <code>443</code>,
          <code>22</code>.
        required: true
      protocol_name:
        description: |-
          The IP protocol name in lowercase, as defined by the Internet Assigned Numbers
          Authority (IANA). For example: <code>tcp</code> or <code>udp</code>.
        recommended: true

  PrivilegeAttackInfo:
    description: |-
      The Privilege Attack Info object groups privileges by the potential attack they
      could enable. It maps specific privileges to MITRE ATT&CK techniques, helping
      identify security risks associated with granted permissions.
    aliases:
      - Privilege Attack Info
    is_a: Object
    in_subset:
      - objects
    slots:
      - attack
      - privilege_info_list
    slot_usage:
      attack:
        description: The MITRE ATT&CK technique that these privileges could enable.
        required: true
      privilege_info_list:
        description: |-
          The list of privilege information objects, where each element describes a
          specific privilege that could enable the associated attack technique.
        required: true

  PrivilegeInfo:
    description: |-
      The Privilege Info object describes information about a specific privilege,
      action, or permission. It captures the privilege name, type, usage status, and
      when it was last used.
    aliases:
      - Privilege Info
    is_a: Object
    in_subset:
      - objects
    slots:
      - is_unused
      - last_used_time
      - name
      - type
      - type_id
    slot_usage:
      is_unused:
        description: Indicates whether the privilege is unused within the analysis timeframe.
      last_used_time:
        description: The most recent time this privilege was used.
      name:
        description: |-
          The name of the privilege, action, or permission. Examples:
          <code>GetObject</code>, <code>CreateStoreImageTask</code> (AWS);
          <code>Microsoft.Storage/storageAccounts/read</code> (Azure);
          <code>storage.objects.get</code> (GCP).
        required: true
      type:
        description: |-
          The type or category of the privilege, normalized to the caption of the
          <code>type_id</code> value. In the case of 'Other', it is defined by the event
          source.
      type_id:
        description: The normalized type of the privilege.
        range: PrivilegeInfoTypeIdEnum

  ProgrammaticCredential:
    description: |-
      The Programmatic Credential object describes service-specific credentials used
      for direct API access and system integration. These credentials are typically
      issued by individual services or platforms for accessing their APIs and
      resources, focusing on credential lifecycle management and usage tracking.
      Examples include API keys, service account keys, client certificates, and
      vendor-specific access tokens.
    aliases:
      - Programmatic Credential
    is_a: Object
    in_subset:
      - objects
    slots:
      - last_used_time
      - type
      - uid
    slot_usage:
      last_used_time:
        description: |-
          The timestamp when this programmatic credential was last used for
          authentication or API access. This helps track credential usage patterns,
          identify dormant credentials that may pose security risks, and support
          credential lifecycle management. The timestamp should reflect the most recent
          successful authentication or API call using this credential.
      type:
        description: |-
          The type or category of programmatic credential, normalized to the caption of
          the type_id value. In the case of 'Other', it is defined by the event source.
          Examples include 'API Key', 'Service Account Key', 'Access Token', 'Client
          Certificate', 'OAuth Token', 'Personal Access Token', etc.
        recommended: true
      uid:
        description: |-
          The unique identifier of the programmatic credential. This could be an API key
          ID, service account key ID, access token identifier, certificate serial number,
          or other unique identifier that distinguishes this credential from others.
          Examples: AWS Access Key ID, GCP Service Account Key ID, Azure Application ID,
          or OAuth2 token identifier.
        required: true

  QueryEvidence:
    description: |-
      The specific resulting evidence information that was queried or discovered.
      When mapping raw telemetry data users should select the appropriate child
      object that best matches the evidence type as defined by query_type_id.
    aliases:
      - Query Evidence
    in_subset:
      - objects
    slots:
      - connection_info
      - file
      - folder
      - group
      - job
      - kernel
      - module
      - network_interfaces
      - peripheral_device
      - process
      - query_type
      - query_type_id
      - service
      - session
      - startup_item
      - state
      - tcp_state_id
      - user
      - users
    slot_usage:
      connection_info:
        description: The network connection information related to a Network Connection query type.
        recommended: true
        annotations:
          group: primary
      file:
        description: |-
          The file that is the target of the query when query_type_id indicates a File
          query.
        recommended: true
        annotations:
          group: primary
      folder:
        description: |-
          The folder that is the target of the query when query_type_id indicates a
          Folder query.
        recommended: true
        annotations:
          group: primary
      group:
        description: |-
          The administrative group that is the target of the query when query_type_id
          indicates an Admin Group query.
        recommended: true
        annotations:
          group: primary
      job:
        description: |-
          The job object that pertains to the event when query_type_id indicates a Job
          query.
        recommended: true
        annotations:
          group: primary
      kernel:
        description: |-
          The kernel object that pertains to the event when query_type_id indicates a
          Kernel query.
        recommended: true
        annotations:
          group: primary
      module:
        description: |-
          The module that pertains to the event when query_type_id indicates a Module
          query.
        recommended: true
        annotations:
          group: primary
      network_interfaces:
        description: |-
          The physical or virtual network interfaces that are associated with the device
          when query_type_id indicates a Network Interfaces query.
        recommended: true
        annotations:
          group: primary
      peripheral_device:
        description: |-
          The peripheral device that triggered the event when query_type_id indicates a
          Peripheral Device query.
        recommended: true
        annotations:
          group: primary
      process:
        description: |-
          The process that pertains to the event when query_type_id indicates a Process
          query.
        recommended: true
        annotations:
          group: primary
      query_type:
        description: The normalized caption of query_type_id or the source-specific query type.
        annotations:
          group: classification
      query_type_id:
        description: |-
          The normalized type of system query performed against a device or system
          component.
        required: true
        range: QueryEvidenceQueryTypeIdEnum
        annotations:
          group: classification
      service:
        description: |-
          The service that pertains to the event when query_type_id indicates a Service
          query.
        recommended: true
        annotations:
          group: primary
      session:
        description: |-
          The authenticated user or service session when query_type_id indicates a
          Session query.
        recommended: true
        annotations:
          group: primary
      startup_item:
        description: |-
          The startup item object that pertains to the event when query_type_id indicates
          a Startup Item query.
        recommended: true
        annotations:
          group: primary
      state:
        description: |-
          The state of the socket, normalized to the caption of the state_id value. In
          the case of 'Other', it is defined by the event source.
        annotations:
          group: context
      tcp_state_id:
        annotations:
          group: context
      user:
        description: The user that pertains to the event when query_type_id indicates a User query.
        recommended: true
        annotations:
          group: primary
      users:
        description: |-
          The users that belong to the administrative group when query_type_id indicates
          a Users query.
        annotations:
          group: context
    rules:
      - postconditions:
          exactly_one_of:
            - slot_conditions:
                connection_info:
                  required: true
            - slot_conditions:
                file:
                  required: true
            - slot_conditions:
                folder:
                  required: true
            - slot_conditions:
                group:
                  required: true
            - slot_conditions:
                job:
                  required: true
            - slot_conditions:
                kernel:
                  required: true
            - slot_conditions:
                module:
                  required: true
            - slot_conditions:
                network_interfaces:
                  required: true
            - slot_conditions:
                peripheral_device:
                  required: true
            - slot_conditions:
                process:
                  required: true
            - slot_conditions:
                service:
                  required: true
            - slot_conditions:
                session:
                  required: true
            - slot_conditions:
                startup_item:
                  required: true
            - slot_conditions:
                user:
                  required: true
        description: |-
          OCSF just_one: exactly one of ['connection_info', 'file', 'folder', 'group',
          'job', 'kernel', 'module', 'network_interfaces', 'peripheral_device',
          'process', 'service', 'session', 'startup_item', 'user'] must be set.
    annotations:
      ocsf_constraints: |-
        {"just_one": ["connection_info", "file", "folder", "group", "job", "kernel",
        "module", "network_interfaces", "peripheral_device", "process", "service",
        "session", "startup_item", "user"]}
    is_a: OcsfObject

  RelatedEvent:
    description: |-
      The Related Event object describes an event or another finding related to a
      finding. It may or may not be an OCSF event.
    aliases:
      - Related Event/Finding
    is_a: Object
    in_subset:
      - objects
    slots:
      - attacks
      - count
      - created_time
      - desc
      - first_seen_time
      - kill_chain
      - last_seen_time
      - modified_time
      - observables
      - product
      - product_uid
      - severity
      - severity_id
      - status
      - tags
      - title
      - traits
      - type
      - type_name
      - type_uid
      - uid
    slot_usage:
      count:
        description: |-
          The number of times that activity in the same logical group occurred, as
          reported by the related Finding.
      created_time:
        description: |-
          <p>The time when the related event/finding was created.</p> If the related
          event/finding is in OCSF and is a Finding, then this value should be equal to
          <code>finding_info.created_time</code> in the corresponding Finding. If the
          related event/finding is in OCSF and is not a Finding, then this value should
          be equal to <code>time</code> in the corresponding event.
      desc:
        description: A description of the related event/finding.
      first_seen_time:
        description: |-
          The time when the finding was first observed. e.g. The time when a
          vulnerability was first observed.<br>It can differ from the
          <code>created_time</code> timestamp, which reflects the time this finding was
          created.
      last_seen_time:
        description: |-
          The time when the finding was most recently observed. e.g. The time when a
          vulnerability was most recently observed.<br>It can differ from the
          <code>modified_time</code> timestamp, which reflects the time this finding was
          last modified.
      modified_time:
        description: The time when the related event/finding was last modified.
      product:
        description: Details about the product that reported the related event/finding.
      product_uid:
        description: The unique identifier of the product that reported the related event.
      severity_id:
        recommended: true
      status:
        description: |-
          The related event status. Should correspond to the label of the status_id (or
          'Other' status value for status_id = 99) of the related event.
      tags:
        description: |-
          The list of tags; <code>{key:value}</code> pairs associated with the related
          event/finding.
      title:
        description: A title or a brief phrase summarizing the related event/finding.
      traits:
        description: |-
          The list of key traits or characteristics extracted from the related
          event/finding that influenced or contributed to the overall finding's outcome.
      type:
        description: |-
          <p>The type of the related event/finding.</p>Populate if the related
          event/finding is <code>NOT</code> in OCSF. If it is in OCSF, then utilize
          <code>type_name, type_uid</code> instead.
      type_name:
        description: |-
          The type of the related OCSF event, as defined by <code>type_uid</code>.<p>For
          example: <code>Process Activity: Launch.</code></p>Populate if the related
          event/finding is in OCSF.
      type_uid:
        description: |-
          The unique identifier of the related OCSF event type. <p>For example:
          <code>100701.</code></p>Populate if the related event/finding is in OCSF.
        recommended: true
      uid:
        description: |-
          <p>The unique identifier of the related event/finding.</p> If the related
          event/finding is in OCSF, then this value must be equal to
          <code>metadata.uid</code> in the corresponding event.
        required: true

  Remediation:
    description: |-
      The Remediation object describes the recommended remediation steps to address
      identified issue(s).
    aliases:
      - Remediation
    is_a: Object
    in_subset:
      - objects
    slots:
      - cis_controls
      - desc
      - kb_article_list
      - kb_articles
      - references
    slot_usage:
      cis_controls:
        description: |-
          An array of Center for Internet Security (CIS) Controls that can be optionally
          mapped to provide additional remediation details.
      desc:
        description: The description of the remediation strategy.
        required: true
      references:
        description: |-
          A list of supporting URL/s, references that help describe the remediation
          strategy.
    close_mappings:
      - iso27001:RiskTreatmentPlan
    related_mappings:
      - kev_catalog:KevEntry
      - core:Configuration

  Reputation:
    description: |-
      The Reputation object describes the reputation/risk score of an entity (e.g.
      device, user, domain).
    aliases:
      - Reputation
    is_a: Object
    in_subset:
      - objects
    slots:
      - base_score
      - provider
      - score
      - score_id
    slot_usage:
      base_score:
        description: The reputation score as reported by the event source.
        required: true
      provider:
        description: The provider of the reputation information.
        recommended: true
      score_id:
        required: true

  Request:
    description: The Request Elements object describes characteristics of an API request.
    aliases:
      - Request Elements
    is_a: Object
    in_subset:
      - objects
    slots:
      - containers
      - data
      - flags
      - uid
    slot_usage:
      data:
        description: The additional data that is associated with the api request.
      flags:
        description: The communication flags that are associated with the api request.
      uid:
        description: The unique request identifier.
        required: true

  Response:
    description: The Response Elements object describes characteristics of an API response.
    aliases:
      - Response Elements
    is_a: Object
    in_subset:
      - objects
    slots:
      - code
      - containers
      - data
      - error
      - error_message
      - flags
      - message
    slot_usage:
      code:
        recommended: true
      data:
        description: The additional data that is associated with the api response.
      error:
        recommended: true
      error_message:
        recommended: true
      flags:
        description: The communication flags that are associated with the api response.
      message:
        recommended: true

  RpcInterface:
    description: |-
      The RPC Interface represents the remote procedure call interface used in the
      DCE/RPC session.
    aliases:
      - RPC Interface
    is_a: Object
    in_subset:
      - objects
    slots:
      - ack_reason
      - ack_result
      - uuid
      - version
    slot_usage:
      ack_reason:
        recommended: true
      ack_result:
        recommended: true
      uuid:
        description: The unique identifier of the particular remote procedure or service.
        required: true
      version:
        description: The version of the DCE/RPC protocol being used in the session.
        required: true

  San:
    description: |-
      The Subject Alternative name (SAN) object describes a SAN secured by a digital
      certificate
    aliases:
      - Subject Alternative Name
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - type
    slot_usage:
      name:
        description: Name of SAN (e.g. The actual IP Address or domain.)
        required: true
      type:
        description: Type descriptor of SAN (e.g. IP Address/domain/etc.)
        required: true

  Sbom:
    description: |-
      The Software Bill of Materials object describes characteristics of a generated
      SBOM.
    aliases:
      - Software Bill of Materials
    is_a: Object
    in_subset:
      - objects
    slots:
      - created_time
      - package
      - product
      - software_components
      - type
      - type_id
      - uid
      - version
    slot_usage:
      created_time:
        description: The time when the SBOM was created.
        recommended: true
      package:
        description: |-
          The software package or library that is being discovered or inventoried by an
          SBOM.
        required: true
      product:
        description: |-
          Details about the upstream product that generated the SBOM e.g.
          <code>cdxgen</code> or <code>Syft</code>.
        recommended: true
      software_components:
        required: true
      type:
        description: |-
          The type of SBOM, normalized to the caption of the <code>type_id</code> value.
          In the case of 'Other', it is defined by the source.
      type_id:
        description: The type of SBOM.
        recommended: true
        range: SbomTypeIdEnum
      uid:
        description: |-
          A unique identifier for the SBOM or the SBOM generation by a source tool, such
          as the SPDX <code>metadata.component.bom-ref</code>.
      version:
        description: |-
          The specification (spec) version of the particular SBOM, e.g.,
          <code>1.6</code>.

  Scim:
    description: |-
      The System for Cross-domain Identity Management (SCIM) Configuration object
      provides a structured set of attributes related to SCIM protocols used for
      identity provisioning and management across cloud-based platforms. It
      standardizes user and group provisioning details, enabling identity
      synchronization and lifecycle management with compatible Identity Providers
      (IdPs) and applications. SCIM is defined in <a target='_blank'
      href='https://datatracker.ietf.org/doc/html/rfc7643'>RFC-7634</a>
    aliases:
      - SCIM
    is_a: Object
    in_subset:
      - objects
    slots:
      - auth_protocol
      - auth_protocol_id
      - created_time
      - error_message
      - is_group_provisioning_enabled
      - is_user_provisioning_enabled
      - last_run_time
      - modified_time
      - name
      - protocol_name
      - rate_limit
      - scim_group_schema
      - scim_user_schema
      - state
      - state_id
      - uid
      - uid_alt
      - url_string
      - vendor_name
      - version
    slot_usage:
      auth_protocol:
        description: |-
          The authorization protocol as defined by the caption of
          <code>auth_protocol_id</code>. In the case of <code>Other</code>, it is defined
          by the event source.
      auth_protocol_id:
        description: |-
          The normalized identifier of the authorization protocol used by the SCIM
          resource.
      created_time:
        description: When the SCIM resource was added to the service provider.
      error_message:
        description: Message or code associated with the last encountered error.
      is_group_provisioning_enabled:
        description: |-
          Indicates whether the SCIM resource is configured to provision groups,
          automatically or otherwise.
      is_user_provisioning_enabled:
        description: |-
          Indicates whether the SCIM resource is configured to provision users,
          automatically or otherwise.
      last_run_time:
        description: Timestamp of the most recent successful synchronization.
      modified_time:
        description: |-
          The most recent time when the SCIM resource was updated at the service
          provider.
      name:
        description: The name of the SCIM resource.
        recommended: true
      protocol_name:
        description: |-
          The supported protocol for the SCIM resource. E.g., <code>SAML</code>,
          <code>OIDC</code>, or <code>OAuth2</code>.
      rate_limit:
        description: |-
          Maximum number of requests allowed by the SCIM resource within a specified time
          frame to avoid throttling.
      scim_group_schema:
        recommended: true
      scim_user_schema:
        recommended: true
      state:
        description: |-
          The provisioning state of the SCIM resource, normalized to the caption of the
          <code>state_id</code> value. In the case of <code>Other</code>, it is defined
          by the event source.
      state_id:
        description: The normalized state ID of the SCIM resource to reflect its activation status.
        range: ScimStateIdEnum
      uid:
        description: A unique identifier for a SCIM resource as defined by the service provider.
        recommended: true
      uid_alt:
        description: |-
          A String that is an identifier for the resource as defined by the provisioning
          client. The <code>externalId</code> may simplify identification of a resource
          between the provisioning client and the service provider by allowing the client
          to use a filter to locate the resource with an identifier from the provisioning
          domain, obviating the need to store a local mapping between the provisioning
          domain's identifier of the resource and the identifier used by the service
          provider.
      url_string:
        description: The primary URL for SCIM API requests.
      vendor_name:
        description: |-
          Name of the vendor or service provider implementing SCIM. E.g.,
          <code>Okta</code>, <code>Auth0</code>, <code>Microsoft</code>.
      version:
        description: SCIM protocol version supported e.g., <code>SCIM 2.0</code>.
        recommended: true

  Script:
    description: |-
      The Script object describes a script or command that can be executed by a
      shell, script engine, or interpreter. Examples include Bash, JavsScript,
      PowerShell, Python, VBScript, etc. Note that the term <em>script</em> here
      denotes not only a script contained within a file but also a script or command
      typed interactively by a user, supplied on the command line, or provided by
      some other file-less mechanism.
    aliases:
      - Script
    is_a: Object
    in_subset:
      - objects
    slots:
      - file
      - hashes
      - name
      - parent_uid
      - script_content
      - type
      - type_id
      - uid
    slot_usage:
      file:
        description: |-
          Present if this script is associated with a file. Not present in the case of a
          file-less script.
      hashes:
        description: |-
          An array of the script's cryptographic hashes. Note that these hashes are
          calculated on the script in its original encoding, and not on the normalized
          UTF-8 encoding found in the <code>script_content</code> attribute.
        recommended: true
      name:
        description: |-
          Unique identifier for the script or macro, independent of the containing file,
          used for tracking, auditing, and security analysis.
      parent_uid:
        description: |-
          This attribute relates a sub-script to a parent script having the matching
          <code>uid</code> attribute. In the case of PowerShell, sub-script execution can
          be identified by matching the activity correlation ID of the raw ETW events
          provided by the OS.
      script_content:
        required: true
      type:
        description: |-
          The script type, normalized to the caption of the <code>type_id</code> value.
          In the case of 'Other', it is defined by the event source.
      type_id:
        description: The normalized script type ID.
        required: true
        range: ScriptTypeIdEnum
      uid:
        description: |-
          Some script engines assign a unique ID to each individual execution of a given
          script. This attribute captures that unique ID. In the case of PowerShell, the
          unique ID corresponds to the <code>ScriptBlockId</code> in the raw ETW events
          provided by the OS.
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:ExecutableScript/
    notes:
      - |-
        D3FEND™ Ontology d3f:ExecutableScript. —
        https://d3fend.mitre.org/dao/artifact/d3f:ExecutableScript/

  SecurityState:
    description: |-
      The Security State object describes the security related state of a managed
      entity.
    aliases:
      - Security State
    is_a: Object
    in_subset:
      - objects
    slots:
      - state
      - state_id
    slot_usage:
      state:
        description: |-
          The security state, normalized to the caption of the state_id value. In the
          case of 'Other', it is defined by the source.
      state_id:
        description: The security state of the managed entity.
        recommended: true
        range: SecurityStateStateIdEnum

  ServicePrivilegeAnalysis:
    description: |-
      The Service Privilege Analysis object describes privilege analysis results for
      a single cloud service or resource namespace. It provides metrics on privilege
      usage, counts by type, and mappings to potential attack techniques.
    aliases:
      - Service Privilege Analysis
    is_a: Object
    in_subset:
      - objects
    slots:
      - all_privileges_unused
      - analyzed_privileges_count
      - execute_count
      - last_used_time
      - name
      - privilege_attack_info_list
      - read_count
      - unused_privileges_count
      - write_count
    slot_usage:
      all_privileges_unused:
        description: Indicates whether all privileges within this service are unused.
      analyzed_privileges_count:
        description: The total count of privileges analyzed within this service.
      execute_count:
        description: The count of execute-type privileges within this service.
      last_used_time:
        description: The most recent time any privilege in this service was used.
      name:
        description: |-
          The service or namespace identifier. Examples: <code>s3</code>,
          <code>ec2</code> (AWS); <code>Microsoft.Storage</code> (Azure);
          <code>storage</code> (GCP).
        required: true
      privilege_attack_info_list:
        description: The list of privilege-to-attack mappings for this service.
      read_count:
        description: The count of read-type privileges within this service.
      unused_privileges_count:
        description: The count of unused privileges within this service.
      write_count:
        description: The count of write-type privileges within this service.

  Session:
    description: |-
      The Session object describes details about an authenticated session. e.g.
      Session Creation Time, Session Issuer.
    aliases:
      - Session
    is_a: Object
    in_subset:
      - objects
    slots:
      - count
      - created_time
      - credential_uid
      - expiration_reason
      - expiration_time
      - is_mfa
      - is_remote
      - is_vpn
      - issuer
      - terminal
      - uid
      - uid_alt
      - uuid
    slot_usage:
      count:
        description: |-
          The number of identical sessions spawned from the same source IP, destination
          IP, application, and content/threat type seen over a period of time.
      created_time:
        description: The time when the session was created.
        recommended: true
      expiration_reason:
        description: The reason which triggered the session expiration.
      expiration_time:
        description: The session expiration time.
      is_remote:
        recommended: true
      issuer:
        description: The identifier of the session issuer.
        recommended: true
      terminal:
        description: 'The Pseudo Terminal associated with the session. Ex: the tty or pts value.'
      uid:
        description: The unique identifier of the session.
        recommended: true
      uid_alt:
        description: |-
          The alternate unique identifier of the session. e.g. AWS ARN -
          <code>arn:aws:sts::123344444444:assumed-role/Admin/example-session</code>.
      uuid:
        description: The universally unique identifier of the session.
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:Session/
    notes:
      - |-
        D3FEND™ Ontology d3f:Session —
        https://d3fend.mitre.org/dao/artifact/d3f:Session/

  SoftwareComponent:
    description: |-
      The Software Component object describes characteristics of a software component
      within a software package.
    aliases:
      - Software Component
    is_a: Object
    in_subset:
      - objects
    slots:
      - author
      - hash
      - license
      - name
      - purl
      - related_component
      - relationship
      - relationship_id
      - type
      - type_id
      - version
    slot_usage:
      author:
        recommended: true
      hash:
        description: Cryptographic hash to identify the binary instance of a software component.
      license:
        description: The software license applied to this component.
      name:
        description: The software component name.
        required: true
      purl:
        description: |-
          The Package URL (PURL) to identify the software component. This is a URL that
          uniquely identifies the component, including the component's name, version, and
          type. The URL is used to locate and retrieve the component's metadata and
          content.
        recommended: true
      related_component:
        recommended: true
      relationship_id:
        recommended: true
      type:
        description: |-
          The type of software component, normalized to the caption of the
          <code>type_id</code> value. In the case of 'Other', it is defined by the
          source.
      type_id:
        description: The type of software component.
        recommended: true
        range: SoftwareComponentTypeIdEnum
      version:
        description: The software component version.
        required: true

  Span:
    description: |-
      Represents a single unit of work or operation within a distributed trace. A
      span typically tracks the execution of a request across a service, capturing
      important details such as the operation, timestamps, and status. Spans help
      break down the overall trace into smaller, manageable parts, enabling detailed
      analysis of the performance and behavior of specific operations within the
      system. They are crucial for understanding latency, dependencies, and
      bottlenecks in complex distributed systems.
    aliases:
      - Span
    is_a: Object
    in_subset:
      - objects
    slots:
      - duration
      - end_time
      - message
      - operation
      - parent_uid
      - service
      - start_time
      - status_code
      - uid
    slot_usage:
      duration:
        description: |-
          The total time, in milliseconds, that the span represents, calculated as the
          difference between start_time and end_time. It reflects the operation's
          performance and latency, independent of event timestamps, and accounts for
          normalized times used by observability tools to ensure consistency across
          distributed systems.
      end_time:
        description: |-
          The end timestamp of the span, essential for identifying latency and
          performance bottlenecks. Like the start time, this timestamp is normalized
          across the observability system to ensure consistency, even when events are
          recorded across distributed services with unsynchronized clocks. Normalized
          time allows for accurate duration calculations and helps observability tools
          track performance across services, regardless of the individual system time
          settings.
        required: true
      message:
        description: |-
          The message in a span (often referred to as a span event) serves as a way to
          record significant moments or occurrences during the span's lifecycle. This
          content typically manifests as log entries, annotations, or semi-structured
          events as a string, providing additional granularity and context about what
          happens at specific points during the execution of an operation.
      operation:
        description: |-
          Describes an action performed in a span, such as API requests, database
          queries, or computations.
      parent_uid:
        description: |-
          The ID of the parent span for this span object, establishing its relationship
          in the trace hierarchy.
      service:
        description: |-
          Identifies the service or component that generates the span, helping trace its
          path through the distributed system.
      start_time:
        description: |-
          The start timestamp of the span, essential for identifying latency and
          performance bottlenecks. This timestamp is normalized across the observability
          system, ensuring consistency even when events occur across distributed services
          with potentially unsynchronized clocks. By using normalized time, observability
          tools can provide accurate, uniform measurements of operation performance and
          latency, regardless of where or when the events actually occur.
        required: true
      status_code:
        description: |-
          Indicates the outcome of the operation in the span, such as success, failure,
          or error. Issues in a span typically refer to problems such as failed
          operations, timeouts, service unavailability, or errors in processing that can
          negatively impact the performance or reliability of the system. Tracking the
          `status_code` helps pinpoint these issues, enabling quicker identification and
          resolution of system inefficiencies or faults.
      uid:
        description: |-
          The unique identifier for the span, used in distributed systems and
          microservices architectures to track and correlate requests across different
          components of an application. It enables tracing the flow of a request through
          various services.
        required: true

  Sso:
    description: |-
      The Single Sign-On (SSO) object provides a structure for normalizing SSO
      attributes, configuration, and/or settings from Identity Providers.
    aliases:
      - SSO
    is_a: Object
    in_subset:
      - objects
    slots:
      - auth_protocol
      - auth_protocol_id
      - certificate
      - created_time
      - duration_mins
      - idle_timeout
      - login_endpoint
      - logout_endpoint
      - metadata_endpoint
      - modified_time
      - name
      - protocol_name
      - scopes
      - uid
      - vendor_name
    slot_usage:
      auth_protocol:
        description: |-
          The authorization protocol as defined by the caption of
          <code>auth_protocol_id</code>. In the case of <code>Other</code>, it is defined
          by the event source.
      auth_protocol_id:
        description: |-
          The normalized identifier of the authentication protocol used by the SSO
          resource.
      certificate:
        description: |-
          Digital Signature associated with the SSO resource, e.g., SAML X.509
          certificate details.
        recommended: true
      created_time:
        description: When the SSO resource was created.
      duration_mins:
        description: |-
          The duration (in minutes) for an SSO session, after which re-authentication is
          required.
      idle_timeout:
        description: |-
          Duration (in minutes) of allowed inactivity before Single Sign-On (SSO) session
          expiration.
      login_endpoint:
        description: URL for initiating an SSO login request.
      logout_endpoint:
        description: |-
          URL for initiating an SSO logout request, allowing sessions to be terminated
          across applications.
      metadata_endpoint:
        description: |-
          URL where metadata about the SSO configuration is available (e.g., for SAML
          configurations).
      modified_time:
        description: The most recent time when the SSO resource was updated.
      name:
        description: The name of the SSO resource.
        recommended: true
      protocol_name:
        description: |-
          The supported protocol for the SSO resource. E.g., <code>SAML</code> or
          <code>OIDC</code>.
      uid:
        description: A unique identifier for a SSO resource.
        recommended: true
      vendor_name:
        description: |-
          Name of the vendor or service provider implementing SSO. E.g.,
          <code>Okta</code>, <code>Auth0</code>, <code>Microsoft</code>.

  StartupItem:
    description: |-
      The startup item object describes an application component that has associated
      startup criteria and configurations.
    aliases:
      - Startup Item
    in_subset:
      - objects
    slots:
      - driver
      - job
      - name
      - process
      - run_mode_ids
      - run_modes
      - run_state
      - run_state_id
      - start_type
      - start_type_id
      - type
      - type_id
    slot_usage:
      driver:
        description: The startup item kernel driver resource.
      job:
        description: The startup item job resource.
      name:
        description: The unique name of the startup item.
        required: true
      process:
        description: The startup item process resource.
      run_mode_ids:
        description: |-
          The list of normalized identifiers that describe the startup items' properties
          when it is running.  Use this field to capture extended information about the
          process, which may depend on the type of startup item.  E.g., A Windows service
          that interacts with the desktop.
        range: StartupItemRunModeIdsEnum
      run_modes:
        description: |-
          The list of run_modes, normalized to the captions of the run_mode_id values.
          In the case of 'Other', they are defined by the event source.
      run_state:
        description: The run state of the startup item.
      run_state_id:
        description: The run state ID of the startup item.
        recommended: true
        range: StartupItemRunStateIdEnum
      start_type:
        description: The start type of the startup item.
      start_type_id:
        description: The start type ID of the startup item.
        required: true
      type:
        description: The startup item type.
      type_id:
        description: The startup item type identifier.
        recommended: true
        range: StartupItemTypeIdEnum
    rules:
      - postconditions:
          exactly_one_of:
            - slot_conditions:
                driver:
                  required: true
            - slot_conditions:
                job:
                  required: true
            - slot_conditions:
                process:
                  required: true
        description: 'OCSF just_one: exactly one of [''driver'', ''job'', ''process''] must be set.'
    annotations:
      ocsf_constraints: '{"just_one": ["driver", "job", "process"]}'
    is_a: OcsfObject

  ThreatActor:
    description: Threat actor is responsible for the observed malicious activity.
    aliases:
      - Threat Actor
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - type
      - type_id
    slot_usage:
      name:
        description: The name of the threat actor.
        required: true
      type:
        description: |-
          The classification of the threat actor based on their motivations,
          capabilities, or affiliations. Common types include nation-state actors,
          cybercriminal groups, hacktivists, or insider threats.
      type_id:
        description: The normalized datastore resource type identifier.
        recommended: true
        range: ThreatActorTypeIdEnum
    exact_mappings:
      - stix:ThreatActor
    close_mappings:
      - attack:Group

  Ticket:
    description: |-
      The Ticket object represents ticket in the customer's IT Service Management
      (ITSM) systems like ServiceNow, Jira, etc.
    aliases:
      - Ticket
    is_a: Object
    in_subset:
      - objects
    slots:
      - src_url
      - status
      - status_details
      - status_id
      - title
      - type
      - type_id
      - uid
    slot_usage:
      src_url:
        description: The url of a ticket in the ticket system.
        recommended: true
      status:
        description: |-
          The status of the ticket normalized to the caption of the
          <code>status_id</code> value. In the case of <code>99</code>, this value should
          as defined by the source.
      status_details:
        description: A list of contextual descriptions of the <code>status, status_id</code> values.
      status_id:
        description: The normalized identifier for the ticket status.
        range: TicketStatusIdEnum
      title:
        description: The title of the ticket.
      type:
        description: |-
          The linked ticket type determines whether the ticket is internal or in an
          external ticketing system.
      type_id:
        description: The normalized identifier for the ticket type.
        range: TicketTypeIdEnum
      uid:
        description: Unique identifier of the ticket.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                src_url:
                  required: true
            - slot_conditions:
                uid:
                  required: true
        description: 'OCSF at_least_one: at least one of [''src_url'', ''uid''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["src_url", "uid"]}'

  Timespan:
    description: |-
      The Time Span object represents different time period durations. If a timespan
      is fractional, i.e. crosses one period, e.g. a week and 3 days, more than one
      may be populated since each member is of integral type. In that case
      <code>type_id</code> if present should be set to <code>Other.</code><P>A
      timespan may also be defined by its time interval boundaries,
      <code>start_time</code> and <code>end_time</code>.
    aliases:
      - Time Span
    is_a: Object
    in_subset:
      - objects
    slots:
      - duration
      - duration_days
      - duration_hours
      - duration_mins
      - duration_months
      - duration_secs
      - duration_weeks
      - duration_years
      - end_time
      - start_time
      - type
      - type_id
    slot_usage:
      duration:
        description: The duration of the time span in milliseconds.
        recommended: true
      duration_days:
        description: The duration of the time span in days.
        recommended: true
      duration_hours:
        description: The duration of the time span in hours.
        recommended: true
      duration_mins:
        description: The duration of the time span in minutes.
        recommended: true
      duration_months:
        description: The duration of the time span in months.
        recommended: true
      duration_secs:
        description: The duration of the time span in seconds.
        recommended: true
      duration_weeks:
        description: The duration of the time span in weeks.
        recommended: true
      duration_years:
        description: The duration of the time span in years.
        recommended: true
      end_time:
        description: The end time or conclusion of the timespan's interval.
        recommended: true
      start_time:
        description: The start time or beginning of the timespan's interval.
        recommended: true
      type:
        description: The type of time span duration the object represents.
      type_id:
        description: The normalized identifier for the time span duration type.
        recommended: true
        range: TimespanTypeIdEnum
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                duration:
                  required: true
            - slot_conditions:
                duration_days:
                  required: true
            - slot_conditions:
                duration_hours:
                  required: true
            - slot_conditions:
                duration_mins:
                  required: true
            - slot_conditions:
                duration_months:
                  required: true
            - slot_conditions:
                duration_secs:
                  required: true
            - slot_conditions:
                duration_weeks:
                  required: true
            - slot_conditions:
                duration_years:
                  required: true
            - slot_conditions:
                end_time:
                  required: true
            - slot_conditions:
                start_time:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['duration', 'duration_days',
          'duration_hours', 'duration_mins', 'duration_months', 'duration_secs',
          'duration_weeks', 'duration_years', 'end_time', 'start_time'] must be set.
    annotations:
      ocsf_constraints: |-
        {"at_least_one": ["duration", "duration_days", "duration_hours",
        "duration_mins", "duration_months", "duration_secs", "duration_weeks",
        "duration_years", "end_time", "start_time"]}

  Tls:
    description: |-
      The Transport Layer Security (TLS) object describes the negotiated TLS protocol
      used for secure communications over an establish network connection.
    aliases:
      - Transport Layer Security (TLS)
    is_a: Object
    in_subset:
      - objects
    slots:
      - alert
      - certificate
      - certificate_chain
      - cipher
      - client_ciphers
      - extension_list
      - handshake_dur
      - ja3_hash
      - ja3s_hash
      - key_length
      - sans
      - server_ciphers
      - sni
      - tls_extension_list
      - version
    slot_usage:
      certificate:
        recommended: true
      certificate_chain:
        recommended: true
      cipher:
        recommended: true
      client_ciphers:
        recommended: true
      ja3_hash:
        recommended: true
      ja3s_hash:
        recommended: true
      sans:
        deprecated: Use <code>tls.certificate.sans</code> attribute instead.
      sni:
        recommended: true
      version:
        description: The TLS protocol version.
        required: true

  TlsExtension:
    description: |-
      The TLS Extension object describes additional attributes that extend the base
      Transport Layer Security (TLS) object.
    aliases:
      - TLS Extension
    is_a: Object
    in_subset:
      - objects
    slots:
      - data
      - type
      - type_id
    slot_usage:
      data:
        description: The data contains information specific to the particular extension type.
        recommended: true
      type:
        description: 'The TLS extension type. For example: <code>Server Name</code>.'
      type_id:
        description: |-
          The TLS extension type identifier. See <a target='_blank'
          href='https://datatracker.ietf.org/doc/html/rfc8446#page-35'>The Transport
          Layer Security (TLS) extension page</a>.
        required: true
        range: TlsExtensionTypeIdEnum

  Token:
    description: |-
      The Token object is the base object for representing tokens, API keys, and
      authentication credentials used across different contexts. This object provides
      common attributes for all token types, including protocol-specific
      authentication tokens (Kerberos, OIDC, SAML) and API/client tokens used for
      service authentication. When to use this object: Use the base
      <code>token</code> object directly in API activity events to represent API
      tokens, client tokens, or API keys used to authenticate API requests. Examples
      include: Okta API tokens, Microsoft Entra ID Application Registration client
      secrets, Stripe API keys, AWS API keys. When NOT to use this object: Do NOT use
      the base <code>token</code> object for protocol-specific authentication tokens
      in authentication events - use <code>authentication_token</code> instead (which
      extends this object). Do NOT use <code>token</code> for tracking credential
      lifecycle and usage patterns - use <code>programmatic_credential</code>
      instead.
    aliases:
      - Token
    is_a: Object
    in_subset:
      - objects
    slots:
      - created_time
      - expiration_time
      - is_renewable
      - modified_time
      - name
      - tenant_uid
      - type
      - type_id
      - uid
      - zone
    slot_usage:
      created_time:
        description: The time that the token was created.
        recommended: true
      expiration_time:
        description: The expiration time of the token.
      is_renewable:
        description: Indicates whether the token is renewable.
      modified_time:
        description: The last time the token was updated.
      name:
        description: |-
          The human-friendly name of a token or key, if available, such as the
          <code>name</code> from the Okta API Token API.
      tenant_uid:
        description: |-
          The unique identifier of the tenant or organization that owns the token or key,
          or the tenant context in which the token is authorized for use. This is
          particularly relevant in multi-tenant Identity Provider scenarios where tokens
          are scoped to specific tenants.
      type:
        description: |-
          The type of the token, normalized to the caption of the <code>type_id</code>
          value. This indicates whether the token is a Client Token, API Token, or one of
          the protocol-specific token types.
        recommended: true
      type_id:
        description: |-
          The normalized token type identifier. Valid values: 0 (Unknown), 1 (Ticket
          Granting Ticket - Kerberos), 2 (Service Ticket - Kerberos), 3 (Identity Token -
          OIDC), 4 (Refresh Token - OIDC), 5 (SAML Assertion), 6 (Client Token -
          IdP-issued), 7 (API Token - generic API keys), 99 (Other).
        recommended: true
        range: TokenTypeIdEnum
      uid:
        description: |-
          The unique ID of a token or key, if available, such as the <code>Secret
          ID</code> of Entra ID Application Registration Client Secrets.
      zone:
        description: |-
          The network zone or geographic region that the token or key is authorized to be
          used from. This may represent network-based access restrictions, geographic
          limitations, or other zone-based authorization policies. Examples include
          Okta's network zone restrictions or cloud provider region restrictions.

  Trace:
    description: |-
      The trace object contains information about a distributed trace,  which is
      crucial for observability. Traces are made up of one or more spans, which are
      individual units of work in application activity. Traces track the journey of a
      request as it moves through various services in a system, capturing key details
      like timing, status, and dependencies at each step. Traces provide insights
      into system performance, helping to identify latency, bottlenecks, and issues
      in complex, distributed environments.
    aliases:
      - Trace
    is_a: Object
    in_subset:
      - objects
    slots:
      - duration
      - end_time
      - flags
      - service
      - span
      - start_time
      - uid
    slot_usage:
      duration:
        description: |-
          The total time, in milliseconds, that the trace covers, calculated as the
          difference between start_time and end_time. This duration helps assess the
          overall performance of a request as it travels across various services, and is
          essential for identifying latency and potential bottlenecks within the
          distributed system. The trace duration may differ from individual span
          durations due to the propagation and processing times of the trace as it spans
          multiple components.
      end_time:
        description: |-
          The end timestamp of the trace, essential for identifying latency and
          performance bottlenecks. Like the start time, this timestamp is normalized
          across the trace system to ensure consistency, even when events are recorded
          across distributed services with unsynchronized clocks. Normalized time allows
          for accurate trace duration calculations and helps observability tools track
          overall performance across services, regardless of the individual system time
          settings.
      flags:
        description: |-
          The flags associated with the trace, used to indicate specific properties or
          behaviors, such as whether the trace is sampled or if it has special handling.
          Flags help control how traces are processed, logged, and analyzed, providing
          valuable context for tracing and observability tools in identifying trace
          characteristics or specific tracking requirements.
      service:
        description: |-
          Identifies the service or component generating the trace, helping to track and
          correlate the flow of requests through various parts of a distributed system.
          This information is essential for understanding the role and performance of
          specific services within the broader context of system operations and for
          diagnosing issues across different components.
      span:
        description: |-
          Represents a single unit of work or operation within a distributed trace. A
          span typically tracks the execution of a request across a service, capturing
          important details such as the operation, timestamps, and status. Spans help
          break down the overall trace into smaller, manageable parts, enabling detailed
          analysis of the performance and behavior of specific operations within the
          system. They are crucial for understanding latency, dependencies, and
          bottlenecks in complex distributed systems.
      start_time:
        description: |-
          The start timestamp of the trace, essential for identifying latency and
          performance bottlenecks. Like the end time, this timestamp is normalized across
          the trace system to ensure consistency, even when events are recorded across
          distributed services with unsynchronized clocks. Normalized time enables
          accurate trace duration calculations and helps observability tools track
          performance across services, regardless of the individual system time settings.
      uid:
        description: |-
          The unique identifier of the trace used in distributed systems and
          microservices architecture to track and correlate requests across various
          components of an application.
        required: true

  Url:
    description: |-
      The Uniform Resource Locator (URL) object describes the characteristics of a
      URL.
    aliases:
      - Uniform Resource Locator
    is_a: Object
    in_subset:
      - objects
    slots:
      - categories
      - category_ids
      - domain
      - hostname
      - path
      - port
      - query_string
      - resource_type
      - scheme
      - subdomain
      - url_string
    slot_usage:
      category_ids:
        recommended: true
      domain:
        description: |-
          The domain portion of the URL. For example: <code>example.com</code> in
          <code>https://sub.example.com</code>.
      hostname:
        description: |-
          The URL host as extracted from the URL. For example:
          <code>www.example.com</code> from
          <code>www.example.com/download/trouble</code>.
        recommended: true
      path:
        description: |-
          The URL path as extracted from the URL. For example:
          <code>/download/trouble</code> from
          <code>www.example.com/download/trouble</code>.
        recommended: true
      port:
        description: 'The URL port. For example: <code>80</code>.'
        recommended: true
      query_string:
        recommended: true
      resource_type:
        description: The context in which a resource was retrieved in a web request.
      scheme:
        recommended: true
      url_string:
        description: |-
          The URL string. See RFC 1738. For example:
          <code>http://www.example.com/download/trouble.exe</code>. Note: The URL path
          should not populate the URL string.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                url_string:
                  required: true
            - slot_conditions:
                path:
                  required: true
        description: 'OCSF at_least_one: at least one of [''url_string'', ''path''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["url_string", "path"]}'
      observable_id: 23
    see_also:
      - https://datatracker.ietf.org/doc/html/rfc1738
      - https://d3fend.mitre.org/dao/artifact/d3f:URL/
    notes:
      - Defined in RFC 1738 — https://datatracker.ietf.org/doc/html/rfc1738
      - D3FEND™ Ontology d3f:URL — https://d3fend.mitre.org/dao/artifact/d3f:URL/
    exact_mappings:
      - stix:Url
      - uco_master:URL

  VendorAttributes:
    description: |-
      The Vendor Attributes object can be used to represent values of attributes
      populated by the Vendor/Finding Provider. It can help distinguish between the
      vendor-provided values and consumer-updated values, of key attributes like
      <code>severity_id</code>.<br>The original finding producer should not populate
      this object. It should be populated by consuming systems that support data
      mutability.
    aliases:
      - Vendor Attributes
    is_a: Object
    in_subset:
      - objects
    slots:
      - severity
      - severity_id
    slot_usage:
      severity:
        description: |-
          The finding severity, as reported by the Vendor (Finding Provider). The value
          should be normalized to the caption of the <code>severity_id</code> value. In
          the case of 'Other', it is defined by the source.
      severity_id:
        description: The finding severity ID, as reported by the Vendor (Finding Provider).

  Vulnerability:
    description: |-
      The vulnerability is an unintended characteristic of a computing component or
      system configuration that multiplies the risk of an adverse event or a loss
      occurring either due to accidental exposure, deliberate attack, or conflict
      with new system components.
    aliases:
      - Vulnerability Details
    is_a: Object
    in_subset:
      - objects
    slots:
      - advisory
      - affected_code
      - affected_packages
      - category
      - cve
      - cwe
      - dependency_chain
      - desc
      - exploit_last_seen_time
      - exploit_ref_url
      - exploit_requirement
      - exploit_type
      - first_seen_time
      - fix_available
      - fix_coverage
      - fix_coverage_id
      - is_exploit_available
      - is_fix_available
      - kb_article_list
      - kb_articles
      - last_seen_time
      - packages
      - references
      - related_vulnerabilities
      - remediation
      - severity
      - title
      - vendor_name
    slot_usage:
      category:
        description: |-
          The category of a vulnerability or weakness, as reported by the source tool,
          such as <code>Container Security</code> or <code>Open Source Security</code>.
      cve:
        description: |-
          Describes the Common Vulnerabilities and Exposures <a target='_blank'
          href='https://cve.mitre.org/'>(CVE)</a> details related to the vulnerability.
        recommended: true
      cwe:
        description: |-
          Describes the Common Weakness Enumeration <a target='_blank'
          href='https://cwe.mitre.org/'>(CWE)</a> details related to the vulnerability.
        recommended: true
      desc:
        description: The description of the vulnerability.
      first_seen_time:
        description: The time when the vulnerability was first observed.
      fix_coverage:
        description: |-
          The fix coverage, normalized to the caption of the <code>fix_coverage_id</code>
          value.
      fix_coverage_id:
        description: |-
          The normalized identifier for fix coverage, applicable to this vulnerability.
          Typically useful, when there are multiple affected packages but only a subset
          have available fixes.
        range: VulnerabilityFixCoverageIdEnum
      kb_article_list:
        deprecated: Use <code>advisory</code> attribute instead.
      last_seen_time:
        description: The time when the vulnerability was most recently observed.
      references:
        description: A list of reference URLs with additional information about the vulnerability.
        recommended: true
      remediation:
        description: |-
          The remediation recommendations on how to mitigate the identified
          vulnerability.
      severity:
        description: The vendor assigned severity of the vulnerability.
      title:
        description: A title or a brief phrase summarizing the discovered vulnerability.
      vendor_name:
        description: The name of the vendor that identified the vulnerability.
    rules:
      - postconditions:
          exactly_one_of:
            - slot_conditions:
                advisory:
                  required: true
            - slot_conditions:
                cve:
                  required: true
            - slot_conditions:
                cwe:
                  required: true
        description: 'OCSF just_one: exactly one of [''advisory'', ''cve'', ''cwe''] must be set.'
    annotations:
      ocsf_constraints: '{"just_one": ["advisory", "cve", "cwe"]}'
    exact_mappings:
      - stix:Vulnerability
      - core:Vulnerability
    close_mappings:
      - cve:CVERecord
      - kev_catalog:KevEntry
      - nvd:NVDEntry
    related_mappings:
      - capec:AttackPattern
      - cwe:Weakness

  Whois:
    description: |-
      The resources of a WHOIS record for a given domain. This can include domain
      names, IP address blocks, autonomous system information, and/or contact and
      registration information for a domain.
    aliases:
      - WHOIS
    is_a: Object
    in_subset:
      - objects
    slots:
      - autonomous_system
      - created_time
      - dnssec_status
      - dnssec_status_id
      - domain
      - domain_contacts
      - email_addr
      - isp
      - isp_org
      - last_seen_time
      - name_servers
      - phone_number
      - registrar
      - status
      - subdomains
      - subnet
    slot_usage:
      autonomous_system:
        description: The autonomous system information associated with a domain.
      created_time:
        description: When the domain was registered or WHOIS entry was created.
        recommended: true
      dnssec_status_id:
        recommended: true
      domain:
        description: The domain name corresponding to the WHOIS record.
        recommended: true
      domain_contacts:
        recommended: true
      email_addr:
        description: The email address for the registrar's abuse contact
      last_seen_time:
        description: When the WHOIS record was last updated or seen at.
        recommended: true
      name_servers:
        recommended: true
      phone_number:
        description: The phone number for the registrar's abuse contact
      registrar:
        recommended: true
      status:
        description: |-
          The status of a domain and its ability to be transferred, e.g.,
          <code>clientTransferProhibited</code>.
        recommended: true
      subnet:
        description: The IP address block (CIDR) associated with a domain.
    exact_mappings:
      - uco_master:Whois

  Dns:
    description: |-
      The Domain Name System (DNS) object represents the shared information
      associated with the DNS query and answer objects.
    aliases:
      - DNS
    is_a: Object
    in_subset:
      - objects
    slots:
      - class_
      - packet_uid
      - type
    slot_usage:
      class_:
        description: |-
          The class of resource records being queried. See <a target='_blank'
          href='https://www.rfc-editor.org/rfc/rfc1035.txt'>RFC1035</a>. For example:
          <code>IN</code>.
        recommended: true
      packet_uid:
        description: |-
          The DNS packet identifier assigned by the program that generated the query. The
          identifier is copied to the response.
        recommended: true
      type:
        description: |-
          The type of resource records being queried. See <a target='_blank'
          href='https://www.rfc-editor.org/rfc/rfc1035.txt'>RFC1035</a>. For example: A,
          AAAA, CNAME, MX, and NS.
        recommended: true
    close_mappings:
      - uco_master:DNSRecord

  Entity:
    description: |-
      The Entity object is an unordered collection of attributes, with a name and
      unique identifier. It serves as a base object that defines a set of attributes
      and default constraints available in all objects that extend it.
    aliases:
      - Entity
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - uid
    slot_usage:
      name:
        description: The name of the entity.
        recommended: true
      uid:
        description: The unique identifier of the entity.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                uid:
                  required: true
        description: 'OCSF at_least_one: at least one of [''name'', ''uid''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["name", "uid"]}'

  Resource:
    description: |-
      The Resource object contains attributes that provide information about a
      particular resource. It serves as a base object, offering attributes that help
      identify and classify the resource effectively.
    aliases:
      - Resource
    is_a: Entity
    mixins:
      - DataClassificationProfile
    in_subset:
      - objects
    slots:
      - created_time
      - data
      - labels
      - modified_time
      - name
      - tags
      - type
      - uid
      - uid_alt
    slot_usage:
      created_time:
        description: The time when the resource was created.
      data:
        description: Additional data describing the resource.
      labels:
        description: The list of labels associated to the resource.
      modified_time:
        description: The time when the resource was last modified.
      name:
        description: The name of the resource.
      tags:
        description: The list of tags; <code>{key:value}</code> pairs associated to the resource.
      type:
        description: The resource type as defined by the event source.
      uid:
        description: The unique identifier of the resource.
      uid_alt:
        description: The alternative unique identifier of the resource.

  AccessAnalysisResult:
    description: |-
      The Access Analysis Result object describes access relationships and pathways
      between identities, resources, focusing on who can access what and through
      which mechanisms. This evaluates access levels (read/write/admin), access types
      (direct, cross-account, public, federated), and the conditions under which
      access is granted. Use this for resource-centric security assessments such as
      external access discovery, public exposure analysis, etc.
    aliases:
      - Access Analysis Result
    is_a: Object
    in_subset:
      - objects
    slots:
      - access_level
      - access_type
      - accessors
      - additional_restrictions
      - condition_keys
      - granted_privileges
    slot_usage:
      access_level:
        description: |-
          The generalized access level or permission scope granted to the identity
          through the analyzed policy configuration. Common examples include Read, Write,
          List, Delete, Admin, or custom permission levels.
        recommended: true
      access_type:
        description: |-
          The type or category of access being granted to the identity. This describes
          the nature of the access relationship, such as cross-account access, public
          access, federated access, or third-party integration access. Examples include
          'Cross-Account', 'Public', 'Federated', 'Service-to-Service', etc.
      accessors:
        description: |-
          The identities that are granted access through the analyzed policy
          configuration. This identifies the specific entity that can exercise the
          permissions and helps assess the access relationship and potential security
          implications. Examples include user accounts, service principals, roles,
          account identifiers, or system identities.
        required: true
      additional_restrictions:
        description: |-
          Details about supplementary restrictions and guardrails that may limit the
          granted access, applied through additional policy types such as Resource
          Control Policies (RCPs) and Service Control Policies (SCPs) in AWS, or other
          policy constraints.
      condition_keys:
        description: |-
          The condition keys and their values that constrain when and how the granted
          access can be exercised. These conditions define the circumstances under which
          the access relationship is valid and the privileges can be used. Examples: IP
          address restrictions like 'aws:SourceIp:192.0.2.0/24', time-based constraints
          like 'aws:RequestedRegion:us-east-1', MFA requirements like
          'aws:MultiFactorAuthPresent:true', or custom conditions based on resource tags
          and request context.
      granted_privileges:
        description: |-
          The specific privileges, actions, or permissions that are granted through the
          analyzed access relationship. This includes the actual operations that the
          accessor can perform on the target resource. Examples: AWS actions like
          'sts:AssumeRole', 's3:GetObject', 'ec2:DescribeInstances'; Azure actions like
          'Microsoft.Storage/storageAccounts/read'; or GCP permissions like
          'storage.objects.get'.

  Account:
    description: |-
      The Account object contains details about the account that initiated or
      performed a specific activity within a system or application. Additionally, the
      Account object refers to logical Cloud and Software-as-a-Service (SaaS) based
      containers such as AWS Accounts, Azure Subscriptions, Oracle Cloud
      Compartments, Google Cloud Projects, and otherwise.
    aliases:
      - Account
    is_a: Entity
    in_subset:
      - objects
    slots:
      - is_disabled
      - is_locked
      - is_on_premises_sync_enabled
      - labels
      - name
      - tags
      - type
      - type_id
      - uid
    slot_usage:
      is_disabled:
        description: Indicates if the account is disabled.
      is_locked:
        description: |-
          Indicates if the account is locked. For example, due to the amount of failed
          logins.
      labels:
        description: The list of labels associated to the account.
      name:
        description: |-
          The name of the account (e.g. <code> GCP Project name </code>, <code> Linux
          Account name </code> or <code> AWS Account name</code>).
      tags:
        description: The list of tags; <code>{key:value}</code> pairs associated to the account.
      type:
        description: |-
          The account type, normalized to the caption of 'account_type_id'. In the case
          of 'Other', it is defined by the event source.
      type_id:
        description: The normalized account type identifier.
        recommended: true
        range: AccountTypeIdEnum
      uid:
        description: |-
          The unique identifier of the account (e.g. <code> AWS Account ID </code>,
          <code> OCID </code>, <code> GCP Project ID </code>, <code> Azure Subscription
          ID </code>, <code> Google Workspace Customer ID </code>, or <code> M365 Tenant
          UID</code>).
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:UserAccount/
      - https://d3fend.mitre.org/dao/artifact/d3f:CloudUserAccount/
    notes:
      - |-
        D3FEND™ Ontology d3f:UserAccount. —
        https://d3fend.mitre.org/dao/artifact/d3f:UserAccount/
      - |-
        D3FEND™ Ontology d3f:CloudUserAccount. —
        https://d3fend.mitre.org/dao/artifact/d3f:CloudUserAccount/
    close_mappings:
      - stix:UserAccount
      - uco_master:Account

  Actor:
    description: |-
      The Actor object contains details about the user, role, application, service,
      or process that initiated or performed a specific activity. Note that Actor is
      not the threat actor of a campaign but may be part of a campaign.
    aliases:
      - Actor
    is_a: Object
    in_subset:
      - objects
    slots:
      - app_name
      - app_uid
      - authorizations
      - idp
      - invoked_by
      - process
      - session
      - user
    slot_usage:
      app_name:
        description: |-
          The client application or service that initiated the activity. This can be in
          conjunction with the <code>user</code> if present.  Note that
          <code>app_name</code> is distinct from the <code>process</code> if present.
      app_uid:
        description: |-
          The unique identifier of the client application or service that initiated the
          activity. This can be in conjunction with the <code>user</code> if present.
          Note that <code>app_name</code> is distinct from the <code>process.pid</code>
          or <code>process.uid</code> if present.
      invoked_by:
        deprecated: Use <code> app_name, app_uid </code> attributes instead.
      process:
        description: The process that initiated the activity.
        recommended: true
      session:
        description: The user session from which the activity was initiated.
      user:
        description: |-
          The user that initiated the activity or the user context from which the
          activity was initiated.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                process:
                  required: true
            - slot_conditions:
                user:
                  required: true
            - slot_conditions:
                invoked_by:
                  required: true
            - slot_conditions:
                session:
                  required: true
            - slot_conditions:
                app_name:
                  required: true
            - slot_conditions:
                app_uid:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['process', 'user', 'invoked_by', 'session',
          'app_name', 'app_uid'] must be set.
    annotations:
      ocsf_constraints: |-
        {"at_least_one": ["process", "user", "invoked_by", "session", "app_name",
        "app_uid"]}
    see_also:
      - https://next.d3fend.mitre.org/agent/d3f:Agent/
    notes:
      - D3FEND™ Ontology d3f:Agent. — https://next.d3fend.mitre.org/agent/d3f:Agent/

  AdditionalRestriction:
    description: |-
      The Additional Restriction object describes supplementary access controls and
      guardrails that constrain or limit granted permissions beyond the primary
      policy. These restrictions are typically applied through hierarchical policy
      frameworks, organizational controls, or conditional access mechanisms. Examples
      include AWS Service Control Policies (SCPs), Resource Control Policies (RCPs),
      Azure Management Group policies, GCP Organization policies, conditional access
      policies, IP restrictions, time-based constraints, and MFA requirements.
    aliases:
      - Additional Restriction
    is_a: Object
    in_subset:
      - objects
    slots:
      - policy
      - status
      - status_id
    slot_usage:
      policy:
        description: |-
          Detailed information about the policy document that defines this restriction,
          including policy metadata, type, scope, and the specific rules or conditions
          that implement the access control.
        required: true
      status:
        description: |-
          The current status of the policy restriction, normalized to the caption of the
          <code>status_id</code> enum value.
      status_id:
        description: |-
          The normalized status identifier indicating the applicability of this policy
          restriction.
        recommended: true
        range: AdditionalRestrictionStatusIdEnum

  Advisory:
    description: |-
      The Advisory object represents publicly disclosed cybersecurity vulnerabilities
      defined in a Security advisory. e.g. <code> Microsoft KB Article</code>,
      <code>Apple Security Advisory</code>, or a <code>GitHub Security Advisory
      (GHSA)</code>
    aliases:
      - Advisory
    is_a: Object
    in_subset:
      - objects
    slots:
      - avg_timespan
      - bulletin
      - classification
      - created_time
      - desc
      - install_state
      - install_state_id
      - is_superseded
      - modified_time
      - os
      - product
      - references
      - related_cves
      - related_cwes
      - size
      - src_url
      - title
      - uid
    slot_usage:
      avg_timespan:
        description: The average time to patch.
      bulletin:
        description: The Advisory bulletin identifier.
      classification:
        description: The vendors classification of the Advisory.
      created_time:
        description: The time when the Advisory record was created.
        recommended: true
      desc:
        description: A brief description of the Advisory Record.
      install_state:
        description: The install state of the Advisory.
        recommended: true
      install_state_id:
        description: The normalized install state ID of the Advisory.
        recommended: true
      is_superseded:
        description: The Advisory has been replaced by another.
      modified_time:
        description: The time when the Advisory record was last updated.
      os:
        description: The operating system the Advisory applies to.
        recommended: true
      product:
        description: The product where the vulnerability was discovered.
      references:
        description: |-
          A list of reference URLs with additional information about the vulnerabilities
          disclosed in the Advisory.
        recommended: true
      related_cves:
        description: |-
          A list of Common Vulnerabilities and Exposures <a target='_blank'
          href='https://cve.mitre.org/'>(CVE)</a> identifiers related to the
          vulnerabilities disclosed in the Advisory.
      related_cwes:
        description: |-
          A list of Common Weakness Enumeration <a target='_blank'
          href='https://cwe.mitre.org/'>(CWE)</a> identifiers related to the
          vulnerabilities disclosed in the Advisory.
      size:
        description: The size in bytes for the Advisory. Usually populated for a KB Article patch.
      src_url:
        description: The Advisory link from the source vendor.
      title:
        description: A title or a brief phrase summarizing the Advisory.
        recommended: true
      uid:
        description: |-
          The unique identifier assigned to the advisory or disclosed vulnerability, e.g,
          <code>GHSA-5mrr-rgp6-x4gr</code>.
        required: true
    close_mappings:
      - cve:CnaPublishedContainer

  AffectedCode:
    description: |-
      The Affected Code object describes details about a code block identified as
      vulnerable.
    aliases:
      - Affected Code
    is_a: Object
    in_subset:
      - objects
    slots:
      - end_column
      - end_line
      - file
      - owner
      - remediation
      - rule
      - start_column
      - start_line
    slot_usage:
      end_column:
        description: |-
          The column number of the last part of the assessed code identified as
          vulnerable.
        recommended: true
      end_line:
        recommended: true
      file:
        description: Details about the file that contains the affected code block.
        required: true
      owner:
        description: Details about the user that owns the affected file.
      rule:
        description: |-
          Details about the specific rule, e.g., those defined as part of a larger
          <code>policy</code>, that triggered the finding.
        recommended: true
      start_column:
        description: |-
          The column number of the first part of the assessed code identified as
          vulnerable.
        recommended: true
      start_line:
        recommended: true
    close_mappings:
      - cwe:DemonstrativeExample
    related_mappings:
      - core:Product

  AffectedPackage:
    description: |-
      The Affected Package object describes details about a software package
      identified as affected by a vulnerability/vulnerabilities.
    aliases:
      - Affected Software Package
    is_a: Package
    in_subset:
      - objects
    slots:
      - fixed_in_version
      - path
      - remediation
    slot_usage:
      path:
        description: The installation path of the affected package.
    exact_mappings:
      - cve:AffectedProduct
    close_mappings:
      - nvd:CPEMatch
      - core:Product

  Agent:
    description: |-
      An Agent (also known as a Sensor) is typically installed on an Operating System
      (OS) and serves as a specialized software component that can be designed to
      monitor, detect, collect, archive, or take action. These activities and
      possible actions are defined by the upstream system controlling the Agent and
      its intended purpose. For instance, an Agent can include Endpoint Detection &
      Response (EDR) agents, backup/disaster recovery sensors, Application
      Performance Monitoring or profiling sensors, and similar software.
    aliases:
      - Agent
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - policies
      - type
      - type_id
      - uid
      - uid_alt
      - vendor_name
      - version
    slot_usage:
      name:
        description: 'The name of the agent or sensor. For example: <code>AWS SSM Agent</code>.'
        recommended: true
      policies:
        description: |-
          Describes the various policies that may be applied or enforced by an agent or
          sensor. E.g., Conditional Access, prevention, auto-update, tamper protection,
          destination configuration, etc.
      type:
        description: |-
          The normalized caption of the type_id value for the agent or sensor. In the
          case of 'Other' or 'Unknown', it is defined by the event source.
      type_id:
        description: |-
          The normalized representation of an agent or sensor. E.g., EDR, vulnerability
          management, APM, backup & recovery, etc.
        recommended: true
        range: AgentTypeIdEnum
      uid:
        description: |-
          The UID of the agent or sensor, sometimes known as a Sensor ID or
          <code>aid</code>.
        recommended: true
      uid_alt:
        description: |-
          An alternative or contextual identifier for the agent or sensor, such as a
          configuration, organization, or license UID.
      vendor_name:
        description: |-
          The company or author who created the agent or sensor. For example:
          <code>Crowdstrike</code>.
      version:
        description: The semantic version of the agent or sensor, e.g., <code>7.101.50.0</code>.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                uid:
                  required: true
            - slot_conditions:
                name:
                  required: true
        description: 'OCSF at_least_one: at least one of [''uid'', ''name''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["uid", "name"]}'
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:Sensor/
    notes:
      - |-
        D3FEND™ Ontology d3f:Sensor. —
        https://d3fend.mitre.org/dao/artifact/d3f:Sensor/

  AiModel:
    description: |-
      The AI Model object describes the characteristics of an AI/ML model. Examples
      include language models like GPT-4, embedding models like
      text-embedding-ada-002, and computer vision models like CLIP.
    aliases:
      - AI Model
    is_a: Entity
    in_subset:
      - objects
    slots:
      - ai_provider
      - name
      - uid
      - version
    slot_usage:
      ai_provider:
        description: |-
          AI service provider or organization name. For example: <code>OpenAI</code>,
          <code>Anthropic</code>, <code>Google</code>, or <code>Internal</code>.
        required: true
      name:
        description: |-
          Human-readable model name. For example: <code>gpt-4o</code>,
          <code>claude-3-sonnet</code>, or <code>text-embedding-ada-002</code>.
        required: true
      uid:
        description: The unique identifier of the AI model.
      version:
        description: |-
          Model version identifier. For example: <code>2024-05-13</code>,
          <code>v2.1.0</code>, or <code>beta</code>.
        recommended: true
    see_also:
      - https://huggingface.co/docs/hub/models
      - https://platform.openai.com/docs/models
    notes:
      - |-
        AI Model Registry and Documentation Standards —
        https://huggingface.co/docs/hub/models
      - OpenAI Model Documentation — https://platform.openai.com/docs/models

  Aircraft:
    description: |-
      The Aircraft object represents any aircraft or otherwise airborne asset such as
      an unmanned system, airplane, balloon, spacecraft, or otherwise. The Aircraft
      object is intended to normalized data captured or otherwise logged from active
      radar, passive radar, multi-spectral systems, or the Automatic Dependant
      Broadcast - Surveillance (ADS-B), and/or Mode S systems.
    aliases:
      - Aircraft
    is_a: Entity
    in_subset:
      - objects
    slots:
      - location
      - model
      - name
      - serial_number
      - speed
      - speed_accuracy
      - track_direction
      - uid
      - uid_alt
      - vertical_speed
    slot_usage:
      location:
        recommended: true
      model:
        description: The model name of the aircraft or unmanned system.
      name:
        description: The name of the aircraft, such as the such as the flight name or callsign.
        recommended: true
      serial_number:
        description: The serial number of the aircraft.
      uid:
        description: |-
          The primary identification identifier for an aircraft, such as the 24-bit
          International Civil Aviation Organization (ICAO) identifier of the aircraft, as
          6 hex digits.
        recommended: true
      uid_alt:
        description: |-
          A secondary identification identifier for an aircraft, such as the 4-digit
          squawk (octal representation).
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                serial_number:
                  required: true
            - slot_conditions:
                uid:
                  required: true
            - slot_conditions:
                uid_alt:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['name', 'serial_number', 'uid', 'uid_alt']
          must be set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["name", "serial_number", "uid", "uid_alt"]}'

  Analytic:
    description: |-
      The Analytic object contains details about the analytic technique used to
      analyze and derive insights from the data or information that led to the
      creation of a finding or conclusion.
    aliases:
      - Analytic
    is_a: Entity
    in_subset:
      - objects
    slots:
      - algorithm
      - category
      - desc
      - name
      - related_analytics
      - state
      - state_id
      - type
      - type_id
      - uid
      - version
    slot_usage:
      algorithm:
        description: The algorithm used by the underlying analytic to generate the finding.
      category:
        description: The analytic category.
      desc:
        description: The description of the analytic that generated the finding.
      name:
        description: The name of the analytic that generated the finding.
      related_analytics:
        description: Other analytics related to this analytic.
        deprecated: |-
          Related Analytics has been decoupled from this object, instead use
          <code>finding_info.related_analytics</code>.
      state:
        description: The Analytic state.
      state_id:
        description: The Analytic state identifier.
        range: AnalyticStateIdEnum
      type:
        description: The analytic type.
      type_id:
        description: The analytic type ID.
        required: true
        range: AnalyticTypeIdEnum
      uid:
        description: The unique identifier of the analytic that generated the finding.
      version:
        description: 'The analytic version. For example: <code>1.1</code>.'

  Anomaly:
    description: |-
      Describes an anomaly or deviation detected in a system. Anomalies are
      unexpected activity patterns that could indicate potential issues needing
      attention.
    aliases:
      - Anomaly
    is_a: Object
    in_subset:
      - objects
    slots:
      - observation_parameter
      - observation_type
      - observations
      - observed_pattern
    slot_usage:
      observation_parameter:
        description: |-
          The specific parameter, metric or property where the anomaly was observed.
          Examples include: CPU usage percentage, API response time in milliseconds, HTTP
          error rate, memory utilization, network latency, transaction volume, etc. This
          helps identify the exact aspect of the system exhibiting anomalous behavior.
        required: true
      observation_type:
        description: |-
          The type of analysis methodology used to detect the anomaly. This indicates how
          the anomaly was identified through different analytical approaches. Common
          types include: Frequency Analysis, Time Pattern Analysis, Volume Analysis,
          Sequence Analysis, Distribution Analysis, etc.
        recommended: true
      observations:
        description: |-
          Details about the observed anomaly or observations that were flagged as
          anomalous compared to expected baseline behavior.
        required: true
      observed_pattern:
        description: |-
          The specific pattern identified within the observation type. For Frequency
          Analysis, this could be 'FREQUENT', 'INFREQUENT', 'RARE', or 'UNSEEN'. For Time
          Pattern Analysis, this could be 'BUSINESS_HOURS', 'OFF_HOURS', or
          'UNUSUAL_TIME'. For Volume Analysis, this could be 'NORMAL_VOLUME',
          'HIGH_VOLUME', or 'SURGE'. The pattern values are specific to each observation
          type and indicate how the observed behavior relates to the baseline.
        recommended: true

  Api:
    description: |-
      The API, or Application Programming Interface, object represents  information
      pertaining to an API request and response.
    aliases:
      - API
    is_a: Object
    in_subset:
      - objects
    slots:
      - group
      - operation
      - request
      - response
      - service
      - token
      - version
    slot_usage:
      group:
        description: The information pertaining to the API group.
      operation:
        required: true
      request:
        description: Details pertaining to the API request.
        recommended: true
      response:
        description: Details pertaining to the API response.
        recommended: true
      service:
        description: The information pertaining to the API service.
      token:
        description: |-
          The API or client token used to authenticate or authorize the API request. This
          attribute contains the base <code>token</code> object that represents: (1)
          IdP-issued client tokens (type_id: 6) such as Okta API tokens or Microsoft
          Entra ID Application Registration client secrets, or (2) generic API
          tokens/keys (type_id: 7) used for SaaS application authentication. Use this
          attribute when the API request was authenticated using a token that should be
          tracked as part of the API activity event. Note: Protocol-specific
          authentication tokens (Kerberos, OIDC, SAML) should be represented using
          <code>authentication_token</code> in authentication events, not in API activity
          events.
      version:
        description: The version of the API service.

  ApplicationObject:
    description: |-
      An Application describes the details for an inventoried application as reported
      by an Application Security tool or other Developer-centric tooling.
      Applications can be defined as Kubernetes resources, Containerized resources,
      or application hosting-specific cloud sources such as AWS Elastic BeanStalk,
      AWS Lightsail, or Azure Logic Apps.
    aliases:
      - Application
    is_a: Object
    in_subset:
      - objects
    slots:
      - criticality
      - data
      - desc
      - group
      - hostname
      - labels
      - name
      - owner
      - region
      - resource_relationship
      - risk_level
      - risk_level_id
      - risk_score
      - sbom
      - tags
      - type
      - uid
      - uid_alt
      - url
      - version
    slot_usage:
      criticality:
        description: The criticality of the application as defined by the event source.
      data:
        description: Additional data describing the application.
      desc:
        description: |-
          A description or commentary for an application, usually retrieved from an
          upstream system.
      group:
        description: The name of the related application or associated resource group.
      hostname:
        description: The fully qualified name of the application.
      labels:
        description: The list of labels associated to the application.
      name:
        description: The name of the application.
        recommended: true
      owner:
        description: The identity of the service or user account that owns the application.
        recommended: true
      region:
        description: The cloud region of the resource.
      resource_relationship:
        description: |-
          A graph representation showing how this application relates to and interacts
          with other entities in the environment. This can include parent/child
          relationships, dependencies, or other connections.
      sbom:
        description: The Software Bill of Materials (SBOM) associated with the application
      tags:
        description: The list of tags; <code>{key:value}</code> pairs associated to the application.
      type:
        description: |-
          The type of application as defined by the event source, e.g.,
          <code>GitHub</code>, <code>Azure Logic App</code>, or <code>Amazon Elastic
          BeanStalk</code>.
      uid:
        description: The unique identifier for the application.
        recommended: true
      uid_alt:
        description: |-
          An alternative or contextual identifier for the application, such as a
          configuration, organization, or license UID.
      url:
        description: The URL of the application.
      version:
        description: The semantic version of the application, e.g., <code>1.7.4</code>.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                uid:
                  required: true
            - slot_conditions:
                name:
                  required: true
        description: 'OCSF at_least_one: at least one of [''uid'', ''name''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["uid", "name"]}'
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:Application/
    notes:
      - |-
        D3FEND™ Ontology d3f:Application. —
        https://d3fend.mitre.org/dao/artifact/d3f:Application/
    exact_mappings:
      - uco_master:Application

  Assessment:
    description: |-
      The Assessment object describes a point-in-time assessment, check, or
      evaluation of a specific configuration or signal against an asset, entity,
      person, or otherwise. For example, this can encapsulate <code>os_signals</code>
      from CrowdStrike Falcon Zero Trust Assessments, or account for
      <code>Datastore</code> configurations from Cyera, or capture details of
      Microsoft Intune configuration policies.
    aliases:
      - Assessment
    is_a: Entity
    in_subset:
      - objects
    slots:
      - category
      - desc
      - meets_criteria
      - name
      - policy
      - uid
    slot_usage:
      category:
        description: |-
          The category that the assessment is part of. For example:
          <code>Prevention</code> or <code>Windows 10</code>.
      desc:
        description: |-
          The description of the assessment criteria, or a description of the specific
          configuration or signal the assessment is targeting.
        recommended: true
      meets_criteria:
        description: |-
          Determines whether the assessment against the specific configuration or signal
          meets the assessments criteria. For example, if the assessment checks if a
          <code>Datastore</code> is encrypted or not, having encryption would be
          evaluated as <code>true</code>.
        required: true
      name:
        description: |-
          The name of the configuration or signal being assessed. For example:
          <code>Kernel Mode Code Integrity (KMCI)</code> or
          <code>publicAccessibilityState</code>.
        recommended: true
      policy:
        description: The details of any policy associated with an assessment.
      uid:
        description: |-
          The unique identifier of the configuration or signal being assessed. For
          example: the <code>signal_id</code>.

  Attack:
    description: |-
      The MITRE ATT&CK® & ATLAS™ object describes the tactic, technique,
      sub-technique & mitigation associated to an attack.
    aliases:
      - MITRE ATT&CK® & ATLAS™
    is_a: Object
    in_subset:
      - objects
    slots:
      - mitigation
      - sub_technique
      - tactic
      - tactics
      - technique
      - version
    slot_usage:
      sub_technique:
        recommended: true
      tactic:
        recommended: true
      technique:
        recommended: true
      version:
        description: The ATT&CK® or ATLAS™ Matrix version.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                tactic:
                  required: true
            - slot_conditions:
                technique:
                  required: true
            - slot_conditions:
                sub_technique:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['tactic', 'technique', 'sub_technique']
          must be set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["tactic", "technique", "sub_technique"]}'
    see_also:
      - https://attack.mitre.org
      - https://atlas.mitre.org/matrices/ATLAS
    notes:
      - ATT&CK® Matrix — https://attack.mitre.org
      - ATLAS™ Matrix — https://atlas.mitre.org/matrices/ATLAS
    exact_mappings:
      - attack:AttackPattern
      - capec:AttackPattern
      - stix:AttackPattern

  AuthFactor:
    description: |-
      An Authentication Factor object describes a category of methods used for
      identity verification in an authentication attempt.
    aliases:
      - Authentication Factor
    is_a: Object
    in_subset:
      - objects
    slots:
      - device
      - email_addr
      - factor_type
      - factor_type_id
      - is_hotp
      - is_totp
      - phone_number
      - provider
      - security_questions
    slot_usage:
      device:
        description: Device used to complete an authentication request.
        recommended: true
        annotations:
          group: primary
      email_addr:
        description: The email address used in an email-based authentication factor.
        annotations:
          group: context
      factor_type:
        recommended: true
        annotations:
          group: primary
      factor_type_id:
        required: true
        annotations:
          group: primary
      is_hotp:
        recommended: true
        annotations:
          group: context
      is_totp:
        recommended: true
        annotations:
          group: context
      phone_number:
        description: The phone number used for a telephony-based authentication request.
        annotations:
          group: context
      provider:
        description: The name of provider for an authentication factor.
        recommended: true
        annotations:
          group: context
      security_questions:
        annotations:
          group: context

  AuthenticationToken:
    description: |-
      The Authentication Token object extends the base <code>token</code> object and
      represents standardized authentication tokens, tickets, or assertions that
      conform to established authentication protocols such as Kerberos, OIDC, and
      SAML. This object inherits all attributes from <code>token</code> and adds
      protocol-specific attributes (e.g., <code>kerberos_flags</code>,
      <code>encryption_details</code>) for authentication events. Use this object in
      authentication events to represent protocol-specific tokens: Kerberos Ticket
      Granting Tickets (TGT) and Service Tickets (ST), OIDC Identity Tokens and
      Refresh Tokens, and SAML Assertions. These tokens are issued by authentication
      servers and identity providers and carry protocol-specific metadata, lifecycle
      information, and security attributes defined by their respective
      specifications. When to use this object: Use <code>authentication_token</code>
      when representing protocol-specific authentication tokens (type_id values 1-5:
      Kerberos TGT/ST, OIDC ID/Refresh tokens, SAML assertions) in authentication
      events. When NOT to use this object: Do NOT use
      <code>authentication_token</code> for API tokens or client tokens (type_id
      values 6-7) used in API activity events - use the base <code>token</code>
      object instead. Do NOT use <code>authentication_token</code> for generic API
      keys - use the base <code>token</code> object instead.
    aliases:
      - Authentication Token
    is_a: Token
    in_subset:
      - objects
    slots:
      - created_time
      - encryption_details
      - expiration_time
      - is_renewable
      - kerberos_flags
      - type
      - type_id
    slot_usage:
      created_time:
        description: |-
          The time that the authentication token was created or issued. This corresponds
          to the token issuance time, such as the <code>iat</code> (issued at) claim in
          OIDC tokens, the issue instant in SAML assertions, or the ticket start time in
          Kerberos tickets.
        recommended: true
      encryption_details:
        description: The encryption details of the authentication token.
        recommended: true
      expiration_time:
        description: The expiration time of the authentication token.
      is_renewable:
        description: Indicates whether the authentication token is renewable.
      kerberos_flags:
        recommended: true
      type:
        description: The type of the authentication token.
        recommended: true
      type_id:
        description: |-
          The normalized authentication token type identifier. This attribute restricts
          the base <code>token.type_id</code> enum to only protocol-specific
          authentication token types (values 0, 1-5, 99). API tokens and client tokens
          (values 6-7) are not valid for <code>authentication_token</code> - use the base
          <code>token</code> object for those types.
        recommended: true
        range: AuthenticationTokenTypeIdEnum

  Authorization:
    description: |-
      The Authorization Result object provides details about the authorization
      outcome and associated policies related to activity.
    aliases:
      - Authorization Result
    is_a: Object
    in_subset:
      - objects
    slots:
      - decision
      - policy
    slot_usage:
      decision:
        description: Authorization Result/outcome, e.g. allowed, denied.
        recommended: true
      policy:
        description: Details about the Identity/Access management policies that are applicable.

  AutonomousSystem:
    description: |-
      An autonomous system (AS) is a collection of connected Internet Protocol (IP)
      routing prefixes under the control of one or more network operators on behalf
      of a single administrative entity or domain that presents a common, clearly
      defined routing policy to the internet.
    aliases:
      - Autonomous System
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - number
    slot_usage:
      name:
        description: Organization name for the Autonomous System.
        recommended: true
        annotations:
          group: context
      number:
        description: Unique number that the AS is identified by.
        recommended: true
        annotations:
          group: context
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                number:
                  required: true
            - slot_conditions:
                name:
                  required: true
        description: 'OCSF at_least_one: at least one of [''number'', ''name''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["number", "name"]}'
    exact_mappings:
      - stix:AutonomousSystem
      - uco_master:AutonomousSystem

  Baseline:
    description: |-
      Describes the baseline or expected behavior of a system, service, or component
      based on historical observations and measurements. It establishes reference
      points for comparison to detect anomalies, trends, and deviations from typical
      patterns.
    aliases:
      - Baseline
    is_a: Object
    in_subset:
      - objects
    slots:
      - observation_parameter
      - observation_type
      - observations
      - observed_pattern
    slot_usage:
      observation_parameter:
        description: |-
          The specific parameter or property being monitored. Examples include: CPU usage
          percentage, API response time in milliseconds, HTTP error rate, memory
          utilization, network latency, transaction volume, etc.
        required: true
      observation_type:
        description: |-
          The type of analysis being performed to establish baseline behavior. Common
          types include: Frequency Analysis, Time Pattern Analysis, Volume Analysis,
          Sequence Analysis, Distribution Analysis, etc.
        recommended: true
      observations:
        description: |-
          Collection of actual measured values, data points and observations recorded for
          this baseline.
        required: true
      observed_pattern:
        description: |-
          The specific pattern identified within the observation type. For Frequency
          Analysis, this could be 'FREQUENT', 'INFREQUENT', 'RARE', or 'UNSEEN'. For Time
          Pattern Analysis, this could be 'BUSINESS_HOURS', 'OFF_HOURS', or
          'UNUSUAL_TIME'. For Volume Analysis, this could be 'NORMAL_VOLUME',
          'HIGH_VOLUME', or 'SURGE'. The pattern values are specific to each observation
          type and indicate the baseline behavior.
        recommended: true

  Campaign:
    description: |-
      Campaign represent organized efforts by threat actors to achieve malicious
      objectives over a period, often characterized by shared tactics, techniques,
      and procedures (TTPs).
    aliases:
      - Campaign
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
    slot_usage:
      name:
        description: The name of a specific campaign associated with a cyber threat.
        required: true
    exact_mappings:
      - attack:Campaign
      - stix:Campaign

  Certificate:
    description: |-
      The Digital Certificate, also known as a Public Key Certificate, object
      contains information about the ownership and usage of a public key. It serves
      as a means to establish trust in the authenticity and integrity of the public
      key and the associated entity.
    aliases:
      - Digital Certificate
    is_a: Object
    in_subset:
      - objects
    slots:
      - created_time
      - expiration_time
      - fingerprints
      - is_self_signed
      - issuer
      - sans
      - serial_number
      - subject
      - uid
      - version
    slot_usage:
      created_time:
        description: The time when the certificate was created.
        recommended: true
      expiration_time:
        description: The expiration time of the certificate.
        recommended: true
      fingerprints:
        description: The fingerprint list of the certificate.
        recommended: true
      is_self_signed:
        recommended: true
      issuer:
        description: The certificate issuer distinguished name.
        required: true
      sans:
        description: |-
          The list of subject alternative names that are secured by a specific
          certificate.
      serial_number:
        description: The serial number of the certificate used to create the digital signature.
        required: true
      subject:
        description: The certificate subject distinguished name.
        recommended: true
      uid:
        description: The unique identifier of the certificate.
      version:
        description: The certificate version.
        recommended: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:Certificate/
    notes:
      - |-
        D3FEND™ Ontology d3f:Certificate. —
        https://d3fend.mitre.org/dao/artifact/d3f:Certificate/
    exact_mappings:
      - stix:X509Certificate

  Check:
    description: |-
      The check object defines a specific, testable compliance verification point
      that evaluates a target device against a standard, framework, or custom
      requirement. While checks are typically associated with formal standards (like
      CIS, NIST, or ISO), they can also represent custom or organizational
      requirements. When mapped to controls, checks can evaluate specific
      control_parameters to determine compliance status, but neither the control
      mapping nor control_parameters are required for a valid check.
    aliases:
      - Check
    is_a: Object
    in_subset:
      - objects
    slots:
      - desc
      - name
      - resource
      - severity
      - severity_id
      - standards
      - status
      - status_id
      - uid
      - version
    slot_usage:
      desc:
        description: |-
          The detailed description of the compliance check, explaining the security
          requirement, vulnerability, or configuration being assessed. For example, CIS:
          <code>The cramfs filesystem type is a compressed read-only Linux filesystem.
          Removing support for unneeded filesystem types reduces the local attack
          surface.</code> or DISA STIG: <code>Unauthorized access to the information
          system by foreign entities may result in loss or compromise of data.</code>
      name:
        description: |-
          The name or title of the compliance check. For example, CIS: <code>Ensure
          mounting of cramfs filesystems is disabled</code> or DISA STIG: <code>The
          Ubuntu operating system must implement DoD-approved encryption to protect the
          confidentiality of remote access sessions</code>.
        recommended: true
      resource:
        description: Describes details about the resource that this check evaluated.
      severity:
        description: |-
          The severity level as defined in the source document. For example CIS
          Benchmarks, valid values are: <code>Level 1</code> (security-forward, essential
          settings), <code>Level 2</code> (security-focused environment, more
          restrictive), or <code>Scored/Not Scored</code> (whether compliance can be
          automatically checked). For DISA STIG, valid values are: <code>CAT I</code>
          (maps to severity_id 5/Critical), <code>CAT II</code> (maps to severity_id
          4/High), or <code>CAT III</code> (maps to severity_id 3/Medium).
      severity_id:
        description: |-
          The normalized severity identifier that maps severity levels to standard
          severity levels. For example CIS Benchmark: <code>Level 2</code> maps to
          <code>4</code> (High), <code>Level 1</code> maps to <code>3</code> (Medium).
          For DISA STIG: <code>CAT I</code> maps to <code>5</code> (Critical), <code>CAT
          II</code> maps to <code>4</code> (High), and <code>CAT III</code> maps to
          <code>3</code> (Medium).
        range: CheckSeverityIdEnum
      standards:
        description: |-
          The regulatory or industry standard this check is associated with. E.g.,
          <code>PCI DSS 3.2.1</code>, <code>HIPAA Security Rule</code>, <code>NIST SP
          800-53 Rev. 5</code>, or <code>ISO/IEC 27001:2013</code>.
        recommended: true
      status:
        description: |-
          The resultant status of the compliance check normalized to the caption of the
          <code>status_id</code> value. For example, CIS Benchmark: <code>Pass</code>
          when all requirements are met, <code>Fail</code> when requirements are not met,
          or DISA STIG: <code>NotAFinding</code> (maps to status_id 1/Pass),
          <code>Open</code> (maps to status_id 3/Fail).
        recommended: true
      status_id:
        description: The normalized status identifier of the compliance check.
        recommended: true
        range: CheckStatusIdEnum
      uid:
        description: |-
          The unique identifier of the compliance check within its standard or framework.
          For example, CIS Benchmark identifier <code>1.1.1.1</code>, DISA STIG
          identifier <code>V-230234</code>, or NIST control identifier
          <code>AC-17(2)</code>.
        recommended: true
      version:
        description: |-
          The check version. For example, CIS Benchmark: <code>1.1.0</code> for Amazon
          Linux 2 or DISA STIG: <code>V2R1</code> for Windows 10.

  CisBenchmark:
    description: |-
      The CIS Benchmark object describes best practices for securely configuring IT
      systems, software, networks, and cloud infrastructure as defined by the <a
      target='_blank' href='https://www.cisecurity.org/cis-benchmarks/'>Center for
      Internet Security</a>. See also <a target='_blank'
      href='https://www.cisecurity.org/insights/blog/getting-to-know-the-cis-benchmarks'>Getting
      to Know the CIS Benchmarks</a>.
    aliases:
      - CIS Benchmark
    deprecated: Use the Compliance object with Checks object instead. (since 1.5.0)
    is_a: Object
    in_subset:
      - objects
    slots:
      - cis_controls
      - desc
      - name
    slot_usage:
      cis_controls:
        recommended: true
      desc:
        description: |-
          The CIS Benchmark description. For example: <i>The cramfs filesystem type is a
          compressed read-only Linux filesystem embedded in small footprint systems. A
          cramfs image can be used without having to first decompress the image.</i>
      name:
        description: |-
          The CIS Benchmark name. For example: <i>Ensure mounting of cramfs filesystems
          is disabled.</i>
        required: true

  CisBenchmarkResult:
    description: |-
      The CIS Benchmark Result object contains information as defined by the Center
      for Internet Security (<a target='_blank'
      href='https://www.cisecurity.org/cis-benchmarks/'>CIS</a>) benchmark result.
      CIS Benchmarks are a collection of best practices for securely configuring IT
      systems, software, networks, and cloud infrastructure.
    aliases:
      - CIS Benchmark Result
    deprecated: Use the Compliance object with Checks object instead. (since 1.5.0)
    is_a: Object
    in_subset:
      - objects
    slots:
      - desc
      - name
      - remediation
      - rule
    slot_usage:
      desc:
        description: The CIS benchmark description.
      name:
        description: The CIS benchmark name.
        required: true
      rule:
        description: The CIS benchmark rule.

  CisControl:
    description: |-
      The CIS Control (aka Critical Security Control) object describes a prioritized
      set of actions to protect your organization and data from cyber-attack vectors.
      The <a target='_blank' href='https://www.cisecurity.org/controls'>CIS
      Controls</a> are defined by the Center for Internet Security.
    aliases:
      - CIS Control
    is_a: Object
    in_subset:
      - objects
    slots:
      - desc
      - name
      - version
    slot_usage:
      desc:
        description: |-
          The CIS Control description. For example: <i>Uninstall or disable unnecessary
          services on enterprise assets and software, such as an unused file sharing
          service, web application module, or service function.</i>
      name:
        description: |-
          The CIS Control name. For example: <i>4.8 Uninstall or Disable Unnecessary
          Services on Enterprise Assets and Software.</i>
        required: true
      version:
        description: 'The CIS Control version. For example: <i>v8</i>.'
        recommended: true
    close_mappings:
      - iso27001:SecurityControl

  CisCsc:
    description: |-
      The CIS Critical Security Control (CSC) contains information as defined by the
      Center for Internet Security Critical Security Control <a target='_blank'
      href='https://www.cisecurity.org/controls'>(CIS CSC)</a>. Prioritized set of
      actions to protect your organization and data from cyber-attack vectors.
    aliases:
      - CIS CSC
    deprecated: Use the cis_control object instead. (since 1.5.0)
    is_a: Object
    in_subset:
      - objects
    slots:
      - control
      - version
    slot_usage:
      control:
        required: true
      version:
        description: The CIS critical security control version.
        recommended: true

  ClassifierDetails:
    description: |-
      The Classifier Details object describes details about the classifier used for
      data classification.
    aliases:
      - Classifier Details
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - type
      - uid
    slot_usage:
      name:
        description: The name of the classifier.
        recommended: true
      type:
        description: The type of the classifier.
        required: true
      uid:
        description: The unique identifier of the classifier.
        recommended: true

  Cloud:
    description: |-
      The Cloud object describes the cloud computing environment where an event or
      finding originated. It provides comprehensive context about the cloud
      infrastructure, including the cloud service provider, account or subscription
      details, organizational structure, geographic regions, availability zones, and
      logical partitions.
    aliases:
      - Cloud
    is_a: Object
    in_subset:
      - objects
    slots:
      - account
      - cloud_partition
      - org
      - project_uid
      - provider
      - region
      - zone
    slot_usage:
      account:
        description: |-
          The Account object containing details about the cloud account, subscription, or
          billing unit where the event or finding was created. This object includes
          properties such as the account name, unique identifier, type, labels, and
          tags.<br/><br/><strong>Examples:</strong><ul><li><strong>AWS:</strong> Account
          object with <code>name</code>, <code>uid</code> (Account ID),
          <code>type</code>, and other account properties</li><li><strong>Azure:</strong>
          Subscription object with <code>name</code>, <code>uid</code> (Subscription ID),
          <code>type</code>, and subscription metadata</li><li><strong>GCP:</strong>
          Project object with <code>name</code>, <code>uid</code> (Project ID),
          <code>type</code>, and project attributes</li><li><strong>Oracle
          Cloud:</strong> Compartment object with <code>name</code>, <code>uid</code>
          (Tenancy OCID), <code>type</code>, and compartment details</li></ul>
      cloud_partition:
        description: |-
          The logical grouping or isolated segment within a cloud provider's
          infrastructure where the event or finding was created, often used for
          compliance, governance, or regional
          separation.<br/><br/><strong>Examples:</strong><ul><li><strong>AWS:</strong>
          Partition where the event occurred (<code>aws</code>, <code>aws-cn</code>,
          <code>aws-us-gov</code>)</li><li><strong>Azure:</strong> Cloud environment
          where the event occurred (<code>AzureCloud</code>,
          <code>AzureUSGovernment</code>, <code>AzureChinaCloud</code>)</li></ul>
      org:
        description: |-
          The Organization object containing details about the organizational unit or
          management structure that governs the account, subscription, or project where
          the event or finding was created. This object includes properties such as the
          organization name, unique identifier, type, and other organizational
          metadata.<br/><br/><strong>Examples:</strong><ul><li><strong>AWS:</strong>
          Organization object with <code>name</code>, <code>uid</code> (Organization ID),
          <code>type</code>, and other organizational
          properties</li><li><strong>Azure:</strong> Management Group object with
          <code>name</code>, <code>uid</code> (Management Group ID), <code>type</code>,
          and management group metadata</li><li><strong>GCP:</strong> Organization object
          with <code>name</code>, <code>uid</code> (Organization ID), <code>type</code>,
          and organizational attributes</li><li><strong>Oracle Cloud:</strong> Tenancy
          object with <code>name</code>, <code>uid</code> (Tenancy OCID),
          <code>type</code>, and tenancy details</li></ul>
      provider:
        description: |-
          The unique name of the Cloud services provider where the event or finding was
          created. Examples include AWS, Azure, GCP (Google Cloud Platform), Oracle
          Cloud, IBM Cloud, Alibaba Cloud, or other public, private, or hybrid cloud
          providers.
        required: true
      region:
        description: |-
          The cloud region where the event or finding was created, as defined by the
          cloud
          provider.<br/><br/><strong>Examples:</strong><ul><li><strong>AWS:</strong>
          Region where the event occurred (<code>us-east-1</code>,
          <code>eu-west-1</code>)</li><li><strong>Azure:</strong> Region where the event
          occurred (<code>East US</code>, <code>West
          Europe</code>)</li><li><strong>GCP:</strong> Region where the event occurred
          (<code>us-central1</code>, <code>europe-west1</code>)</li><li><strong>Oracle
          Cloud:</strong> Region where the event occurred (<code>us-ashburn-1</code>,
          <code>uk-london-1</code>)</li></ul>
        recommended: true
      zone:
        description: |-
          The availability zone in the cloud region where the event or finding was
          created, as defined by the cloud
          provider.<br/><br/><strong>Examples:</strong><ul><li><strong>AWS:</strong>
          Availability zone where the event occurred (<code>us-east-1a</code>,
          <code>us-east-1b</code>)</li><li><strong>Azure:</strong> Availability zone
          where the event occurred (<code>1</code>, <code>2</code>, <code>3</code> within
          a region)</li><li><strong>GCP:</strong> Availability zone where the event
          occurred (<code>us-central1-a</code>,
          <code>us-central1-b</code>)</li><li><strong>Oracle Cloud:</strong> Availability
          zone where the event occurred (<code>AD-1</code>, <code>AD-2</code>,
          <code>AD-3</code>)</li></ul>

  Compliance:
    description: |-
      The Compliance object contains information about Industry and Regulatory
      Framework standards, controls and requirements or details about custom
      assessments utilized in a compliance evaluation. Standards define broad
      security frameworks, controls represent specific security requirements within
      those frameworks, and checks are the testable verification points used to
      determine if controls are properly implemented.
    aliases:
      - Compliance
    is_a: Object
    in_subset:
      - objects
    slots:
      - assessments
      - category
      - checks
      - compliance_references
      - compliance_standards
      - control
      - control_parameters
      - desc
      - requirements
      - standards
      - status
      - status_code
      - status_detail
      - status_details
      - status_id
    slot_usage:
      assessments:
        description: A list of assessments associated with the compliance requirements evaluation.
      category:
        description: |-
          The category a control framework pertains to, as reported by the source tool,
          such as <code>Asset Management</code> or <code>Risk Assessment</code>.
      checks:
        description: |-
          A list of compliance checks associated with specific industry standards or
          frameworks. Each check represents an individual rule or requirement that has
          been evaluated against a target device. Checks typically include details such
          as the check name (e.g., CIS: 'Ensure mounting of cramfs filesystems is
          disabled' or DISA STIG descriptive titles), unique identifiers (such as CIS
          identifier '1.1.1.1' or DISA STIG identifier 'V-230234'), descriptions
          (detailed explanations of security requirements or vulnerability discussions),
          and version information.
      compliance_references:
        deprecated: Use the Compliance object with Check array instead.
      compliance_standards:
        deprecated: Use the Compliance object with Check array instead.
      control:
        description: |-
          A Control is a prescriptive, actionable set of specifications that strengthens
          device posture. The control specifies required security measures, while the
          specific implementation values are defined in control_parameters. E.g., CIS AWS
          Foundations Benchmark 1.2.0 - Control 2.1 - Ensure CloudTrail is enabled in all
          regions
        recommended: true
      control_parameters:
        description: |-
          The list of control parameters evaluated in a Compliance check. E.g.,
          parameters for CloudTrail configuration might include
          <code>multiRegionTrailEnabled: true</code>, <code>logFileValidationEnabled:
          true</code>, and <code>requiredRegions: [us-east-1, us-west-2]</code>
      desc:
        description: The description or criteria of a control.
      requirements:
        description: |-
          The specific compliance requirements being evaluated. E.g., <code>PCI DSS
          Requirement 8.2.3 - Passwords must meet minimum complexity requirements</code>
          or <code>HIPAA Security Rule 164.312(a)(2)(iv) - Implement encryption and
          decryption mechanisms</code>
      standards:
        description: The regulatory or industry standards being evaluated for compliance.
        recommended: true
      status:
        description: |-
          The resultant status of the compliance check normalized to the caption of the
          <code>status_id</code> value. In the case of 'Other', it is defined by the
          event source.
        recommended: true
      status_code:
        description: The resultant status code of the compliance check.
      status_detail:
        description: The contextual description of the <code>status, status_code</code> values.
        deprecated: Use the <code> status_details </code> attribute instead.
      status_details:
        description: |-
          A list of contextual descriptions of the <code>status, status_code</code>
          values.
      status_id:
        description: The normalized status identifier of the compliance check.
        recommended: true
        range: ComplianceStatusIdEnum
    close_mappings:
      - iso27001:SecurityControl

  Container:
    description: |-
      The Container object describes an instance of a specific container. A container
      is a prepackaged, portable system image that runs isolated on an existing
      system using a container runtime like containerd.
    aliases:
      - Container
    is_a: Object
    in_subset:
      - objects
    slots:
      - hash
      - image
      - labels
      - name
      - network_driver
      - orchestrator
      - pod_uuid
      - runtime
      - size
      - tag
      - tags
      - uid
    slot_usage:
      hash:
        description: |-
          Commit hash of image created for docker or the SHA256 hash of the container.
          For example:
          <code>13550340a8681c84c861aac2e5b440161c2b33a3e4f302ac680ca5b686de48de</code>.
        recommended: true
      image:
        description: The container image used as a template to run the container.
        recommended: true
      labels:
        description: The list of labels associated to the container.
      name:
        description: The container name.
        recommended: true
      size:
        description: The size of the container image.
        recommended: true
      tag:
        description: The tag used by the container. It can indicate version, format, OS.
      tags:
        description: The list of tags; <code>{key:value}</code> pairs associated to the container.
      uid:
        description: |-
          The full container unique identifier for this instantiation of the container.
          For example:
          <code>ac2ea168264a08f9aaca0dfc82ff3551418dfd22d02b713142a6843caa2f61bf</code>.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                uid:
                  required: true
            - slot_conditions:
                name:
                  required: true
        description: 'OCSF at_least_one: at least one of [''uid'', ''name''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["uid", "name"]}'
      observable_id: 27
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:ContainerProcess/
    notes:
      - |-
        D3FEND™ Ontology d3f:ContainerProcess. —
        https://d3fend.mitre.org/dao/artifact/d3f:ContainerProcess/
    related_mappings:
      - uco_master:Software

  Cve:
    description: |-
      The Common Vulnerabilities and Exposures (CVE) object represents publicly
      disclosed cybersecurity vulnerabilities defined in CVE Program catalog (<a
      target='_blank' href='https://cve.mitre.org/'>CVE</a>). There is one CVE Record
      for each vulnerability in the catalog.
    aliases:
      - CVE
    is_a: Object
    in_subset:
      - objects
    slots:
      - created_time
      - cvss
      - cwe
      - cwe_uid
      - cwe_url
      - desc
      - epss
      - modified_time
      - product
      - references
      - related_cwes
      - title
      - type
      - uid
    slot_usage:
      created_time:
        description: |-
          The Record Creation Date identifies when the CVE ID was issued to a CVE
          Numbering Authority (CNA) or the CVE Record was published on the CVE List. Note
          that the Record Creation Date does not necessarily indicate when this
          vulnerability was discovered, shared with the affected vendor, publicly
          disclosed, or updated in CVE.
        recommended: true
      cvss:
        recommended: true
      cwe:
        deprecated: Use <code>related_cwes</code> attribute instead.
      desc:
        description: A brief description of the CVE Record.
      modified_time:
        description: The Record Modified Date identifies when the CVE record was last updated.
      product:
        description: The product where the vulnerability was discovered.
      references:
        description: A list of reference URLs with additional information about the CVE Record.
        recommended: true
      related_cwes:
        description: |-
          Describes the Common Weakness Enumeration <a target='_blank'
          href='https://cwe.mitre.org/'>(CWE)</a> details related to the CVE Record.
      title:
        description: A title or a brief phrase summarizing the CVE record.
        recommended: true
      type:
        description: |-
          <p>The vulnerability type as selected from a large dropdown menu during CVE
          refinement.</p>Most frequently used vulnerability types are: <code>DoS</code>,
          <code>Code Execution</code>, <code>Overflow</code>, <code>Memory
          Corruption</code>, <code>Sql Injection</code>, <code>XSS</code>,
          <code>Directory Traversal</code>, <code>Http Response Splitting</code>,
          <code>Bypass something</code>, <code>Gain Information</code>, <code>Gain
          Privileges</code>, <code>CSRF</code>, <code>File Inclusion</code>. For more
          information see <a target='_blank'
          href='https://www.cvedetails.com/vulnerabilities-by-types.php'>Vulnerabilities
          By Type</a> distributions.
        recommended: true
      uid:
        description: |-
          The Common Vulnerabilities and Exposures unique number assigned to a specific
          computer vulnerability. A CVE Identifier begins with 4 digits representing the
          year followed by a sequence of digits that acts as a unique identifier. For
          example: <code>CVE-2021-12345</code>.
        required: true
    exact_mappings:
      - cve:CVERecord
    close_mappings:
      - kev_catalog:KevEntry
      - nvd:NVDEntry
      - stix:Vulnerability
      - core:Vulnerability

  Cvss:
    description: |-
      The Common Vulnerability Scoring System (<a target='_blank'
      href='https://www.first.org/cvss/'>CVSS</a>) object provides a way to capture
      the principal characteristics of a vulnerability and produce a numerical score
      reflecting its severity.
    aliases:
      - CVSS Score
    is_a: Object
    in_subset:
      - objects
    slots:
      - base_score
      - depth
      - metrics
      - overall_score
      - severity
      - src_url
      - vector_string
      - vendor_name
      - version
    slot_usage:
      base_score:
        description: 'The CVSS base score. For example: <code>9.1</code>.'
        required: true
      depth:
        recommended: true
      metrics:
        description: |-
          The Common Vulnerability Scoring System metrics. This attribute contains
          information on the CVE's impact. If the CVE has been analyzed, this attribute
          will contain any CVSSv2 or CVSSv3 information associated with the
          vulnerability. For example: <code>{ {"Access Vector", "Network"}, {"Access
          Complexity", "Low"}, ...}</code>.
      overall_score:
        description: |-
          The CVSS overall score, impacted by base, temporal, and environmental metrics.
          For example: <code>9.1</code>.
        recommended: true
      severity:
        description: |-
          <p>The Common Vulnerability Scoring System (CVSS) Qualitative Severity Rating.
          A textual representation of the numeric score.</p><strong>CVSS
          v2.0</strong><ul><li>Low (0.0 – 3.9)</li><li>Medium (4.0 – 6.9)</li><li>High
          (7.0 – 10.0)</li></ul></p><strong>CVSS v3.0</strong><ul><li>None
          (0.0)</li><li>Low (0.1 - 3.9)</li><li>Medium (4.0 - 6.9)</li><li>High (7.0 -
          8.9)</li><li>Critical (9.0 - 10.0)</li></ul>
      src_url:
        description: |-
          The source URL for the CVSS score. For example:
          <code>https://nvd.nist.gov/vuln/detail/CVE-2021-44228</code>
      vendor_name:
        description: |-
          The vendor that provided the CVSS score. For example: <code>NVD, REDHAT</code>
          etc.
        recommended: true
      version:
        description: 'The CVSS version. For example: <code>3.1</code>.'
        required: true
    exact_mappings:
      - nvd:CVSSMetric
    close_mappings:
      - core:Impact
    related_mappings:
      - cve:CnaContainer

  Cwe:
    description: |-
      The CWE object represents a weakness in a software system that can be exploited
      by a threat actor to perform an attack. The CWE object is based on the <a
      target='_blank' href='https://cwe.mitre.org/'>Common Weakness Enumeration
      (CWE)</a> catalog.
    aliases:
      - CWE
    is_a: Object
    in_subset:
      - objects
    slots:
      - caption
      - src_url
      - uid
    slot_usage:
      caption:
        description: The caption assigned to the Common Weakness Enumeration unique identifier.
      src_url:
        description: |-
          URL pointing to the CWE Specification. For more information see <a
          target='_blank' href='https://cwe.mitre.org/'>CWE.</a>
      uid:
        description: |-
          The Common Weakness Enumeration unique number assigned to a specific weakness.
          A CWE Identifier begins "CWE" followed by a sequence of digits that acts as a
          unique identifier. For example: <code>CWE-123</code>.
        required: true
    exact_mappings:
      - cwe:Weakness
      - core:Weakness
    close_mappings:
      - nvd:NVDWeakness

  D3fTactic:
    description: |-
      The MITRE D3FEND™ Tactic object describes the tactic ID and/or name that is
      associated to an attack.
    aliases:
      - MITRE D3FEND™ Tactic
    is_a: Entity
    in_subset:
      - objects
    slots:
      - name
      - src_url
      - uid
    slot_usage:
      name:
        description: |-
          The tactic name that is associated with the defensive technique. For example:
          <code>Isolate</code>.
      src_url:
        description: |-
          The versioned permalink of the defensive tactic. For example:
          <code>https://d3fend.mitre.org/tactic/d3f:Isolate/</code>.
      uid:
        description: The unique identifier of the defensive tactic.
    see_also:
      - https://d3fend.mitre.org
    notes:
      - D3FEND™ Matrix — https://d3fend.mitre.org

  D3fTechnique:
    description: |-
      The MITRE D3FEND™ Technique object describes the leaf defensive technique ID
      and/or name associated to a countermeasure.
    aliases:
      - MITRE D3FEND™ Technique
    is_a: Entity
    in_subset:
      - objects
    slots:
      - name
      - src_url
      - uid
    slot_usage:
      name:
        description: |-
          The name of the defensive technique. For example: <code>IO Port
          Restriction</code>.
      src_url:
        description: |-
          The versioned permalink of the defensive technique. For example:
          <code>https://d3fend.mitre.org/technique/d3f:IOPortRestriction/</code>.
      uid:
        description: |-
          The unique identifier of the defensive technique. For example:
          <code>D3-IOPR</code>.
    notes:
      - D3FEND™ Matrix — href='https://d3fend.mitre.org

  D3fend:
    description: |-
      The MITRE D3FEND™ object describes the tactic & technique associated with a
      countermeasure.
    aliases:
      - MITRE D3FEND™
    is_a: Object
    in_subset:
      - objects
    slots:
      - d3f_tactic
      - d3f_technique
      - version
    slot_usage:
      d3f_tactic:
        description: |-
          The Tactic object describes the tactic ID and/or name that is associated with a
          countermeasure.
        recommended: true
      d3f_technique:
        description: |-
          The Technique object describes the technique ID and/or name associated with a
          countermeasure.
        recommended: true
      version:
        description: The D3FEND™ Matrix version.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                d3f_tactic:
                  required: true
            - slot_conditions:
                d3f_technique:
                  required: true
        description: 'OCSF at_least_one: at least one of [''d3f_tactic'', ''d3f_technique''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["d3f_tactic", "d3f_technique"]}'
    see_also:
      - https://d3fend.mitre.org
    notes:
      - D3FEND™ Matrix — https://d3fend.mitre.org

  DataClassification:
    description: |-
      The Data Classification object includes information about data classification
      levels and data category types.
    aliases:
      - Data Classification
    is_a: Object
    in_subset:
      - objects
    slots:
      - category
      - category_id
      - classifier_details
      - confidentiality
      - confidentiality_id
      - discovery_details
      - policy
      - size
      - src_url
      - status
      - status_details
      - status_id
      - total
      - uid
    slot_usage:
      category:
        description: |-
          The name of the data classification category that data matched into, e.g.
          Financial, Personal, Governmental, etc.
      category_id:
        description: The normalized identifier of the data classification category.
        recommended: true
        range: DataClassificationCategoryIdEnum
      classifier_details:
        recommended: true
      confidentiality_id:
        recommended: true
      discovery_details:
        description: Details about the data discovered by classification job.
      policy:
        description: |-
          Details about the data policy that governs data handling and security measures
          related to classification.
      size:
        description: Size of the data classified.
      src_url:
        description: The source URL pointing towards the full classification job details.
      status:
        description: |-
          The resultant status of the classification job normalized to the caption of the
          <code>status_id</code> value. In the case of 'Other', it is defined by the
          event source.
        recommended: true
      status_details:
        description: The contextual description of the <code>status, status_id</code> value.
      status_id:
        description: The normalized status identifier of the classification job.
        recommended: true
        range: DataClassificationStatusIdEnum
      total:
        description: The total count of discovered entities, by the classification job.
      uid:
        description: The unique identifier of the classification job.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                category_id:
                  required: true
            - slot_conditions:
                confidentiality_id:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['category_id', 'confidentiality_id'] must
          be set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["category_id", "confidentiality_id"]}'
    close_mappings:
      - uco_master:MarkingDefinition

  DataSecurity:
    description: |-
      The Data Security object describes the characteristics, techniques and content
      of a Data Loss Prevention (DLP), Data Loss Detection (DLD), Data
      Classification, or similar tools' finding, alert, or detection mechanism(s).
    aliases:
      - Data Security
    is_a: DataClassification
    in_subset:
      - objects
    slots:
      - data_lifecycle_state
      - data_lifecycle_state_id
      - detection_pattern
      - detection_system
      - detection_system_id
      - pattern_match
      - policy
    slot_usage:
      data_lifecycle_state_id:
        recommended: true
      detection_pattern:
        recommended: true
      detection_system_id:
        recommended: true
      policy:
        description: Details about the policy that triggered the finding.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                data_lifecycle_state_id:
                  required: true
            - slot_conditions:
                detection_pattern:
                  required: true
            - slot_conditions:
                detection_system_id:
                  required: true
            - slot_conditions:
                policy:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['data_lifecycle_state_id',
          'detection_pattern', 'detection_system_id', 'policy'] must be set.
    annotations:
      ocsf_constraints: |-
        {"at_least_one": ["data_lifecycle_state_id", "detection_pattern",
        "detection_system_id", "policy"]}

  Database:
    description: |-
      The database object is used for databases which are typically datastore
      services that contain an organized collection of structured and unstructured
      data or a types of data.
    aliases:
      - Database
    is_a: Entity
    mixins:
      - DataClassificationProfile
    in_subset:
      - objects
    slots:
      - created_time
      - desc
      - embedding_model
      - groups
      - modified_time
      - name
      - size
      - type
      - type_id
      - uid
    slot_usage:
      created_time:
        description: The time when the database was known to have been created.
      desc:
        description: The description of the database.
      embedding_model:
        description: |-
          Model used for creating embeddings (if applicable). For example:
          <code>text-embedding-ada-002</code> or <code>all-MiniLM-L6-v2</code>.
      groups:
        description: The group names to which the database belongs.
      modified_time:
        description: |-
          The most recent time when any changes, updates, or modifications were made
          within the database.
      name:
        description: The database name, ordinarily as assigned by a database administrator.
      size:
        description: The size of the database in bytes.
      type:
        description: The database type.
        recommended: true
      type_id:
        description: The normalized identifier of the database type.
        required: true
        range: DatabaseTypeIdEnum
      uid:
        description: The unique identifier of the database.
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:Database/
    notes:
      - |-
        D3FEND™ Ontology d3f:Database. —
        https://d3fend.mitre.org/dao/artifact/d3f:Database/

  Databucket:
    description: |-
      The databucket object is a basic container that holds data, typically organized
      through the use of data partitions.
    aliases:
      - Databucket
    is_a: Resource
    mixins:
      - DataClassificationProfile
      - CloudProfile
    in_subset:
      - objects
    slots:
      - agent_list
      - cloud_partition
      - created_time
      - criticality
      - desc
      - encryption_details
      - file
      - group
      - groups
      - hostname
      - ip
      - is_backed_up
      - is_encrypted
      - is_public
      - modified_time
      - name
      - namespace
      - owner
      - region
      - resource_relationship
      - size
      - type
      - type_id
      - uid
      - version
      - zone
    slot_usage:
      cloud_partition:
        description: |-
          The logical grouping or isolated segment within a cloud provider's
          infrastructure where the databucket is located.
      created_time:
        description: The time when the databucket was known to have been created.
      criticality:
        description: The criticality of the databucket as defined by the event source.
      desc:
        description: The description of the databucket.
      encryption_details:
        description: |-
          The encryption details of the databucket. Should be populated if the databucket
          is encrypted.
      file:
        description: Details about the file/object within a databucket.
      group:
        description: The name of the related resource group.
        deprecated: Use the <code>groups</code> attribute instead.
      groups:
        description: The group names to which the databucket belongs.
      hostname:
        description: The fully qualified hostname of the databucket.
        recommended: true
      ip:
        description: The IP address of the resource, in either IPv4 or IPv6 format.
        recommended: true
      is_encrypted:
        description: Indicates if the databucket is encrypted.
      is_public:
        description: Indicates if the databucket is publicly accessible.
        recommended: true
      modified_time:
        description: |-
          The most recent time when any changes, updates, or modifications were made
          within the databucket.
      name:
        description: The databucket name.
      namespace:
        description: |-
          The namespace is useful when similar entities exist that you need to keep
          separate.
      owner:
        description: The identity of the service or user account that owns the databucket.
        recommended: true
      region:
        description: The cloud region of the databucket.
      resource_relationship:
        description: |-
          A graph representation showing how this databucket relates to and interacts
          with other entities in the environment. This can include parent/child
          relationships, dependencies, or other connections.
      size:
        description: The size of the databucket in bytes.
      type:
        description: The databucket type.
        recommended: true
      type_id:
        description: The normalized identifier of the databucket type.
        required: true
        range: DatabucketTypeIdEnum
      uid:
        description: The unique identifier of the databucket.
      version:
        description: The version of the resource. For example <code>1.2.3</code>.
      zone:
        description: |-
          The specific availability zone within a cloud region where the databucket is
          located.
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:CloudStorage/
    notes:
      - |-
        D3FEND™ Ontology d3f:CloudStorage. —
        https://d3fend.mitre.org/dao/artifact/d3f:CloudStorage/

  DceRpc:
    description: |-
      The DCE/RPC, or Distributed Computing Environment/Remote Procedure Call, object
      describes the remote procedure call system for distributed computing
      environments.
    aliases:
      - DCE/RPC
    is_a: Object
    in_subset:
      - objects
    slots:
      - command
      - command_response
      - flags
      - opnum
      - rpc_interface
    slot_usage:
      command:
        description: The request command (e.g. REQUEST, BIND).
        recommended: true
      command_response:
        description: The reply to the request command (e.g. RESPONSE, BINDACK or FAULT).
        recommended: true
      flags:
        description: The list of interface flags.
        required: true
      opnum:
        recommended: true
      rpc_interface:
        required: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:RemoteProcedureCall/
    notes:
      - |-
        D3FEND™ Ontology d3f:RemoteProcedureCall. —
        https://d3fend.mitre.org/dao/artifact/d3f:RemoteProcedureCall/

  DeviceHwInfo:
    description: |-
      The Device Hardware Information object contains details and specifications of
      the physical components that make up a device. This information provides an
      overview of the hardware capabilities, configuration, and characteristics of
      the device.
    aliases:
      - Device Hardware Info
    is_a: Object
    in_subset:
      - objects
    slots:
      - bios_date
      - bios_manufacturer
      - bios_ver
      - chassis
      - cpu_architecture
      - cpu_architecture_id
      - cpu_bits
      - cpu_cores
      - cpu_count
      - cpu_speed
      - cpu_type
      - desktop_display
      - gpu_count
      - gpu_info_list
      - keyboard_info
      - ram_size
      - serial_number
      - uuid
      - vendor_name
    slot_usage:
      gpu_info_list:
        description: |-
          A list of GPU objects describing the hardware properties of each graphics
          processor installed on the device.
      serial_number:
        description: The device manufacturer serial number.
      uuid:
        description: |-
          The device manufacturer assigned universally unique hardware identifier. For
          SMBIOS compatible devices such as those running Linux and Windows, it is the
          UUID member of the System Information structure in the SMBIOS information. For
          macOS devices, it is the Hardware UUID (also known as IOPlatformUUID in the I/O
          Registry).
      vendor_name:
        description: The device manufacturer.

  DigitalSignature:
    description: |-
      The Digital Signature object contains information about the cryptographic
      mechanism used to verify the authenticity, integrity, and origin of the file or
      application.
    aliases:
      - Digital Signature
    is_a: Object
    in_subset:
      - objects
    slots:
      - algorithm
      - algorithm_id
      - certificate
      - created_time
      - developer_uid
      - digest
      - state
      - state_id
    slot_usage:
      algorithm:
        description: |-
          The digital signature algorithm used to create the signature, normalized to the
          caption of 'algorithm_id'. In the case of 'Other', it is defined by the event
          source.
      algorithm_id:
        description: The identifier of the normalized digital signature algorithm.
        required: true
        range: DigitalSignatureAlgorithmIdEnum
      certificate:
        recommended: true
      created_time:
        description: The time when the digital signature was created.
      state:
        description: |-
          The digital signature state defines the signature state, normalized to the
          caption of 'state_id'. In the case of 'Other', it is defined by the event
          source.
      state_id:
        description: The normalized identifier of the signature state.
        range: DigitalSignatureStateIdEnum

  DiscoveryDetails:
    description: The Discovery Details object describes results of a discovery task/job.
    aliases:
      - Discovery Details
    is_a: Object
    in_subset:
      - objects
    slots:
      - count
      - occurrence_details
      - occurrences
      - type
      - value
    slot_usage:
      count:
        description: The number of discovered entities of the specified type.
        recommended: true
      occurrence_details:
        description: |-
          Details about where in the target entity, specified information was discovered.
          Only the attributes, relevant to the target entity type should be populated.
        deprecated: Use <code>occurrences</code> instead.
      occurrences:
        description: |-
          Details about where in the target entity, specified information was discovered.
          Only the attributes, relevant to the target entity type should be populated.
      type:
        description: |-
          The specific type of information that was discovered. e.g.<code> name,
          phone_number, etc.</code>
        recommended: true
      value:
        description: Optionally, the specific value of discovered information.

  Display:
    description: |-
      The Display object contains information about the physical or virtual display
      connected to a computer system.
    aliases:
      - Display
    is_a: Object
    in_subset:
      - objects
    slots:
      - color_depth
      - physical_height
      - physical_orientation
      - physical_width
      - scale_factor

  DnsAnswer:
    description: |-
      The DNS Answer object represents a specific response provided by the Domain
      Name System (DNS) when querying for information about a domain or performing a
      DNS operation. It encapsulates the relevant details and data returned by the
      DNS server in response to a query.
    aliases:
      - DNS Answer
    is_a: Dns
    in_subset:
      - objects
    slots:
      - class_
      - flag_ids
      - flags
      - rdata
      - ttl
      - type
    slot_usage:
      class_:
        description: |-
          The class of DNS data contained in this resource record. See <a target='_blank'
          href='https://www.rfc-editor.org/rfc/rfc1035.txt'>RFC1035</a>. For example:
          <code>IN</code>.
        recommended: true
      flag_ids:
        description: The list of DNS answer header flag IDs.
        recommended: true
        range: DnsAnswerFlagIdsEnum
      flags:
        description: The list of DNS answer header flags.
      rdata:
        required: true
      ttl:
        recommended: true
      type:
        description: |-
          The type of data contained in this resource record. See <a target='_blank'
          href='https://www.rfc-editor.org/rfc/rfc1035.txt'>RFC1035</a>. For example:
          <code>CNAME</code>.
        recommended: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:InboundInternetDNSResponseTraffic/
    notes:
      - |-
        D3FEND™ Ontology d3f:InboundInternetDNSResponseTraffic. —
        https://d3fend.mitre.org/dao/artifact/d3f:InboundInternetDNSResponseTraffic/
    close_mappings:
      - uco_master:DNSRecord

  DnsQuery:
    description: |-
      The DNS query object represents a specific request made to the Domain Name
      System (DNS) to retrieve information about a domain or perform a DNS operation.
      This object encapsulates the necessary attributes and methods to construct and
      send DNS queries, specify the query type (e.g., A, AAAA, MX).
    aliases:
      - DNS Query
    is_a: Dns
    in_subset:
      - objects
    slots:
      - hostname
      - opcode
      - opcode_id
    slot_usage:
      hostname:
        description: 'The hostname or domain being queried. For example: <code>www.example.com</code>'
        required: true
      opcode_id:
        recommended: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:DNSLookup/
    notes:
      - |-
        D3FEND™ Ontology d3f:DNSLookup. —
        https://d3fend.mitre.org/dao/artifact/d3f:DNSLookup/

  DomainContact:
    description: |-
      The contact information related to a domain registration, e.g., registrant,
      administrator, abuse, billing, or technical contact.
    aliases:
      - Domain Contact
    is_a: Object
    in_subset:
      - objects
    slots:
      - email_addr
      - location
      - name
      - phone_number
      - type
      - type_id
      - uid
    slot_usage:
      email_addr:
        recommended: true
      location:
        description: |-
          Location details for the contract such as the city, state/province, country,
          etc.
        recommended: true
      name:
        description: The individual or organization name for the contact.
      type:
        description: |-
          The Domain Contact type, normalized to the caption of the <code>type_id</code>
          value. In the case of 'Other', it is defined by the source
      type_id:
        description: The normalized domain contact type ID.
        required: true
        range: DomainContactTypeIdEnum
      uid:
        description: |-
          The unique identifier of the contact information, typically provided in WHOIS
          information.
    close_mappings:
      - uco_master:DomainName

  Edge:
    description: Represents a connection or relationship between two nodes in a graph.
    aliases:
      - Edge
    is_a: Entity
    in_subset:
      - objects
    slots:
      - data
      - is_directed
      - name
      - relation
      - source
      - target
      - uid
    slot_usage:
      data:
        description: Additional data about the edge such as weight, distance, or custom properties.
      is_directed:
        description: |-
          Indicates whether the edge is (<code>true</code>) or undirected
          (<code>false</code>).
      name:
        description: The human-readable name or label for the edge.
        recommended: true
      relation:
        description: The type of relationship between nodes (e.g. is-attached-to , depends-on, etc).
        recommended: true
      source:
        description: The unique identifier of the node where the edge originates.
        required: true
      target:
        description: The unique identifier of the node where the edge terminates.
        required: true
      uid:
        description: Unique identifier of the edge.
        recommended: true
    see_also:
      - https://github.com/jsongraph/json-graph-specification/
    notes:
      - |-
        JSON graph specification. —
        https://github.com/jsongraph/json-graph-specification/

  Email:
    description: |-
      The Email object describes the email metadata such as sender, recipients, and
      direction, and can include embedded URLs and files.
    aliases:
      - Email
    is_a: Object
    mixins:
      - DataClassificationProfile
    in_subset:
      - objects
    slots:
      - cc
      - cc_mailboxes
      - delivered_to
      - delivered_to_list
      - files
      - from_
      - from_list
      - from_mailbox
      - from_mailboxes
      - http_headers
      - is_read
      - message_uid
      - raw_header
      - reply_to
      - reply_to_list
      - reply_to_mailboxes
      - return_path
      - sender
      - sender_mailbox
      - size
      - smtp_from
      - smtp_to
      - subject
      - to
      - to_mailboxes
      - uid
      - urls
      - x_originating_ip
    slot_usage:
      delivered_to:
        deprecated: Use the <code> delivered_to_list </code> attribute instead.
      files:
        description: The files embedded or attached to the email.
      from_:
        recommended: true
      message_uid:
        recommended: true
      reply_to:
        recommended: true
        deprecated: Use the <code> reply_to_list </code> attribute instead.
      size:
        description: The size in bytes of the email, including attachments.
        recommended: true
      smtp_from:
        recommended: true
        deprecated: Use the <code> from </code> attribute instead.
      smtp_to:
        recommended: true
        deprecated: Use the <code> to </code> attribute instead.
      subject:
        description: The email header Subject value, as defined by RFC 5322.
        recommended: true
      to:
        recommended: true
      uid:
        description: The unique identifier of the email thread.
        recommended: true
      urls:
        description: The URLs embedded in the email.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                from_:
                  required: true
            - slot_conditions:
                to:
                  required: true
        description: 'OCSF at_least_one: at least one of [''from_'', ''to''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["from", "to"]}'
      observable_id: 22
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:Email/
    notes:
      - D3FEND™ Ontology d3f:Email. — https://d3fend.mitre.org/dao/artifact/d3f:Email/
    exact_mappings:
      - stix:EmailMessage
      - uco_master:EmailMessage

  EmailAuth:
    description: |-
      The Email Authentication object describes the Sender Policy Framework (SPF),
      DomainKeys Identified Mail (DKIM) and Domain-based Message Authentication,
      Reporting and Conformance (DMARC) attributes of an email.
    aliases:
      - Email Authentication
    is_a: Object
    in_subset:
      - objects
    slots:
      - dkim
      - dkim_domain
      - dkim_signature
      - dmarc
      - dmarc_override
      - dmarc_policy
      - spf
    slot_usage:
      dkim:
        recommended: true
      dkim_domain:
        recommended: true
      dkim_signature:
        recommended: true
      dmarc:
        recommended: true
      dmarc_override:
        recommended: true
      dmarc_policy:
        recommended: true
      spf:
        recommended: true

  EncryptionDetails:
    description: Details about the encryption methodology utilized.
    aliases:
      - Encryption Details
    is_a: Object
    in_subset:
      - objects
    slots:
      - algorithm
      - algorithm_id
      - key_length
      - key_uid
      - type
    slot_usage:
      algorithm:
        description: The encryption algorithm used, normalized to the caption of 'algorithm_id
      algorithm_id:
        description: The encryption algorithm used.
        recommended: true
        range: EncryptionDetailsAlgorithmIdEnum
      key_length:
        description: The length of the encryption key used.
      key_uid:
        description: |-
          The unique identifier of the key used for encryption. For example, AWS KMS Key
          ARN.
      type:
        description: The type of the encryption used.
        recommended: true

  Endpoint:
    description: |-
      The Endpoint object describes a physical or virtual device that connects to and
      exchanges information with a computer network. Some examples of endpoints are
      mobile devices, desktop computers, virtual machines, embedded devices, and
      servers. Internet-of-Things devices—like cameras, lighting, refrigerators,
      security systems, smart speakers, and thermostats—are also endpoints.
    aliases:
      - Endpoint
    is_a: Entity
    mixins:
      - ContainerProfile
    in_subset:
      - objects
    slots:
      - agent_list
      - domain
      - hostname
      - hw_info
      - instance_uid
      - interface_name
      - interface_uid
      - ip
      - location
      - mac
      - mac_vendor
      - name
      - os
      - owner
      - pool
      - subnet_uid
      - type
      - type_id
      - uid
      - vlan_uid
      - vpc_uid
      - zone
    slot_usage:
      domain:
        description: |-
          The name of the domain that the endpoint belongs to or that corresponds to the
          endpoint.
      hostname:
        description: The fully qualified name of the endpoint.
        recommended: true
      instance_uid:
        recommended: true
      interface_name:
        recommended: true
      interface_uid:
        recommended: true
      ip:
        description: The IP address of the endpoint, in either IPv4 or IPv6 format.
        recommended: true
      location:
        description: The geographical location of the endpoint.
      mac:
        description: The Media Access Control (MAC) address of the endpoint.
      mac_vendor:
        description: |-
          The vendor or manufacturer of the endpoint's network interface controller
          (NIC), as identified from the MAC address.
      name:
        description: The short name of the endpoint.
      os:
        description: The endpoint operating system.
      owner:
        description: |-
          The identity of the service or user account that owns the endpoint or was last
          logged into it.
        recommended: true
      pool:
        description: The pool of desktops or virtual machines to which the endpoint belongs.
      type:
        description: |-
          The endpoint type. For example: <code>unknown</code>, <code>server</code>,
          <code>desktop</code>, <code>laptop</code>, <code>tablet</code>,
          <code>mobile</code>, <code>virtual</code>, <code>browser</code>, or
          <code>other</code>.
      type_id:
        description: The endpoint type ID.
        recommended: true
        range: EndpointTypeIdEnum
      uid:
        description: The unique identifier of the endpoint.
      zone:
        description: The network zone or LAN segment.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                ip:
                  required: true
            - slot_conditions:
                uid:
                  required: true
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                hostname:
                  required: true
            - slot_conditions:
                instance_uid:
                  required: true
            - slot_conditions:
                interface_uid:
                  required: true
            - slot_conditions:
                interface_name:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['ip', 'uid', 'name', 'hostname',
          'instance_uid', 'interface_uid', 'interface_name'] must be set.
    annotations:
      ocsf_constraints: |-
        {"at_least_one": ["ip", "uid", "name", "hostname", "instance_uid",
        "interface_uid", "interface_name"]}
      observable_id: 20
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:ComputerNetworkNode/
    notes:
      - |-
        D3FEND™ Ontology d3f:Host. —
        https://d3fend.mitre.org/dao/artifact/d3f:ComputerNetworkNode/
    broad_mappings:
      - stix:Host
      - uco_master:Device

  EndpointConnection:
    description: |-
      The Endpoint Connection object contains information detailing a connection
      attempt to an endpoint.
    aliases:
      - Endpoint Connection
    is_a: Object
    in_subset:
      - objects
    slots:
      - code
      - network_endpoint
    slot_usage:
      code:
        description: A numerical response status code providing details about the connection.
        recommended: true
      network_endpoint:
        description: Provides characteristics of the network endpoint.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                network_endpoint:
                  required: true
            - slot_conditions:
                code:
                  required: true
        description: 'OCSF at_least_one: at least one of [''network_endpoint'', ''code''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["network_endpoint", "code"]}'

  Enrichment:
    description: |-
      The Enrichment object provides inline enrichment data for specific attributes
      of interest within an event. It serves as a mechanism to enhance or supplement
      the information associated with the event by adding additional relevant details
      or context.
    aliases:
      - Enrichment
    is_a: Object
    in_subset:
      - objects
    slots:
      - created_time
      - data
      - desc
      - name
      - provider
      - reputation
      - short_desc
      - src_url
      - type
      - value
    slot_usage:
      created_time:
        description: The time when the enrichment data was generated.
        recommended: true
      data:
        description: |-
          The enrichment data associated with the attribute and value. The meaning of
          this data depends on the type the enrichment record.
        required: true
      desc:
        description: A long description of the enrichment data.
      name:
        description: The name of the attribute to which the enriched data pertains.
        required: true
      provider:
        description: The enrichment data provider name.
        recommended: true
      reputation:
        description: The reputation of the enrichment data.
      short_desc:
        description: A short description of the enrichment data.
        recommended: true
      src_url:
        description: The URL of the source of the enrichment data.
        recommended: true
      type:
        description: 'The enrichment type. For example: <code>location</code>.'
        recommended: true
      value:
        description: The value of the attribute to which the enriched data pertains.
        required: true

  EnvironmentVariable:
    description: An environment variable.
    aliases:
      - Environment Variable
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - value
    slot_usage:
      name:
        description: The name of the environment variable.
        required: true
      value:
        description: The value of the environment variable.
        required: true
    exact_mappings:
      - uco_master:EnvironmentVariable

  Epss:
    description: |-
      The Exploit Prediction Scoring System (EPSS) object describes the estimated
      probability a vulnerability will be exploited. EPSS is a community-driven
      effort to combine descriptive information about vulnerabilities (CVEs) with
      evidence of actual exploitation in-the-wild. (<a target='_blank'
      href='https://www.first.org/epss/'>EPSS</a>).
    aliases:
      - EPSS
    is_a: Object
    in_subset:
      - objects
    slots:
      - created_time
      - percentile
      - score
      - version
    slot_usage:
      created_time:
        description: The timestamp indicating when the EPSS score was calculated.
        recommended: true
      score:
        description: |-
          The EPSS score representing the probability [0-1] of exploitation in the wild
          in the next 30 days (following score publication).
        required: true
      version:
        description: The version of the EPSS model used to calculate the score.
        recommended: true
    related_mappings:
      - kev_catalog:KevEntry
      - nvd:NVDEntry
      - core:Impact

  Evidences:
    description: |-
      A collection of evidence artifacts associated to the activity/activities that
      triggered a security detection.
    aliases:
      - Evidence Artifacts
    is_a: Entity
    in_subset:
      - objects
    slots:
      - actor
      - api
      - connection_info
      - container
      - data
      - database
      - databucket
      - device
      - dst_endpoint
      - email
      - file
      - http_request
      - http_response
      - ja4_fingerprint_list
      - job
      - name
      - process
      - query
      - resources
      - script
      - src_endpoint
      - tls
      - uid
      - url
      - user
      - verdict
      - verdict_id
    slot_usage:
      actor:
        description: |-
          Describes details about the user/role/process that was the source of the
          activity that triggered the detection.
        recommended: true
      api:
        description: |-
          Describes details about the API call associated to the activity that triggered
          the detection.
        recommended: true
      connection_info:
        description: |-
          Describes details about the network connection associated to the activity that
          triggered the detection.
        recommended: true
      container:
        description: |-
          Describes details about the container associated to the activity that triggered
          the detection.
        recommended: true
      data:
        description: |-
          Additional evidence data that is not accounted for in the specific evidence
          attributes.<code> Use only when absolutely necessary.</code>
      database:
        description: |-
          Describes details about the database associated to the activity that triggered
          the detection.
        recommended: true
      databucket:
        description: |-
          Describes details about the databucket associated to the activity that
          triggered the detection.
        recommended: true
      device:
        description: |-
          An addressable device, computer system or host associated to the activity that
          triggered the detection.
        recommended: true
      dst_endpoint:
        description: |-
          Describes details about the destination of the network activity that triggered
          the detection.
        recommended: true
      email:
        description: The email object associated to the activity that triggered the detection.
        recommended: true
      file:
        description: |-
          Describes details about the file associated to the activity that triggered the
          detection.
        recommended: true
      http_request:
        description: |-
          Describes details about the http request associated to the activity that
          triggered the detection.
        recommended: true
      http_response:
        description: |-
          Describes details about the http response associated to the activity that
          triggered the detection.
        recommended: true
      ja4_fingerprint_list:
        description: Describes details about the JA4+ fingerprints that triggered the detection.
        recommended: true
      job:
        description: |-
          Describes details about the scheduled job that was associated with the activity
          that triggered the detection.
        recommended: true
      name:
        description: |-
          The naming convention or type identifier of the evidence associated with the
          security detection. For example, the <code>@odata.type</code> from Microsoft
          Graph Alerts V2 or <code>display_name</code> from CrowdStrike Falcon Incident
          Behaviors.
      process:
        description: |-
          Describes details about the process associated to the activity that triggered
          the detection.
        recommended: true
      query:
        description: |-
          Describes details about the DNS query associated to the activity that triggered
          the detection.
        recommended: true
      resources:
        description: |-
          Describes details about the cloud resources directly related to activity that
          triggered the detection. For resources impacted by the detection, use
          <code>Affected Resources</code> at the top-level of the finding.
        recommended: true
      script:
        description: |-
          Describes details about the script that was associated with the activity that
          triggered the detection.
        recommended: true
      src_endpoint:
        description: |-
          Describes details about the source of the network activity that triggered the
          detection.
        recommended: true
      tls:
        description: |-
          Describes details about the Transport Layer Security (TLS) activity that
          triggered the detection.
        recommended: true
      uid:
        description: |-
          The unique identifier of the evidence associated with the security detection.
          For example, the <code>activity_id</code> from CrowdStrike Falcon Alerts or
          <code>behavior_id</code> from CrowdStrike Falcon Incident Behaviors.
      url:
        description: |-
          The URL object that pertains to the event or object associated to the activity
          that triggered the detection.
        recommended: true
      user:
        description: |-
          Describes details about the user that was the target or somehow else associated
          with the activity that triggered the detection.
        recommended: true
      verdict:
        description: The normalized verdict of the evidence associated with the security detection.
      verdict_id:
        description: |-
          The normalized verdict (or status) ID of the evidence associated with the
          security detection. For example, Microsoft Graph Security Alerts contain a
          <code>verdict</code> enumeration for each type of <code>evidence</code>
          associated with the Alert. This is typically set by an automated investigation
          process or an analyst/investigator assigned to the finding.
        range: EvidencesVerdictIdEnum
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                actor:
                  required: true
            - slot_conditions:
                api:
                  required: true
            - slot_conditions:
                connection_info:
                  required: true
            - slot_conditions:
                data:
                  required: true
            - slot_conditions:
                database:
                  required: true
            - slot_conditions:
                databucket:
                  required: true
            - slot_conditions:
                device:
                  required: true
            - slot_conditions:
                dst_endpoint:
                  required: true
            - slot_conditions:
                email:
                  required: true
            - slot_conditions:
                file:
                  required: true
            - slot_conditions:
                process:
                  required: true
            - slot_conditions:
                query:
                  required: true
            - slot_conditions:
                resources:
                  required: true
            - slot_conditions:
                src_endpoint:
                  required: true
            - slot_conditions:
                url:
                  required: true
            - slot_conditions:
                user:
                  required: true
            - slot_conditions:
                job:
                  required: true
            - slot_conditions:
                script:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['actor', 'api', 'connection_info', 'data',
          'database', 'databucket', 'device', 'dst_endpoint', 'email', 'file', 'process',
          'query', 'resources', 'src_endpoint', 'url', 'user', 'job', 'script'] must be
          set.
    annotations:
      ocsf_constraints: |-
        {"at_least_one": ["actor", "api", "connection_info", "data", "database",
        "databucket", "device", "dst_endpoint", "email", "file", "process", "query",
        "resources", "src_endpoint", "url", "user", "job", "script"]}

  Extension:
    description: |-
      The OCSF Schema Extension object provides detailed information about the schema
      extension used to construct the event. The schema extensions are registered in
      the <a target='_blank'
      href='https://github.com/ocsf/ocsf-schema/blob/main/extensions.md'>extensions.md</a>
      file.
    aliases:
      - Schema Extension
    is_a: Entity
    in_subset:
      - objects
    slots:
      - name
      - uid
      - version
    slot_usage:
      name:
        description: 'The schema extension name. For example: <code>dev</code>.'
      uid:
        description: 'The schema extension unique identifier. For example: <code>999</code>.'
      version:
        description: 'The schema extension version. For example: <code>1.0.0-alpha.2</code>.'
        required: true

  Feature:
    description: |-
      The Feature object provides information about the software product feature that
      generated a specific event. It encompasses details related to the capabilities,
      components, user interface (UI) design, and performance upgrades associated
      with the feature.
    aliases:
      - Feature
    is_a: Entity
    in_subset:
      - objects
    slots:
      - name
      - uid
      - version
    slot_usage:
      name:
        description: The name of the feature.
      uid:
        description: The unique identifier of the feature.
      version:
        description: The version of the feature.
        recommended: true

  File:
    description: |-
      The File object represents the metadata associated with a file stored in a
      computer system. It encompasses information about the file itself, including
      its attributes, properties, and organizational details.
    aliases:
      - File
    is_a: Entity
    mixins:
      - DataClassificationProfile
    in_subset:
      - objects
    slots:
      - accessed_time
      - accessor
      - attributes
      - company_name
      - confidentiality
      - confidentiality_id
      - created_time
      - creator
      - desc
      - drive_type
      - drive_type_id
      - encryption_details
      - ext
      - hashes
      - imported_symbols
      - internal_name
      - is_deleted
      - is_encrypted
      - is_public
      - is_readonly
      - is_system
      - mime_type
      - modified_time
      - modifier
      - name
      - owner
      - parent_folder
      - path
      - product
      - security_descriptor
      - signature
      - signatures
      - size
      - storage_class
      - tags
      - type
      - type_id
      - uid
      - uri
      - url
      - version
      - volume
      - xattributes
    slot_usage:
      created_time:
        description: The time when the file was created.
      creator:
        description: The user that created the file.
      desc:
        description: |-
          The description of the file, as returned by file system. For example: the
          description as returned by the Unix file command or the Windows file type.
      encryption_details:
        description: |-
          The encryption details of the file. Should be populated if the file is
          encrypted.
      ext:
        description: |-
          The extension of the file, excluding the leading dot. For example:
          <code>exe</code> from <code>svchost.exe</code>, or <code>gz</code> from
          <code>export.tar.gz</code>.
        recommended: true
      hashes:
        recommended: true
      internal_name:
        description: |-
          The name of the file as identified within the file itself. This contrasts with
          the name by which the file is known on disk. Where available, the internal name
          is widely used by security practitioners and detection content because the
          on-disk file name is not reliable. On the Windows OS, most PE files contain a
          <a
          href="https://learn.microsoft.com/en-us/windows/win32/menurc/versioninfo-resource">VERSIONINFO</a>
          resource from which the internal name can be obtained. On macOS, binaries can
          optionally embed a copy of the application's Info.plist file which in turn
          contains the name of the executable.
      is_deleted:
        description: Indicates if the file was deleted from the filesystem.
      is_encrypted:
        description: Indicates if the file is encrypted.
      is_public:
        description: |-
          Indicates if the file is publicly accessible. For example in an object's public
          access in AWS S3
      is_readonly:
        description: Indicates that the file cannot be modified.
      modified_time:
        description: The time when the file was last modified.
      modifier:
        description: The user that last modified the file.
      name:
        description: 'The name of the file. For example: <code>svchost.exe</code>'
        required: true
      path:
        description: |-
          The full path to the file. For example:
          <code>c:\windows\system32\svchost.exe</code>.
        recommended: true
      product:
        description: The product that created or installed the file.
      signature:
        deprecated: Use the <code>signatures</code> attribute.
      storage_class:
        description: |-
          The storage class of the file. For example in AWS S3: <code>STANDARD,
          STANDARD_IA, GLACIER</code>.
      tags:
        description: The list of tags; <code>{key:value}</code> pairs associated to the file.
      type:
        description: The file type.
      type_id:
        description: |-
          The file type ID. Note the distinction between a <code>Regular File</code> and
          an <code>Executable File</code>. If the distinction is not known, or not
          indicated by the log, use <code>Regular File</code>. In this case, it should
          not be assumed that a Regular File is not executable.
        required: true
        range: FileTypeIdEnum
      uid:
        description: |-
          The unique identifier of the file as defined by the storage system, such the
          file system file ID.
      uri:
        description: |-
          The file URI, such as those reporting by static analysis tools. E.g.,
          <code>file:///C:/dev/sarif/sarif-tutorials/samples/Introduction/simple-example.js</code>
      url:
        description: The URL of the file, when applicable.
      version:
        description: 'The file version. For example: <code>8.0.7601.17514</code>.'
      volume:
        description: The volume on the storage device where the file is located.
    see_also:
      - https://next.d3fend.mitre.org/dao/artifact/d3f:File/
    notes:
      - |-
        D3FEND™ Ontology d3f:File —
        https://next.d3fend.mitre.org/dao/artifact/d3f:File/
    annotations:
      observable_id: 24
    exact_mappings:
      - stix:File
      - uco_master:File

  FindingObject:
    description: |-
      The Finding object describes metadata related to a security finding generated
      by a security tool or system.
    aliases:
      - Finding
    deprecated: Use the new <code>finding_info</code> object. (since 1.0.0)
    is_a: Object
    in_subset:
      - objects
    slots:
      - created_time
      - desc
      - first_seen_time
      - last_seen_time
      - modified_time
      - product
      - product_uid
      - related_events
      - remediation
      - src_url
      - supporting_data
      - title
      - types
      - uid
    slot_usage:
      created_time:
        description: The time when the finding was created.
      desc:
        description: The description of the reported finding.
      first_seen_time:
        description: The time when the finding was first observed.
      last_seen_time:
        description: The time when the finding was most recently observed.
      modified_time:
        description: The time when the finding was last modified.
      product:
        description: Details about the product that reported the finding.
      product_uid:
        description: The unique identifier of the product that reported the finding.
      src_url:
        description: The URL pointing to the source of the finding.
      title:
        description: A title or a brief phrase summarizing the reported finding.
        required: true
      types:
        description: One or more types of the reported finding.
      uid:
        description: The unique identifier of the reported finding.
        required: true

  FindingInfo:
    description: |-
      The Finding Information object describes metadata related to a security finding
      generated by a security tool or system.
    aliases:
      - Finding Information
    is_a: Object
    in_subset:
      - objects
    slots:
      - analytic
      - attack_graph
      - attacks
      - created_time
      - data_sources
      - desc
      - first_seen_time
      - kill_chain
      - last_seen_time
      - modified_time
      - product
      - product_uid
      - related_analytics
      - related_events
      - related_events_count
      - src_url
      - tags
      - title
      - traits
      - types
      - uid
      - uid_alt
    slot_usage:
      analytic:
        recommended: true
      attack_graph:
        annotations:
          group: context
      attacks:
        description: |-
          The <a target='_blank' href='https://attack.mitre.org'>MITRE ATT&CK®</a>
          technique and associated tactics related to the finding.
      created_time:
        description: The time when the finding was created.
      desc:
        description: The description of the reported finding.
      first_seen_time:
        description: |-
          The time when the finding was first observed. e.g. The time when a
          vulnerability was first observed. <p>It can differ from the
          <code>created_time</code> timestamp, which reflects the time this finding was
          created.</p>
      last_seen_time:
        description: |-
          The time when the finding was most recently observed. e.g. The time when a
          vulnerability was most recently observed. <p>It can differ from the
          <code>modified_time</code> timestamp, which reflects the time this finding was
          last modified.</p>
      modified_time:
        description: The time when the finding was last modified.
      product:
        description: Details about the product that reported the finding.
      product_uid:
        description: The unique identifier of the product that reported the finding.
      related_analytics:
        description: Other analytics related to this finding.
      src_url:
        description: The URL pointing to the source of the finding.
      tags:
        description: The list of tags; <code>{key:value}</code> pairs associated with the finding.
      title:
        description: A title or a brief phrase summarizing the reported finding.
        recommended: true
      traits:
        description: The list of key traits or characteristics extracted from the finding.
      types:
        description: One or more types of the reported finding.
      uid:
        description: The unique identifier of the reported finding.
        required: true
      uid_alt:
        description: The alternative unique identifier of the reported finding.

  Fingerprint:
    description: |-
      The Fingerprint object provides detailed information about a fingerprint, which
      is a compact representation of data used to identify a longer piece of
      information, such as a public key, file content, or application implementation.
      It contains the algorithm or scheme and value of the fingerprint, enabling
      efficient and reliable identification of the associated data.
    aliases:
      - Fingerprint
    is_a: Object
    in_subset:
      - objects
    slots:
      - algorithm
      - algorithm_id
      - value
    slot_usage:
      algorithm:
        description: |-
          The algorithm or scheme used to create the fingerprint, normalized to the
          caption of <code>algorithm_id</code>. In the case of <code>Other</code>, it is
          defined by the event source.
      algorithm_id:
        description: |-
          The identifier of the normalized algorithm or scheme, which was used to create
          the fingerprint.
        required: true
        range: FingerprintAlgorithmIdEnum
      value:
        description: |-
          The fingerprint value.<p><b>Note:</b> This uses type <code>file_hash_t</code>
          (&quot;Hash&quot;), which has been generalized for all fingerprints but retains
          the same name and caption for backwards compatibility.</p>
        required: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:DigitalFingerprint/
    notes:
      - |-
        D3FEND™ Ontology d3f:DigitalFingerprint. —
        https://d3fend.mitre.org/dao/artifact/d3f:DigitalFingerprint/
    annotations:
      observable_id: 30
    exact_mappings:
      - uco_master:Hash

  FunctionInvocation:
    description: |-
      The Function Invocation object provides details regarding the invocation of a
      function.
    aliases:
      - Function Invocation
    is_a: Object
    in_subset:
      - objects
    slots:
      - error
      - parameters
      - return_value
    slot_usage:
      error:
        description: |-
          The error indication returned from the function. This may differ from the
          return value (e.g. when <code>errno</code> is used).
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                parameters:
                  required: true
            - slot_conditions:
                return_value:
                  required: true
            - slot_conditions:
                error:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['parameters', 'return_value', 'error'] must
          be set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["parameters", "return_value", "error"]}'

  GpuInfo:
    description: |-
      The GPU information object contains attributes describing graphical processing
      hardware.
    aliases:
      - GPU Information
    is_a: Object
    in_subset:
      - objects
    slots:
      - bus_type
      - bus_type_id
      - cores
      - model
      - vendor_name
      - vram_mode
      - vram_mode_id
      - vram_size
    slot_usage:
      bus_type_id:
        description: The normalized identifier of the attachment bus or interface standard.
        range: GpuInfoBusTypeIdEnum
      model:
        description: |-
          The model name of the GPU. For example: <code>GeForce RTX A6000</code>,
          <code>Radeon PRO W7900</code>, or <code>Intel Data Center GPU Max 1550</code>.
        recommended: true
      vendor_name:
        description: |-
          The name of the vendor of the GPU. For example: <code>NVIDIA</code>,
          <code>AMD</code>, or <code>Intel</code>.
        recommended: true
      vram_mode:
        recommended: true
      vram_mode_id:
        recommended: true
        range: GpuInfoVramModeIdEnum
      vram_size:
        recommended: true

  Graph:
    description: A graph data structure representation with nodes and edges.
    aliases:
      - Graph
    is_a: Entity
    in_subset:
      - objects
    slots:
      - desc
      - edges
      - is_directed
      - name
      - nodes
      - query_language
      - query_language_id
      - type
      - uid
    slot_usage:
      desc:
        description: |-
          The graph description - provides additional details about the graph's purpose
          and contents.
      edges:
        description: |-
          The edges/connections between nodes in the graph - contains the collection of
          <code>edge</code> objects defining relationships between nodes.
      is_directed:
        description: |-
          Indicates if the graph is directed (<code>true</code>) or undirected
          (<code>false</code>).
      name:
        description: The graph name - a human readable identifier for the graph.
      nodes:
        description: |-
          The nodes/vertices of the graph - contains the collection of <code>node</code>
          objects that make up the graph.
        required: true
      query_language:
        description: |-
          The graph query language, normalized to the caption of the
          <code>query_language_id</code> value.
      query_language_id:
        description: |-
          The normalized identifier of a graph query language that can be used to
          interact with the graph.
        recommended: true
        range: GraphQueryLanguageIdEnum
      type:
        description: |-
          The graph type. Typically useful to represent the specific type of graph that
          is used.
      uid:
        description: Unique identifier of the graph - a unique ID to reference this specific graph.
    see_also:
      - https://github.com/jsongraph/json-graph-specification/
    notes:
      - |-
        JSON graph specification. —
        https://github.com/jsongraph/json-graph-specification/

  Group:
    description: |-
      The Group object represents a collection or association of entities, such as
      users, policies, or devices. It serves as a logical grouping mechanism to
      organize and manage entities with similar characteristics or permissions within
      a system or organization, including but not limited to purposes of access
      control.
    aliases:
      - Group
    is_a: Entity
    in_subset:
      - objects
    slots:
      - desc
      - domain
      - name
      - privileges
      - type
      - uid
      - uid_alt
    slot_usage:
      desc:
        description: The group description.
      domain:
        description: |-
          The domain where the group is defined. For example: the LDAP or Active
          Directory domain.
      name:
        description: The group name.
      privileges:
        description: The group privileges.
      type:
        description: The type of the group.
      uid:
        description: |-
          The unique identifier of the group. For example, for Windows events this is the
          security identifier (SID) of the group. Another example, pool id or desktop id
          that the device belongs to.
      uid_alt:
        description: The alternate unique identifier.
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:AccessControlGroup/
    notes:
      - |-
        D3FEND™ Ontology d3f:AccessControlGroup. —
        https://d3fend.mitre.org/dao/artifact/d3f:AccessControlGroup/

  Hassh:
    description: |-
      The HASSH object contains SSH network fingerprinting values for specific
      client/server implementations. It provides a standardized way of identifying
      and categorizing SSH connections based on their unique characteristics and
      behavior.
    aliases:
      - HASSH
    is_a: Object
    in_subset:
      - objects
    slots:
      - algorithm
      - fingerprint
    slot_usage:
      algorithm:
        description: |-
          The concatenation of key exchange, encryption, authentication and compression
          algorithms (separated by ';'). NOTE: This is not the underlying algorithm for
          the hash implementation.
        recommended: true
      fingerprint:
        description: |-
          The hash of the key exchange, encryption, authentication and compression
          algorithms.
        required: true

  HttpCookie:
    description: |-
      The HTTP Cookie object, also known as a web cookie or browser cookie, contains
      details and values pertaining to a small piece of data that a server sends to a
      user's web browser. This data is then stored by the browser and sent back to
      the server with subsequent requests, allowing the server to remember and track
      certain information about the user's browsing session or preferences.
    aliases:
      - HTTP Cookie
    is_a: Object
    in_subset:
      - objects
    slots:
      - domain
      - expiration_time
      - http_only
      - is_http_only
      - is_secure
      - name
      - path
      - samesite
      - secure
      - value
    slot_usage:
      domain:
        description: The domain name for the server from which the http_cookie is served.
      expiration_time:
        description: The expiration time of the HTTP cookie.
      name:
        description: The HTTP cookie name.
        required: true
      path:
        description: The path of the HTTP cookie.
      value:
        description: The HTTP cookie value.
        required: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:SessionCookie/
    notes:
      - |-
        D3FEND™ Ontology d3f:SessionCookie. —
        https://d3fend.mitre.org/dao/artifact/d3f:SessionCookie/
    exact_mappings:
      - uco_master:BrowserCookie

  HttpHeader:
    description: |-
      The HTTP Header object represents the headers sent in an HTTP request or
      response. HTTP headers are key-value pairs that convey additional information
      about the HTTP message, including details about the content, caching,
      authentication, encoding, and other aspects of the communication.
    aliases:
      - HTTP Header
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - value
    slot_usage:
      name:
        description: The name of the HTTP header.
        required: true
      value:
        description: The value of the HTTP header.
        required: true

  HttpRequest:
    description: |-
      The HTTP Request object represents the attributes of a request made to a web
      server. It encapsulates the details and metadata associated with an HTTP
      request, including the request method, headers, URL, query parameters, body
      content, and other relevant information.
    aliases:
      - HTTP Request
    is_a: Object
    in_subset:
      - objects
    slots:
      - args
      - body_length
      - http_headers
      - http_method
      - length
      - referrer
      - uid
      - url
      - user_agent
      - version
      - x_forwarded_for
    slot_usage:
      body_length:
        description: |-
          The actual length of the HTTP request body, in number of bytes, independent of
          a potentially existing Content-Length header.
      http_headers:
        recommended: true
      http_method:
        description: |-
          The <a target='_blank'
          href='https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods'>HTTP request
          method</a> indicates the desired action to be performed for a given resource.
        recommended: true
        range: HttpRequestHttpMethodEnum
      length:
        description: The length of the entire HTTP request, in number of bytes.
      uid:
        description: The unique identifier of the http request.
      url:
        description: The URL object that pertains to the request.
        recommended: true
      user_agent:
        recommended: true
      version:
        description: The Hypertext Transfer Protocol (HTTP) version.
        recommended: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:OutboundInternetNetworkTraffic/
    notes:
      - |-
        D3FEND™ Ontology d3f:OutboundInternetNetworkTraffic. —
        https://d3fend.mitre.org/dao/artifact/d3f:OutboundInternetNetworkTraffic/
    close_mappings:
      - uco_master:HTTPConnection

  HttpResponse:
    description: |-
      The HTTP Response object contains detailed information about the response sent
      from a web server to the requester. It encompasses attributes and metadata that
      describe the response status, headers, body content, and other relevant
      information.
    aliases:
      - HTTP Response
    is_a: Object
    in_subset:
      - objects
    slots:
      - body_length
      - code
      - content_type
      - http_headers
      - latency
      - length
      - message
      - status
    slot_usage:
      body_length:
        description: |-
          The actual length of the HTTP response body, in number of bytes, independent of
          a potentially existing Content-Length header.
      code:
        description: |-
          The Hypertext Transfer Protocol (HTTP) status code returned from the web server
          to the client. For example, 200.
        required: true
      http_headers:
        recommended: true
      length:
        description: The length of the entire HTTP response, in number of bytes.
      status:
        description: |-
          The response status. For example: A successful HTTP status of 'OK' which
          corresponds to a code of 200.
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:InboundInternetNetworkTraffic/
    notes:
      - |-
        D3FEND™ Ontology d3f:InboundInternetNetworkTraffic. —
        https://d3fend.mitre.org/dao/artifact/d3f:InboundInternetNetworkTraffic/
    close_mappings:
      - uco_master:HTTPConnection

  IdentityActivityMetrics:
    description: |-
      The Identity Activity Metrics object captures usage patterns, authentication
      activity, credential usage and other metrics for identities across cloud and
      on-premises environments. Example identities include AWS IAM Users, Roles,
      Azure AD Principals, GCP Service Accounts, on-premises Active Directory
      accounts.
    aliases:
      - Identity Activity Metrics
    is_a: Object
    in_subset:
      - objects
    slots:
      - first_seen_time
      - last_authentication_time
      - last_seen_time
      - password_last_used_time
      - programmatic_credentials
    slot_usage:
      first_seen_time:
        description: |-
          The timestamp when this identity was first observed or created in the system.
          This helps establish the identity's age and lifecycle stage for risk
          assessment.
      last_authentication_time:
        description: |-
          The timestamp when this identity last successfully authenticated to any system
          or service. This differs from <code>last_seen_time</code> as it specifically
          tracks authentication events rather than all activities.
      last_seen_time:
        description: |-
          The timestamp of the most recent activity performed by this identity, including
          authentication, resource access, or API calls. This is the most comprehensive
          indicator of identity usage recency.
        recommended: true
      password_last_used_time:
        description: |-
          The timestamp when password-based authentication was last used by this
          identity. This helps distinguish between password and other authentication
          methods (MFA, SSO, certificates) and identify password-specific usage patterns.
      programmatic_credentials:
        description: |-
          Details about the programmatic credentials associated with this identity, such
          as API keys, service account keys, access tokens, and client certificates used
          for automated access.

  Idp:
    description: |-
      The Identity Provider object contains detailed information about a provider
      responsible for creating, maintaining, and managing identity information while
      offering authentication services to applications. An Identity Provider (IdP)
      serves as a trusted authority that verifies the identity of users and issues
      authentication tokens or assertions to enable secure access to applications or
      services.
    aliases:
      - Identity Provider
    is_a: Entity
    in_subset:
      - objects
    slots:
      - auth_factors
      - domain
      - fingerprint
      - has_mfa
      - issuer
      - name
      - protocol_name
      - scim
      - sso
      - state
      - state_id
      - tenant_uid
      - uid
      - url_string
    slot_usage:
      auth_factors:
        description: |-
          The Authentication Factors object describes the different types of Multi-Factor
          Authentication (MFA) methods and/or devices supported by the Identity Provider.
      domain:
        description: The primary domain associated with the Identity Provider.
      fingerprint:
        description: The fingerprint of the X.509 certificate used by the Identity Provider.
      has_mfa:
        description: The Identity Provider enforces Multi Factor Authentication (MFA).
      issuer:
        description: |-
          The unique identifier (often a URL) used by the Identity Provider as its
          issuer.
      name:
        description: The name of the Identity Provider.
        recommended: true
      protocol_name:
        description: |-
          The supported protocol of the Identity Provider. E.g., <code>SAML</code>,
          <code>OIDC</code>, or <code>OAuth2</code>.
      state:
        description: |-
          The configuration state of the Identity Provider, normalized to the caption of
          the <code>state_id</code> value. In the case of <code>Other</code>, it is
          defined by the event source.
      state_id:
        description: |-
          The normalized state ID of the Identity Provider to reflect its configuration
          or activation status.
        range: IdpStateIdEnum
      tenant_uid:
        description: The tenant ID associated with the Identity Provider.
      uid:
        description: The unique identifier of the Identity Provider.
        recommended: true
      url_string:
        description: The URL for accessing the configuration or metadata of the Identity Provider.

  Image:
    description: |-
      The Image object provides a description of a specific Virtual Machine (VM) or
      Container image.
    aliases:
      - Image
    is_a: Entity
    in_subset:
      - objects
    slots:
      - labels
      - name
      - path
      - tag
      - tags
      - uid
    slot_usage:
      labels:
        description: The list of labels associated to the image.
      name:
        description: 'The image name. For example: <code>elixir</code>.'
      path:
        description: The full path to the image file.
      tags:
        description: The list of tags; <code>{key:value}</code> pairs associated to the image.
      uid:
        description: 'The unique image ID. For example: <code>77af4d6b9913</code>.'
        required: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:ContainerImage/
    notes:
      - |-
        D3FEND™ Ontology d3f:ContainerImage —
        https://d3fend.mitre.org/dao/artifact/d3f:ContainerImage/
    related_mappings:
      - uco_master:RasterPicture

  Ja4Fingerprint:
    description: |-
      The JA4+ fingerprint object provides detailed fingerprint information about
      various aspects of network traffic which is both machine and human readable.
    aliases:
      - JA4+ Fingerprint
    is_a: Object
    in_subset:
      - objects
    slots:
      - section_a
      - section_b
      - section_c
      - section_d
      - type
      - type_id
      - value
    slot_usage:
      type:
        description: |-
          The JA4+ fingerprint type as defined by <a
          href='https://blog.foxio.io/ja4+-network-fingerprinting
          target='_blank'>FoxIO</a>, normalized to the caption of 'type_id'. In the case
          of 'Other', it is defined by the event source.
      type_id:
        description: The identifier of the JA4+ fingerprint type.
        required: true
        range: Ja4FingerprintTypeIdEnum
      value:
        description: The JA4+ fingerprint value.
        required: true

  Job:
    description: |-
      The Job object provides information about a scheduled job or task, including
      its name, command line, and state. It encompasses attributes that describe the
      properties and status of the scheduled job.
    aliases:
      - Job
    is_a: Object
    in_subset:
      - objects
    slots:
      - cmd_line
      - created_time
      - desc
      - file
      - last_run_time
      - name
      - next_run_time
      - run_state
      - run_state_id
      - user
    slot_usage:
      cmd_line:
        description: The job command line.
        recommended: true
      created_time:
        description: The time when the job was created.
        recommended: true
      desc:
        description: The description of the job.
        recommended: true
      file:
        description: The file that pertains to the job.
      last_run_time:
        description: The time when the job was last run.
        recommended: true
      name:
        description: The name of the job.
        required: true
      next_run_time:
        description: The time when the job will next be run.
      run_state:
        description: The run state of the job.
      run_state_id:
        description: The run state ID of the job.
        recommended: true
        range: JobRunStateIdEnum
      user:
        description: The user that created the job.
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:ScheduledJob/
    notes:
      - |-
        D3FEND™ Ontology d3f:ScheduledJob. —
        https://d3fend.mitre.org/dao/artifact/d3f:ScheduledJob/

  KbArticle:
    description: The KB Article object contains metadata that describes the patch or update.
    aliases:
      - KB Article
    is_a: Object
    in_subset:
      - objects
    slots:
      - avg_timespan
      - bulletin
      - classification
      - created_time
      - install_state
      - install_state_id
      - is_superseded
      - os
      - product
      - severity
      - size
      - src_url
      - title
      - uid
    slot_usage:
      avg_timespan:
        description: The average time to patch.
      bulletin:
        description: The kb article bulletin identifier.
      classification:
        description: The vendors classification of the kb article.
      created_time:
        description: The date the kb article was released by the vendor.
      install_state:
        description: The install state of the kb article.
        recommended: true
      install_state_id:
        description: The normalized install state ID of the kb article.
        recommended: true
      is_superseded:
        description: The kb article has been replaced by another.
      os:
        description: The operating system the kb article applies.
        recommended: true
      product:
        description: The product details the kb article applies.
      severity:
        description: The severity of the kb article.
        recommended: true
      size:
        description: The size in bytes for the kb article.
      src_url:
        description: The kb article link from the source vendor.
      title:
        description: The title of the kb article.
        recommended: true
      uid:
        description: The unique identifier for the kb article.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                uid:
                  required: true
            - slot_conditions:
                src_url:
                  required: true
        description: 'OCSF at_least_one: at least one of [''uid'', ''src_url''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["uid", "src_url"]}'

  Kernel:
    description: |-
      The Kernel Resource object provides information about a specific kernel
      resource, including its name and type. It describes essential attributes
      associated with a resource managed by the kernel of an operating system.
    aliases:
      - Kernel Resource
    is_a: Object
    in_subset:
      - objects
    slots:
      - is_system
      - name
      - path
      - system_call
      - type
      - type_id
    slot_usage:
      name:
        description: The name of the kernel resource.
        required: true
      path:
        description: The full path of the kernel resource.
      type:
        description: The type of the kernel resource.
      type_id:
        description: The type of the kernel resource.
        required: true
        range: KernelTypeIdEnum
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:Kernel/
    notes:
      - D3FEND™ Ontology d3f:Kernel — https://d3fend.mitre.org/dao/artifact/d3f:Kernel/
    related_mappings:
      - uco_master:OperatingSystem

  KernelDriver:
    description: |-
      The Kernel Extension object describes a kernel driver that has been loaded or
      unloaded into the operating system (OS) kernel.
    aliases:
      - Kernel Extension
    is_a: Object
    in_subset:
      - objects
    slots:
      - file
    slot_usage:
      file:
        description: The driver/extension file object.
        required: true
        annotations:
          group: primary
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:KernelModule/
    notes:
      - |-
        D3FEND™ Ontology d3f:KernelModule —
        https://d3fend.mitre.org/dao/artifact/d3f:KernelModule/
    close_mappings:
      - uco_master:Library

  KeyValueObject:
    description: A generic object allowing to define a <code>{key:value}</code> pair.
    aliases:
      - Key:Value object
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - value
      - values
    slot_usage:
      name:
        description: The name of the key.
        required: true
      value:
        description: The value associated to the key.
        recommended: true
      values:
        description: |-
          Optional, the values associated to the key. You can populate this attribute,
          when you have multiple values for the same key.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                value:
                  required: true
            - slot_conditions:
                values:
                  required: true
        description: 'OCSF at_least_one: at least one of [''value'', ''values''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["value", "values"]}'

  KeyboardInfo:
    description: |-
      The Keyboard Information object contains details and attributes related to a
      computer or device keyboard. It encompasses information that describes the
      characteristics, capabilities, and configuration of the keyboard.
    aliases:
      - Keyboard Information
    is_a: Object
    in_subset:
      - objects
    slots:
      - function_keys
      - ime
      - keyboard_layout
      - keyboard_subtype
      - keyboard_type

  KillChainPhase:
    description: |-
      The Kill Chain Phase object represents a single phase of a cyber attack,
      including the initial reconnaissance and planning stages up to the final
      objective of the attacker. It provides a detailed description of each phase and
      its associated activities within the broader context of a cyber attack. See <a
      target='_blank'
      href='https://www.lockheedmartin.com/en-us/capabilities/cyber/cyber-kill-chain.html'>Cyber
      Kill Chain®</a>.
    aliases:
      - Kill Chain Phase
    is_a: Object
    in_subset:
      - objects
    slots:
      - phase
      - phase_id
    slot_usage:
      phase:
        recommended: true
      phase_id:
        required: true
    close_mappings:
      - attack:KillChainPhase

  LdapPerson:
    description: The additional LDAP attributes that describe a person.
    aliases:
      - LDAP Person
    is_a: Object
    in_subset:
      - objects
    slots:
      - cost_center
      - created_time
      - deleted_time
      - department
      - display_name
      - email_addrs
      - employee_uid
      - given_name
      - hire_time
      - job_title
      - labels
      - last_login_time
      - ldap_cn
      - ldap_dn
      - leave_time
      - location
      - manager
      - modified_time
      - office_location
      - phone_number
      - surname
      - tags
    slot_usage:
      created_time:
        description: The timestamp when the user was created.
      department:
        description: The name of the department in which the user works.
      display_name:
        description: |-
          The display name of the LDAP person. According to RFC 2798, this is the
          preferred name of a person to be used when displaying entries.
      labels:
        description: |-
          The labels associated with the user. For example in AD this could be the
          <code>userType</code>, <code>employeeType</code>. For example: <code>Member,
          Employee</code>.
      location:
        description: |-
          The geographical location associated with a user. This is typically the user's
          usual work location.
      modified_time:
        description: The timestamp when the user entry was last modified.
      phone_number:
        description: |-
          The telephone number of the user. Corresponds to the LDAP
          <code>Telephone-Number</code> CN.
      tags:
        description: The list of tags; <code>{key:value}</code> pairs associated to the user.
    close_mappings:
      - uco_master:Person

  LoadBalancer:
    description: |-
      The load balancer object describes the load balancer entity and contains
      additional information regarding the distribution of traffic across a network.
    aliases:
      - Load Balancer
    is_a: Entity
    in_subset:
      - objects
    slots:
      - classification
      - code
      - dst_endpoint
      - endpoint_connections
      - error_message
      - ip
      - message
      - metrics
      - name
      - status_detail
      - uid
    slot_usage:
      classification:
        description: The request classification as defined by the load balancer.
      code:
        description: |-
          The numeric response status code detailing the connection from the load
          balancer to the destination target.
        recommended: true
      dst_endpoint:
        description: The destination to which the load balancer is distributing traffic.
        recommended: true
      endpoint_connections:
        description: An object detailing the load balancer connection attempts and responses.
        recommended: true
      error_message:
        description: The load balancer error message.
      ip:
        description: |-
          The IP address of the load balancer node that handled the client request. Note:
          the load balancer may have other IP addresses, and this is not an IP address of
          the target/distribution endpoint - see <code>dst_endpoint</code>.
      message:
        description: The load balancer message.
      metrics:
        description: General purpose metrics associated with the load balancer.
      name:
        description: The name of the load balancer.
      status_detail:
        description: |-
          The status detail contains additional status information about the load
          balancer distribution event.
      uid:
        description: The unique identifier for the load balancer.

  Location:
    description: |-
      The Geo Location object describes a geographical location, usually associated
      with an IP address.
    aliases:
      - Geo Location
    is_a: Object
    in_subset:
      - objects
    slots:
      - aerial_height
      - city
      - continent
      - coordinates
      - country
      - desc
      - geodetic_altitude
      - geodetic_vertical_accuracy
      - geohash
      - horizontal_accuracy
      - is_on_premises
      - isp
      - lat
      - long
      - postal_code
      - pressure_altitude
      - provider
      - region
    slot_usage:
      city:
        recommended: true
      continent:
        recommended: true
      country:
        recommended: true
      desc:
        description: The description of the geographical location.
      isp:
        deprecated: |-
          Utilize <code>isp</code> attribute available in <code>network_endpoint,
          whois</code> objects according to your use-case.
      provider:
        description: The provider of the geographical location data.
      region:
        description: |-
          The alphanumeric code that identifies the principal subdivision (e.g. province
          or state) of the country. For example, 'CH-VD' for the Canton of Vaud,
          Switzerland
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                city:
                  required: true
            - slot_conditions:
                country:
                  required: true
            - slot_conditions:
                postal_code:
                  required: true
            - slot_conditions:
                region:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['city', 'country', 'postal_code', 'region']
          must be set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["city", "country", "postal_code", "region"]}'
      observable_id: 26
    exact_mappings:
      - uco_master:Location

  Logger:
    description: |-
      The Logger object represents the device and product where events are stored
      with times for receipt and transmission.  This may be at the source device
      where the event occurred, a remote scanning device, intermediate hops, or the
      ultimate destination.
    aliases:
      - Logger
    is_a: Entity
    in_subset:
      - objects
    slots:
      - device
      - event_uid
      - is_truncated
      - log_format
      - log_level
      - log_name
      - log_provider
      - log_version
      - logged_time
      - name
      - product
      - transmit_time
      - uid
      - untruncated_size
      - version
    slot_usage:
      device:
        description: The device where the events are logged.
        recommended: true
      event_uid:
        description: The unique identifier of the event assigned by the logger.
      is_truncated:
        description: |-
          Indicates whether the OCSF event data has been truncated due to size
          limitations. When <code>true</code>, some event data may have been omitted to
          fit within system constraints.
      log_format:
        description: The format of data in the log. For example JSON, syslog or CSV.
      log_level:
        description: |-
          The level at which an event was logged. This can be log provider specific. For
          example the audit level.
      log_name:
        description: |-
          The log name for the logging provider log, or the file name of the system log.
          This may be an intermediate store-and-forward log or a vendor destination log.
          For example /archive/server1/var/log/messages.0 or /var/log/.
        recommended: true
      log_provider:
        description: |-
          The logging provider or logging service that logged the event. This may be an
          intermediate application store-and-forward log or a vendor destination log.
        recommended: true
      log_version:
        description: |-
          The event log schema version of the original event. For example the syslog
          version or the Cisco Log Schema version
      logged_time:
        recommended: true
      name:
        description: The name of the logging product instance.
        recommended: true
      product:
        description: |-
          The product logging the event.  This may be the event source product, a
          management server product, a scanning product, a SIEM, etc.
        recommended: true
      transmit_time:
        description: |-
          The time when the event was transmitted from the logging device to it's next
          destination.
        recommended: true
      uid:
        description: The unique identifier of the logging product instance.
        recommended: true
      untruncated_size:
        description: |-
          The original size of the OCSF event data in kilobytes before any truncation
          occurred. This field is typically populated when <code>is_truncated</code> is
          <code>true</code> to indicate the full size of the original event.
      version:
        description: The version of the logging provider.

  LongString:
    description: |-
      This object is a used to capture strings which may be truncated by a security
      product due to their length.
    aliases:
      - Long String
    is_a: Object
    in_subset:
      - objects
    slots:
      - is_truncated
      - untruncated_size
      - value
    slot_usage:
      is_truncated:
        description: |-
          Indicates that <code>value</code> has been truncated. May be omitted if
          truncation has not occurred.
      untruncated_size:
        description: |-
          The size in bytes of the string represented by <code>value</code> before
          truncation. Should be omitted if truncation has not occurred.
      value:
        description: The string value, truncated if <code>is_truncated</code> is <code>true</code>.
        required: true

  Malware:
    description: |-
      The Malware object describes the classification of known malicious software,
      which is intentionally designed to cause damage to a computer, server, client,
      or computer network.
    aliases:
      - Malware
    is_a: Entity
    in_subset:
      - objects
    slots:
      - classification_ids
      - classifications
      - cves
      - files
      - name
      - num_infected
      - path
      - provider
      - severity
      - severity_id
      - uid
    slot_usage:
      classification_ids:
        description: The list of normalized identifiers of the malware classifications.
        required: true
        range: MalwareClassificationIdsEnum
      classifications:
        description: |-
          The list of malware classifications, normalized to the captions of the
          <code>classification_ids</code> values. In the case of 'Other', they are
          defined by the event source.
      cves:
        description: |-
          The list of Common Vulnerabilities and Exposures (CVE) identifiers associated
          with the malware. Reference: <a target='_blank'
          href='https://cve.mitre.org/'>CVE</a>
      files:
        description: |-
          The list of file objects representing files that were identified as infected by
          the malware.
      name:
        description: The malware name, as reported by the detection engine.
      num_infected:
        description: The number of files that were identified to be infected by the malware.
      path:
        description: The filesystem path of the malware that was observed.
        recommended: true
        deprecated: Use <code>file.path</code> attribute available via <code>files</code>.
      provider:
        description: |-
          The name or identifier of the security solution or service that provided the
          malware detection information.
        recommended: true
      severity:
        description: |-
          The severity of the malware, normalized to the captions of the
          <code>severity_id</code> values. In the case of 'Other', they are defined by
          the event source.
      severity_id:
        description: The normalized identifier of the malware severity.
        recommended: true
      uid:
        description: |-
          A unique identifier for the specific malware instance, as assigned by the
          detection engine (e.g., virus signature ID or IPS rule ID).
    exact_mappings:
      - stix:Malware
    close_mappings:
      - attack:Software
      - uco_master:MaliciousTool
    related_mappings:
      - capec:AttackPattern

  ManagedEntity:
    description: |-
      The Managed Entity object describes the type and version of an entity, such as
      a user, device, or policy.  For types in the <code>type_id</code> enum list, an
      associated attribute should be populated.  If the type of entity is not in the
      <code>type_id</code> list, information can be put into the <code>data</code>
      attribute, <code>type_id</code> should be 'Other' and the <code>type</code>
      attribute should label the entity type.
    aliases:
      - Managed Entity
    is_a: Entity
    in_subset:
      - objects
    slots:
      - data
      - device
      - email
      - group
      - location
      - name
      - org
      - policy
      - type
      - type_id
      - uid
      - user
      - version
    slot_usage:
      data:
        description: The managed entity content as a JSON object.
      device:
        recommended: true
      email:
        recommended: true
      group:
        recommended: true
      name:
        description: |-
          The name of the managed entity. It should match the name of the specific entity
          object's name if populated, or the name of the managed entity if the
          <code>type_id</code> is 'Other'.
      org:
        description: |-
          The Organization object containing details about the managed organizational
          entity. This object includes properties such as the organization name, unique
          identifier, type, and other organizational metadata. This attribute should be
          populated when <code>type_id</code> is <code>4</code> (Organization).
        recommended: true
      policy:
        description: Describes details of a managed policy.
        recommended: true
      type:
        description: |-
          The managed entity type. For example: <code>Policy</code>, <code>User</code>,
          <code>Organization</code>, <code>Device</code>.
        recommended: true
      type_id:
        description: |-
          The type of the Managed Entity. It is recommended to also populate the
          <code>type</code> attribute with the associated label, or the source specific
          name if <code>Other</code>.
        recommended: true
        range: ManagedEntityTypeIdEnum
      uid:
        description: |-
          The identifier of the managed entity. It should match the <code>uid</code> of
          the specific entity's object UID if populated, or the source specific ID if the
          <code>type_id</code> is 'Other'.
      user:
        recommended: true
      version:
        description: 'The version of the managed entity. For example: <code>1.2.3</code>.'
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                uid:
                  required: true
            - slot_conditions:
                device:
                  required: true
            - slot_conditions:
                group:
                  required: true
            - slot_conditions:
                org:
                  required: true
            - slot_conditions:
                policy:
                  required: true
            - slot_conditions:
                user:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['name', 'uid', 'device', 'group', 'org',
          'policy', 'user'] must be set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["name", "uid", "device", "group", "org", "policy", "user"]}'

  MessageContext:
    description: |-
      Communication context for AI system interactions including protocols, roles,
      clients, and session information for MCP and other AI communication systems.
    aliases:
      - Message Context
    is_a: Entity
    in_subset:
      - objects
    slots:
      - ai_role
      - ai_role_id
      - application
      - completion_tokens
      - name
      - prompt_tokens
      - service
      - total_tokens
      - uid
    slot_usage:
      ai_role_id:
        description: |-
          Specifies the functional role of the AI within the context of this message,
          such as retrieving information, assisting reasoning, executing a tool, or
          generating content.
        recommended: true
        range: MessageContextAiRoleIdEnum
      application:
        description: |-
          The initiating client application. In AI systems, this represents the
          client-side application or framework that initiates requests (e.g., LangChain
          application, web browser, mobile app, SDK implementation).
        recommended: true
      completion_tokens:
        description: Number of tokens in the model's response/completion for this message.
      name:
        description: |-
          The name or identifier of the message context. In AI systems, this could be the
          conversation ID, session name, thread identifier, or interaction name (e.g.,
          'user-session-123', 'conversation-abc', 'chat-thread-456').
      prompt_tokens:
        description: Number of tokens in the input prompt for this message.
      service:
        description: |-
          The server or service handling the request. In AI systems, this represents the
          AI service, API endpoint, or agent that processes and responds to requests
          (e.g., OpenAI API service, Claude API service, internal AI model service).
        recommended: true
      total_tokens:
        description: Total number of tokens used for this message (prompt + completion).
      uid:
        description: |-
          The unique identifier of the message context. This could be a session ID,
          conversation ID, or other unique identifier that allows correlation of messages
          within the same context.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                application:
                  required: true
            - slot_conditions:
                service:
                  required: true
        description: 'OCSF at_least_one: at least one of [''application'', ''service''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["application", "service"]}'
    see_also:
      - https://owasp.org/www-project-ai-security-and-privacy-guide/
      - https://modelcontextprotocol.io/
    notes:
      - |-
        OWASP AI Security and Privacy Guide - Agent Security —
        https://owasp.org/www-project-ai-security-and-privacy-guide/
      - Model Context Protocol (MCP) Specification — https://modelcontextprotocol.io/

  Metadata:
    description: The Metadata object describes the metadata associated with the event.
    aliases:
      - Metadata
    is_a: Object
    mixins:
      - DataClassificationProfile
    in_subset:
      - objects
    slots:
      - correlation_uid
      - debug
      - event_code
      - extension
      - extensions
      - is_truncated
      - labels
      - log_format
      - log_level
      - log_name
      - log_provider
      - log_source
      - log_version
      - logged_time
      - loggers
      - modified_time
      - original_event_uid
      - original_time
      - processed_time
      - product
      - profiles
      - reporter
      - sequence
      - source
      - tags
      - tenant_uid
      - total_queued_duration
      - transformation_info_list
      - transmit_time
      - type
      - uid
      - untruncated_size
      - version
    slot_usage:
      correlation_uid:
        description: |-
          A unique identifier used to correlate this OCSF event with other related OCSF
          events, distinct from the event's <code>uid</code> value. This enables linking
          multiple OCSF events that are part of the same activity, transaction, or
          security incident across different systems or time periods.
      event_code:
        description: |-
          The identifier of the original event. For example the numerical Windows Event
          Code or Cisco syslog code.
      is_truncated:
        description: |-
          Indicates whether the OCSF event data has been truncated due to size
          limitations. When <code>true</code>, some event data may have been omitted to
          fit within system constraints.
      labels:
        description: |-
          The list of labels attached to the event. For example: <code>["sample",
          "dev"]</code>
      log_format:
        description: |-
          The format of data in the log where the data originated. For example CSV, XML,
          Windows Multiline, JSON, syslog or Cisco Log Schema.
      log_level:
        description: |-
          The level at which an event was logged. This can be log provider specific. For
          example the audit level.
      log_name:
        description: |-
          The event log name, typically for the consumer of the event. For example, the
          storage bucket name, SIEM repository index name, etc.
        recommended: true
      log_provider:
        description: |-
          The logging provider or logging service that logged the event. For example AWS
          CloudWatch or Splunk.
      log_source:
        description: |-
          The log system or component where the data originated. For example, a file
          path, syslog server name or a Windows hostname and logging subsystem such as
          Security.
      log_version:
        description: |-
          The event log schema version of the original event. For example the syslog
          version or the Cisco Log Schema version
      modified_time:
        description: The time when the event was last modified or enriched.
      original_event_uid:
        description: |-
          The unique identifier assigned to the event in its original logging system
          before transformation to OCSF format. This field preserves the source system's
          native event identifier, enabling traceability back to the raw log entry. For
          example, a Windows Event Record ID, a syslog message ID, a Splunk _cd value, or
          a database transaction log sequence number.
      original_time:
        recommended: true
      product:
        required: true
      reporter:
        description: The entity from which the event or finding was first reported.
        recommended: true
      source:
        description: |-
          The source of the event or finding. This can be any distinguishing name for the
          logical origin of the data — for example, 'CloudTrail Events', or a use case
          like 'Attack Simulations' or 'Vulnerability Scans'.
      tags:
        description: The list of tags; <code>{key:value}</code> pairs associated to the event.
      tenant_uid:
        recommended: true
      total_queued_duration:
        description: |-
          The amount of time an event spent in a queue awaiting processing. In this case,
          the value is the difference between <code>processed_time</code> and
          <code>logged_time</code>. This duration is inclusive of all queues between the
          originator of the event and the intended long-term storage destination of the
          event.
      transmit_time:
        description: |-
          The time when the event was transmitted from the logging device to it's next
          destination.
      type:
        description: |-
          The type of the event or finding as a subset of the <code>source</code> of the
          event. This can be any distinguishing characteristic of the data. For example
          'Management Events' or 'Device Penetration Test'.
      uid:
        description: |-
          A unique identifier assigned to the OCSF event. This ID is specific to the OCSF
          event itself and is distinct from the original event identifier in the source
          system (see <code>original_event_uid</code>).
      untruncated_size:
        description: |-
          The original size of the OCSF event data in kilobytes before any truncation
          occurred. This field is typically populated when <code>is_truncated</code> is
          <code>true</code> to indicate the full size of the original event.
      version:
        description: |-
          The version of the OCSF schema, using Semantic Versioning Specification (<a
          target='_blank' href='https://semver.org'>SemVer</a>). For example:
          <code>1.0.0.</code> Event consumers use the version to determine the available
          event attributes.
        required: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:Metadata/
    notes:
      - |-
        D3FEND™ Ontology d3f:Metadata —
        https://d3fend.mitre.org/dao/artifact/d3f:Metadata/

  Metric:
    description: The Metric object defines a simple name/value pair entity for a metric.
    aliases:
      - Metric
    is_a: Object
    in_subset:
      - objects
    slots:
      - name
      - value
    slot_usage:
      name:
        description: The name of the metric.
        required: true
      value:
        description: The value of the metric.
        required: true

  Mitigation:
    description: |-
      The MITRE Mitigation object describes the ATT&CK® or ATLAS™ Mitigation ID
      and/or name that is associated to an attack.
    aliases:
      - MITRE Mitigation
    is_a: Entity
    in_subset:
      - objects
    slots:
      - countermeasures
      - name
      - src_url
      - uid
    slot_usage:
      countermeasures:
        description: |-
          The D3FEND countermeasures that are associated with the attack technique. For
          example: ATT&CK Technique <code>T1003</code> is addressed by Mitigation
          <code>M1027</code>, and D3FEND Technique <code>D3-OTP</code>.
      name:
        description: |-
          The Mitigation name that is associated with the attack technique. For example:
          <code>Password Policies</code>, or <code>Code Signing</code>.
      src_url:
        description: |-
          The versioned permalink of the Mitigation. For example:
          <code>https://attack.mitre.org/versions/v14/mitigations/M1027</code>.
      uid:
        description: |-
          The Mitigation ID that is associated with the attack technique. For example:
          <code>M1027</code>, or <code>AML.M0013</code>.
    see_also:
      - https://attack.mitre.org
      - https://atlas.mitre.org/matrices/ATLAS
      - https://d3fend.mitre.org/mappings/attack-mitigations/
    notes:
      - ATT&CK® Matrix — https://attack.mitre.org
      - ATLAS™ Matrix — https://atlas.mitre.org/matrices/ATLAS
      - |-
        ATT&CK® Mitigation to D3FEND™ Technique Mappings —
        https://d3fend.mitre.org/mappings/attack-mitigations/
    exact_mappings:
      - attack:Mitigation
    related_mappings:
      - capec:AttackPattern

  Module:
    description: The Module object describes the attributes of a module.
    aliases:
      - Module
    is_a: Object
    in_subset:
      - objects
    slots:
      - base_address
      - file
      - function_invocation
      - function_name
      - load_type
      - load_type_id
      - start_address
      - type
    slot_usage:
      base_address:
        recommended: true
      file:
        description: The module file object.
        recommended: true
      function_invocation:
        description: |-
          Details about the invocation of the function given in
          <code>function_name</code>.
      function_name:
        description: |-
          The invoked function in the module. For load and unload events, this is the
          entry-point function of the module. The system calls the entry-point function
          whenever a process or thread loads or unloads the module.
        recommended: true
      load_type_id:
        description: The normalized identifier for how the module was loaded in memory.
        recommended: true
        range: ModuleLoadTypeIdEnum
      start_address:
        recommended: true
      type:
        description: The module type.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                load_type_id:
                  required: true
            - slot_conditions:
                function_name:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['load_type_id', 'function_name'] must be
          set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["load_type_id", "function_name"]}'
    close_mappings:
      - uco_master:Library

  NetworkConnectionInfo:
    description: |-
      The Network Connection Information object describes characteristics of an OSI
      Transport Layer communication, including TCP and UDP.
    aliases:
      - Network Connection Information
    is_a: Object
    in_subset:
      - objects
    slots:
      - boundary
      - boundary_id
      - community_uid
      - direction
      - direction_id
      - flag_history
      - protocol_name
      - protocol_num
      - protocol_ver
      - protocol_ver_id
      - session
      - tcp_flags
      - uid
    slot_usage:
      boundary_id:
        recommended: true
      direction_id:
        required: true
      protocol_name:
        description: |-
          The IP protocol name in lowercase, as defined by the Internet Assigned Numbers
          Authority (IANA). For example: <code>tcp</code> or <code>udp</code>.
        recommended: true
      protocol_num:
        recommended: true
      protocol_ver:
        description: The Internet Protocol version.
      protocol_ver_id:
        description: The Internet Protocol version identifier.
        recommended: true
        range: NetworkConnectionInfoProtocolVerIdEnum
      uid:
        description: The unique identifier of the connection.
        recommended: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:NetworkSession/
    notes:
      - |-
        D3FEND™ Ontology d3f:NetworkSession —
        https://d3fend.mitre.org/dao/artifact/d3f:NetworkSession/
    exact_mappings:
      - uco_master:NetworkConnection
    close_mappings:
      - stix:NetworkTraffic

  NetworkEndpoint:
    description: |-
      The Network Endpoint object describes characteristics of a network endpoint.
      These can be a source or destination of a network connection.
    aliases:
      - Network Endpoint
    is_a: Endpoint
    in_subset:
      - objects
    slots:
      - autonomous_system
      - fingerprints
      - intermediate_ips
      - isp
      - isp_org
      - network_scope
      - network_scope_id
      - port
      - proxy_endpoint
      - svc_name
      - type
      - type_id
      - uid
    slot_usage:
      fingerprints:
        description: |-
          Fingerprints that identify the specific application implementation on this
          endpoint, such as Cisco NPF or HASSH.
      port:
        description: The port used for communication within the network connection.
        recommended: true
      proxy_endpoint:
        description: |-
          The network proxy information pertaining to a specific endpoint. This can be
          used to describe information pertaining to network address translation (NAT).
      svc_name:
        recommended: true
      type:
        description: |-
          The network endpoint type. For example: <code>unknown</code>,
          <code>server</code>, <code>desktop</code>, <code>laptop</code>,
          <code>tablet</code>, <code>mobile</code>, <code>virtual</code>,
          <code>browser</code>, or <code>other</code>.
      type_id:
        description: The network endpoint type ID.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                ip:
                  required: true
            - slot_conditions:
                uid:
                  required: true
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                hostname:
                  required: true
            - slot_conditions:
                svc_name:
                  required: true
            - slot_conditions:
                instance_uid:
                  required: true
            - slot_conditions:
                interface_uid:
                  required: true
            - slot_conditions:
                interface_name:
                  required: true
            - slot_conditions:
                domain:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['ip', 'uid', 'name', 'hostname',
          'svc_name', 'instance_uid', 'interface_uid', 'interface_name', 'domain'] must
          be set.
    annotations:
      ocsf_constraints: |-
        {"at_least_one": ["ip", "uid", "name", "hostname", "svc_name", "instance_uid",
        "interface_uid", "interface_name", "domain"]}
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:ComputerNetworkNode/
    notes:
      - |-
        D3FEND™ Ontology d3f:ComputerNetworkNode. —
        https://d3fend.mitre.org/dao/artifact/d3f:ComputerNetworkNode/

  NetworkInterface:
    description: |-
      The Network Interface object describes the type and associated attributes of a
      physical or virtual network interface.
    aliases:
      - Network Interface
    is_a: Entity
    in_subset:
      - objects
    slots:
      - hostname
      - ip
      - mac
      - name
      - namespace
      - open_ports
      - subnet_prefix
      - type
      - type_id
      - uid
    slot_usage:
      hostname:
        description: The hostname associated with the network interface.
        recommended: true
      ip:
        description: The IP address associated with the network interface.
        recommended: true
      mac:
        description: The MAC address of the network interface.
        recommended: true
      name:
        description: The name of the network interface.
      type:
        description: The type of network interface.
      type_id:
        description: The network interface type identifier.
        recommended: true
        range: NetworkInterfaceTypeIdEnum
      uid:
        description: The unique identifier for the network interface.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                ip:
                  required: true
            - slot_conditions:
                mac:
                  required: true
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                hostname:
                  required: true
            - slot_conditions:
                uid:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['ip', 'mac', 'name', 'hostname', 'uid']
          must be set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["ip", "mac", "name", "hostname", "uid"]}'
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:NetworkInterfaceCard/
    notes:
      - |-
        D3FEND™ Ontology d3f:NetworkInterfaceCard. —
        https://d3fend.mitre.org/dao/artifact/d3f:NetworkInterfaceCard/
    exact_mappings:
      - uco_master:NetworkInterface

  NetworkProxy:
    description: |-
      The network proxy endpoint object describes a proxy server, which acts as an
      intermediary between a client requesting a resource and the server providing
      that resource.
    aliases:
      - Network Proxy Endpoint
    is_a: NetworkEndpoint
    in_subset:
      - objects
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:ProxyServer/
    notes:
      - |-
        D3FEND™ Ontology d3f:ProxyServer —
        https://d3fend.mitre.org/dao/artifact/d3f:ProxyServer/

  NetworkTraffic:
    description: |-
      The Network Traffic object describes characteristics of network traffic over a
      time period. The metrics represent network data transferred between source and
      destination during an observation window.
    aliases:
      - Network Traffic
    is_a: Object
    in_subset:
      - objects
    slots:
      - bytes
      - bytes_in
      - bytes_missed
      - bytes_out
      - chunks
      - chunks_in
      - chunks_out
      - end_time
      - packets
      - packets_in
      - packets_out
      - start_time
      - timespan
    slot_usage:
      bytes:
        description: |-
          The total number of bytes transferred in both directions (sum of bytes_in and
          bytes_out).
        recommended: true
      bytes_in:
        description: |-
          The number of bytes sent from the destination to the source (inbound
          direction).
      bytes_missed:
        description: |-
          The number of bytes that were missed during observation, typically due to
          packet loss or sampling limitations.
      bytes_out:
        description: |-
          The number of bytes sent from the source to the destination (outbound
          direction).
      chunks:
        description: |-
          The total number of chunks transferred in both directions (sum of chunks_in and
          chunks_out).
      chunks_in:
        description: |-
          The number of chunks sent from the destination to the source (inbound
          direction).
      chunks_out:
        description: |-
          The number of chunks sent from the source to the destination (outbound
          direction).
      end_time:
        description: The end time of the observation or reporting period.
      packets:
        description: |-
          The total number of packets transferred in both directions (sum of packets_in
          and packets_out).
        recommended: true
      packets_in:
        description: |-
          The number of packets sent from the destination to the source (inbound
          direction).
      packets_out:
        description: |-
          The number of packets sent from the source to the destination (outbound
          direction).
      start_time:
        description: The start time of the observation or reporting period.
      timespan:
        description: |-
          The time span object representing the duration of the observation or reporting
          period.
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:NetworkTraffic/
    notes:
      - |-
        D3FEND™ Ontology d3f:NetworkTraffic —
        https://d3fend.mitre.org/dao/artifact/d3f:NetworkTraffic/

  Node:
    description: Represents a node or a vertex in a graph structure.
    aliases:
      - Node
    is_a: Object
    in_subset:
      - objects
    slots:
      - data
      - desc
      - name
      - type
      - uid
    slot_usage:
      data:
        description: |-
          Additional data about the node stored as key-value pairs. Can include custom
          properties specific to the node.
      desc:
        description: A human-readable description of the node's purpose or meaning in the graph.
      name:
        description: |-
          A human-readable name or label for the node. Should be descriptive and unique
          within the graph context.
        recommended: true
      type:
        description: |-
          Categorizes the node into a specific class or type. Useful for grouping and
          filtering nodes.
      uid:
        description: |-
          A unique string or numeric identifier that distinguishes this node from all
          others in the graph. Must be unique across all nodes.
        required: true
    see_also:
      - https://github.com/jsongraph/json-graph-specification/
    notes:
      - |-
        JSON graph specification. —
        https://github.com/jsongraph/json-graph-specification/

  Organization:
    description: |-
      The Organization object describes characteristics of an organization or company
      and its division if any. Additionally, it also describes cloud and
      Software-as-a-Service (SaaS) logical hierarchies such as AWS Organizations,
      Google Cloud Organizations, Oracle Cloud Tenancies, and similar constructs.
    aliases:
      - Organization
    is_a: Entity
    in_subset:
      - objects
    slots:
      - name
      - ou_name
      - ou_uid
      - uid
    slot_usage:
      name:
        description: |-
          The name of the organization, Oracle Cloud Tenancy, Google Cloud Organization,
          or AWS Organization. For example, <code> Widget, Inc. </code> or the <code> AWS
          Organization name </code>.
      ou_name:
        description: |-
          The name of an organizational unit, Google Cloud Folder, or AWS Org Unit. For
          example, the <code> GCP Project Name </code>, or <code> Dev_Prod_OU </code>.
        recommended: true
      ou_uid:
        description: |-
          The unique identifier of an organizational unit, Google Cloud Folder, or AWS
          Org Unit. For example, an  <code> Oracle Cloud Tenancy ID </code>, <code> AWS
          OU ID </code>, or <code> GCP Folder ID </code>.
      uid:
        description: |-
          The unique identifier of the organization, Oracle Cloud Tenancy, Google Cloud
          Organization, or AWS Organization. For example, an <code> AWS Org ID </code> or
          <code> Oracle Cloud Domain ID </code>.
    exact_mappings:
      - uco_master:Organization

  PeripheralDevice:
    description: |-
      The peripheral device object describes the properties of external, connectable,
      and detachable hardware.
    aliases:
      - Peripheral Device
    is_a: Entity
    in_subset:
      - objects
    slots:
      - class_
      - model
      - name
      - serial_number
      - type
      - type_id
      - uid
      - vendor_id_list
      - vendor_name
    slot_usage:
      class_:
        description: The class of the peripheral device.
      model:
        description: The peripheral device model.
        recommended: true
      name:
        description: The name of the peripheral device.
        required: true
      serial_number:
        description: The peripheral device serial number.
        recommended: true
      type:
        description: |-
          The Peripheral Device type, normalized to the caption of the
          <code>type_id</code> value. In the case of 'Other', it is defined by the
          source.
      type_id:
        description: The normalized peripheral device type ID.
        recommended: true
        range: PeripheralDeviceTypeIdEnum
      uid:
        description: The unique identifier of the peripheral device.
        recommended: true
      vendor_id_list:
        description: The list of vendor IDs for the peripheral device.
        recommended: true
      vendor_name:
        description: The primary vendor name for the peripheral device.
        recommended: true
    narrow_mappings:
      - uco_master:Device

  Policy:
    description: |-
      The Policy object describes the policies that are applicable. <p>Policy
      attributes provide traceability to the operational state of the security
      product at the time that the event was captured, facilitating forensics,
      troubleshooting, and policy tuning/adjustments.</p>
    aliases:
      - Policy
    is_a: Entity
    in_subset:
      - objects
    slots:
      - data
      - desc
      - group
      - is_applied
      - name
      - type
      - uid
      - version
    slot_usage:
      data:
        description: |-
          Additional data about the policy such as the underlying JSON policy itself or
          other details.
      desc:
        description: The description of the policy.
      group:
        description: The policy group.
      is_applied:
        description: |-
          A determination if the content of a policy was applied to a target or request,
          or not.
        recommended: true
      name:
        description: 'The policy name. For example: <code>AdministratorAccess Policy</code>.'
      type:
        description: |-
          The policy type. For example: <code>Identity Policy, Resource Policy, Service
          Control Policy, etc.</code>.
      uid:
        description: A unique identifier of the policy instance.
      version:
        description: The policy version number.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                type:
                  required: true
            - slot_conditions:
                uid:
                  required: true
        description: 'OCSF at_least_one: at least one of [''name'', ''type'', ''uid''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["name", "type", "uid"]}'
    close_mappings:
      - iso27001:InformationSecurityPolicy

  ProcessEntity:
    description: The Process Entity object provides critical fields for referencing a process.
    aliases:
      - Process Entity
    is_a: Entity
    in_subset:
      - objects
    slots:
      - cmd_line
      - cpid
      - created_time
      - name
      - path
      - pid
      - uid
    slot_usage:
      cmd_line:
        recommended: true
      cpid:
        recommended: true
      created_time:
        description: The time when the process was created/started.
        recommended: true
      name:
        description: 'The friendly name of the process, for example: <code>Notepad++</code>.'
      path:
        description: The process file path.
      pid:
        recommended: true
      uid:
        description: |-
          A unique identifier for this process assigned by the producer (tool).
          Facilitates correlation of a process event with other events for that process.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                cmd_line:
                  required: true
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                path:
                  required: true
            - slot_conditions:
                pid:
                  required: true
            - slot_conditions:
                uid:
                  required: true
            - slot_conditions:
                cpid:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['cmd_line', 'name', 'path', 'pid', 'uid',
          'cpid'] must be set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["cmd_line", "name", "path", "pid", "uid", "cpid"]}'

  Product:
    description: The Product object describes characteristics of a software product.
    aliases:
      - Product
    is_a: Entity
    mixins:
      - DataClassificationProfile
    in_subset:
      - objects
    slots:
      - cpe_name
      - feature
      - lang
      - name
      - path
      - uid
      - url_string
      - vendor_name
      - version
    slot_usage:
      name:
        description: The name of the product.
      path:
        description: The installation path of the product.
      uid:
        description: The unique identifier of the product.
      url_string:
        description: The URL pointing towards the product.
      vendor_name:
        description: The name of the vendor of the product.
        recommended: true
      version:
        description: |-
          The version of the product, as defined by the event source. For example:
          <code>2013.1.3-beta</code>.
        recommended: true

  QueryInfo:
    description: |-
      The query info object holds information related to data access within a
      datastore. To access, manipulate, delete, or retrieve data from a datastore, a
      query must be written using a specific syntax.
    aliases:
      - Query Information
    is_a: Entity
    in_subset:
      - objects
    slots:
      - bytes
      - data
      - name
      - query_string
      - query_time
      - uid
    slot_usage:
      bytes:
        description: The size of the data returned from the query.
      data:
        description: The data returned from the query execution.
      name:
        description: The query name for a saved or scheduled query.
      query_string:
        description: |-
          A string representing the query code being run. For example: <code>SELECT *
          FROM my_table</code>
        required: true
      query_time:
        description: The time when the query was run.
      uid:
        description: The unique identifier of the query.

  Reporter:
    description: The entity from which an event or finding was reported.
    aliases:
      - Reporter
    is_a: Entity
    in_subset:
      - objects
    slots:
      - hostname
      - ip
      - name
      - org
      - uid
    slot_usage:
      hostname:
        description: The hostname of the entity from which the event or finding was reported.
        recommended: true
      ip:
        description: The IP address of the entity from which the event or finding was reported.
        recommended: true
      name:
        description: The name of the entity from which the event or finding was reported.
        recommended: true
      org:
        description: The organization properties of the entity that reported the event or finding.
      uid:
        description: |-
          The unique identifier of the entity from which the event or finding was
          reported.
        recommended: true
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                hostname:
                  required: true
            - slot_conditions:
                ip:
                  required: true
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                uid:
                  required: true
        description: |-
          OCSF at_least_one: at least one of ['hostname', 'ip', 'name', 'uid'] must be
          set.
    annotations:
      ocsf_constraints: '{"at_least_one": ["hostname", "ip", "name", "uid"]}'

  ResourceDetails:
    description: |-
      The Resource Details object describes details about resources that were
      affected by the activity/event.
    aliases:
      - Resource Details
    is_a: Resource
    mixins:
      - CloudProfile
    in_subset:
      - objects
    slots:
      - agent_list
      - cloud_partition
      - criticality
      - group
      - hostname
      - ip
      - is_backed_up
      - name
      - namespace
      - owner
      - provider
      - region
      - resource_relationship
      - role
      - role_id
      - version
      - zone
    slot_usage:
      cloud_partition:
        description: |-
          The logical grouping or isolated segment within a cloud provider's
          infrastructure where the resource is located. Examples include AWS partitions
          (aws, aws-cn, aws-us-gov), Azure cloud environments (AzureCloud,
          AzureUSGovernment, AzureChinaCloud), or similar logical divisions in other
          cloud providers.
      criticality:
        description: The criticality of the resource as defined by the event source.
      group:
        description: The name of the related resource group.
      hostname:
        description: The fully qualified name of the resource.
        recommended: true
      ip:
        description: The IP address of the resource, in either IPv4 or IPv6 format.
        recommended: true
      name:
        recommended: true
      namespace:
        description: |-
          The namespace is useful when similar entities exist that you need to keep
          separate.
      owner:
        description: |-
          The details of the entity that owns the resource. This object includes
          properties such as the owner's name, unique identifier, type, domain, and other
          relevant attributes that help identify the resource owner within the
          environment.
        recommended: true
      provider:
        description: |-
          The cloud service provider that hosts or manages the resource. This field is
          typically used when the resource is managed by a different provider than the
          one generating the event or finding. Examples include AWS, Azure, GCP (Google
          Cloud Platform), Oracle Cloud, IBM Cloud, Alibaba Cloud, or other public,
          private, or hybrid cloud providers.
      region:
        description: |-
          The cloud region where the resource is hosted, as defined by the cloud
          provider. This represents the physical or logical geographic area containing
          the infrastructure supporting the resource. Examples include AWS regions
          (us-east-1, eu-west-1), Azure regions (East US, West Europe), GCP regions
          (us-central1, europe-west1), or Oracle Cloud regions (us-ashburn-1,
          uk-london-1).
      resource_relationship:
        description: |-
          A graph representation showing how this resource relates to and interacts with
          other entities in the environment. This can include parent/child relationships,
          dependencies, or other connections.
      role:
        description: |-
          The role of the resource in the context of the event or finding, normalized to
          the caption of the role_id value. In the case of 'Other', it is defined by the
          event source.
      role_id:
        description: |-
          The normalized identifier of the resource's role in the context of the event or
          finding.
        recommended: true
        range: ResourceDetailsRoleIdEnum
      version:
        description: The version of the resource. For example <code>1.2.3</code>.
      zone:
        description: |-
          The availability zone within a cloud region where the resource is located.
          Examples include AWS availability zones (us-east-1a, us-east-1b), Azure
          availability zones (1, 2, 3 within a region), GCP zones (us-central1-a,
          us-central1-b), or Oracle Cloud availability domains (AD-1, AD-2, AD-3).

  Rule:
    description: |-
      The Rule object describes characteristics of a rule associated with a policy or
      an event.
    aliases:
      - Rule
    is_a: Entity
    in_subset:
      - objects
    slots:
      - category
      - desc
      - name
      - type
      - uid
      - version
    slot_usage:
      category:
        description: The rule category.
      desc:
        description: The description of the rule that generated the event.
      name:
        description: The name of the rule that generated the event.
      type:
        description: The rule type.
      uid:
        description: The unique identifier of the rule that generated the event.
      version:
        description: 'The rule version. For example: <code>1.1</code>.'

  Scan:
    description: The Scan object describes characteristics of a proactive scan.
    aliases:
      - Scan
    is_a: Entity
    in_subset:
      - objects
    slots:
      - name
      - type
      - type_id
      - uid
    slot_usage:
      name:
        description: |-
          The administrator-supplied or application-generated name of the scan. For
          example: "Home office weekly user database scan", "Scan folders for viruses",
          "Full system virus scan"
      type:
        description: The type of scan.
      type_id:
        description: The type id of the scan.
        required: true
        range: ScanTypeIdEnum
      uid:
        description: The application-defined unique identifier assigned to an instance of a scan.

  Service:
    description: |-
      The Service object describes characteristics of a service, <code> e.g. AWS EC2.
      </code>
    aliases:
      - Service
    is_a: Entity
    in_subset:
      - objects
    slots:
      - labels
      - name
      - tags
      - uid
      - version
    slot_usage:
      labels:
        description: The list of labels associated with the service.
      name:
        description: The name of the service.
      tags:
        description: The list of tags; <code>{key:value}</code> pairs associated to the service.
      uid:
        description: The unique identifier of the service.
      version:
        description: The version of the service.
        recommended: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:ServiceApplication/
    notes:
      - |-
        D3FEND™ Ontology d3f:ServiceApplication. —
        https://d3fend.mitre.org/dao/artifact/d3f:ServiceApplication/
    close_mappings:
      - uco_master:OnlineService

  SubTechnique:
    description: |-
      The MITRE Sub-technique object describes the ATT&CK® or ATLAS™ Sub-technique ID
      and/or name associated to an attack.
    aliases:
      - MITRE Sub-technique
    is_a: Entity
    in_subset:
      - objects
    slots:
      - name
      - src_url
      - uid
    slot_usage:
      name:
        description: |-
          The name of the attack sub-technique. For example: <code>Scanning IP
          Blocks</code> or <code>User Execution: Unsafe ML Artifacts</code>.
      src_url:
        description: |-
          The versioned permalink of the attack sub-technique. For example:
          <code>https://attack.mitre.org/versions/v14/techniques/T1595/001/</code>.
      uid:
        description: |-
          The unique identifier of the attack sub-technique. For example:
          <code>T1595.001</code> or <code>AML.T0011.000</code>.
    see_also:
      - https://attack.mitre.org
      - https://atlas.mitre.org/matrices/ATLAS
    notes:
      - ATT&CK® Matrix — https://attack.mitre.org
      - ATLAS™ Matrix — https://atlas.mitre.org/matrices/ATLAS
    exact_mappings:
      - attack:SubTechnique
    close_mappings:
      - capec:AttackStep

  Table:
    description: |-
      The table object represents a table within a structured relational database or
      datastore, which contains columns and rows of data that are able to be create,
      updated, deleted and queried.
    aliases:
      - Table
    is_a: Entity
    in_subset:
      - objects
    slots:
      - created_time
      - desc
      - groups
      - modified_time
      - name
      - size
      - uid
    slot_usage:
      created_time:
        description: The time when the table was known to have been created.
      desc:
        description: The description of the table.
      groups:
        description: The group names to which the table belongs.
      modified_time:
        description: |-
          The most recent time when any changes, updates, or modifications were made
          within the table.
      name:
        description: The table name, ordinarily as assigned by a database administrator.
      size:
        description: The size of the data table in bytes.
      uid:
        description: The unique identifier of the table.

  Tactic:
    description: |-
      The MITRE Tactic object describes the ATT&CK® or ATLAS™ Tactic ID and/or name
      that is associated to an attack.
    aliases:
      - MITRE Tactic
    is_a: Entity
    in_subset:
      - objects
    slots:
      - name
      - src_url
      - uid
    slot_usage:
      name:
        description: |-
          The Tactic name that is associated with the attack technique. For example:
          <code>Reconnaissance</code> or <code>ML Model Access</code>.
      src_url:
        description: |-
          The versioned permalink of the Tactic. For example:
          <code>https://attack.mitre.org/versions/v14/tactics/TA0043/</code>.
      uid:
        description: |-
          The Tactic ID that is associated with the attack technique. For example:
          <code>TA0043</code>, or <code>AML.TA0000</code>.
    see_also:
      - https://attack.mitre.org
      - https://atlas.mitre.org/matrices/ATLAS
    notes:
      - ATT&CK® Matrix — https://attack.mitre.org
      - ATLAS™ Matrix — https://atlas.mitre.org/matrices/ATLAS
    exact_mappings:
      - attack:Tactic
    close_mappings:
      - capec:Category

  Technique:
    description: |-
      The MITRE Technique object describes the ATT&CK® or ATLAS™ Technique ID and/or
      name associated to an attack.
    aliases:
      - MITRE Technique
    is_a: Entity
    in_subset:
      - objects
    slots:
      - name
      - src_url
      - uid
    slot_usage:
      name:
        description: |-
          The name of the attack technique. For example: <code>Active Scanning</code> or
          <code>AI Model Inference API Access</code>.
      src_url:
        description: |-
          The versioned permalink of the attack technique. For example:
          <code>https://attack.mitre.org/versions/v14/techniques/T1595/</code>.
      uid:
        description: |-
          The unique identifier of the attack technique. For example: <code>T1595</code>
          or <code>AML.T0040</code>.
    see_also:
      - https://attack.mitre.org
      - https://atlas.mitre.org/matrices/ATLAS
    notes:
      - ATT&CK® Matrix — https://attack.mitre.org
      - ATLAS™ Matrix — https://atlas.mitre.org/matrices/ATLAS
    exact_mappings:
      - attack:Technique
      - capec:Technique

  Trait:
    description: |-
      Describes a characteristic or feature of an entity that was observed. For
      example, this object can be used to represent specific characteristics derived
      from events or findings that can be surfaced as distinguishing traits of the
      entity in question.
    aliases:
      - Trait
    is_a: Entity
    in_subset:
      - objects
    slots:
      - category
      - name
      - type
      - uid
      - values
    slot_usage:
      category:
        description: The high-level grouping or classification this trait belongs to.
      name:
        description: The name of the trait.
      type:
        description: |-
          The type of the trait. For example, this can be used to indicate if the trait
          acts as a contributing factor (increases risk/severity) or a mitigating factor
          (decreases risk/severity), in the context of the related finding.
      uid:
        description: The unique identifier of the trait.
      values:
        description: The values of the trait.

  TransformationInfo:
    description: The transformation_info object represents the mapping or transformation used.
    aliases:
      - Transformation Info
    is_a: Entity
    in_subset:
      - objects
    slots:
      - lang
      - name
      - product
      - time
      - uid
      - url_string
    slot_usage:
      lang:
        description: The transformation language used to transform the data.
      name:
        description: The name of the transformation or mapping.
        recommended: true
      product:
        description: The product or instance used to make the transformation
      time:
        description: Time of the transformation.
        recommended: true
      uid:
        description: The unique identifier of the mapping or transformation.
      url_string:
        description: The Uniform Resource Locator String where the mapping or transformation exists.
        recommended: true

  UnmannedAerialSystem:
    description: |-
      The Unmanned Aerial System object describes the characteristics, Position
      Location Information (PLI), and other metadata of Unmanned Aerial Systems (UAS)
      and other unmanned and drone systems used in Remote ID. Remote ID is defined in
      the Standard Specification for Remote ID and Tracking (ASTM Designation:
      F3411-22a) <a target='_blank'
      href='https://cdn.standards.iteh.ai/samples/112830/71297057ac42432880a203654f213709/ASTM-F3411-22a.pdf'>ASTM
      F3411-22a</a>.
    aliases:
      - Unmanned Aerial System
    is_a: Aircraft
    in_subset:
      - objects
    slots:
      - hw_info
      - location
      - name
      - serial_number
      - type
      - type_id
      - uid
      - uid_alt
      - uuid
    slot_usage:
      location:
        recommended: true
      name:
        description: The name of the unmanned system as reported by tracking or sensing hardware.
      serial_number:
        description: |-
          The serial number of the unmanned system. This is expressed in
          <code>CTA-2063-A</code> format.
        recommended: true
      type:
        description: The type of the UAS. For example, Helicopter, Gyroplane, Rocket, etc.
      type_id:
        description: The UAS type identifier.
        recommended: true
        range: UnmannedAerialSystemTypeIdEnum
      uid:
        description: |-
          The primary identification identifier for an unmanned system. This can be a
          Serial Number (in <code>CTA-2063-A</code> format, the Registration ID (provided
          by the <code>CAA</code>, a UTM, or a unique Session ID.
        recommended: true
      uid_alt:
        description: |-
          A secondary identification identifier for an unmanned system. This can be a
          Serial Number (in <code>CTA-2063-A</code> format, the Registration ID (provided
          by the <code>CAA</code>, a UTM, or a unique Session ID.
        recommended: true
      uuid:
        description: |-
          The Unmanned Aircraft System Traffic Management (UTM) provided universal unique
          ID (UUID) traceable to a non-obfuscated ID where this UTM UUID acts as a
          'session id' to protect exposure of operationally sensitive information.
        recommended: true

  UnmannedSystemOperatingArea:
    description: |-
      The Unmanned System Operating Area object describes details about a precise
      area of operations for a UAS flight or mission.
    aliases:
      - Unmanned System Operating Area
    is_a: Location
    in_subset:
      - objects
    slots:
      - altitude_ceiling
      - altitude_floor
      - count
      - end_time
      - locations
      - radius
      - start_time
      - type
      - type_id
    slot_usage:
      count:
        description: Indicates the number of UAS in the operating area.
        recommended: true
      end_time:
        description: |-
          The date and time at which a group or an Intent-Based Network Participant
          operation ends. (This field is only applicable to Network Remote ID.)
      locations:
        description: |-
          A list of Position Location Information (PLI) (latitude/longitude pairs)
          defining the area where a group or Intent-Based Network Participant operation
          is taking place. (This field is only applicable to Network Remote ID.)
        recommended: true
      start_time:
        description: |-
          The date and time at which a group or an Intent-Based Network Participant
          operation starts. (This field is only applicable to Network Remote ID.)
      type:
        description: |-
          The type of operating area. For example, <code>Takeoff Location</code>,
          <code>Fixed Location</code>, <code>Dynamic Location</code>.
      type_id:
        description: The operating area type identifier.
        recommended: true
        range: UnmannedSystemOperatingAreaTypeIdEnum

  User:
    description: |-
      The User object describes the characteristics of a user/person or a security
      principal.
    aliases:
      - User
    is_a: Entity
    in_subset:
      - objects
    slots:
      - account
      - credential_uid
      - display_name
      - domain
      - email_addr
      - forward_addr
      - full_name
      - groups
      - has_mfa
      - ldap_person
      - name
      - org
      - phone_number
      - programmatic_credentials
      - risk_level
      - risk_level_id
      - risk_score
      - type
      - type_id
      - uid
      - uid_alt
    slot_usage:
      account:
        description: The user's account or the account associated with the user.
      credential_uid:
        deprecated: Use <code>programmatic_credentials</code> instead.
      display_name:
        description: The display name of the user, as reported by the product.
      domain:
        description: |-
          The domain where the user is defined. For example: the LDAP or Active Directory
          domain.
      full_name:
        description: The full name of the user, as reported by the product.
      groups:
        description: The administrative groups to which the user belongs.
      has_mfa:
        recommended: true
      ldap_person:
        description: The additional LDAP attributes that describe a person.
      name:
        description: The username. For example, <code>janedoe1</code>.
        recommended: true
      org:
        description: Organization and org unit related to the user.
      phone_number:
        description: The telephone number of the user.
      programmatic_credentials:
        description: |-
          Details about the programmatic credential (API keys, access tokens,
          certificates, etc) associated to the user.
      type:
        description: The type of the user. For example, System, AWS IAM User, etc.
      type_id:
        description: The account type identifier.
        recommended: true
        range: UserTypeIdEnum
      uid:
        description: |-
          The unique user identifier. For example, the Windows user SID, ActiveDirectory
          DN or AWS user ARN.
        recommended: true
      uid_alt:
        description: |-
          The alternate user identifier. For example, the Active Directory user GUID or
          AWS user Principal ID.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
                account:
                  required: true
            - slot_conditions:
                name:
                  required: true
            - slot_conditions:
                uid:
                  required: true
        description: 'OCSF at_least_one: at least one of [''account'', ''name'', ''uid''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["account", "name", "uid"]}'
      observable_id: 21
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:UserAccount/
    notes:
      - |-
        D3FEND™ Ontology d3f:UserAccount —
        https://d3fend.mitre.org/dao/artifact/d3f:UserAccount/
    close_mappings:
      - stix:UserAccount
      - uco_master:UserAccount

  WebResource:
    description: |-
      The Web Resource object describes characteristics of a web resource that was
      affected by the activity/event.
    aliases:
      - Web Resource
    is_a: Resource
    in_subset:
      - objects
    slots:
      - data
      - desc
      - name
      - type
      - uid
      - url_string
    slot_usage:
      data:
        description: |-
          Details of the web resource, e.g, <code>file</code> details,
          <code>search</code> results or application-defined resource.
      desc:
        description: Description of the web resource.
      name:
        description: The name of the web resource.
      type:
        description: The web resource type as defined by the event source.
      uid:
        description: The unique identifier of the web resource.
      url_string:
        description: The URL pointing towards the source of the web resource.
        recommended: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:WebResource/
    notes:
      - |-
        D3FEND™ Ontology d3f:WebResource. —
        https://d3fend.mitre.org/dao/artifact/d3f:WebResource/

  Device:
    description: |-
      The Device object represents an addressable computer system or host, which is
      typically connected to a computer network and participates in the transmission
      or processing of data within the computer network.
    aliases:
      - Device
    is_a: Endpoint
    in_subset:
      - objects
    slots:
      - autoscale_uid
      - boot_time
      - boot_uid
      - created_time
      - desc
      - domain
      - eid
      - first_seen_time
      - groups
      - hostname
      - hypervisor
      - iccid
      - image
      - imei
      - imei_list
      - ip
      - is_backed_up
      - is_compliant
      - is_managed
      - is_mobile_account_active
      - is_personal
      - is_shared
      - is_supervised
      - is_trusted
      - last_seen_time
      - location
      - meid
      - model
      - modified_time
      - name
      - network_interfaces
      - org
      - os_machine_uuid
      - region
      - risk_level
      - risk_level_id
      - risk_score
      - subnet
      - type
      - type_id
      - udid
      - uid
      - uid_alt
      - vendor_name
    slot_usage:
      boot_time:
        description: The time the system was booted.
      created_time:
        description: The time when the device was known to have been created.
      desc:
        description: The description of the device, ordinarily as reported by the operating system.
      domain:
        description: |-
          The network domain where the device resides. For example:
          <code>work.example.com</code>.
      first_seen_time:
        description: The initial discovery time of the device.
      groups:
        description: |-
          The group names to which the device belongs. For example: <code>["Windows
          Laptops", "Engineering"]</code>.
      hostname:
        description: The device hostname.
        recommended: true
      image:
        description: The image used as a template to run the virtual machine.
      ip:
        description: The device IP address, in either IPv4 or IPv6 format.
      last_seen_time:
        description: The most recent discovery time of the device.
      location:
        description: The geographical location of the device.
      model:
        description: The model of the device. For example <code>ThinkPad X1 Carbon</code>.
      modified_time:
        description: The time when the device was last known to have been modified.
      name:
        description: |-
          The alternate device name, ordinarily as assigned by an administrator.
          <p><b>Note:</b> The <b>Name</b> could be any other string that helps to
          identify the device, such as a phone number; for example
          <code>310-555-1234</code>.</p>
      org:
        description: Organization and org unit related to the device.
      region:
        description: The region where the virtual machine is located. For example, an AWS Region.
        recommended: true
      type:
        description: |-
          The device type. For example: <code>unknown</code>, <code>server</code>,
          <code>desktop</code>, <code>laptop</code>, <code>tablet</code>,
          <code>mobile</code>, <code>virtual</code>, <code>browser</code>, or
          <code>other</code>.
        recommended: true
      type_id:
        description: The device type ID.
        required: true
      uid:
        description: |-
          The unique identifier of the device. For example the Windows TargetSID or AWS
          EC2 ARN.
        recommended: true
      uid_alt:
        description: |-
          An alternate unique identifier of the device if any. For example the
          ActiveDirectory DN.
      vendor_name:
        description: |-
          The vendor for the device. For example <code>Dell</code> or
          <code>Lenovo</code>.
        recommended: true
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:Host/
    notes:
      - D3FEND™ Ontology d3f:Host. — https://d3fend.mitre.org/dao/artifact/d3f:Host/
    exact_mappings:
      - uco_master:Device

  FirewallRule:
    description: |-
      The Firewall Rule object represents a specific rule within a firewall policy or
      event. It contains information about a rule's configuration, properties, and
      associated actions that define how network traffic is handled by the firewall.
    aliases:
      - Firewall Rule
    is_a: Rule
    in_subset:
      - objects
    slots:
      - condition
      - duration
      - match_details
      - match_location
      - rate_limit
      - sensitivity
    slot_usage:
      condition:
        description: 'The rule trigger condition for the rule. For example: SQL_INJECTION.'
      duration:
        description: The rule response time duration, usually used for challenge completion time.

  MalwareScanInfo:
    description: |-
      The malware scan information object describes characteristics, metadata of a
      malware scanning job.
    aliases:
      - Malware Scan Info
    is_a: Scan
    in_subset:
      - objects
    slots:
      - end_time
      - num_files
      - num_infected
      - num_volumes
      - size
      - start_time
      - unique_malware_count
    slot_usage:
      end_time:
        description: The timestamp indicating when the scan job completed execution.
      num_files:
        description: The total number of files analyzed during the scan.
      num_infected:
        description: The total number of files identified as infected with malware during the scan.
      num_volumes:
        description: The total number of storage volumes examined during the malware scan.
      size:
        description: The total size in bytes of all files that were scanned.
      start_time:
        description: The timestamp indicating when the scan job began execution.
      unique_malware_count:
        description: The number of unique malware detected across all infected files.

  Process:
    description: The Process object describes a running instance of a launched program.
    aliases:
      - Process
    is_a: ProcessEntity
    mixins:
      - ContainerProfile
    in_subset:
      - objects
    slots:
      - ancestry
      - environment_variables
      - file
      - integrity
      - integrity_id
      - lineage
      - loaded_modules
      - parent_process
      - ptid
      - sandbox
      - session
      - terminated_time
      - tid
      - user
      - working_directory
      - xattributes
    slot_usage:
      environment_variables:
        description: Environment variables associated with the process.
      file:
        description: The process file object.
        recommended: true
      lineage:
        deprecated: Use the <code>ancestry</code> attribute.
      parent_process:
        recommended: true
      session:
        description: The user session under which this process is running.
      terminated_time:
        description: The time when the process was terminated.
      user:
        description: The user under which this process is running.
        recommended: true
      xattributes:
        description: |-
          An unordered collection of zero or more name/value pairs that represent a
          process extended attribute.
    rules:
      - postconditions:
          any_of:
            - slot_conditions:
