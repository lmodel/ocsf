                  required: true
            - slot_conditions:
                uid:
                  required: true
            - slot_conditions:
                cpid:
                  required: true
        description: 'OCSF at_least_one: at least one of [''pid'', ''uid'', ''cpid''] must be set.'
    annotations:
      ocsf_constraints: '{"at_least_one": ["pid", "uid", "cpid"]}'
      observable_id: 25
    see_also:
      - https://d3fend.mitre.org/dao/artifact/d3f:Process/
    notes:
      - |-
        D3FEND™ Ontology d3f:Process —
