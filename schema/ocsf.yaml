    aliases:
    - Scan
    is_a: Entity
    slots:
    - name
    - Scan_type
    - Scan_type_id
    - uid
    - Scan_name
    - Scan_uid
    slot_usage:
      name:
        name: name
        description: 'The administrator-supplied or application-generated name of
          the scan. For

          example: "Home office weekly user database scan", "Scan folders for viruses",

          "Full system virus scan"'
      type:
        name: type
        description: The type of scan.
      type_id:
        name: type_id
        description: The type id of the scan.
        range: ScanTypeIdEnum
        required: true
      uid:
        name: uid
        description: The application-defined unique identifier assigned to an instance
          of a scan.
    class_uri: ocsf:Scan
  Service:
    name: Service
    definition_uri: https://w3id.org/lmodel/ocsf/Service
    description: 'The Service object describes characteristics of a service, <code>
      e.g. AWS EC2.

      </code>'
    notes:
    - "D3FEND\u2122 Ontology d3f:ServiceApplication. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:ServiceApplication/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
