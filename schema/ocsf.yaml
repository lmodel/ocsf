    class_uri: ocsf:TransformationInfo
  UnmannedAerialSystem:
    name: UnmannedAerialSystem
    definition_uri: https://w3id.org/lmodel/ocsf/UnmannedAerialSystem
    description: 'The Unmanned Aerial System object describes the characteristics,
      Position

      Location Information (PLI), and other metadata of Unmanned Aerial Systems (UAS)

      and other unmanned and drone systems used in Remote ID. Remote ID is defined
      in

      the Standard Specification for Remote ID and Tracking (ASTM Designation:

      F3411-22a) <a target=''_blank''

      href=''https://cdn.standards.iteh.ai/samples/112830/71297057ac42432880a203654f213709/ASTM-F3411-22a.pdf''>ASTM

      F3411-22a</a>.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Unmanned Aerial System
    is_a: Aircraft
    slots:
    - Aircraft_model
    - speed
    - speed_accuracy
    - track_direction
    - vertical_speed
    - hw_info
    - location
    - UnmannedAerialSystem_name
    - serial_number
    - UnmannedAerialSystem_type
    - UnmannedAerialSystem_type_id
    - UnmannedAerialSystem_uid
    - uid_alt
    - UnmannedAerialSystem_uuid
    - UnmannedAerialSystem_location
    - UnmannedAerialSystem_serial_number
    - UnmannedAerialSystem_uid_alt
    slot_usage:
      location:
        name: location
        recommended: true
      name:
        name: name
        description: The name of the unmanned system as reported by tracking or sensing
          hardware.
      serial_number:
        name: serial_number
        description: 'The serial number of the unmanned system. This is expressed
          in

          <code>CTA-2063-A</code> format.'
        recommended: true
      type:
        name: type
        description: The type of the UAS. For example, Helicopter, Gyroplane, Rocket,
          etc.
      type_id:
        name: type_id
        description: The UAS type identifier.
        range: UnmannedAerialSystemTypeIdEnum
        recommended: true
      uid:
        name: uid
        description: 'The primary identification identifier for an unmanned system.
          This can be a

          Serial Number (in <code>CTA-2063-A</code> format, the Registration ID (provided

          by the <code>CAA</code>, a UTM, or a unique Session ID.'
        recommended: true
      uid_alt:
        name: uid_alt
        description: 'A secondary identification identifier for an unmanned system.
          This can be a

          Serial Number (in <code>CTA-2063-A</code> format, the Registration ID (provided

          by the <code>CAA</code>, a UTM, or a unique Session ID.'
        recommended: true
      uuid:
        name: uuid
        description: 'The Unmanned Aircraft System Traffic Management (UTM) provided
          universal unique

          ID (UUID) traceable to a non-obfuscated ID where this UTM UUID acts as a

          ''session id'' to protect exposure of operationally sensitive information.'
        recommended: true
    class_uri: ocsf:UnmannedAerialSystem
  UnmannedSystemOperatingArea:
