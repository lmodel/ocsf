    - SecurityControlProfile_firewall_rule
    - SecurityControlProfile_is_alert
    - malware
    - malware_scan_info
    - SecurityControlProfile_policy
    - SecurityControlProfile_risk_details
    - SecurityControlProfile_risk_level
    - SecurityControlProfile_risk_level_id
    - SecurityControlProfile_risk_score
    slot_usage:
      action:
        name: action
        description: The normalized caption of <code>action_id</code>.
      action_id:
        name: action_id
        description: 'The action taken by a control or other policy-based system leading
          to an

          outcome or disposition. An unknown action may still correspond to a known

          disposition. Refer to <code>disposition_id</code> for the outcome of the

          action.'
        recommended: true
      confidence:
        name: confidence
        annotations:
          group:
            tag: group
            value: context
      confidence_id:
        name: confidence_id
        annotations:
          group:
            tag: group
            value: context
        recommended: true
      confidence_score:
        name: confidence_score
        annotations:
          group:
            tag: group
            value: context
      disposition_id:
        name: disposition_id
        recommended: true
      firewall_rule:
        name: firewall_rule
        description: 'The firewall rule that pertains to the control that triggered
          the event, if

          applicable.'
      is_alert:
        name: is_alert
        description: 'Indicates that the event is considered to be an alertable signal.
          Should be set

          to <code>true</code> if <code>disposition_id = Alert</code> among other

          dispositions, and/or <code>risk_level_id</code> or <code>severity_id</code>
          of

          the event is elevated. Not all control events will be alertable, for example
          if

          <code>disposition_id = Exonerated</code> or <code>disposition_id =

          Allowed</code>.'
        recommended: true
      policy:
        name: policy
        description: 'The policy that pertains to the control that triggered the event,
          if

          applicable. For example the name of an anti-malware policy or an access
          control

          policy.'
