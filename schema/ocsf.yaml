    - Dns_type
    - DnsQuery_hostname
    - opcode
    - DnsQuery_opcode_id
    slot_usage:
      hostname:
        name: hostname
        description: 'The hostname or domain being queried. For example: <code>www.example.com</code>'
        required: true
      opcode_id:
        name: opcode_id
        recommended: true
    class_uri: ocsf:DnsQuery
  DomainContact:
    name: DomainContact
    definition_uri: https://w3id.org/lmodel/ocsf/DomainContact
    description: 'The contact information related to a domain registration, e.g.,
      registrant,

      administrator, abuse, billing, or technical contact.'
