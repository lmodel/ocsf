          the success or failure of authentication, granting of authority, password

          change, entity change, privileged use etc.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: 3
          category:
            tag: category
            value: iam
      NETWORK_ACTIVITY:
        text: NETWORK_ACTIVITY
        description: Network Activity events.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: 4
          category:
            tag: category
            value: network
      REMEDIATION:
        text: REMEDIATION
        description: 'Remediation events report the results of remediation commands
          targeting files,

          processes, and other objects.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: 7
          category:
            tag: category
            value: remediation
      SYSTEM_ACTIVITY:
        text: SYSTEM_ACTIVITY
        description: System Activity events.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: 1
          category:
            tag: category
            value: system
      UNMANNED_SYSTEMS:
        text: UNMANNED_SYSTEMS
        description: 'Unmanned Systems events report the activity, existence, and/or
          state of

          unmanned systems for tracking, mission planning, and other related activities.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: 8
          category:
            tag: category
            value: unmanned_systems
