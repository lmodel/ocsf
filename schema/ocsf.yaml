classes:
  OcsfObject:
    name: OcsfObject
    definition_uri: https://w3id.org/lmodel/ocsf/OcsfObject
    description: Abstract root for every OCSF object class.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    abstract: true
    class_uri: ocsf:OcsfObject
  AnalysisTarget:
    name: AnalysisTarget
    definition_uri: https://w3id.org/lmodel/ocsf/AnalysisTarget
    description: 'The analysis target defines the scope of monitored activities, specifying
      what

      entity, system or process is analyzed for activity patterns.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Analysis Target
    is_a: OcsfObject
    slots:
    - AnalysisTarget_name
    - AnalysisTarget_type
    slot_usage:
      name:
        name: name
        description: 'The specific name or identifier of the analysis target, such
          as the username of

          a User Account, the name of a Kubernetes Cluster, the identifier of a Network

          Namespace, or the name of an Application Component.'
        required: true
      type:
        name: type
        description: 'The category of the analysis target, such as User Account, Kubernetes
          Cluster,

          Network Namespace, or Application Component.'
    class_uri: ocsf:AnalysisTarget
  AnomalyAnalysis:
    name: AnomalyAnalysis
    definition_uri: https://w3id.org/lmodel/ocsf/AnomalyAnalysis
    description: 'Describes the analysis of activity patterns and anomalies of target
      entities to

      identify potential security threats, performance issues, or other deviations

      from established baselines. This includes monitoring and analyzing user

      interactions, API usage, resource utilization, access patterns and other

      measured indicators.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Anomaly Analysis
    is_a: OcsfObject
    slots:
    - AnomalyAnalysis_analysis_targets
    - AnomalyAnalysis_anomalies
    - AnomalyAnalysis_baselines
    slot_usage:
      analysis_targets:
        name: analysis_targets
        description: 'The analysis targets define the scope of monitored activities,
          specifying what

          entities, systems or processes are analyzed for activity patterns.'
        required: true
      anomalies:
        name: anomalies
        description: 'List of detected activities that significantly deviate from
          the established

          baselines. This can include unusual access patterns, unexpected user-agents,

          abnormal API usage, suspicious traffic spikes, unauthorized access attempts,

          and other activities that may indicate potential security threats or system

          issues.'
        required: true
      baselines:
        name: baselines
        description: 'List of established patterns representing normal activity that
          serve as

          reference points for anomaly detection. This includes typical user interaction

          patterns like common user-agents, expected API access frequencies and patterns,

          standard resource utilization levels, and regular traffic flows. These

          baselines help establish what constitutes ''normal'' activity in the system.'
        recommended: true
    class_uri: ocsf:AnomalyAnalysis
  Object:
    name: Object
    definition_uri: https://w3id.org/lmodel/ocsf/Object
    description: 'An unordered collection of attributes. It defines a set of attributes
      available

      in all objects. It can be also used as a generic object to log objects that
      are

      not otherwise defined by the schema.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Object
    is_a: OcsfObject
    class_uri: ocsf:Object
  Observable:
    name: Observable
    definition_uri: https://w3id.org/lmodel/ocsf/Observable
    description: 'The observable object is a pivot element that contains related information

      found in many places in the event.'
    notes:
    - "OCSF Observables FAQ \u2014\nhttps://github.com/ocsf/ocsf-docs/blob/main/Articles/Defining\
      \ and Using\nObservables.md"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://github.com/ocsf/ocsf-docs/blob/main/Articles/Defining%20and%20Using%20Observables.md
    aliases:
    - Observable
    close_mappings:
    - uco_master:ObservableObject
    is_a: Object
    slots:
    - Observable_event_uid
    - Observable_name
    - reputation
    - Observable_type
    - Observable_type_id
    - Observable_type_uid
    - Observable_value
    slot_usage:
      event_uid:
        name: event_uid
        description: 'The unique identifier (<code>metadata.uid</code>) of the source
          OCSF event from

          which this observable was extracted. This field enables linking observables

          back to their originating event data when observables are stored in a separate

          location or system.'
      name:
        name: name
        description: 'The full name of the observable attribute. The <code>name</code>
          is a

          pointer/reference to an attribute within the OCSF event data. For example:

          <code>file.name</code>. Array attributes may be represented in one of three

          ways. For example: <code>resources.uid</code>, <code>resources[].uid</code>,

          <code>resources[0].uid</code>.'
        recommended: true
      type:
        name: type
        description: The observable value type name.
      type_id:
        name: type_id
        description: The observable value type identifier.
        range: ObservableTypeIdEnum
        required: true
      type_uid:
        name: type_uid
        description: 'The OCSF event type UID (<code>type_uid</code>) of the source
          event that this

          observable was extracted from. This field enables filtering and categorizing

          observables by their originating event type. For example: <code>300101</code>

          for Network Activity (class_uid 3001) with activity_id 1.'
      value:
        name: value
        description: 'The value associated with the observable attribute. The meaning
          of the value

          depends on the observable type.<br/>If the <code>name</code> refers to a
          scalar

          attribute, then the <code>value</code> is the value of the attribute.<br/>If

          the <code>name</code> refers to an object attribute, then the

          <code>value</code> is not populated.'
    class_uri: ocsf:Observable
  Observation:
    name: Observation
    definition_uri: https://w3id.org/lmodel/ocsf/Observation
    description: 'A record of an observed value or event that captures the timing
      and frequency

      of its occurrence. Used to track when values/events were first detected, last

      detected, and their total occurrence count.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Observation
    exact_mappings:
    - uco_master:Observation
    is_a: Object
    slots:
    - Observation_count
    - Observation_timespan
    - Observation_value
    slot_usage:
      count:
        name: count
        description: 'Integer representing the total number of times this specific
          value/event was

          observed across all occurrences. Helps establish prevalence and patterns.'
        recommended: true
      timespan:
        name: timespan
        description: 'The time window when the value or event was first observed.
          It is used to

          analyze activity patterns, detect trends, or correlate events within a specific

          timeframe.'
        recommended: true
      value:
        name: value
        description: 'The specific value, event, indicator or data point that was
          observed and

          recorded. This is the core piece of information being tracked.'
        required: true
    class_uri: ocsf:Observation
  OccurrenceDetails:
    name: OccurrenceDetails
    definition_uri: https://w3id.org/lmodel/ocsf/OccurrenceDetails
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["cell_name", "column_name", "column_number", "end_line",

          "json_path", "page_number", "record_index_in_array", "row_number",

          "start_line"]}'
    description: 'Details about where in the target entity, specified information
      was discovered.

      Only the attributes, relevant to the target entity type should be populated.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Occurrence Details
    is_a: Object
    slots:
    - OccurrenceDetails_cell_name
    - OccurrenceDetails_column_name
    - OccurrenceDetails_column_number
    - OccurrenceDetails_end_line
    - OccurrenceDetails_json_path
    - OccurrenceDetails_page_number
    - OccurrenceDetails_record_index_in_array
    - OccurrenceDetails_row_number
    - OccurrenceDetails_start_line
    slot_usage:
      cell_name:
        name: cell_name
        description: The cell name/reference in a spreadsheet. e.g <code>A2</code>
      column_name:
        name: column_name
        description: The column name in a spreadsheet, where the information was discovered.
      column_number:
        name: column_number
        description: 'The column number in a spreadsheet or a plain text document,
          where the

          information was discovered.'
      end_line:
        name: end_line
        description: 'The line number of the last line of the file, where the information
          was

          discovered.'
      json_path:
        name: json_path
        description: 'The JSON path of the attribute in a json record, where the information
          was

          discovered'
      page_number:
        name: page_number
        description: The page number in a document, where the information was discovered.
      record_index_in_array:
        name: record_index_in_array
        description: 'The index of the record in the array of records, where the information
          was

          discovered. e.g. the index of a record in an array of JSON records in a
          file.'
      row_number:
        name: row_number
        description: The row number in a spreadsheet, where the information was discovered.
      start_line:
        name: start_line
        description: 'The line number of the first line of the file, where the information
          was

          discovered.'
    class_uri: ocsf:OccurrenceDetails
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            cell_name:
              name: cell_name
              required: true
        - slot_conditions:
            column_name:
              name: column_name
              required: true
        - slot_conditions:
            column_number:
              name: column_number
              required: true
        - slot_conditions:
            end_line:
              name: end_line
              required: true
        - slot_conditions:
            json_path:
              name: json_path
              required: true
        - slot_conditions:
            page_number:
              name: page_number
              required: true
        - slot_conditions:
            record_index_in_array:
              name: record_index_in_array
              required: true
        - slot_conditions:
            row_number:
              name: row_number
              required: true
        - slot_conditions:
            start_line:
              name: start_line
              required: true
      description: 'OCSF at_least_one: at least one of [''cell_name'', ''column_name'',

        ''column_number'', ''end_line'', ''json_path'', ''page_number'',

        ''record_index_in_array'', ''row_number'', ''start_line''] must be set.'
  Os:
    name: Os
    definition_uri: https://w3id.org/lmodel/ocsf/Os
    description: 'The Operating System (OS) object describes characteristics of an
      OS, such as

      Linux or Windows.'
    notes:
    - "D3FEND\u2122 Ontology d3f:OperatingSystem \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:OperatingSystem/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:OperatingSystem/
    aliases:
    - Operating System (OS)
    exact_mappings:
    - uco_master:OperatingSystem
    close_mappings:
    - stix:Software
    is_a: Object
    slots:
    - build
    - Os_country
    - cpe_name
    - cpu_bits
    - edition
    - kernel_release
    - lang
    - Os_name
    - sp_name
    - sp_ver
    - Os_type
    - Os_type_id
    - Os_version
    slot_usage:
      country:
        name: country
        description: 'The operating system country code, as defined by the ISO 3166-1
          standard

          (Alpha-2 code).<p><b>Note:</b> The two letter country code should be

          capitalized. For example: <code>US</code> or <code>CA</code>.</p>'
      name:
        name: name
        description: The operating system name.
        required: true
      type:
        name: type
        description: The type of the operating system.
      type_id:
        name: type_id
        description: The type identifier of the operating system.
        range: OsTypeIdEnum
        required: true
      version:
        name: version
        description: 'The version of the OS running on the device that originated
          the event. For

          example: "Windows 10", "OS X 10.7", or "iOS 9".'
    class_uri: ocsf:Os
  Osint:
    name: Osint
    definition_uri: https://w3id.org/lmodel/ocsf/Osint
    description: 'The OSINT (Open Source Intelligence) object contains details related
      to an

      indicator such as the indicator itself, related indicators, geolocation,

      registrar information, subdomains, analyst commentary, and other contextual

      information. This information can be used to further enrich a detection or

      finding by providing decisioning support to other analysts and engineers.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - OSINT
    is_a: Object
    slots:
    - Osint_answers
    - Osint_attacks
    - Osint_autonomous_system
    - campaign
    - Osint_category
    - Osint_comment
    - Osint_confidence
    - Osint_confidence_id
    - Osint_created_time
    - Osint_creator
    - Osint_desc
    - Osint_detection_pattern
    - detection_pattern_type
    - detection_pattern_type_id
    - Osint_email
    - Osint_email_auth
    - Osint_expiration_time
    - external_uid
    - Osint_file
    - intrusion_sets
    - Osint_kill_chain
    - Osint_labels
    - Osint_location
    - malware
    - Osint_modified_time
    - Osint_name
    - Osint_references
    - Osint_related_analytics
    - Osint_reputation
    - Osint_risk_score
    - Osint_script
    - Osint_severity
    - Osint_severity_id
    - Osint_signatures
    - Osint_src_url
    - Osint_subdomains
    - Osint_subnet
    - threat_actor
    - Osint_tlp
    - Osint_type
    - Osint_type_id
    - Osint_uid
    - Osint_uploaded_time
    - Osint_value
    - Osint_vendor_name
    - Osint_vulnerabilities
    - Osint_whois
    slot_usage:
      answers:
        name: answers
        description: 'Any pertinent DNS answers information related to an indicator
          or OSINT

          analysis.'
      attacks:
        name: attacks
        description: 'MITRE ATT&CK Tactics, Techniques, and/or Procedures (TTPs) pertinent
          to an

          indicator or OSINT analysis.'
      autonomous_system:
        name: autonomous_system
        description: 'Any pertinent autonomous system information related to an indicator
          or OSINT

          analysis.'
      category:
        name: category
        description: Categorizes the threat indicator based on its functional or operational
          role.
      comment:
        name: comment
        description: Analyst commentary or source commentary about an indicator or
          OSINT analysis.
      confidence:
        name: confidence
        description: 'The confidence of an indicator being malicious and/or pertinent,
          normalized to

          the caption of the confidence_id value. In the case of ''Other'', it is
          defined

          by the event source or analyst.'
      confidence_id:
        name: confidence_id
        description: 'The normalized confidence refers to the accuracy of collected
          information

          related to the OSINT or how pertinent an indicator or analysis is to a specific

          event or finding. A low confidence means that the information collected
          or

          analysis conducted lacked detail or is not accurate enough to qualify an

          indicator as fully malicious.'
        recommended: true
      created_time:
        name: created_time
        description: The timestamp when the indicator was initially created or identified.
      creator:
        name: creator
        description: 'The identifier of the user, system, or organization that contributed
          the

          indicator.'
      desc:
        name: desc
        description: 'A detailed explanation of the indicator, including its context,
          purpose, and

          relevance.'
      detection_pattern:
        name: detection_pattern
        description: The specific detection pattern or signature associated with the
          indicator.
      email:
        name: email
        description: Any email information pertinent to an indicator or OSINT analysis.
      email_auth:
        name: email_auth
        description: 'Any email authentication information pertinent to an indicator
          or OSINT

          analysis.'
      expiration_time:
        name: expiration_time
        description: 'The expiration date of the indicator, after which it is no longer
          considered

          reliable.'
      file:
        name: file
        description: Any pertinent file information related to an indicator or OSINT
          analysis.
      kill_chain:
        name: kill_chain
        description: Lockheed Martin Kill Chain Phases pertinent to an indicator or
          OSINT analysis.
      labels:
        name: labels
        description: Tags or keywords associated with the indicator to enhance searchability.
      location:
        name: location
        description: 'Any pertinent geolocation information related to an indicator
          or OSINT

          analysis.'
      modified_time:
        name: modified_time
        description: The timestamp of the last modification or update to the indicator.
      name:
        name: name
        description: 'The <code>name</code> is a pointer/reference to an attribute
          within the OCSF

          event data. For example: file.name.'
      references:
        name: references
        description: 'Provides a reference to an external source of information related
          to the CTI

          being represented. This may include a URL, a document, or some other type
          of

          reference that provides additional context or information about the CTI.'
      related_analytics:
        name: related_analytics
        description: Any analytics related to an indicator or OSINT analysis.
      reputation:
        name: reputation
        description: 'Related reputational analysis from third-party engines and analysts
          for a given

          indicator or OSINT analysis.'
      risk_score:
        name: risk_score
        description: "A numerical representation of the threat indicator\u2019s risk\
          \ level."
      script:
        name: script
        description: Any pertinent script information related to an indicator or OSINT
          analysis.
      severity:
        name: severity
        description: 'Represents the severity level of the threat indicator, typically
          reflecting its

          potential impact or damage.'
      severity_id:
        name: severity_id
        description: 'The normalized severity level of the threat indicator, typically
          reflecting its

          potential impact or damage.'
      signatures:
        name: signatures
        description: Any digital signatures or hashes related to an indicator or OSINT
          analysis.
      src_url:
        name: src_url
        description: 'The source URL of an indicator or OSINT analysis, e.g., a URL
          back to a TIP,

          report, or otherwise.'
      subdomains:
        name: subdomains
        description: 'Any pertinent subdomain information - such as those generated
          by a Domain

          Generation Algorithm - related to an indicator or OSINT analysis.'
      subnet:
        name: subnet
        description: A CIDR or network block related to an indicator or OSINT analysis.
      tlp:
        name: tlp
        description: 'The <a target=''_blank'' href=''https://www.first.org/tlp/''>Traffic
          Light

          Protocol</a> was created to facilitate greater sharing of potentially sensitive

          information and more effective collaboration. TLP provides a simple and

          intuitive schema for indicating with whom potentially sensitive information
          can

          be shared.'
        range: OsintTlpEnum
        recommended: true
      type:
        name: type
        description: The OSINT indicator type.
      type_id:
        name: type_id
        description: The OSINT indicator type ID.
        range: OsintTypeIdEnum
        required: true
      uid:
        name: uid
        description: The unique identifier for the OSINT object.
      uploaded_time:
        name: uploaded_time
        description: 'The timestamp indicating when the associated indicator or intelligence
          was

          added to the system or repository.'
      value:
        name: value
        description: 'The actual indicator value in scope, e.g., a SHA-256 hash hexdigest
          or a domain

          name.'
        required: true
      vendor_name:
        name: vendor_name
        description: The vendor name of a tool which generates intelligence or provides
          indicators.
      vulnerabilities:
        name: vulnerabilities
        description: Any vulnerabilities related to an indicator or OSINT analysis.
      whois:
        name: whois
        description: Any pertinent WHOIS information related to an indicator or OSINT
          analysis.
    class_uri: ocsf:Osint
  Package:
    name: Package
    definition_uri: https://w3id.org/lmodel/ocsf/Package
    description: The Software Package object describes details about a software package.
    notes:
    - "D3FEND\u2122 Ontology d3f:SoftwarePackage. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:SoftwarePackage/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:SoftwarePackage/
    aliases:
    - Software Package
    is_a: Object
    slots:
    - Package_architecture
    - cpe_name
    - epoch
    - Package_hash
    - Package_license
    - license_url
    - Package_name
    - package_manager
    - package_manager_url
    - purl
    - release
    - Package_src_url
    - Package_type
    - Package_type_id
    - Package_uid
    - Package_vendor_name
    - Package_version
    slot_usage:
      architecture:
        name: architecture
        recommended: true
      hash:
        name: hash
        description: 'Cryptographic hash to identify the binary instance of a software
          component.

          This can include any component such file, package, or library.'
      license:
        name: license
        description: The software license applied to this package.
      name:
        name: name
        description: The software package name.
        required: true
      src_url:
        name: src_url
        description: 'The link to the specific library or package such as within <code>GitHub</code>,

          this is different from the link to the package manager where the library
          or

          package is hosted.'
      type:
        name: type
        description: 'The type of software package, normalized to the caption of the

          <code>type_id</code> value. In the case of ''Other'', it is defined by the

          source.'
      type_id:
        name: type_id
        description: The type of software package.
        range: PackageTypeIdEnum
        recommended: true
      uid:
        name: uid
        description: 'A unique identifier for the package or library reported by the
          source tool.

          E.g., the <code>libId</code> within the <code>sbom</code> field of an OX

          Security Issue or the SPDX <code>components.*.bom-ref</code>.'
      vendor_name:
        name: vendor_name
        description: The name of the vendor who published the software package.
      version:
        name: version
        description: The software package version.
        required: true
    class_uri: ocsf:Package
  Packet:
    name: Packet
    definition_uri: https://w3id.org/lmodel/ocsf/Packet
    description: 'The Packet object represents a single captured network packet and
      its

      associated metadata. It describes where the packet came from, how it is stored

      or encoded, and how it can be located within a capture file or stream. This

      object does not interpret protocol content; it only represents the captured

      packet data and its positioning information.'
    notes:
    - "D3FEND\u2122 Ontology d3f:NetworkPacket. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:NetworkPacket/"
    - "D3FEND\u2122 Ontology d3f:PacketCaptureFile. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:PacketCaptureFile/"
    - "D3FEND\u2122 Ontology d3f:PacketLog. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:PacketLog/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:NetworkPacket/
    - https://d3fend.mitre.org/dao/artifact/d3f:PacketCaptureFile/
    - https://d3fend.mitre.org/dao/artifact/d3f:PacketLog/
    aliases:
    - Packet
    is_a: Object
    slots:
    - Packet_encoding
    - Packet_encoding_id
    - Packet_end_offset
    - Packet_format
    - Packet_format_id
    - Packet_sequence_number
    - Packet_source
    - Packet_source_id
    - Packet_start_offset
    - Packet_value
    slot_usage:
      encoding:
        name: encoding
        description: "The human-readable name of the encoding used to represent the\
          \ packet data in\nthe <code>value</code> field. This should match the caption\
          \ associated with\n<code>encoding_id</code>. If <code>encoding_id</code>\
          \ is 99 (Other), this field\ncontains the original data source\u2013specific\
          \ encoding value."
      encoding_id:
        name: encoding_id
        description: 'The normalized identifier of the encoding method used to represent
          the packet

          data as a string.'
        range: PacketEncodingIdEnum
        recommended: true
      end_offset:
        name: end_offset
        description: The ending byte position of this packet within a capture file
          or stream.
      format:
        name: format
        description: "The human-readable name of the packet capture file format in\
          \ which the packet\nis stored. This should match the caption associated\
          \ with\n<code>format_id</code>. If <code>format_id</code> is 99 (Other),\
          \ this field\ncontains the original data source\u2013specific format value."
      format_id:
        name: format_id
        description: The normalized identifier of the packet capture format.
        range: PacketFormatIdEnum
        recommended: true
      sequence_number:
        name: sequence_number
        description: 'The relative order number of this packet within its capture
          context (such as a

          PCAP file, network session, or reconstructed stream). This represents

          chronological capture order, distinct from both protocol-level sequencing
          (such

          as TCP sequence numbers).'
      source:
        name: source
        description: "The human-readable name describing how or where the packet was\
          \ obtained. This\nshould match the caption associated with <code>source_id</code>.\
          \ If\n<code>source_id</code> is 99 (Other), this field contains the original\
          \ data\nsource\u2013specific value."
      source_id:
        name: source_id
        description: 'A normalized numeric identifier that specifies how the packet
          was obtained or

          generated.'
        range: PacketSourceIdEnum
        recommended: true
      start_offset:
        name: start_offset
        description: The starting byte position of this packet within a capture file
          or stream.
      value:
        name: value
        description: 'The actual packet data, represented as a string. The format
          of this string is

          determined by the specified <code>encoding_id</code> (e.g., Base64,

          Hexadecimal, or URL Encoded).'
        required: true
    class_uri: ocsf:Packet
  Parameter:
    name: Parameter
    definition_uri: https://w3id.org/lmodel/ocsf/Parameter
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["name", "pre_value", "post_value"]}'
    description: The Parameter object provides details regarding a parameter of a
      a function.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Parameter
    is_a: Object
    slots:
    - Parameter_name
    - Parameter_post_value
    - Parameter_pre_value
    slot_usage:
      name:
        name: name
        description: The parameter name.
      post_value:
        name: post_value
        description: The parameter value after function execution.
      pre_value:
        name: pre_value
        description: The parameter value before function execution.
    class_uri: ocsf:Parameter
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            pre_value:
              name: pre_value
              required: true
        - slot_conditions:
            post_value:
              name: post_value
              required: true
      description: 'OCSF at_least_one: at least one of [''name'', ''pre_value'', ''post_value'']
        must be

        set.'
  PermissionAnalysisResult:
    name: PermissionAnalysisResult
    definition_uri: https://w3id.org/lmodel/ocsf/PermissionAnalysisResult
    description: 'The Permission Analysis object describes analysis results of permissions,

      policies directly associated with an identity (user, role, or service account).

      This evaluates what permissions an identity has been granted through attached

      policies, which privileges are actively used versus unused, and identifies

      potential over-privileged access. Use this for identity-centric security

      assessments such as privilege audits, dormant permission discovery, and

      least-privilege compliance analysis.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Permission Analysis Result
    is_a: Object
    slots:
    - PermissionAnalysisResult_analyzed_privileges_count
    - PermissionAnalysisResult_condition_keys
    - PermissionAnalysisResult_granted_privileges
    - PermissionAnalysisResult_policy
    - PermissionAnalysisResult_service_privilege_analysis_list
    - PermissionAnalysisResult_total_potential_attacks_count
    - PermissionAnalysisResult_unused_privileges_count
    - PermissionAnalysisResult_unused_services_count
    slot_usage:
      analyzed_privileges_count:
        name: analyzed_privileges_count
        description: The total count of privileges that were analyzed across all services.
      condition_keys:
        name: condition_keys
        description: 'The condition keys and their values that were evaluated during
          policy analysis,

          including contextual constraints that affect permission grants. These

          conditions define when and how permissions are applied. Examples:

          <code>aws:SourceIp:1.2.3.4</code>, <code>aws:RequestedRegion:us-east-1</code>.'
      granted_privileges:
        name: granted_privileges
        description: 'The specific privileges, actions, or permissions that are explicitly
          granted by

          the analyzed policy. Examples: AWS actions like <code>s3:GetObject</code>,

          <code>ec2:RunInstances</code>, <code>iam:CreateUser</code>; Azure actions
          like

          <code>Microsoft.Storage/storageAccounts/read</code>; or GCP permissions
          like

          <code>storage.objects.get</code>.'
      policy:
        name: policy
        description: 'Detailed information about the policy document that was analyzed,
          including

          policy metadata, version, type (identity-based, resource-based, etc.), and

          structural details. This provides context for understanding the scope and

          nature of the permission analysis.'
        recommended: true
      service_privilege_analysis_list:
        name: service_privilege_analysis_list
        description: The list of privilege analysis results grouped by cloud service
          or namespace.
      total_potential_attacks_count:
        name: total_potential_attacks_count
        description: 'The total count of privilege-to-attack technique mappings identified
          across all

          analyzed privileges.'
      unused_privileges_count:
        name: unused_privileges_count
        description: 'The total count of privileges or actions defined in the policy
          that have not

          been utilized within the analysis timeframe. This metric helps identify

          over-privileged access and opportunities for privilege reduction to follow
          the

          principle of least privilege. High counts may indicate policy bloat or

          excessive permissions.'
      unused_services_count:
        name: unused_services_count
        description: 'The total count of cloud services or resource types referenced
          in the policy

          that have not been accessed or utilized within the analysis timeframe. This

          helps identify unused service permissions that could be removed to reduce

          attack surface. Examples: AWS services like S3, SQS, IAM, Lambda; Azure

          services like Storage, Compute, KeyVault; or GCP services like Cloud Storage,

          Compute Engine, BigQuery.'
    class_uri: ocsf:PermissionAnalysisResult
  PortInfo:
    name: PortInfo
    definition_uri: https://w3id.org/lmodel/ocsf/PortInfo
    description: 'The Port Information object describes a port and its associated
      protocol

      details.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Port Information
    is_a: Object
    slots:
    - PortInfo_port
    - PortInfo_protocol_name
    - protocol_num
    slot_usage:
      port:
        name: port
        description: 'The port number. For example: <code>80</code>, <code>443</code>,

          <code>22</code>.'
        required: true
      protocol_name:
        name: protocol_name
        description: 'The IP protocol name in lowercase, as defined by the Internet
          Assigned Numbers

          Authority (IANA). For example: <code>tcp</code> or <code>udp</code>.'
        recommended: true
    class_uri: ocsf:PortInfo
  PrivilegeAttackInfo:
    name: PrivilegeAttackInfo
    definition_uri: https://w3id.org/lmodel/ocsf/PrivilegeAttackInfo
    description: 'The Privilege Attack Info object groups privileges by the potential
      attack they

      could enable. It maps specific privileges to MITRE ATT&CK techniques, helping

      identify security risks associated with granted permissions.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Privilege Attack Info
    is_a: Object
    slots:
    - PrivilegeAttackInfo_attack
    - PrivilegeAttackInfo_privilege_info_list
    slot_usage:
      attack:
        name: attack
        description: The MITRE ATT&CK technique that these privileges could enable.
        required: true
      privilege_info_list:
        name: privilege_info_list
        description: 'The list of privilege information objects, where each element
          describes a

          specific privilege that could enable the associated attack technique.'
        required: true
    class_uri: ocsf:PrivilegeAttackInfo
  PrivilegeInfo:
    name: PrivilegeInfo
    definition_uri: https://w3id.org/lmodel/ocsf/PrivilegeInfo
    description: 'The Privilege Info object describes information about a specific
      privilege,

      action, or permission. It captures the privilege name, type, usage status, and

      when it was last used.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Privilege Info
    is_a: Object
    slots:
    - PrivilegeInfo_is_unused
    - PrivilegeInfo_last_used_time
    - PrivilegeInfo_name
    - PrivilegeInfo_type
    - PrivilegeInfo_type_id
    slot_usage:
      is_unused:
        name: is_unused
        description: Indicates whether the privilege is unused within the analysis
          timeframe.
      last_used_time:
        name: last_used_time
        description: The most recent time this privilege was used.
      name:
        name: name
        description: 'The name of the privilege, action, or permission. Examples:

          <code>GetObject</code>, <code>CreateStoreImageTask</code> (AWS);

          <code>Microsoft.Storage/storageAccounts/read</code> (Azure);

          <code>storage.objects.get</code> (GCP).'
        required: true
      type:
        name: type
        description: 'The type or category of the privilege, normalized to the caption
          of the

          <code>type_id</code> value. In the case of ''Other'', it is defined by the
          event

          source.'
      type_id:
        name: type_id
        description: The normalized type of the privilege.
        range: PrivilegeInfoTypeIdEnum
    class_uri: ocsf:PrivilegeInfo
  ProgrammaticCredential:
    name: ProgrammaticCredential
    definition_uri: https://w3id.org/lmodel/ocsf/ProgrammaticCredential
    description: 'The Programmatic Credential object describes service-specific credentials
      used

      for direct API access and system integration. These credentials are typically

      issued by individual services or platforms for accessing their APIs and

      resources, focusing on credential lifecycle management and usage tracking.

      Examples include API keys, service account keys, client certificates, and

      vendor-specific access tokens.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Programmatic Credential
    is_a: Object
    slots:
    - ProgrammaticCredential_last_used_time
    - ProgrammaticCredential_type
    - ProgrammaticCredential_uid
    slot_usage:
      last_used_time:
        name: last_used_time
        description: 'The timestamp when this programmatic credential was last used
          for

          authentication or API access. This helps track credential usage patterns,

          identify dormant credentials that may pose security risks, and support

          credential lifecycle management. The timestamp should reflect the most recent

          successful authentication or API call using this credential.'
      type:
        name: type
        description: 'The type or category of programmatic credential, normalized
          to the caption of

          the type_id value. In the case of ''Other'', it is defined by the event
          source.

          Examples include ''API Key'', ''Service Account Key'', ''Access Token'',
          ''Client

          Certificate'', ''OAuth Token'', ''Personal Access Token'', etc.'
        recommended: true
      uid:
        name: uid
        description: 'The unique identifier of the programmatic credential. This could
          be an API key

          ID, service account key ID, access token identifier, certificate serial
          number,

          or other unique identifier that distinguishes this credential from others.

          Examples: AWS Access Key ID, GCP Service Account Key ID, Azure Application
          ID,

          or OAuth2 token identifier.'
        required: true
    class_uri: ocsf:ProgrammaticCredential
  QueryEvidence:
    name: QueryEvidence
    definition_uri: https://w3id.org/lmodel/ocsf/QueryEvidence
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"just_one": ["connection_info", "file", "folder", "group", "job",
          "kernel",

          "module", "network_interfaces", "peripheral_device", "process", "service",

          "session", "startup_item", "user"]}'
    description: 'The specific resulting evidence information that was queried or
      discovered.

      When mapping raw telemetry data users should select the appropriate child

      object that best matches the evidence type as defined by query_type_id.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Query Evidence
    is_a: OcsfObject
    slots:
    - QueryEvidence_connection_info
    - QueryEvidence_file
    - QueryEvidence_folder
    - QueryEvidence_group
    - QueryEvidence_job
    - QueryEvidence_kernel
    - QueryEvidence_module
    - QueryEvidence_network_interfaces
    - QueryEvidence_peripheral_device
    - QueryEvidence_process
    - QueryEvidence_query_type
    - QueryEvidence_query_type_id
    - QueryEvidence_service
    - QueryEvidence_session
    - QueryEvidence_startup_item
    - QueryEvidence_state
    - QueryEvidence_tcp_state_id
    - QueryEvidence_user
    - QueryEvidence_users
    slot_usage:
      connection_info:
        name: connection_info
        annotations:
          group:
            tag: group
            value: primary
        description: The network connection information related to a Network Connection
          query type.
        recommended: true
      file:
        name: file
        annotations:
          group:
            tag: group
            value: primary
        description: 'The file that is the target of the query when query_type_id
          indicates a File

          query.'
        recommended: true
      folder:
        name: folder
        annotations:
          group:
            tag: group
            value: primary
        description: 'The folder that is the target of the query when query_type_id
          indicates a

          Folder query.'
        recommended: true
      group:
        name: group
        annotations:
          group:
            tag: group
            value: primary
        description: 'The administrative group that is the target of the query when
          query_type_id

          indicates an Admin Group query.'
        recommended: true
      job:
        name: job
        annotations:
          group:
            tag: group
            value: primary
        description: 'The job object that pertains to the event when query_type_id
          indicates a Job

          query.'
        recommended: true
      kernel:
        name: kernel
        annotations:
          group:
            tag: group
            value: primary
        description: 'The kernel object that pertains to the event when query_type_id
          indicates a

          Kernel query.'
        recommended: true
      module:
        name: module
        annotations:
          group:
            tag: group
            value: primary
        description: 'The module that pertains to the event when query_type_id indicates
          a Module

          query.'
        recommended: true
      network_interfaces:
        name: network_interfaces
        annotations:
          group:
            tag: group
            value: primary
        description: 'The physical or virtual network interfaces that are associated
          with the device

          when query_type_id indicates a Network Interfaces query.'
        recommended: true
      peripheral_device:
        name: peripheral_device
        annotations:
          group:
            tag: group
            value: primary
        description: 'The peripheral device that triggered the event when query_type_id
          indicates a

          Peripheral Device query.'
        recommended: true
      process:
        name: process
        annotations:
          group:
            tag: group
            value: primary
        description: 'The process that pertains to the event when query_type_id indicates
          a Process

          query.'
        recommended: true
      query_type:
        name: query_type
        annotations:
          group:
            tag: group
            value: classification
        description: The normalized caption of query_type_id or the source-specific
          query type.
      query_type_id:
        name: query_type_id
        annotations:
          group:
            tag: group
            value: classification
        description: 'The normalized type of system query performed against a device
          or system

          component.'
        range: QueryEvidenceQueryTypeIdEnum
        required: true
      service:
        name: service
        annotations:
          group:
            tag: group
            value: primary
        description: 'The service that pertains to the event when query_type_id indicates
          a Service

          query.'
        recommended: true
      session:
        name: session
        annotations:
          group:
            tag: group
            value: primary
        description: 'The authenticated user or service session when query_type_id
          indicates a

          Session query.'
        recommended: true
      startup_item:
        name: startup_item
        annotations:
          group:
            tag: group
            value: primary
        description: 'The startup item object that pertains to the event when query_type_id
          indicates

          a Startup Item query.'
        recommended: true
      state:
        name: state
        annotations:
          group:
            tag: group
            value: context
        description: 'The state of the socket, normalized to the caption of the state_id
          value. In

          the case of ''Other'', it is defined by the event source.'
      tcp_state_id:
        name: tcp_state_id
        annotations:
          group:
            tag: group
            value: context
      user:
        name: user
        annotations:
          group:
            tag: group
            value: primary
        description: The user that pertains to the event when query_type_id indicates
          a User query.
        recommended: true
      users:
        name: users
        annotations:
          group:
            tag: group
            value: context
        description: 'The users that belong to the administrative group when query_type_id
          indicates

          a Users query.'
    class_uri: ocsf:QueryEvidence
    rules:
    - postconditions:
        exactly_one_of:
        - slot_conditions:
            connection_info:
              name: connection_info
              required: true
        - slot_conditions:
            file:
              name: file
              required: true
        - slot_conditions:
            folder:
              name: folder
              required: true
        - slot_conditions:
            group:
              name: group
              required: true
        - slot_conditions:
            job:
              name: job
              required: true
        - slot_conditions:
            kernel:
              name: kernel
              required: true
        - slot_conditions:
            module:
              name: module
              required: true
        - slot_conditions:
            network_interfaces:
              name: network_interfaces
              required: true
        - slot_conditions:
            peripheral_device:
              name: peripheral_device
              required: true
        - slot_conditions:
            process:
              name: process
              required: true
        - slot_conditions:
            service:
              name: service
              required: true
        - slot_conditions:
            session:
              name: session
              required: true
        - slot_conditions:
            startup_item:
              name: startup_item
              required: true
        - slot_conditions:
            user:
              name: user
              required: true
      description: 'OCSF just_one: exactly one of [''connection_info'', ''file'',
        ''folder'', ''group'',

        ''job'', ''kernel'', ''module'', ''network_interfaces'', ''peripheral_device'',

        ''process'', ''service'', ''session'', ''startup_item'', ''user''] must be
        set.'
  RelatedEvent:
    name: RelatedEvent
    definition_uri: https://w3id.org/lmodel/ocsf/RelatedEvent
    description: 'The Related Event object describes an event or another finding related
      to a

      finding. It may or may not be an OCSF event.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Related Event/Finding
    is_a: Object
    slots:
    - attacks
    - RelatedEvent_count
    - RelatedEvent_created_time
    - RelatedEvent_desc
    - RelatedEvent_first_seen_time
    - kill_chain
    - RelatedEvent_last_seen_time
    - RelatedEvent_modified_time
    - observables
    - RelatedEvent_product
    - RelatedEvent_product_uid
    - severity
    - RelatedEvent_severity_id
    - RelatedEvent_status
    - RelatedEvent_tags
    - RelatedEvent_title
    - RelatedEvent_traits
    - RelatedEvent_type
    - RelatedEvent_type_name
    - RelatedEvent_type_uid
    - RelatedEvent_uid
    slot_usage:
      count:
        name: count
        description: 'The number of times that activity in the same logical group
          occurred, as

          reported by the related Finding.'
      created_time:
        name: created_time
        description: '<p>The time when the related event/finding was created.</p>
          If the related

          event/finding is in OCSF and is a Finding, then this value should be equal
          to

          <code>finding_info.created_time</code> in the corresponding Finding. If
          the

          related event/finding is in OCSF and is not a Finding, then this value should

          be equal to <code>time</code> in the corresponding event.'
      desc:
        name: desc
        description: A description of the related event/finding.
      first_seen_time:
        name: first_seen_time
        description: 'The time when the finding was first observed. e.g. The time
          when a

          vulnerability was first observed.<br>It can differ from the

          <code>created_time</code> timestamp, which reflects the time this finding
          was

          created.'
      last_seen_time:
        name: last_seen_time
        description: 'The time when the finding was most recently observed. e.g. The
          time when a

          vulnerability was most recently observed.<br>It can differ from the

          <code>modified_time</code> timestamp, which reflects the time this finding
          was

          last modified.'
      modified_time:
        name: modified_time
        description: The time when the related event/finding was last modified.
      product:
        name: product
        description: Details about the product that reported the related event/finding.
      product_uid:
        name: product_uid
        description: The unique identifier of the product that reported the related
          event.
      severity_id:
        name: severity_id
        recommended: true
      status:
        name: status
        description: 'The related event status. Should correspond to the label of
          the status_id (or

          ''Other'' status value for status_id = 99) of the related event.'
      tags:
        name: tags
        description: 'The list of tags; <code>{key:value}</code> pairs associated
          with the related

          event/finding.'
      title:
        name: title
        description: A title or a brief phrase summarizing the related event/finding.
      traits:
        name: traits
        description: 'The list of key traits or characteristics extracted from the
          related

          event/finding that influenced or contributed to the overall finding''s outcome.'
      type:
        name: type
        description: '<p>The type of the related event/finding.</p>Populate if the
          related

          event/finding is <code>NOT</code> in OCSF. If it is in OCSF, then utilize

          <code>type_name, type_uid</code> instead.'
      type_name:
        name: type_name
        description: 'The type of the related OCSF event, as defined by <code>type_uid</code>.<p>For

          example: <code>Process Activity: Launch.</code></p>Populate if the related

          event/finding is in OCSF.'
      type_uid:
        name: type_uid
        description: 'The unique identifier of the related OCSF event type. <p>For
          example:

          <code>100701.</code></p>Populate if the related event/finding is in OCSF.'
        recommended: true
      uid:
        name: uid
        description: '<p>The unique identifier of the related event/finding.</p> If
          the related

          event/finding is in OCSF, then this value must be equal to

          <code>metadata.uid</code> in the corresponding event.'
        required: true
    class_uri: ocsf:RelatedEvent
  Remediation:
    name: Remediation
    definition_uri: https://w3id.org/lmodel/ocsf/Remediation
    description: 'The Remediation object describes the recommended remediation steps
      to address

      identified issue(s).'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Remediation
    close_mappings:
    - iso27001:RiskTreatmentPlan
    related_mappings:
    - kev_catalog:KevEntry
    - core:Configuration
    is_a: Object
    slots:
    - Remediation_cis_controls
    - Remediation_desc
    - kb_article_list
    - kb_articles
    - Remediation_references
    slot_usage:
      cis_controls:
        name: cis_controls
        description: 'An array of Center for Internet Security (CIS) Controls that
          can be optionally

          mapped to provide additional remediation details.'
      desc:
        name: desc
        description: The description of the remediation strategy.
        required: true
      references:
        name: references
        description: 'A list of supporting URL/s, references that help describe the
          remediation

          strategy.'
    class_uri: ocsf:Remediation
  Reputation:
    name: Reputation
    definition_uri: https://w3id.org/lmodel/ocsf/Reputation
    description: 'The Reputation object describes the reputation/risk score of an
      entity (e.g.

      device, user, domain).'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Reputation
    is_a: Object
    slots:
    - Reputation_base_score
    - Reputation_provider
    - score
    - Reputation_score_id
    slot_usage:
      base_score:
        name: base_score
        description: The reputation score as reported by the event source.
        required: true
      provider:
        name: provider
        description: The provider of the reputation information.
        recommended: true
      score_id:
        name: score_id
        required: true
    class_uri: ocsf:Reputation
  Request:
    name: Request
    definition_uri: https://w3id.org/lmodel/ocsf/Request
    description: The Request Elements object describes characteristics of an API request.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Request Elements
    is_a: Object
    slots:
    - containers
    - Request_data
    - Request_flags
    - Request_uid
    slot_usage:
      data:
        name: data
        description: The additional data that is associated with the api request.
      flags:
        name: flags
        description: The communication flags that are associated with the api request.
      uid:
        name: uid
        description: The unique request identifier.
        required: true
    class_uri: ocsf:Request
  Response:
    name: Response
    definition_uri: https://w3id.org/lmodel/ocsf/Response
    description: The Response Elements object describes characteristics of an API
      response.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Response Elements
    is_a: Object
    slots:
    - Response_code
    - containers
    - Response_data
    - Response_error
    - Response_error_message
    - Response_flags
    - Response_message
    slot_usage:
      code:
        name: code
        recommended: true
      data:
        name: data
        description: The additional data that is associated with the api response.
      error:
        name: error
        recommended: true
      error_message:
        name: error_message
        recommended: true
      flags:
        name: flags
        description: The communication flags that are associated with the api response.
      message:
        name: message
        recommended: true
    class_uri: ocsf:Response
  RpcInterface:
    name: RpcInterface
    definition_uri: https://w3id.org/lmodel/ocsf/RpcInterface
    description: 'The RPC Interface represents the remote procedure call interface
      used in the

      DCE/RPC session.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - RPC Interface
    is_a: Object
    slots:
    - RpcInterface_ack_reason
    - RpcInterface_ack_result
    - RpcInterface_uuid
    - RpcInterface_version
    slot_usage:
      ack_reason:
        name: ack_reason
        recommended: true
      ack_result:
        name: ack_result
        recommended: true
      uuid:
        name: uuid
        description: The unique identifier of the particular remote procedure or service.
        required: true
      version:
        name: version
        description: The version of the DCE/RPC protocol being used in the session.
        required: true
    class_uri: ocsf:RpcInterface
  San:
    name: San
    definition_uri: https://w3id.org/lmodel/ocsf/San
    description: 'The Subject Alternative name (SAN) object describes a SAN secured
      by a digital

      certificate'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Subject Alternative Name
    is_a: Object
    slots:
    - San_name
    - San_type
    slot_usage:
      name:
        name: name
        description: Name of SAN (e.g. The actual IP Address or domain.)
        required: true
      type:
        name: type
        description: Type descriptor of SAN (e.g. IP Address/domain/etc.)
        required: true
    class_uri: ocsf:San
  Sbom:
    name: Sbom
    definition_uri: https://w3id.org/lmodel/ocsf/Sbom
    description: 'The Software Bill of Materials object describes characteristics
      of a generated

      SBOM.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Software Bill of Materials
    is_a: Object
    slots:
    - Sbom_created_time
    - Sbom_package
    - Sbom_product
    - Sbom_software_components
    - Sbom_type
    - Sbom_type_id
    - Sbom_uid
    - Sbom_version
    slot_usage:
      created_time:
        name: created_time
        description: The time when the SBOM was created.
        recommended: true
      package:
        name: package
        description: 'The software package or library that is being discovered or
          inventoried by an

          SBOM.'
        required: true
      product:
        name: product
        description: 'Details about the upstream product that generated the SBOM e.g.

          <code>cdxgen</code> or <code>Syft</code>.'
        recommended: true
      software_components:
        name: software_components
        required: true
      type:
        name: type
        description: 'The type of SBOM, normalized to the caption of the <code>type_id</code>
          value.

          In the case of ''Other'', it is defined by the source.'
      type_id:
        name: type_id
        description: The type of SBOM.
        range: SbomTypeIdEnum
        recommended: true
      uid:
        name: uid
        description: 'A unique identifier for the SBOM or the SBOM generation by a
          source tool, such

          as the SPDX <code>metadata.component.bom-ref</code>.'
      version:
        name: version
        description: 'The specification (spec) version of the particular SBOM, e.g.,

          <code>1.6</code>.'
    class_uri: ocsf:Sbom
  Scim:
    name: Scim
    definition_uri: https://w3id.org/lmodel/ocsf/Scim
    description: 'The System for Cross-domain Identity Management (SCIM) Configuration
      object

      provides a structured set of attributes related to SCIM protocols used for

      identity provisioning and management across cloud-based platforms. It

      standardizes user and group provisioning details, enabling identity

      synchronization and lifecycle management with compatible Identity Providers

      (IdPs) and applications. SCIM is defined in <a target=''_blank''

      href=''https://datatracker.ietf.org/doc/html/rfc7643''>RFC-7634</a>'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - SCIM
    is_a: Object
    slots:
    - Scim_auth_protocol
    - Scim_auth_protocol_id
    - Scim_created_time
    - Scim_error_message
    - Scim_is_group_provisioning_enabled
    - Scim_is_user_provisioning_enabled
    - Scim_last_run_time
    - Scim_modified_time
    - Scim_name
    - Scim_protocol_name
    - Scim_rate_limit
    - Scim_scim_group_schema
    - Scim_scim_user_schema
    - Scim_state
    - Scim_state_id
    - Scim_uid
    - Scim_uid_alt
    - Scim_url_string
    - Scim_vendor_name
    - Scim_version
    slot_usage:
      auth_protocol:
        name: auth_protocol
        description: 'The authorization protocol as defined by the caption of

          <code>auth_protocol_id</code>. In the case of <code>Other</code>, it is
          defined

          by the event source.'
      auth_protocol_id:
        name: auth_protocol_id
        description: 'The normalized identifier of the authorization protocol used
          by the SCIM

          resource.'
      created_time:
        name: created_time
        description: When the SCIM resource was added to the service provider.
      error_message:
        name: error_message
        description: Message or code associated with the last encountered error.
      is_group_provisioning_enabled:
        name: is_group_provisioning_enabled
        description: 'Indicates whether the SCIM resource is configured to provision
          groups,

          automatically or otherwise.'
      is_user_provisioning_enabled:
        name: is_user_provisioning_enabled
        description: 'Indicates whether the SCIM resource is configured to provision
          users,

          automatically or otherwise.'
      last_run_time:
        name: last_run_time
        description: Timestamp of the most recent successful synchronization.
      modified_time:
        name: modified_time
        description: 'The most recent time when the SCIM resource was updated at the
          service

          provider.'
      name:
        name: name
        description: The name of the SCIM resource.
        recommended: true
      protocol_name:
        name: protocol_name
        description: 'The supported protocol for the SCIM resource. E.g., <code>SAML</code>,

          <code>OIDC</code>, or <code>OAuth2</code>.'
      rate_limit:
        name: rate_limit
        description: 'Maximum number of requests allowed by the SCIM resource within
          a specified time

          frame to avoid throttling.'
      scim_group_schema:
        name: scim_group_schema
        recommended: true
      scim_user_schema:
        name: scim_user_schema
        recommended: true
      state:
        name: state
        description: 'The provisioning state of the SCIM resource, normalized to the
          caption of the

          <code>state_id</code> value. In the case of <code>Other</code>, it is defined

          by the event source.'
      state_id:
        name: state_id
        description: The normalized state ID of the SCIM resource to reflect its activation
          status.
        range: ScimStateIdEnum
      uid:
        name: uid
        description: A unique identifier for a SCIM resource as defined by the service
          provider.
        recommended: true
      uid_alt:
        name: uid_alt
        description: 'A String that is an identifier for the resource as defined by
          the provisioning

          client. The <code>externalId</code> may simplify identification of a resource

          between the provisioning client and the service provider by allowing the
          client

          to use a filter to locate the resource with an identifier from the provisioning

          domain, obviating the need to store a local mapping between the provisioning

          domain''s identifier of the resource and the identifier used by the service

          provider.'
      url_string:
        name: url_string
        description: The primary URL for SCIM API requests.
      vendor_name:
        name: vendor_name
        description: 'Name of the vendor or service provider implementing SCIM. E.g.,

          <code>Okta</code>, <code>Auth0</code>, <code>Microsoft</code>.'
      version:
        name: version
        description: SCIM protocol version supported e.g., <code>SCIM 2.0</code>.
        recommended: true
    class_uri: ocsf:Scim
  Script:
    name: Script
    definition_uri: https://w3id.org/lmodel/ocsf/Script
    description: 'The Script object describes a script or command that can be executed
      by a

      shell, script engine, or interpreter. Examples include Bash, JavsScript,

      PowerShell, Python, VBScript, etc. Note that the term <em>script</em> here

      denotes not only a script contained within a file but also a script or command

      typed interactively by a user, supplied on the command line, or provided by

      some other file-less mechanism.'
    notes:
    - "D3FEND\u2122 Ontology d3f:ExecutableScript. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:ExecutableScript/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:ExecutableScript/
    aliases:
    - Script
    is_a: Object
    slots:
    - Script_file
    - Script_hashes
    - Script_name
    - Script_parent_uid
    - Script_script_content
    - Script_type
    - Script_type_id
    - Script_uid
    slot_usage:
      file:
        name: file
        description: 'Present if this script is associated with a file. Not present
          in the case of a

          file-less script.'
      hashes:
        name: hashes
        description: 'An array of the script''s cryptographic hashes. Note that these
          hashes are

          calculated on the script in its original encoding, and not on the normalized

          UTF-8 encoding found in the <code>script_content</code> attribute.'
        recommended: true
      name:
        name: name
        description: 'Unique identifier for the script or macro, independent of the
          containing file,

          used for tracking, auditing, and security analysis.'
      parent_uid:
        name: parent_uid
        description: 'This attribute relates a sub-script to a parent script having
          the matching

          <code>uid</code> attribute. In the case of PowerShell, sub-script execution
          can

          be identified by matching the activity correlation ID of the raw ETW events

          provided by the OS.'
      script_content:
        name: script_content
        required: true
      type:
        name: type
        description: 'The script type, normalized to the caption of the <code>type_id</code>
          value.

          In the case of ''Other'', it is defined by the event source.'
      type_id:
        name: type_id
        description: The normalized script type ID.
        range: ScriptTypeIdEnum
        required: true
      uid:
        name: uid
        description: 'Some script engines assign a unique ID to each individual execution
          of a given

          script. This attribute captures that unique ID. In the case of PowerShell,
          the

          unique ID corresponds to the <code>ScriptBlockId</code> in the raw ETW events

          provided by the OS.'
    class_uri: ocsf:Script
  SecurityState:
