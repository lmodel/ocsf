    - Evidences_uid
    slot_usage:
      actor:
        name: actor
        description: 'Describes details about the user/role/process that was the source
          of the

          activity that triggered the detection.'
        recommended: true
      api:
        name: api
        description: 'Describes details about the API call associated to the activity
          that triggered

          the detection.'
        recommended: true
      connection_info:
        name: connection_info
        description: 'Describes details about the network connection associated to
          the activity that

          triggered the detection.'
        recommended: true
      container:
        name: container
        description: 'Describes details about the container associated to the activity
          that triggered

          the detection.'
        recommended: true
      data:
        name: data
        description: 'Additional evidence data that is not accounted for in the specific
          evidence

          attributes.<code> Use only when absolutely necessary.</code>'
      database:
        name: database
        description: 'Describes details about the database associated to the activity
          that triggered

          the detection.'
        recommended: true
      databucket:
        name: databucket
        description: 'Describes details about the databucket associated to the activity
          that

          triggered the detection.'
        recommended: true
      device:
        name: device
        description: 'An addressable device, computer system or host associated to
          the activity that

          triggered the detection.'
        recommended: true
      dst_endpoint:
        name: dst_endpoint
        description: 'Describes details about the destination of the network activity
          that triggered

          the detection.'
        recommended: true
      email:
        name: email
        description: The email object associated to the activity that triggered the
          detection.
        recommended: true
      file:
        name: file
        description: 'Describes details about the file associated to the activity
          that triggered the

          detection.'
        recommended: true
      http_request:
        name: http_request
        description: 'Describes details about the http request associated to the activity
          that

          triggered the detection.'
        recommended: true
      http_response:
        name: http_response
        description: 'Describes details about the http response associated to the
          activity that

          triggered the detection.'
        recommended: true
      ja4_fingerprint_list:
        name: ja4_fingerprint_list
        description: Describes details about the JA4+ fingerprints that triggered
          the detection.
        recommended: true
      job:
        name: job
        description: 'Describes details about the scheduled job that was associated
          with the activity

          that triggered the detection.'
        recommended: true
      name:
        name: name
        description: 'The naming convention or type identifier of the evidence associated
          with the

          security detection. For example, the <code>@odata.type</code> from Microsoft

          Graph Alerts V2 or <code>display_name</code> from CrowdStrike Falcon Incident

          Behaviors.'
      process:
        name: process
        description: 'Describes details about the process associated to the activity
          that triggered

          the detection.'
        recommended: true
      query:
        name: query
        description: 'Describes details about the DNS query associated to the activity
          that triggered

          the detection.'
        recommended: true
      resources:
        name: resources
        description: 'Describes details about the cloud resources directly related
          to activity that

          triggered the detection. For resources impacted by the detection, use

          <code>Affected Resources</code> at the top-level of the finding.'
        recommended: true
      script:
        name: script
        description: 'Describes details about the script that was associated with
          the activity that

          triggered the detection.'
        recommended: true
      src_endpoint:
        name: src_endpoint
        description: 'Describes details about the source of the network activity that
          triggered the

          detection.'
        recommended: true
      tls:
        name: tls
        description: 'Describes details about the Transport Layer Security (TLS) activity
          that

          triggered the detection.'
        recommended: true
      uid:
        name: uid
        description: 'The unique identifier of the evidence associated with the security
          detection.

          For example, the <code>activity_id</code> from CrowdStrike Falcon Alerts
          or

          <code>behavior_id</code> from CrowdStrike Falcon Incident Behaviors.'
      url:
        name: url
        description: 'The URL object that pertains to the event or object associated
          to the activity

          that triggered the detection.'
        recommended: true
      user:
        name: user
        description: 'Describes details about the user that was the target or somehow
          else associated

          with the activity that triggered the detection.'
        recommended: true
      verdict:
        name: verdict
        description: The normalized verdict of the evidence associated with the security
          detection.
      verdict_id:
        name: verdict_id
        description: 'The normalized verdict (or status) ID of the evidence associated
          with the

          security detection. For example, Microsoft Graph Security Alerts contain
          a

          <code>verdict</code> enumeration for each type of <code>evidence</code>

          associated with the Alert. This is typically set by an automated investigation

          process or an analyst/investigator assigned to the finding.'
        range: EvidencesVerdictIdEnum
    class_uri: ocsf:Evidences
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            actor:
              name: actor
              required: true
        - slot_conditions:
            api:
              name: api
              required: true
        - slot_conditions:
            connection_info:
              name: connection_info
              required: true
        - slot_conditions:
            data:
              name: data
              required: true
        - slot_conditions:
            database:
              name: database
              required: true
        - slot_conditions:
            databucket:
              name: databucket
              required: true
        - slot_conditions:
            device:
              name: device
              required: true
        - slot_conditions:
            dst_endpoint:
              name: dst_endpoint
              required: true
        - slot_conditions:
            email:
              name: email
              required: true
        - slot_conditions:
            file:
              name: file
              required: true
        - slot_conditions:
            process:
              name: process
              required: true
        - slot_conditions:
            query:
              name: query
              required: true
        - slot_conditions:
            resources:
              name: resources
              required: true
        - slot_conditions:
            src_endpoint:
              name: src_endpoint
              required: true
        - slot_conditions:
            url:
              name: url
              required: true
        - slot_conditions:
