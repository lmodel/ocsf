        name: traffic
        annotations:
          group:
            tag: group
            value: context
        description: 'Traffic refers to the amount of data transmitted from a Unmanned
          Aerial System

          (UAS) or Counter Unmanned Aerial System (UAS) (CUAS) system at a given point
          of

          time. Ex: <code>bytes_in</code> and <code>bytes_out</code>.'
      unmanned_aerial_system:
        name: unmanned_aerial_system
        annotations:
          group:
            tag: group
            value: primary
        required: true
      unmanned_system_operating_area:
        name: unmanned_system_operating_area
        annotations:
          group:
            tag: group
            value: primary
        recommended: true
      unmanned_system_operator:
        name: unmanned_system_operator
        annotations:
          group:
            tag: group
            value: primary
        required: true
