    name: EmailActivityDirectionIdEnum
    definition_uri: https://w3id.org/lmodel/ocsf/EmailActivityDirectionIdEnum
    description: '<p>The direction of the email relative to the scanning host or

      organization.</p>Email scanned at an internet gateway might be characterized
      as

      inbound to the organization from the Internet, outbound from the organization

      to the Internet, or internal within the organization. Email scanned at a

      workstation might be characterized as inbound to, or outbound from the

      workstation.'
    from_schema: https://w3id.org/lmodel/ocsf/enums
    permissible_values:
      UNKNOWN:
        text: UNKNOWN
        description: The email direction is unknown.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '0'
          caption:
            tag: caption
            value: Unknown
      INBOUND:
        text: INBOUND
        description: 'Email Inbound, from the Internet or outside network destined
          for an entity

          inside network.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '1'
          caption:
            tag: caption
            value: Inbound
      OUTBOUND:
        text: OUTBOUND
        description: Email Outbound, from inside the network destined for an entity
          outside network.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '2'
          caption:
            tag: caption
            value: Outbound
      INTERNAL:
        text: INTERNAL
        description: Email Internal, from inside the network destined for an entity
          inside network.
