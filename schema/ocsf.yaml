    - https://d3fend.mitre.org/dao/artifact/d3f:Email/
    aliases:
    - Email
    exact_mappings:
    - stix:EmailMessage
    - uco_master:EmailMessage
    is_a: Object
    mixins:
    - DataClassificationProfile
    slots:
    - cc
    - cc_mailboxes
    - Email_delivered_to
    - delivered_to_list
    - Email_files
    - Email_from_
    - from_list
    - from_mailbox
    - from_mailboxes
    - http_headers
    - is_read
    - Email_message_uid
    - raw_header
    - Email_reply_to
    - reply_to_list
    - reply_to_mailboxes
    - return_path
    - sender
    - sender_mailbox
    - Email_size
    - Email_smtp_from
    - Email_smtp_to
    - Email_subject
    - Email_to
    - to_mailboxes
    - Email_uid
    - Email_urls
    - x_originating_ip
    - DataClassificationProfile_data_classification
    - DataClassificationProfile_data_classifications
    slot_usage:
      delivered_to:
        name: delivered_to
        deprecated: Use the <code> delivered_to_list </code> attribute instead.
      files:
        name: files
        description: The files embedded or attached to the email.
      from_:
        name: from_
        recommended: true
      message_uid:
        name: message_uid
        recommended: true
      reply_to:
        name: reply_to
        deprecated: Use the <code> reply_to_list </code> attribute instead.
        recommended: true
      size:
        name: size
        description: The size in bytes of the email, including attachments.
        recommended: true
      smtp_from:
        name: smtp_from
        deprecated: Use the <code> from </code> attribute instead.
        recommended: true
      smtp_to:
        name: smtp_to
        deprecated: Use the <code> to </code> attribute instead.
        recommended: true
      subject:
        name: subject
        description: The email header Subject value, as defined by RFC 5322.
        recommended: true
      to:
        name: to
        recommended: true
      uid:
        name: uid
        description: The unique identifier of the email thread.
        recommended: true
      urls:
        name: urls
        description: The URLs embedded in the email.
    class_uri: ocsf:Email
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            from_:
              name: from_
              required: true
        - slot_conditions:
            to:
              name: to
              required: true
      description: 'OCSF at_least_one: at least one of [''from_'', ''to''] must be
        set.'
