    definition_uri: https://w3id.org/lmodel/ocsf/DnsAnswer
    description: 'The DNS Answer object represents a specific response provided by
      the Domain

      Name System (DNS) when querying for information about a domain or performing
      a

      DNS operation. It encapsulates the relevant details and data returned by the

      DNS server in response to a query.'
    notes:
    - "D3FEND\u2122 Ontology d3f:InboundInternetDNSResponseTraffic. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:InboundInternetDNSResponseTraffic/"
