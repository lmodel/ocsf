    - StartupItem_name
    - StartupItem_process
    - StartupItem_run_mode_ids
    - StartupItem_run_modes
    - StartupItem_run_state
    - StartupItem_run_state_id
    - StartupItem_start_type
    - StartupItem_start_type_id
    - StartupItem_type
    - StartupItem_type_id
    slot_usage:
      driver:
        name: driver
        description: The startup item kernel driver resource.
      job:
        name: job
        description: The startup item job resource.
      name:
        name: name
        description: The unique name of the startup item.
        required: true
      process:
        name: process
        description: The startup item process resource.
      run_mode_ids:
        name: run_mode_ids
        description: 'The list of normalized identifiers that describe the startup
          items'' properties

          when it is running.  Use this field to capture extended information about
          the

          process, which may depend on the type of startup item.  E.g., A Windows
          service

          that interacts with the desktop.'
        range: StartupItemRunModeIdsEnum
      run_modes:
        name: run_modes
        description: 'The list of run_modes, normalized to the captions of the run_mode_id
          values.

          In the case of ''Other'', they are defined by the event source.'
      run_state:
        name: run_state
        description: The run state of the startup item.
      run_state_id:
        name: run_state_id
        description: The run state ID of the startup item.
        range: StartupItemRunStateIdEnum
        recommended: true
      start_type:
        name: start_type
        description: The start type of the startup item.
      start_type_id:
        name: start_type_id
        description: The start type ID of the startup item.
        required: true
      type:
        name: type
        description: The startup item type.
      type_id:
        name: type_id
        description: The startup item type identifier.
        range: StartupItemTypeIdEnum
        recommended: true
    class_uri: ocsf:StartupItem
    rules:
    - postconditions:
        exactly_one_of:
        - slot_conditions:
            driver:
              name: driver
              required: true
        - slot_conditions:
            job:
              name: job
              required: true
        - slot_conditions:
            process:
              name: process
              required: true
      description: 'OCSF just_one: exactly one of [''driver'', ''job'', ''process'']
        must be set.'
  ThreatActor:
    name: ThreatActor
    definition_uri: https://w3id.org/lmodel/ocsf/ThreatActor
    description: Threat actor is responsible for the observed malicious activity.
    in_subset:
