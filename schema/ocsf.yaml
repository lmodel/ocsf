        be set.'
  Timespan:
    name: Timespan
    definition_uri: https://w3id.org/lmodel/ocsf/Timespan
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["duration", "duration_days", "duration_hours",

          "duration_mins", "duration_months", "duration_secs", "duration_weeks",

          "duration_years", "end_time", "start_time"]}'
    description: 'The Time Span object represents different time period durations.
      If a timespan

      is fractional, i.e. crosses one period, e.g. a week and 3 days, more than one

      may be populated since each member is of integral type. In that case

      <code>type_id</code> if present should be set to <code>Other.</code><P>A

      timespan may also be defined by its time interval boundaries,

      <code>start_time</code> and <code>end_time</code>.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Time Span
    is_a: Object
    slots:
    - Timespan_duration
    - Timespan_duration_days
    - Timespan_duration_hours
    - Timespan_duration_mins
    - Timespan_duration_months
    - Timespan_duration_secs
    - Timespan_duration_weeks
    - Timespan_duration_years
    - Timespan_end_time
    - Timespan_start_time
    - Timespan_type
    - Timespan_type_id
    slot_usage:
      duration:
        name: duration
        description: The duration of the time span in milliseconds.
        recommended: true
      duration_days:
        name: duration_days
        description: The duration of the time span in days.
        recommended: true
      duration_hours:
        name: duration_hours
        description: The duration of the time span in hours.
        recommended: true
      duration_mins:
        name: duration_mins
        description: The duration of the time span in minutes.
        recommended: true
      duration_months:
        name: duration_months
        description: The duration of the time span in months.
        recommended: true
      duration_secs:
        name: duration_secs
        description: The duration of the time span in seconds.
        recommended: true
      duration_weeks:
        name: duration_weeks
        description: The duration of the time span in weeks.
        recommended: true
      duration_years:
        name: duration_years
        description: The duration of the time span in years.
        recommended: true
      end_time:
        name: end_time
        description: The end time or conclusion of the timespan's interval.
        recommended: true
      start_time:
        name: start_time
        description: The start time or beginning of the timespan's interval.
        recommended: true
      type:
        name: type
        description: The type of time span duration the object represents.
      type_id:
        name: type_id
        description: The normalized identifier for the time span duration type.
        range: TimespanTypeIdEnum
        recommended: true
    class_uri: ocsf:Timespan
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            duration:
              name: duration
              required: true
        - slot_conditions:
            duration_days:
              name: duration_days
              required: true
        - slot_conditions:
            duration_hours:
              name: duration_hours
              required: true
        - slot_conditions:
            duration_mins:
              name: duration_mins
              required: true
        - slot_conditions:
            duration_months:
              name: duration_months
              required: true
        - slot_conditions:
            duration_secs:
              name: duration_secs
              required: true
        - slot_conditions:
            duration_weeks:
              name: duration_weeks
              required: true
        - slot_conditions:
            duration_years:
              name: duration_years
              required: true
        - slot_conditions:
            end_time:
              name: end_time
              required: true
        - slot_conditions:
            start_time:
              name: start_time
              required: true
      description: 'OCSF at_least_one: at least one of [''duration'', ''duration_days'',

        ''duration_hours'', ''duration_mins'', ''duration_months'', ''duration_secs'',

        ''duration_weeks'', ''duration_years'', ''end_time'', ''start_time''] must
        be set.'
  Tls:
    name: Tls
    definition_uri: https://w3id.org/lmodel/ocsf/Tls
    description: 'The Transport Layer Security (TLS) object describes the negotiated
      TLS protocol

      used for secure communications over an establish network connection.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Transport Layer Security (TLS)
    is_a: Object
    slots:
    - alert
    - Tls_certificate
    - Tls_certificate_chain
    - Tls_cipher
    - Tls_client_ciphers
    - extension_list
    - handshake_dur
    - Tls_ja3_hash
    - Tls_ja3s_hash
    - key_length
    - Tls_sans
    - server_ciphers
    - Tls_sni
    - tls_extension_list
    - Tls_version
    slot_usage:
      certificate:
        name: certificate
        recommended: true
      certificate_chain:
        name: certificate_chain
        recommended: true
      cipher:
        name: cipher
        recommended: true
      client_ciphers:
        name: client_ciphers
        recommended: true
      ja3_hash:
        name: ja3_hash
        recommended: true
      ja3s_hash:
        name: ja3s_hash
        recommended: true
      sans:
        name: sans
        deprecated: Use <code>tls.certificate.sans</code> attribute instead.
      sni:
        name: sni
        recommended: true
      version:
        name: version
        description: The TLS protocol version.
        required: true
    class_uri: ocsf:Tls
  TlsExtension:
    name: TlsExtension
    definition_uri: https://w3id.org/lmodel/ocsf/TlsExtension
    description: 'The TLS Extension object describes additional attributes that extend
      the base

      Transport Layer Security (TLS) object.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - TLS Extension
    is_a: Object
    slots:
    - TlsExtension_data
    - TlsExtension_type
    - TlsExtension_type_id
    slot_usage:
      data:
        name: data
        description: The data contains information specific to the particular extension
          type.
        recommended: true
      type:
        name: type
        description: 'The TLS extension type. For example: <code>Server Name</code>.'
      type_id:
        name: type_id
        description: 'The TLS extension type identifier. See <a target=''_blank''

          href=''https://datatracker.ietf.org/doc/html/rfc8446#page-35''>The Transport

          Layer Security (TLS) extension page</a>.'
        range: TlsExtensionTypeIdEnum
        required: true
    class_uri: ocsf:TlsExtension
  Token:
    name: Token
    definition_uri: https://w3id.org/lmodel/ocsf/Token
    description: 'The Token object is the base object for representing tokens, API
      keys, and

      authentication credentials used across different contexts. This object provides

      common attributes for all token types, including protocol-specific

      authentication tokens (Kerberos, OIDC, SAML) and API/client tokens used for

      service authentication. When to use this object: Use the base

      <code>token</code> object directly in API activity events to represent API

      tokens, client tokens, or API keys used to authenticate API requests. Examples

      include: Okta API tokens, Microsoft Entra ID Application Registration client

      secrets, Stripe API keys, AWS API keys. When NOT to use this object: Do NOT
      use

      the base <code>token</code> object for protocol-specific authentication tokens

      in authentication events - use <code>authentication_token</code> instead (which

      extends this object). Do NOT use <code>token</code> for tracking credential

      lifecycle and usage patterns - use <code>programmatic_credential</code>

      instead.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Token
    is_a: Object
    slots:
    - Token_created_time
    - Token_expiration_time
    - Token_is_renewable
    - Token_modified_time
    - Token_name
    - Token_tenant_uid
    - Token_type
    - Token_type_id
    - Token_uid
    - Token_zone
    slot_usage:
      created_time:
        name: created_time
        description: The time that the token was created.
        recommended: true
      expiration_time:
        name: expiration_time
        description: The expiration time of the token.
      is_renewable:
        name: is_renewable
        description: Indicates whether the token is renewable.
      modified_time:
        name: modified_time
        description: The last time the token was updated.
      name:
        name: name
        description: 'The human-friendly name of a token or key, if available, such
          as the

          <code>name</code> from the Okta API Token API.'
      tenant_uid:
        name: tenant_uid
        description: 'The unique identifier of the tenant or organization that owns
          the token or key,

          or the tenant context in which the token is authorized for use. This is

          particularly relevant in multi-tenant Identity Provider scenarios where
          tokens

          are scoped to specific tenants.'
      type:
        name: type
        description: 'The type of the token, normalized to the caption of the <code>type_id</code>

          value. This indicates whether the token is a Client Token, API Token, or
          one of

          the protocol-specific token types.'
        recommended: true
      type_id:
        name: type_id
        description: 'The normalized token type identifier. Valid values: 0 (Unknown),
          1 (Ticket

          Granting Ticket - Kerberos), 2 (Service Ticket - Kerberos), 3 (Identity
          Token -

          OIDC), 4 (Refresh Token - OIDC), 5 (SAML Assertion), 6 (Client Token -

          IdP-issued), 7 (API Token - generic API keys), 99 (Other).'
        range: TokenTypeIdEnum
        recommended: true
      uid:
        name: uid
        description: 'The unique ID of a token or key, if available, such as the <code>Secret

          ID</code> of Entra ID Application Registration Client Secrets.'
      zone:
        name: zone
        description: 'The network zone or geographic region that the token or key
          is authorized to be

          used from. This may represent network-based access restrictions, geographic

          limitations, or other zone-based authorization policies. Examples include

          Okta''s network zone restrictions or cloud provider region restrictions.'
    class_uri: ocsf:Token
  Trace:
    name: Trace
    definition_uri: https://w3id.org/lmodel/ocsf/Trace
    description: 'The trace object contains information about a distributed trace,  which
      is

      crucial for observability. Traces are made up of one or more spans, which are

      individual units of work in application activity. Traces track the journey of
      a

      request as it moves through various services in a system, capturing key details

      like timing, status, and dependencies at each step. Traces provide insights

      into system performance, helping to identify latency, bottlenecks, and issues

      in complex, distributed environments.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Trace
    is_a: Object
    slots:
    - Trace_duration
    - Trace_end_time
    - Trace_flags
    - Trace_service
    - Trace_span
    - Trace_start_time
    - Trace_uid
    slot_usage:
      duration:
        name: duration
        description: 'The total time, in milliseconds, that the trace covers, calculated
          as the

          difference between start_time and end_time. This duration helps assess the

          overall performance of a request as it travels across various services,
          and is

          essential for identifying latency and potential bottlenecks within the

          distributed system. The trace duration may differ from individual span

          durations due to the propagation and processing times of the trace as it
          spans

          multiple components.'
      end_time:
        name: end_time
        description: 'The end timestamp of the trace, essential for identifying latency
          and

          performance bottlenecks. Like the start time, this timestamp is normalized

          across the trace system to ensure consistency, even when events are recorded

          across distributed services with unsynchronized clocks. Normalized time
          allows

          for accurate trace duration calculations and helps observability tools track

          overall performance across services, regardless of the individual system
          time

          settings.'
      flags:
        name: flags
        description: 'The flags associated with the trace, used to indicate specific
          properties or

          behaviors, such as whether the trace is sampled or if it has special handling.

          Flags help control how traces are processed, logged, and analyzed, providing

          valuable context for tracing and observability tools in identifying trace

          characteristics or specific tracking requirements.'
      service:
        name: service
        description: 'Identifies the service or component generating the trace, helping
          to track and

          correlate the flow of requests through various parts of a distributed system.

          This information is essential for understanding the role and performance
          of

          specific services within the broader context of system operations and for

          diagnosing issues across different components.'
      span:
        name: span
        description: 'Represents a single unit of work or operation within a distributed
          trace. A

          span typically tracks the execution of a request across a service, capturing

          important details such as the operation, timestamps, and status. Spans help

          break down the overall trace into smaller, manageable parts, enabling detailed

          analysis of the performance and behavior of specific operations within the

          system. They are crucial for understanding latency, dependencies, and

          bottlenecks in complex distributed systems.'
      start_time:
        name: start_time
        description: 'The start timestamp of the trace, essential for identifying
          latency and

          performance bottlenecks. Like the end time, this timestamp is normalized
          across

          the trace system to ensure consistency, even when events are recorded across

          distributed services with unsynchronized clocks. Normalized time enables

          accurate trace duration calculations and helps observability tools track

          performance across services, regardless of the individual system time settings.'
      uid:
        name: uid
        description: 'The unique identifier of the trace used in distributed systems
          and

          microservices architecture to track and correlate requests across various

          components of an application.'
        required: true
    class_uri: ocsf:Trace
  Url:
    name: Url
    definition_uri: https://w3id.org/lmodel/ocsf/Url
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["url_string", "path"]}'
      observable_id:
        tag: observable_id
        value: 23
    description: 'The Uniform Resource Locator (URL) object describes the characteristics
      of a

      URL.'
    notes:
    - "Defined in RFC 1738 \u2014 https://datatracker.ietf.org/doc/html/rfc1738"
    - "D3FEND\u2122 Ontology d3f:URL \u2014 https://d3fend.mitre.org/dao/artifact/d3f:URL/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://datatracker.ietf.org/doc/html/rfc1738
    - https://d3fend.mitre.org/dao/artifact/d3f:URL/
    aliases:
    - Uniform Resource Locator
    exact_mappings:
    - stix:Url
    - uco_master:URL
    is_a: Object
    slots:
    - categories
    - Url_category_ids
    - Url_domain
    - Url_hostname
    - Url_path
    - Url_port
    - Url_query_string
    - Url_resource_type
    - Url_scheme
    - subdomain
    - Url_url_string
    slot_usage:
      category_ids:
        name: category_ids
        recommended: true
      domain:
        name: domain
        description: 'The domain portion of the URL. For example: <code>example.com</code>
          in

          <code>https://sub.example.com</code>.'
      hostname:
        name: hostname
        description: 'The URL host as extracted from the URL. For example:

          <code>www.example.com</code> from

          <code>www.example.com/download/trouble</code>.'
        recommended: true
      path:
        name: path
        description: 'The URL path as extracted from the URL. For example:

          <code>/download/trouble</code> from

          <code>www.example.com/download/trouble</code>.'
        recommended: true
      port:
        name: port
        description: 'The URL port. For example: <code>80</code>.'
        recommended: true
      query_string:
        name: query_string
        recommended: true
      resource_type:
        name: resource_type
        description: The context in which a resource was retrieved in a web request.
      scheme:
        name: scheme
        recommended: true
      url_string:
        name: url_string
        description: 'The URL string. See RFC 1738. For example:

          <code>http://www.example.com/download/trouble.exe</code>. Note: The URL
          path

          should not populate the URL string.'
        recommended: true
    class_uri: ocsf:Url
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            url_string:
              name: url_string
              required: true
        - slot_conditions:
            path:
              name: path
              required: true
      description: 'OCSF at_least_one: at least one of [''url_string'', ''path'']
        must be set.'
  VendorAttributes:
    name: VendorAttributes
    definition_uri: https://w3id.org/lmodel/ocsf/VendorAttributes
    description: 'The Vendor Attributes object can be used to represent values of
      attributes

      populated by the Vendor/Finding Provider. It can help distinguish between the

      vendor-provided values and consumer-updated values, of key attributes like

      <code>severity_id</code>.<br>The original finding producer should not populate

      this object. It should be populated by consuming systems that support data

      mutability.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Vendor Attributes
    is_a: Object
    slots:
    - VendorAttributes_severity
    - VendorAttributes_severity_id
    slot_usage:
      severity:
        name: severity
        description: 'The finding severity, as reported by the Vendor (Finding Provider).
          The value

          should be normalized to the caption of the <code>severity_id</code> value.
          In

          the case of ''Other'', it is defined by the source.'
      severity_id:
        name: severity_id
        description: The finding severity ID, as reported by the Vendor (Finding Provider).
    class_uri: ocsf:VendorAttributes
  Vulnerability:
    name: Vulnerability
    definition_uri: https://w3id.org/lmodel/ocsf/Vulnerability
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"just_one": ["advisory", "cve", "cwe"]}'
    description: 'The vulnerability is an unintended characteristic of a computing
      component or

      system configuration that multiplies the risk of an adverse event or a loss

      occurring either due to accidental exposure, deliberate attack, or conflict

      with new system components.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Vulnerability Details
    exact_mappings:
    - stix:Vulnerability
    - core:Vulnerability
    close_mappings:
    - cve:CVERecord
    - kev_catalog:KevEntry
    - nvd:NVDEntry
    related_mappings:
    - capec:AttackPattern
    - cwe:Weakness
    is_a: Object
    slots:
    - advisory
    - affected_code
    - affected_packages
    - Vulnerability_category
    - Vulnerability_cve
    - Vulnerability_cwe
    - dependency_chain
    - Vulnerability_desc
    - exploit_last_seen_time
    - exploit_ref_url
    - exploit_requirement
    - exploit_type
    - Vulnerability_first_seen_time
    - fix_available
    - Vulnerability_fix_coverage
    - Vulnerability_fix_coverage_id
    - is_exploit_available
    - is_fix_available
    - Vulnerability_kb_article_list
    - kb_articles
    - Vulnerability_last_seen_time
    - packages
    - Vulnerability_references
    - related_vulnerabilities
    - Vulnerability_remediation
    - Vulnerability_severity
    - Vulnerability_title
    - Vulnerability_vendor_name
    slot_usage:
      category:
        name: category
        description: 'The category of a vulnerability or weakness, as reported by
          the source tool,

          such as <code>Container Security</code> or <code>Open Source Security</code>.'
      cve:
        name: cve
        description: 'Describes the Common Vulnerabilities and Exposures <a target=''_blank''

          href=''https://cve.mitre.org/''>(CVE)</a> details related to the vulnerability.'
        recommended: true
      cwe:
        name: cwe
        description: 'Describes the Common Weakness Enumeration <a target=''_blank''

          href=''https://cwe.mitre.org/''>(CWE)</a> details related to the vulnerability.'
        recommended: true
      desc:
        name: desc
        description: The description of the vulnerability.
      first_seen_time:
        name: first_seen_time
        description: The time when the vulnerability was first observed.
      fix_coverage:
        name: fix_coverage
        description: 'The fix coverage, normalized to the caption of the <code>fix_coverage_id</code>

          value.'
      fix_coverage_id:
        name: fix_coverage_id
        description: 'The normalized identifier for fix coverage, applicable to this
          vulnerability.

          Typically useful, when there are multiple affected packages but only a subset

          have available fixes.'
        range: VulnerabilityFixCoverageIdEnum
      kb_article_list:
        name: kb_article_list
        deprecated: Use <code>advisory</code> attribute instead.
      last_seen_time:
        name: last_seen_time
        description: The time when the vulnerability was most recently observed.
      references:
        name: references
        description: A list of reference URLs with additional information about the
          vulnerability.
        recommended: true
      remediation:
        name: remediation
        description: 'The remediation recommendations on how to mitigate the identified

          vulnerability.'
      severity:
        name: severity
        description: The vendor assigned severity of the vulnerability.
      title:
        name: title
        description: A title or a brief phrase summarizing the discovered vulnerability.
      vendor_name:
        name: vendor_name
        description: The name of the vendor that identified the vulnerability.
    class_uri: ocsf:Vulnerability
    rules:
    - postconditions:
        exactly_one_of:
        - slot_conditions:
            advisory:
              name: advisory
              required: true
        - slot_conditions:
            cve:
              name: cve
              required: true
        - slot_conditions:
            cwe:
              name: cwe
              required: true
      description: 'OCSF just_one: exactly one of [''advisory'', ''cve'', ''cwe'']
        must be set.'
  Whois:
    name: Whois
    definition_uri: https://w3id.org/lmodel/ocsf/Whois
    description: 'The resources of a WHOIS record for a given domain. This can include
      domain

      names, IP address blocks, autonomous system information, and/or contact and

      registration information for a domain.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - WHOIS
    exact_mappings:
    - uco_master:Whois
    is_a: Object
    slots:
    - Whois_autonomous_system
    - Whois_created_time
    - dnssec_status
    - Whois_dnssec_status_id
    - Whois_domain
    - Whois_domain_contacts
    - Whois_email_addr
    - isp
    - isp_org
    - Whois_last_seen_time
    - Whois_name_servers
    - Whois_phone_number
    - Whois_registrar
    - Whois_status
    - subdomains
    - Whois_subnet
    slot_usage:
      autonomous_system:
        name: autonomous_system
        description: The autonomous system information associated with a domain.
      created_time:
        name: created_time
        description: When the domain was registered or WHOIS entry was created.
        recommended: true
      dnssec_status_id:
        name: dnssec_status_id
        recommended: true
      domain:
        name: domain
        description: The domain name corresponding to the WHOIS record.
        recommended: true
      domain_contacts:
        name: domain_contacts
        recommended: true
      email_addr:
        name: email_addr
        description: The email address for the registrar's abuse contact
      last_seen_time:
        name: last_seen_time
        description: When the WHOIS record was last updated or seen at.
        recommended: true
      name_servers:
        name: name_servers
        recommended: true
      phone_number:
        name: phone_number
        description: The phone number for the registrar's abuse contact
      registrar:
        name: registrar
        recommended: true
      status:
        name: status
        description: 'The status of a domain and its ability to be transferred, e.g.,

          <code>clientTransferProhibited</code>.'
        recommended: true
      subnet:
        name: subnet
        description: The IP address block (CIDR) associated with a domain.
    class_uri: ocsf:Whois
  Dns:
    name: Dns
    definition_uri: https://w3id.org/lmodel/ocsf/Dns
    description: 'The Domain Name System (DNS) object represents the shared information

      associated with the DNS query and answer objects.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - DNS
    close_mappings:
    - uco_master:DNSRecord
    is_a: Object
    slots:
    - Dns_class_
    - Dns_packet_uid
    - Dns_type
    slot_usage:
      class_:
        name: class_
        description: 'The class of resource records being queried. See <a target=''_blank''

          href=''https://www.rfc-editor.org/rfc/rfc1035.txt''>RFC1035</a>. For example:

          <code>IN</code>.'
        recommended: true
      packet_uid:
        name: packet_uid
        description: 'The DNS packet identifier assigned by the program that generated
          the query. The

          identifier is copied to the response.'
        recommended: true
      type:
        name: type
        description: 'The type of resource records being queried. See <a target=''_blank''

          href=''https://www.rfc-editor.org/rfc/rfc1035.txt''>RFC1035</a>. For example:
          A,

          AAAA, CNAME, MX, and NS.'
        recommended: true
    class_uri: ocsf:Dns
  Entity:
    name: Entity
    definition_uri: https://w3id.org/lmodel/ocsf/Entity
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["name", "uid"]}'
    description: 'The Entity object is an unordered collection of attributes, with
      a name and

      unique identifier. It serves as a base object that defines a set of attributes

      and default constraints available in all objects that extend it.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Entity
    is_a: Object
    slots:
    - Entity_name
    - Entity_uid
    slot_usage:
      name:
        name: name
        description: The name of the entity.
        recommended: true
      uid:
        name: uid
        description: The unique identifier of the entity.
        recommended: true
    class_uri: ocsf:Entity
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            uid:
              name: uid
              required: true
      description: 'OCSF at_least_one: at least one of [''name'', ''uid''] must be
        set.'
  Resource:
    name: Resource
    definition_uri: https://w3id.org/lmodel/ocsf/Resource
    description: 'The Resource object contains attributes that provide information
      about a

      particular resource. It serves as a base object, offering attributes that help

      identify and classify the resource effectively.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Resource
    is_a: Entity
    mixins:
    - DataClassificationProfile
    slots:
    - Resource_created_time
    - Resource_data
    - Resource_labels
    - Resource_modified_time
    - name
    - Resource_tags
    - Resource_type
    - uid
    - Resource_uid_alt
    - Resource_name
    - Resource_uid
    - DataClassificationProfile_data_classification
    - DataClassificationProfile_data_classifications
    slot_usage:
      created_time:
        name: created_time
        description: The time when the resource was created.
      data:
        name: data
        description: Additional data describing the resource.
      labels:
        name: labels
        description: The list of labels associated to the resource.
      modified_time:
        name: modified_time
        description: The time when the resource was last modified.
      name:
        name: name
        description: The name of the resource.
      tags:
        name: tags
        description: The list of tags; <code>{key:value}</code> pairs associated to
          the resource.
      type:
        name: type
        description: The resource type as defined by the event source.
      uid:
        name: uid
        description: The unique identifier of the resource.
      uid_alt:
        name: uid_alt
        description: The alternative unique identifier of the resource.
    class_uri: ocsf:Resource
  AccessAnalysisResult:
    name: AccessAnalysisResult
    definition_uri: https://w3id.org/lmodel/ocsf/AccessAnalysisResult
    description: 'The Access Analysis Result object describes access relationships
      and pathways

      between identities, resources, focusing on who can access what and through

      which mechanisms. This evaluates access levels (read/write/admin), access types

      (direct, cross-account, public, federated), and the conditions under which

      access is granted. Use this for resource-centric security assessments such as

      external access discovery, public exposure analysis, etc.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Access Analysis Result
    is_a: Object
    slots:
    - AccessAnalysisResult_access_level
    - AccessAnalysisResult_access_type
    - AccessAnalysisResult_accessors
    - AccessAnalysisResult_additional_restrictions
    - AccessAnalysisResult_condition_keys
    - AccessAnalysisResult_granted_privileges
    slot_usage:
      access_level:
        name: access_level
        description: 'The generalized access level or permission scope granted to
          the identity

          through the analyzed policy configuration. Common examples include Read,
          Write,

          List, Delete, Admin, or custom permission levels.'
        recommended: true
      access_type:
        name: access_type
        description: 'The type or category of access being granted to the identity.
          This describes

          the nature of the access relationship, such as cross-account access, public

          access, federated access, or third-party integration access. Examples include

          ''Cross-Account'', ''Public'', ''Federated'', ''Service-to-Service'', etc.'
      accessors:
        name: accessors
        description: 'The identities that are granted access through the analyzed
          policy

          configuration. This identifies the specific entity that can exercise the

          permissions and helps assess the access relationship and potential security

          implications. Examples include user accounts, service principals, roles,

          account identifiers, or system identities.'
        required: true
      additional_restrictions:
        name: additional_restrictions
        description: 'Details about supplementary restrictions and guardrails that
          may limit the

          granted access, applied through additional policy types such as Resource

          Control Policies (RCPs) and Service Control Policies (SCPs) in AWS, or other

          policy constraints.'
      condition_keys:
        name: condition_keys
        description: 'The condition keys and their values that constrain when and
          how the granted

          access can be exercised. These conditions define the circumstances under
          which

          the access relationship is valid and the privileges can be used. Examples:
          IP

          address restrictions like ''aws:SourceIp:192.0.2.0/24'', time-based constraints

          like ''aws:RequestedRegion:us-east-1'', MFA requirements like

          ''aws:MultiFactorAuthPresent:true'', or custom conditions based on resource
          tags

          and request context.'
      granted_privileges:
        name: granted_privileges
        description: 'The specific privileges, actions, or permissions that are granted
          through the

          analyzed access relationship. This includes the actual operations that the

          accessor can perform on the target resource. Examples: AWS actions like

          ''sts:AssumeRole'', ''s3:GetObject'', ''ec2:DescribeInstances''; Azure actions
          like

          ''Microsoft.Storage/storageAccounts/read''; or GCP permissions like

          ''storage.objects.get''.'
    class_uri: ocsf:AccessAnalysisResult
  Account:
    name: Account
    definition_uri: https://w3id.org/lmodel/ocsf/Account
    description: 'The Account object contains details about the account that initiated
      or

      performed a specific activity within a system or application. Additionally,
      the

      Account object refers to logical Cloud and Software-as-a-Service (SaaS) based

      containers such as AWS Accounts, Azure Subscriptions, Oracle Cloud

      Compartments, Google Cloud Projects, and otherwise.'
    notes:
    - "D3FEND\u2122 Ontology d3f:UserAccount. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:UserAccount/"
    - "D3FEND\u2122 Ontology d3f:CloudUserAccount. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:CloudUserAccount/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:UserAccount/
    - https://d3fend.mitre.org/dao/artifact/d3f:CloudUserAccount/
    aliases:
    - Account
    close_mappings:
    - stix:UserAccount
    - uco_master:Account
    is_a: Entity
    slots:
    - Account_is_disabled
    - Account_is_locked
    - is_on_premises_sync_enabled
    - Account_labels
    - name
    - Account_tags
    - Account_type
    - Account_type_id
    - uid
    - Account_name
    - Account_uid
    slot_usage:
      is_disabled:
        name: is_disabled
        description: Indicates if the account is disabled.
      is_locked:
        name: is_locked
        description: 'Indicates if the account is locked. For example, due to the
          amount of failed

          logins.'
      labels:
        name: labels
        description: The list of labels associated to the account.
      name:
        name: name
        description: 'The name of the account (e.g. <code> GCP Project name </code>,
          <code> Linux

          Account name </code> or <code> AWS Account name</code>).'
      tags:
        name: tags
        description: The list of tags; <code>{key:value}</code> pairs associated to
          the account.
      type:
        name: type
        description: 'The account type, normalized to the caption of ''account_type_id''.
          In the case

          of ''Other'', it is defined by the event source.'
      type_id:
        name: type_id
        description: The normalized account type identifier.
        range: AccountTypeIdEnum
        recommended: true
      uid:
        name: uid
        description: 'The unique identifier of the account (e.g. <code> AWS Account
          ID </code>,

          <code> OCID </code>, <code> GCP Project ID </code>, <code> Azure Subscription

          ID </code>, <code> Google Workspace Customer ID </code>, or <code> M365
          Tenant

          UID</code>).'
    class_uri: ocsf:Account
  Actor:
    name: Actor
    definition_uri: https://w3id.org/lmodel/ocsf/Actor
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["process", "user", "invoked_by", "session", "app_name",

          "app_uid"]}'
    description: 'The Actor object contains details about the user, role, application,
      service,

      or process that initiated or performed a specific activity. Note that Actor
      is

      not the threat actor of a campaign but may be part of a campaign.'
    notes:
    - "D3FEND\u2122 Ontology d3f:Agent. \u2014 https://next.d3fend.mitre.org/agent/d3f:Agent/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://next.d3fend.mitre.org/agent/d3f:Agent/
    aliases:
    - Actor
    is_a: Object
    slots:
    - Actor_app_name
    - Actor_app_uid
    - authorizations
    - idp
    - Actor_invoked_by
    - Actor_process
    - Actor_session
    - Actor_user
    slot_usage:
      app_name:
        name: app_name
        description: 'The client application or service that initiated the activity.
          This can be in

          conjunction with the <code>user</code> if present.  Note that

          <code>app_name</code> is distinct from the <code>process</code> if present.'
      app_uid:
        name: app_uid
        description: 'The unique identifier of the client application or service that
          initiated the

          activity. This can be in conjunction with the <code>user</code> if present.

          Note that <code>app_name</code> is distinct from the <code>process.pid</code>

          or <code>process.uid</code> if present.'
      invoked_by:
        name: invoked_by
        deprecated: Use <code> app_name, app_uid </code> attributes instead.
      process:
        name: process
        description: The process that initiated the activity.
        recommended: true
      session:
        name: session
        description: The user session from which the activity was initiated.
      user:
        name: user
        description: 'The user that initiated the activity or the user context from
          which the

          activity was initiated.'
        recommended: true
    class_uri: ocsf:Actor
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            process:
              name: process
              required: true
        - slot_conditions:
            user:
              name: user
              required: true
        - slot_conditions:
            invoked_by:
              name: invoked_by
              required: true
        - slot_conditions:
            session:
              name: session
              required: true
        - slot_conditions:
            app_name:
              name: app_name
              required: true
        - slot_conditions:
            app_uid:
              name: app_uid
              required: true
      description: 'OCSF at_least_one: at least one of [''process'', ''user'', ''invoked_by'',
        ''session'',

        ''app_name'', ''app_uid''] must be set.'
  AdditionalRestriction:
    name: AdditionalRestriction
    definition_uri: https://w3id.org/lmodel/ocsf/AdditionalRestriction
    description: 'The Additional Restriction object describes supplementary access
      controls and

      guardrails that constrain or limit granted permissions beyond the primary

      policy. These restrictions are typically applied through hierarchical policy

      frameworks, organizational controls, or conditional access mechanisms. Examples

      include AWS Service Control Policies (SCPs), Resource Control Policies (RCPs),

      Azure Management Group policies, GCP Organization policies, conditional access

      policies, IP restrictions, time-based constraints, and MFA requirements.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Additional Restriction
    is_a: Object
    slots:
    - AdditionalRestriction_policy
    - AdditionalRestriction_status
    - AdditionalRestriction_status_id
    slot_usage:
      policy:
        name: policy
        description: 'Detailed information about the policy document that defines
          this restriction,

          including policy metadata, type, scope, and the specific rules or conditions

          that implement the access control.'
        required: true
      status:
        name: status
        description: 'The current status of the policy restriction, normalized to
          the caption of the

          <code>status_id</code> enum value.'
      status_id:
        name: status_id
        description: 'The normalized status identifier indicating the applicability
          of this policy

          restriction.'
        range: AdditionalRestrictionStatusIdEnum
        recommended: true
    class_uri: ocsf:AdditionalRestriction
  Advisory:
    name: Advisory
    definition_uri: https://w3id.org/lmodel/ocsf/Advisory
    description: 'The Advisory object represents publicly disclosed cybersecurity
      vulnerabilities

      defined in a Security advisory. e.g. <code> Microsoft KB Article</code>,

      <code>Apple Security Advisory</code>, or a <code>GitHub Security Advisory

      (GHSA)</code>'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Advisory
    close_mappings:
    - cve:CnaPublishedContainer
    is_a: Object
    slots:
    - Advisory_avg_timespan
    - Advisory_bulletin
    - Advisory_classification
    - Advisory_created_time
    - Advisory_desc
    - Advisory_install_state
    - Advisory_install_state_id
    - Advisory_is_superseded
    - Advisory_modified_time
    - Advisory_os
    - Advisory_product
    - Advisory_references
    - Advisory_related_cves
    - Advisory_related_cwes
    - Advisory_size
    - Advisory_src_url
    - Advisory_title
    - Advisory_uid
    slot_usage:
      avg_timespan:
        name: avg_timespan
        description: The average time to patch.
      bulletin:
        name: bulletin
        description: The Advisory bulletin identifier.
      classification:
        name: classification
        description: The vendors classification of the Advisory.
      created_time:
        name: created_time
        description: The time when the Advisory record was created.
        recommended: true
      desc:
        name: desc
        description: A brief description of the Advisory Record.
      install_state:
        name: install_state
        description: The install state of the Advisory.
        recommended: true
      install_state_id:
        name: install_state_id
        description: The normalized install state ID of the Advisory.
        recommended: true
      is_superseded:
        name: is_superseded
        description: The Advisory has been replaced by another.
      modified_time:
        name: modified_time
        description: The time when the Advisory record was last updated.
      os:
        name: os
        description: The operating system the Advisory applies to.
        recommended: true
      product:
        name: product
        description: The product where the vulnerability was discovered.
      references:
        name: references
        description: 'A list of reference URLs with additional information about the
          vulnerabilities

          disclosed in the Advisory.'
        recommended: true
      related_cves:
        name: related_cves
        description: 'A list of Common Vulnerabilities and Exposures <a target=''_blank''

          href=''https://cve.mitre.org/''>(CVE)</a> identifiers related to the

          vulnerabilities disclosed in the Advisory.'
      related_cwes:
        name: related_cwes
        description: 'A list of Common Weakness Enumeration <a target=''_blank''

          href=''https://cwe.mitre.org/''>(CWE)</a> identifiers related to the

          vulnerabilities disclosed in the Advisory.'
      size:
        name: size
        description: The size in bytes for the Advisory. Usually populated for a KB
          Article patch.
      src_url:
        name: src_url
        description: The Advisory link from the source vendor.
      title:
        name: title
        description: A title or a brief phrase summarizing the Advisory.
        recommended: true
      uid:
        name: uid
        description: 'The unique identifier assigned to the advisory or disclosed
          vulnerability, e.g,

          <code>GHSA-5mrr-rgp6-x4gr</code>.'
        required: true
    class_uri: ocsf:Advisory
  AffectedCode:
    name: AffectedCode
    definition_uri: https://w3id.org/lmodel/ocsf/AffectedCode
    description: 'The Affected Code object describes details about a code block identified
      as

      vulnerable.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Affected Code
    close_mappings:
    - cwe:DemonstrativeExample
    related_mappings:
    - core:Product
    is_a: Object
    slots:
    - AffectedCode_end_column
    - AffectedCode_end_line
    - AffectedCode_file
    - AffectedCode_owner
    - remediation
    - AffectedCode_rule
    - AffectedCode_start_column
    - AffectedCode_start_line
    slot_usage:
      end_column:
        name: end_column
        description: 'The column number of the last part of the assessed code identified
          as

          vulnerable.'
        recommended: true
      end_line:
        name: end_line
        recommended: true
      file:
        name: file
        description: Details about the file that contains the affected code block.
        required: true
      owner:
        name: owner
        description: Details about the user that owns the affected file.
      rule:
        name: rule
        description: 'Details about the specific rule, e.g., those defined as part
          of a larger

          <code>policy</code>, that triggered the finding.'
        recommended: true
      start_column:
        name: start_column
        description: 'The column number of the first part of the assessed code identified
          as

          vulnerable.'
        recommended: true
      start_line:
        name: start_line
        recommended: true
    class_uri: ocsf:AffectedCode
  AffectedPackage:
    name: AffectedPackage
    definition_uri: https://w3id.org/lmodel/ocsf/AffectedPackage
    description: 'The Affected Package object describes details about a software package

      identified as affected by a vulnerability/vulnerabilities.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Affected Software Package
    exact_mappings:
    - cve:AffectedProduct
    close_mappings:
    - nvd:CPEMatch
    - core:Product
    is_a: Package
    slots:
    - Package_architecture
    - cpe_name
    - epoch
    - Package_hash
    - Package_license
    - license_url
    - Package_name
    - package_manager
    - package_manager_url
    - purl
    - release
    - Package_src_url
    - Package_type
    - Package_type_id
    - Package_uid
    - Package_vendor_name
    - Package_version
    - fixed_in_version
    - AffectedPackage_path
    - remediation
    slot_usage:
      path:
        name: path
        description: The installation path of the affected package.
    class_uri: ocsf:AffectedPackage
  Agent:
    name: Agent
    definition_uri: https://w3id.org/lmodel/ocsf/Agent
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["uid", "name"]}'
    description: 'An Agent (also known as a Sensor) is typically installed on an Operating
      System

      (OS) and serves as a specialized software component that can be designed to

      monitor, detect, collect, archive, or take action. These activities and

      possible actions are defined by the upstream system controlling the Agent and

      its intended purpose. For instance, an Agent can include Endpoint Detection
      &

      Response (EDR) agents, backup/disaster recovery sensors, Application

      Performance Monitoring or profiling sensors, and similar software.'
    notes:
    - "D3FEND\u2122 Ontology d3f:Sensor. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:Sensor/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:Sensor/
    aliases:
    - Agent
    is_a: Object
    slots:
    - Agent_name
    - Agent_policies
    - Agent_type
    - Agent_type_id
    - Agent_uid
    - Agent_uid_alt
    - Agent_vendor_name
    - Agent_version
    slot_usage:
      name:
        name: name
        description: 'The name of the agent or sensor. For example: <code>AWS SSM
          Agent</code>.'
        recommended: true
      policies:
        name: policies
        description: 'Describes the various policies that may be applied or enforced
          by an agent or

          sensor. E.g., Conditional Access, prevention, auto-update, tamper protection,

          destination configuration, etc.'
      type:
        name: type
        description: 'The normalized caption of the type_id value for the agent or
          sensor. In the

          case of ''Other'' or ''Unknown'', it is defined by the event source.'
      type_id:
        name: type_id
        description: 'The normalized representation of an agent or sensor. E.g., EDR,
          vulnerability

          management, APM, backup & recovery, etc.'
        range: AgentTypeIdEnum
        recommended: true
      uid:
        name: uid
        description: 'The UID of the agent or sensor, sometimes known as a Sensor
          ID or

          <code>aid</code>.'
        recommended: true
      uid_alt:
        name: uid_alt
        description: 'An alternative or contextual identifier for the agent or sensor,
          such as a

          configuration, organization, or license UID.'
      vendor_name:
        name: vendor_name
        description: 'The company or author who created the agent or sensor. For example:

          <code>Crowdstrike</code>.'
      version:
        name: version
        description: The semantic version of the agent or sensor, e.g., <code>7.101.50.0</code>.
    class_uri: ocsf:Agent
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            uid:
              name: uid
              required: true
        - slot_conditions:
            name:
              name: name
              required: true
      description: 'OCSF at_least_one: at least one of [''uid'', ''name''] must be
        set.'
  AiModel:
    name: AiModel
    definition_uri: https://w3id.org/lmodel/ocsf/AiModel
    description: 'The AI Model object describes the characteristics of an AI/ML model.
      Examples

      include language models like GPT-4, embedding models like

      text-embedding-ada-002, and computer vision models like CLIP.'
    notes:
    - "AI Model Registry and Documentation Standards \u2014\nhttps://huggingface.co/docs/hub/models"
    - "OpenAI Model Documentation \u2014 https://platform.openai.com/docs/models"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://huggingface.co/docs/hub/models
    - https://platform.openai.com/docs/models
    aliases:
    - AI Model
    is_a: Entity
    slots:
    - AiModel_ai_provider
    - name
    - uid
    - AiModel_version
    - AiModel_name
    - AiModel_uid
    slot_usage:
      ai_provider:
        name: ai_provider
        description: 'AI service provider or organization name. For example: <code>OpenAI</code>,

          <code>Anthropic</code>, <code>Google</code>, or <code>Internal</code>.'
        required: true
      name:
        name: name
        description: 'Human-readable model name. For example: <code>gpt-4o</code>,

          <code>claude-3-sonnet</code>, or <code>text-embedding-ada-002</code>.'
        required: true
      uid:
        name: uid
        description: The unique identifier of the AI model.
      version:
        name: version
        description: 'Model version identifier. For example: <code>2024-05-13</code>,

          <code>v2.1.0</code>, or <code>beta</code>.'
        recommended: true
    class_uri: ocsf:AiModel
  Aircraft:
    name: Aircraft
    definition_uri: https://w3id.org/lmodel/ocsf/Aircraft
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["name", "serial_number", "uid", "uid_alt"]}'
    description: 'The Aircraft object represents any aircraft or otherwise airborne
      asset such as

      an unmanned system, airplane, balloon, spacecraft, or otherwise. The Aircraft

      object is intended to normalized data captured or otherwise logged from active

      radar, passive radar, multi-spectral systems, or the Automatic Dependant

      Broadcast - Surveillance (ADS-B), and/or Mode S systems.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Aircraft
    is_a: Entity
    slots:
    - Aircraft_location
    - Aircraft_model
    - name
    - Aircraft_serial_number
    - speed
    - speed_accuracy
    - track_direction
    - uid
    - Aircraft_uid_alt
    - vertical_speed
    - Aircraft_name
    - Aircraft_uid
    slot_usage:
      location:
        name: location
        recommended: true
      model:
        name: model
        description: The model name of the aircraft or unmanned system.
      name:
        name: name
        description: The name of the aircraft, such as the such as the flight name
          or callsign.
        recommended: true
      serial_number:
        name: serial_number
        description: The serial number of the aircraft.
      uid:
        name: uid
        description: 'The primary identification identifier for an aircraft, such
          as the 24-bit

          International Civil Aviation Organization (ICAO) identifier of the aircraft,
          as

          6 hex digits.'
        recommended: true
      uid_alt:
        name: uid_alt
        description: 'A secondary identification identifier for an aircraft, such
          as the 4-digit

          squawk (octal representation).'
    class_uri: ocsf:Aircraft
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            serial_number:
              name: serial_number
              required: true
        - slot_conditions:
            uid:
              name: uid
              required: true
        - slot_conditions:
            uid_alt:
              name: uid_alt
              required: true
      description: 'OCSF at_least_one: at least one of [''name'', ''serial_number'',
        ''uid'', ''uid_alt'']

        must be set.'
  Analytic:
    name: Analytic
    definition_uri: https://w3id.org/lmodel/ocsf/Analytic
    description: 'The Analytic object contains details about the analytic technique
      used to

      analyze and derive insights from the data or information that led to the

      creation of a finding or conclusion.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Analytic
    is_a: Entity
    slots:
    - Analytic_algorithm
    - Analytic_category
    - Analytic_desc
    - name
    - Analytic_related_analytics
    - Analytic_state
    - Analytic_state_id
    - Analytic_type
    - Analytic_type_id
    - uid
    - Analytic_version
    - Analytic_name
    - Analytic_uid
    slot_usage:
      algorithm:
        name: algorithm
        description: The algorithm used by the underlying analytic to generate the
          finding.
      category:
        name: category
        description: The analytic category.
      desc:
        name: desc
        description: The description of the analytic that generated the finding.
      name:
        name: name
        description: The name of the analytic that generated the finding.
      related_analytics:
        name: related_analytics
        description: Other analytics related to this analytic.
        deprecated: 'Related Analytics has been decoupled from this object, instead
          use

          <code>finding_info.related_analytics</code>.'
      state:
        name: state
        description: The Analytic state.
      state_id:
        name: state_id
        description: The Analytic state identifier.
        range: AnalyticStateIdEnum
      type:
        name: type
        description: The analytic type.
      type_id:
        name: type_id
        description: The analytic type ID.
        range: AnalyticTypeIdEnum
        required: true
      uid:
        name: uid
        description: The unique identifier of the analytic that generated the finding.
      version:
        name: version
        description: 'The analytic version. For example: <code>1.1</code>.'
    class_uri: ocsf:Analytic
  Anomaly:
    name: Anomaly
    definition_uri: https://w3id.org/lmodel/ocsf/Anomaly
    description: 'Describes an anomaly or deviation detected in a system. Anomalies
      are

      unexpected activity patterns that could indicate potential issues needing

      attention.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Anomaly
    is_a: Object
    slots:
    - Anomaly_observation_parameter
    - Anomaly_observation_type
    - Anomaly_observations
    - Anomaly_observed_pattern
    slot_usage:
      observation_parameter:
        name: observation_parameter
        description: 'The specific parameter, metric or property where the anomaly
          was observed.

          Examples include: CPU usage percentage, API response time in milliseconds,
          HTTP

          error rate, memory utilization, network latency, transaction volume, etc.
          This

          helps identify the exact aspect of the system exhibiting anomalous behavior.'
        required: true
      observation_type:
        name: observation_type
        description: 'The type of analysis methodology used to detect the anomaly.
          This indicates how

          the anomaly was identified through different analytical approaches. Common

          types include: Frequency Analysis, Time Pattern Analysis, Volume Analysis,

          Sequence Analysis, Distribution Analysis, etc.'
        recommended: true
      observations:
        name: observations
        description: 'Details about the observed anomaly or observations that were
          flagged as

          anomalous compared to expected baseline behavior.'
        required: true
      observed_pattern:
        name: observed_pattern
        description: 'The specific pattern identified within the observation type.
          For Frequency

          Analysis, this could be ''FREQUENT'', ''INFREQUENT'', ''RARE'', or ''UNSEEN''.
          For Time

          Pattern Analysis, this could be ''BUSINESS_HOURS'', ''OFF_HOURS'', or

          ''UNUSUAL_TIME''. For Volume Analysis, this could be ''NORMAL_VOLUME'',

          ''HIGH_VOLUME'', or ''SURGE''. The pattern values are specific to each observation

          type and indicate how the observed behavior relates to the baseline.'
        recommended: true
    class_uri: ocsf:Anomaly
  Api:
    name: Api
    definition_uri: https://w3id.org/lmodel/ocsf/Api
    description: 'The API, or Application Programming Interface, object represents  information

      pertaining to an API request and response.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - API
    is_a: Object
    slots:
    - Api_group
    - Api_operation
    - Api_request
    - Api_response
    - Api_service
    - Api_token
    - Api_version
    slot_usage:
      group:
        name: group
        description: The information pertaining to the API group.
      operation:
        name: operation
        required: true
      request:
        name: request
        description: Details pertaining to the API request.
        recommended: true
      response:
        name: response
        description: Details pertaining to the API response.
        recommended: true
      service:
        name: service
        description: The information pertaining to the API service.
      token:
        name: token
        description: 'The API or client token used to authenticate or authorize the
          API request. This

          attribute contains the base <code>token</code> object that represents: (1)

          IdP-issued client tokens (type_id: 6) such as Okta API tokens or Microsoft

          Entra ID Application Registration client secrets, or (2) generic API

          tokens/keys (type_id: 7) used for SaaS application authentication. Use this

          attribute when the API request was authenticated using a token that should
          be

          tracked as part of the API activity event. Note: Protocol-specific

          authentication tokens (Kerberos, OIDC, SAML) should be represented using

          <code>authentication_token</code> in authentication events, not in API activity

          events.'
      version:
        name: version
        description: The version of the API service.
    class_uri: ocsf:Api
  ApplicationObject:
    name: ApplicationObject
    definition_uri: https://w3id.org/lmodel/ocsf/ApplicationObject
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["uid", "name"]}'
    description: 'An Application describes the details for an inventoried application
      as reported

      by an Application Security tool or other Developer-centric tooling.

      Applications can be defined as Kubernetes resources, Containerized resources,

      or application hosting-specific cloud sources such as AWS Elastic BeanStalk,

      AWS Lightsail, or Azure Logic Apps.'
    notes:
    - "D3FEND\u2122 Ontology d3f:Application. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:Application/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:Application/
    aliases:
    - Application
    exact_mappings:
    - uco_master:Application
    is_a: Object
    slots:
    - ApplicationObject_criticality
    - ApplicationObject_data
    - ApplicationObject_desc
    - ApplicationObject_group
    - ApplicationObject_hostname
    - ApplicationObject_labels
    - ApplicationObject_name
    - ApplicationObject_owner
    - ApplicationObject_region
    - ApplicationObject_resource_relationship
    - risk_level
    - risk_level_id
    - risk_score
    - ApplicationObject_sbom
    - ApplicationObject_tags
    - ApplicationObject_type
    - ApplicationObject_uid
    - ApplicationObject_uid_alt
    - ApplicationObject_url
    - ApplicationObject_version
    slot_usage:
      criticality:
        name: criticality
        description: The criticality of the application as defined by the event source.
      data:
        name: data
        description: Additional data describing the application.
      desc:
        name: desc
        description: 'A description or commentary for an application, usually retrieved
          from an

          upstream system.'
      group:
        name: group
        description: The name of the related application or associated resource group.
      hostname:
        name: hostname
        description: The fully qualified name of the application.
      labels:
        name: labels
        description: The list of labels associated to the application.
      name:
        name: name
        description: The name of the application.
        recommended: true
      owner:
        name: owner
        description: The identity of the service or user account that owns the application.
        recommended: true
      region:
        name: region
        description: The cloud region of the resource.
      resource_relationship:
        name: resource_relationship
        description: 'A graph representation showing how this application relates
          to and interacts

          with other entities in the environment. This can include parent/child

          relationships, dependencies, or other connections.'
      sbom:
        name: sbom
        description: The Software Bill of Materials (SBOM) associated with the application
      tags:
        name: tags
        description: The list of tags; <code>{key:value}</code> pairs associated to
          the application.
      type:
        name: type
        description: 'The type of application as defined by the event source, e.g.,

          <code>GitHub</code>, <code>Azure Logic App</code>, or <code>Amazon Elastic

          BeanStalk</code>.'
      uid:
        name: uid
        description: The unique identifier for the application.
        recommended: true
      uid_alt:
        name: uid_alt
        description: 'An alternative or contextual identifier for the application,
          such as a

          configuration, organization, or license UID.'
      url:
        name: url
        description: The URL of the application.
      version:
        name: version
        description: The semantic version of the application, e.g., <code>1.7.4</code>.
    class_uri: ocsf:ApplicationObject
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            uid:
              name: uid
              required: true
        - slot_conditions:
            name:
              name: name
              required: true
      description: 'OCSF at_least_one: at least one of [''uid'', ''name''] must be
        set.'
  Assessment:
    name: Assessment
    definition_uri: https://w3id.org/lmodel/ocsf/Assessment
    description: 'The Assessment object describes a point-in-time assessment, check,
      or

      evaluation of a specific configuration or signal against an asset, entity,

      person, or otherwise. For example, this can encapsulate <code>os_signals</code>

      from CrowdStrike Falcon Zero Trust Assessments, or account for

      <code>Datastore</code> configurations from Cyera, or capture details of

      Microsoft Intune configuration policies.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Assessment
    is_a: Entity
    slots:
    - Assessment_category
    - Assessment_desc
    - Assessment_meets_criteria
    - name
    - Assessment_policy
    - uid
    - Assessment_name
    - Assessment_uid
    slot_usage:
      category:
        name: category
        description: 'The category that the assessment is part of. For example:

          <code>Prevention</code> or <code>Windows 10</code>.'
      desc:
        name: desc
        description: 'The description of the assessment criteria, or a description
          of the specific

          configuration or signal the assessment is targeting.'
        recommended: true
      meets_criteria:
        name: meets_criteria
        description: 'Determines whether the assessment against the specific configuration
          or signal

          meets the assessments criteria. For example, if the assessment checks if
          a

          <code>Datastore</code> is encrypted or not, having encryption would be

          evaluated as <code>true</code>.'
        required: true
      name:
        name: name
        description: 'The name of the configuration or signal being assessed. For
          example:

          <code>Kernel Mode Code Integrity (KMCI)</code> or

          <code>publicAccessibilityState</code>.'
        recommended: true
      policy:
        name: policy
        description: The details of any policy associated with an assessment.
      uid:
        name: uid
        description: 'The unique identifier of the configuration or signal being assessed.
          For

          example: the <code>signal_id</code>.'
    class_uri: ocsf:Assessment
  Attack:
    name: Attack
    definition_uri: https://w3id.org/lmodel/ocsf/Attack
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["tactic", "technique", "sub_technique"]}'
    description: "The MITRE ATT&CK\xAE & ATLAS\u2122 object describes the tactic,\
      \ technique,\nsub-technique & mitigation associated to an attack."
    notes:
    - "ATT&CK\xAE Matrix \u2014 https://attack.mitre.org"
    - "ATLAS\u2122 Matrix \u2014 https://atlas.mitre.org/matrices/ATLAS"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://attack.mitre.org
    - https://atlas.mitre.org/matrices/ATLAS
    aliases:
    - "MITRE ATT&CK\xAE & ATLAS\u2122"
    exact_mappings:
    - attack:AttackPattern
    - capec:AttackPattern
    - stix:AttackPattern
    is_a: Object
    slots:
    - mitigation
    - Attack_sub_technique
    - Attack_tactic
    - tactics
    - Attack_technique
    - Attack_version
    slot_usage:
      sub_technique:
        name: sub_technique
        recommended: true
      tactic:
        name: tactic
        recommended: true
      technique:
        name: technique
        recommended: true
      version:
        name: version
        description: "The ATT&CK\xAE or ATLAS\u2122 Matrix version."
        recommended: true
    class_uri: ocsf:Attack
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            tactic:
              name: tactic
              required: true
        - slot_conditions:
            technique:
              name: technique
              required: true
        - slot_conditions:
            sub_technique:
              name: sub_technique
              required: true
      description: 'OCSF at_least_one: at least one of [''tactic'', ''technique'',
        ''sub_technique'']

        must be set.'
  AuthFactor:
    name: AuthFactor
    definition_uri: https://w3id.org/lmodel/ocsf/AuthFactor
    description: 'An Authentication Factor object describes a category of methods
      used for

      identity verification in an authentication attempt.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Authentication Factor
    is_a: Object
    slots:
    - AuthFactor_device
    - AuthFactor_email_addr
    - AuthFactor_factor_type
    - AuthFactor_factor_type_id
    - AuthFactor_is_hotp
    - AuthFactor_is_totp
    - AuthFactor_phone_number
    - AuthFactor_provider
    - AuthFactor_security_questions
    slot_usage:
      device:
        name: device
        annotations:
          group:
            tag: group
            value: primary
        description: Device used to complete an authentication request.
        recommended: true
      email_addr:
        name: email_addr
        annotations:
          group:
            tag: group
            value: context
        description: The email address used in an email-based authentication factor.
      factor_type:
        name: factor_type
        annotations:
          group:
            tag: group
            value: primary
        recommended: true
      factor_type_id:
        name: factor_type_id
        annotations:
          group:
            tag: group
            value: primary
        required: true
      is_hotp:
        name: is_hotp
        annotations:
          group:
            tag: group
            value: context
        recommended: true
      is_totp:
        name: is_totp
        annotations:
          group:
            tag: group
            value: context
        recommended: true
      phone_number:
        name: phone_number
        annotations:
          group:
            tag: group
            value: context
        description: The phone number used for a telephony-based authentication request.
      provider:
        name: provider
        annotations:
          group:
            tag: group
            value: context
        description: The name of provider for an authentication factor.
        recommended: true
      security_questions:
        name: security_questions
        annotations:
          group:
            tag: group
            value: context
    class_uri: ocsf:AuthFactor
  AuthenticationToken:
    name: AuthenticationToken
    definition_uri: https://w3id.org/lmodel/ocsf/AuthenticationToken
    description: 'The Authentication Token object extends the base <code>token</code>
      object and

      represents standardized authentication tokens, tickets, or assertions that

      conform to established authentication protocols such as Kerberos, OIDC, and

      SAML. This object inherits all attributes from <code>token</code> and adds

      protocol-specific attributes (e.g., <code>kerberos_flags</code>,

      <code>encryption_details</code>) for authentication events. Use this object
      in

      authentication events to represent protocol-specific tokens: Kerberos Ticket

      Granting Tickets (TGT) and Service Tickets (ST), OIDC Identity Tokens and

      Refresh Tokens, and SAML Assertions. These tokens are issued by authentication

      servers and identity providers and carry protocol-specific metadata, lifecycle

      information, and security attributes defined by their respective

      specifications. When to use this object: Use <code>authentication_token</code>

      when representing protocol-specific authentication tokens (type_id values 1-5:

      Kerberos TGT/ST, OIDC ID/Refresh tokens, SAML assertions) in authentication

      events. When NOT to use this object: Do NOT use

      <code>authentication_token</code> for API tokens or client tokens (type_id

      values 6-7) used in API activity events - use the base <code>token</code>

      object instead. Do NOT use <code>authentication_token</code> for generic API

      keys - use the base <code>token</code> object instead.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Authentication Token
    is_a: Token
    slots:
    - Token_modified_time
    - Token_name
    - Token_tenant_uid
    - Token_uid
    - Token_zone
    - created_time
    - AuthenticationToken_encryption_details
    - expiration_time
    - is_renewable
    - AuthenticationToken_kerberos_flags
    - type
    - type_id
    - AuthenticationToken_created_time
    - AuthenticationToken_expiration_time
    - AuthenticationToken_is_renewable
    - AuthenticationToken_type
    - AuthenticationToken_type_id
    slot_usage:
      created_time:
        name: created_time
        description: 'The time that the authentication token was created or issued.
          This corresponds

          to the token issuance time, such as the <code>iat</code> (issued at) claim
          in

          OIDC tokens, the issue instant in SAML assertions, or the ticket start time
          in

          Kerberos tickets.'
        recommended: true
      encryption_details:
        name: encryption_details
        description: The encryption details of the authentication token.
        recommended: true
      expiration_time:
        name: expiration_time
        description: The expiration time of the authentication token.
      is_renewable:
        name: is_renewable
        description: Indicates whether the authentication token is renewable.
      kerberos_flags:
        name: kerberos_flags
        recommended: true
      type:
        name: type
        description: The type of the authentication token.
        recommended: true
      type_id:
        name: type_id
        description: 'The normalized authentication token type identifier. This attribute
          restricts

          the base <code>token.type_id</code> enum to only protocol-specific

          authentication token types (values 0, 1-5, 99). API tokens and client tokens

          (values 6-7) are not valid for <code>authentication_token</code> - use the
          base

          <code>token</code> object for those types.'
        range: AuthenticationTokenTypeIdEnum
        recommended: true
    class_uri: ocsf:AuthenticationToken
  Authorization:
    name: Authorization
    definition_uri: https://w3id.org/lmodel/ocsf/Authorization
    description: 'The Authorization Result object provides details about the authorization

      outcome and associated policies related to activity.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Authorization Result
    is_a: Object
    slots:
    - Authorization_decision
    - Authorization_policy
    slot_usage:
      decision:
        name: decision
        description: Authorization Result/outcome, e.g. allowed, denied.
        recommended: true
      policy:
        name: policy
        description: Details about the Identity/Access management policies that are
          applicable.
    class_uri: ocsf:Authorization
  AutonomousSystem:
    name: AutonomousSystem
    definition_uri: https://w3id.org/lmodel/ocsf/AutonomousSystem
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["number", "name"]}'
    description: 'An autonomous system (AS) is a collection of connected Internet
      Protocol (IP)

      routing prefixes under the control of one or more network operators on behalf

      of a single administrative entity or domain that presents a common, clearly

      defined routing policy to the internet.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Autonomous System
    exact_mappings:
    - stix:AutonomousSystem
    - uco_master:AutonomousSystem
    is_a: Object
    slots:
    - AutonomousSystem_name
    - AutonomousSystem_number
    slot_usage:
      name:
        name: name
        annotations:
          group:
            tag: group
            value: context
        description: Organization name for the Autonomous System.
        recommended: true
      number:
        name: number
        annotations:
          group:
            tag: group
            value: context
        description: Unique number that the AS is identified by.
        recommended: true
    class_uri: ocsf:AutonomousSystem
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            number:
              name: number
              required: true
        - slot_conditions:
            name:
              name: name
              required: true
      description: 'OCSF at_least_one: at least one of [''number'', ''name''] must
        be set.'
  Baseline:
    name: Baseline
    definition_uri: https://w3id.org/lmodel/ocsf/Baseline
    description: 'Describes the baseline or expected behavior of a system, service,
      or component

      based on historical observations and measurements. It establishes reference

      points for comparison to detect anomalies, trends, and deviations from typical

      patterns.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Baseline
    is_a: Object
    slots:
    - Baseline_observation_parameter
    - Baseline_observation_type
    - Baseline_observations
    - Baseline_observed_pattern
    slot_usage:
      observation_parameter:
        name: observation_parameter
        description: 'The specific parameter or property being monitored. Examples
          include: CPU usage

          percentage, API response time in milliseconds, HTTP error rate, memory

          utilization, network latency, transaction volume, etc.'
        required: true
      observation_type:
        name: observation_type
        description: 'The type of analysis being performed to establish baseline behavior.
          Common

          types include: Frequency Analysis, Time Pattern Analysis, Volume Analysis,

          Sequence Analysis, Distribution Analysis, etc.'
        recommended: true
      observations:
        name: observations
        description: 'Collection of actual measured values, data points and observations
          recorded for

          this baseline.'
        required: true
      observed_pattern:
        name: observed_pattern
        description: 'The specific pattern identified within the observation type.
          For Frequency

          Analysis, this could be ''FREQUENT'', ''INFREQUENT'', ''RARE'', or ''UNSEEN''.
          For Time

          Pattern Analysis, this could be ''BUSINESS_HOURS'', ''OFF_HOURS'', or

          ''UNUSUAL_TIME''. For Volume Analysis, this could be ''NORMAL_VOLUME'',

          ''HIGH_VOLUME'', or ''SURGE''. The pattern values are specific to each observation

          type and indicate the baseline behavior.'
        recommended: true
    class_uri: ocsf:Baseline
  Campaign:
    name: Campaign
    definition_uri: https://w3id.org/lmodel/ocsf/Campaign
    description: 'Campaign represent organized efforts by threat actors to achieve
      malicious

      objectives over a period, often characterized by shared tactics, techniques,

      and procedures (TTPs).'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Campaign
    exact_mappings:
    - attack:Campaign
    - stix:Campaign
    is_a: Object
    slots:
    - Campaign_name
    slot_usage:
      name:
        name: name
        description: The name of a specific campaign associated with a cyber threat.
        required: true
    class_uri: ocsf:Campaign
  Certificate:
    name: Certificate
    definition_uri: https://w3id.org/lmodel/ocsf/Certificate
    description: 'The Digital Certificate, also known as a Public Key Certificate,
      object

      contains information about the ownership and usage of a public key. It serves

      as a means to establish trust in the authenticity and integrity of the public

      key and the associated entity.'
    notes:
    - "D3FEND\u2122 Ontology d3f:Certificate. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:Certificate/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:Certificate/
    aliases:
    - Digital Certificate
    exact_mappings:
    - stix:X509Certificate
    is_a: Object
    slots:
    - Certificate_created_time
    - Certificate_expiration_time
    - Certificate_fingerprints
    - Certificate_is_self_signed
    - Certificate_issuer
    - Certificate_sans
    - Certificate_serial_number
    - Certificate_subject
    - Certificate_uid
    - Certificate_version
    slot_usage:
      created_time:
        name: created_time
        description: The time when the certificate was created.
        recommended: true
      expiration_time:
        name: expiration_time
        description: The expiration time of the certificate.
        recommended: true
      fingerprints:
        name: fingerprints
        description: The fingerprint list of the certificate.
        recommended: true
      is_self_signed:
        name: is_self_signed
        recommended: true
      issuer:
        name: issuer
        description: The certificate issuer distinguished name.
        required: true
      sans:
        name: sans
        description: 'The list of subject alternative names that are secured by a
          specific

          certificate.'
      serial_number:
        name: serial_number
        description: The serial number of the certificate used to create the digital
          signature.
        required: true
      subject:
        name: subject
        description: The certificate subject distinguished name.
        recommended: true
      uid:
        name: uid
        description: The unique identifier of the certificate.
      version:
        name: version
        description: The certificate version.
        recommended: true
    class_uri: ocsf:Certificate
  Check:
    name: Check
    definition_uri: https://w3id.org/lmodel/ocsf/Check
    description: 'The check object defines a specific, testable compliance verification
      point

      that evaluates a target device against a standard, framework, or custom

      requirement. While checks are typically associated with formal standards (like

      CIS, NIST, or ISO), they can also represent custom or organizational

      requirements. When mapped to controls, checks can evaluate specific

      control_parameters to determine compliance status, but neither the control

      mapping nor control_parameters are required for a valid check.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Check
    is_a: Object
    slots:
    - Check_desc
    - Check_name
    - Check_resource
    - Check_severity
    - Check_severity_id
    - Check_standards
    - Check_status
    - Check_status_id
    - Check_uid
    - Check_version
    slot_usage:
      desc:
        name: desc
        description: 'The detailed description of the compliance check, explaining
          the security

          requirement, vulnerability, or configuration being assessed. For example,
          CIS:

          <code>The cramfs filesystem type is a compressed read-only Linux filesystem.

          Removing support for unneeded filesystem types reduces the local attack

          surface.</code> or DISA STIG: <code>Unauthorized access to the information

          system by foreign entities may result in loss or compromise of data.</code>'
      name:
        name: name
        description: 'The name or title of the compliance check. For example, CIS:
          <code>Ensure

          mounting of cramfs filesystems is disabled</code> or DISA STIG: <code>The

          Ubuntu operating system must implement DoD-approved encryption to protect
          the

          confidentiality of remote access sessions</code>.'
        recommended: true
      resource:
        name: resource
        description: Describes details about the resource that this check evaluated.
      severity:
        name: severity
        description: 'The severity level as defined in the source document. For example
          CIS

          Benchmarks, valid values are: <code>Level 1</code> (security-forward, essential

          settings), <code>Level 2</code> (security-focused environment, more

          restrictive), or <code>Scored/Not Scored</code> (whether compliance can
          be

          automatically checked). For DISA STIG, valid values are: <code>CAT I</code>

          (maps to severity_id 5/Critical), <code>CAT II</code> (maps to severity_id

          4/High), or <code>CAT III</code> (maps to severity_id 3/Medium).'
      severity_id:
        name: severity_id
        description: 'The normalized severity identifier that maps severity levels
          to standard

          severity levels. For example CIS Benchmark: <code>Level 2</code> maps to

          <code>4</code> (High), <code>Level 1</code> maps to <code>3</code> (Medium).

          For DISA STIG: <code>CAT I</code> maps to <code>5</code> (Critical), <code>CAT

          II</code> maps to <code>4</code> (High), and <code>CAT III</code> maps to

          <code>3</code> (Medium).'
        range: CheckSeverityIdEnum
      standards:
        name: standards
        description: 'The regulatory or industry standard this check is associated
          with. E.g.,

          <code>PCI DSS 3.2.1</code>, <code>HIPAA Security Rule</code>, <code>NIST
          SP

          800-53 Rev. 5</code>, or <code>ISO/IEC 27001:2013</code>.'
        recommended: true
      status:
        name: status
        description: 'The resultant status of the compliance check normalized to the
          caption of the

          <code>status_id</code> value. For example, CIS Benchmark: <code>Pass</code>

          when all requirements are met, <code>Fail</code> when requirements are not
          met,

          or DISA STIG: <code>NotAFinding</code> (maps to status_id 1/Pass),

          <code>Open</code> (maps to status_id 3/Fail).'
        recommended: true
      status_id:
        name: status_id
        description: The normalized status identifier of the compliance check.
        range: CheckStatusIdEnum
        recommended: true
      uid:
        name: uid
        description: 'The unique identifier of the compliance check within its standard
          or framework.

          For example, CIS Benchmark identifier <code>1.1.1.1</code>, DISA STIG

          identifier <code>V-230234</code>, or NIST control identifier

          <code>AC-17(2)</code>.'
        recommended: true
      version:
        name: version
        description: 'The check version. For example, CIS Benchmark: <code>1.1.0</code>
          for Amazon

          Linux 2 or DISA STIG: <code>V2R1</code> for Windows 10.'
    class_uri: ocsf:Check
  CisBenchmark:
    name: CisBenchmark
    definition_uri: https://w3id.org/lmodel/ocsf/CisBenchmark
    description: 'The CIS Benchmark object describes best practices for securely configuring
      IT

      systems, software, networks, and cloud infrastructure as defined by the <a

      target=''_blank'' href=''https://www.cisecurity.org/cis-benchmarks/''>Center
      for

      Internet Security</a>. See also <a target=''_blank''

      href=''https://www.cisecurity.org/insights/blog/getting-to-know-the-cis-benchmarks''>Getting

      to Know the CIS Benchmarks</a>.'
    deprecated: Use the Compliance object with Checks object instead. (since 1.5.0)
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - CIS Benchmark
    is_a: Object
    slots:
    - CisBenchmark_cis_controls
    - CisBenchmark_desc
    - CisBenchmark_name
    slot_usage:
      cis_controls:
        name: cis_controls
        recommended: true
      desc:
        name: desc
        description: 'The CIS Benchmark description. For example: <i>The cramfs filesystem
          type is a

          compressed read-only Linux filesystem embedded in small footprint systems.
          A

          cramfs image can be used without having to first decompress the image.</i>'
      name:
        name: name
        description: 'The CIS Benchmark name. For example: <i>Ensure mounting of cramfs
          filesystems

          is disabled.</i>'
        required: true
    class_uri: ocsf:CisBenchmark
  CisBenchmarkResult:
    name: CisBenchmarkResult
    definition_uri: https://w3id.org/lmodel/ocsf/CisBenchmarkResult
    description: 'The CIS Benchmark Result object contains information as defined
      by the Center

      for Internet Security (<a target=''_blank''

      href=''https://www.cisecurity.org/cis-benchmarks/''>CIS</a>) benchmark result.

      CIS Benchmarks are a collection of best practices for securely configuring IT

      systems, software, networks, and cloud infrastructure.'
    deprecated: Use the Compliance object with Checks object instead. (since 1.5.0)
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - CIS Benchmark Result
    is_a: Object
    slots:
    - CisBenchmarkResult_desc
    - CisBenchmarkResult_name
    - remediation
    - CisBenchmarkResult_rule
    slot_usage:
      desc:
        name: desc
        description: The CIS benchmark description.
      name:
        name: name
        description: The CIS benchmark name.
        required: true
      rule:
        name: rule
        description: The CIS benchmark rule.
    class_uri: ocsf:CisBenchmarkResult
  CisControl:
    name: CisControl
    definition_uri: https://w3id.org/lmodel/ocsf/CisControl
    description: 'The CIS Control (aka Critical Security Control) object describes
      a prioritized

      set of actions to protect your organization and data from cyber-attack vectors.

      The <a target=''_blank'' href=''https://www.cisecurity.org/controls''>CIS

      Controls</a> are defined by the Center for Internet Security.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - CIS Control
    close_mappings:
    - iso27001:SecurityControl
    is_a: Object
    slots:
    - CisControl_desc
    - CisControl_name
    - CisControl_version
    slot_usage:
      desc:
        name: desc
        description: 'The CIS Control description. For example: <i>Uninstall or disable
          unnecessary

          services on enterprise assets and software, such as an unused file sharing

          service, web application module, or service function.</i>'
      name:
        name: name
        description: 'The CIS Control name. For example: <i>4.8 Uninstall or Disable
          Unnecessary

          Services on Enterprise Assets and Software.</i>'
        required: true
      version:
        name: version
        description: 'The CIS Control version. For example: <i>v8</i>.'
        recommended: true
    class_uri: ocsf:CisControl
  CisCsc:
    name: CisCsc
    definition_uri: https://w3id.org/lmodel/ocsf/CisCsc
    description: 'The CIS Critical Security Control (CSC) contains information as
      defined by the

      Center for Internet Security Critical Security Control <a target=''_blank''

      href=''https://www.cisecurity.org/controls''>(CIS CSC)</a>. Prioritized set
      of

      actions to protect your organization and data from cyber-attack vectors.'
    deprecated: Use the cis_control object instead. (since 1.5.0)
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - CIS CSC
    is_a: Object
    slots:
    - CisCsc_control
    - CisCsc_version
    slot_usage:
      control:
        name: control
        required: true
      version:
        name: version
        description: The CIS critical security control version.
        recommended: true
    class_uri: ocsf:CisCsc
  ClassifierDetails:
    name: ClassifierDetails
    definition_uri: https://w3id.org/lmodel/ocsf/ClassifierDetails
    description: 'The Classifier Details object describes details about the classifier
      used for

      data classification.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Classifier Details
    is_a: Object
    slots:
    - ClassifierDetails_name
    - ClassifierDetails_type
    - ClassifierDetails_uid
    slot_usage:
      name:
        name: name
        description: The name of the classifier.
        recommended: true
      type:
        name: type
        description: The type of the classifier.
        required: true
      uid:
        name: uid
        description: The unique identifier of the classifier.
        recommended: true
    class_uri: ocsf:ClassifierDetails
  Cloud:
    name: Cloud
    definition_uri: https://w3id.org/lmodel/ocsf/Cloud
    description: 'The Cloud object describes the cloud computing environment where
      an event or

      finding originated. It provides comprehensive context about the cloud

      infrastructure, including the cloud service provider, account or subscription

      details, organizational structure, geographic regions, availability zones, and

      logical partitions.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Cloud
    is_a: Object
    slots:
    - Cloud_account
    - Cloud_cloud_partition
    - Cloud_org
    - project_uid
    - Cloud_provider
    - Cloud_region
    - Cloud_zone
    slot_usage:
      account:
        name: account
        description: 'The Account object containing details about the cloud account,
          subscription, or

          billing unit where the event or finding was created. This object includes

          properties such as the account name, unique identifier, type, labels, and

          tags.<br/><br/><strong>Examples:</strong><ul><li><strong>AWS:</strong> Account

          object with <code>name</code>, <code>uid</code> (Account ID),

          <code>type</code>, and other account properties</li><li><strong>Azure:</strong>

          Subscription object with <code>name</code>, <code>uid</code> (Subscription
          ID),

          <code>type</code>, and subscription metadata</li><li><strong>GCP:</strong>

          Project object with <code>name</code>, <code>uid</code> (Project ID),

          <code>type</code>, and project attributes</li><li><strong>Oracle

          Cloud:</strong> Compartment object with <code>name</code>, <code>uid</code>

          (Tenancy OCID), <code>type</code>, and compartment details</li></ul>'
      cloud_partition:
        name: cloud_partition
        description: 'The logical grouping or isolated segment within a cloud provider''s

          infrastructure where the event or finding was created, often used for

          compliance, governance, or regional

          separation.<br/><br/><strong>Examples:</strong><ul><li><strong>AWS:</strong>

          Partition where the event occurred (<code>aws</code>, <code>aws-cn</code>,

          <code>aws-us-gov</code>)</li><li><strong>Azure:</strong> Cloud environment

          where the event occurred (<code>AzureCloud</code>,

          <code>AzureUSGovernment</code>, <code>AzureChinaCloud</code>)</li></ul>'
      org:
        name: org
        description: 'The Organization object containing details about the organizational
          unit or

          management structure that governs the account, subscription, or project
          where

          the event or finding was created. This object includes properties such as
          the

          organization name, unique identifier, type, and other organizational

          metadata.<br/><br/><strong>Examples:</strong><ul><li><strong>AWS:</strong>

          Organization object with <code>name</code>, <code>uid</code> (Organization
          ID),

          <code>type</code>, and other organizational

          properties</li><li><strong>Azure:</strong> Management Group object with

          <code>name</code>, <code>uid</code> (Management Group ID), <code>type</code>,

          and management group metadata</li><li><strong>GCP:</strong> Organization
          object

          with <code>name</code>, <code>uid</code> (Organization ID), <code>type</code>,

          and organizational attributes</li><li><strong>Oracle Cloud:</strong> Tenancy

          object with <code>name</code>, <code>uid</code> (Tenancy OCID),

          <code>type</code>, and tenancy details</li></ul>'
      provider:
        name: provider
        description: 'The unique name of the Cloud services provider where the event
          or finding was

          created. Examples include AWS, Azure, GCP (Google Cloud Platform), Oracle

          Cloud, IBM Cloud, Alibaba Cloud, or other public, private, or hybrid cloud

          providers.'
        required: true
      region:
        name: region
        description: 'The cloud region where the event or finding was created, as
          defined by the

          cloud

          provider.<br/><br/><strong>Examples:</strong><ul><li><strong>AWS:</strong>

          Region where the event occurred (<code>us-east-1</code>,

          <code>eu-west-1</code>)</li><li><strong>Azure:</strong> Region where the
          event

          occurred (<code>East US</code>, <code>West

          Europe</code>)</li><li><strong>GCP:</strong> Region where the event occurred

          (<code>us-central1</code>, <code>europe-west1</code>)</li><li><strong>Oracle

          Cloud:</strong> Region where the event occurred (<code>us-ashburn-1</code>,

          <code>uk-london-1</code>)</li></ul>'
        recommended: true
      zone:
        name: zone
        description: 'The availability zone in the cloud region where the event or
          finding was

          created, as defined by the cloud

          provider.<br/><br/><strong>Examples:</strong><ul><li><strong>AWS:</strong>

          Availability zone where the event occurred (<code>us-east-1a</code>,

          <code>us-east-1b</code>)</li><li><strong>Azure:</strong> Availability zone

          where the event occurred (<code>1</code>, <code>2</code>, <code>3</code>
          within

          a region)</li><li><strong>GCP:</strong> Availability zone where the event

          occurred (<code>us-central1-a</code>,

          <code>us-central1-b</code>)</li><li><strong>Oracle Cloud:</strong> Availability

          zone where the event occurred (<code>AD-1</code>, <code>AD-2</code>,

          <code>AD-3</code>)</li></ul>'
    class_uri: ocsf:Cloud
  Compliance:
    name: Compliance
    definition_uri: https://w3id.org/lmodel/ocsf/Compliance
    description: 'The Compliance object contains information about Industry and Regulatory

      Framework standards, controls and requirements or details about custom

      assessments utilized in a compliance evaluation. Standards define broad

      security frameworks, controls represent specific security requirements within

      those frameworks, and checks are the testable verification points used to

      determine if controls are properly implemented.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Compliance
    close_mappings:
    - iso27001:SecurityControl
    is_a: Object
    slots:
    - Compliance_assessments
    - Compliance_category
    - Compliance_checks
    - Compliance_compliance_references
    - Compliance_compliance_standards
    - Compliance_control
    - Compliance_control_parameters
    - Compliance_desc
    - Compliance_requirements
    - Compliance_standards
    - Compliance_status
    - Compliance_status_code
    - Compliance_status_detail
    - Compliance_status_details
    - Compliance_status_id
    slot_usage:
      assessments:
        name: assessments
        description: A list of assessments associated with the compliance requirements
          evaluation.
      category:
        name: category
        description: 'The category a control framework pertains to, as reported by
          the source tool,

          such as <code>Asset Management</code> or <code>Risk Assessment</code>.'
      checks:
        name: checks
        description: 'A list of compliance checks associated with specific industry
          standards or

          frameworks. Each check represents an individual rule or requirement that
          has

          been evaluated against a target device. Checks typically include details
          such

          as the check name (e.g., CIS: ''Ensure mounting of cramfs filesystems is

          disabled'' or DISA STIG descriptive titles), unique identifiers (such as
          CIS

          identifier ''1.1.1.1'' or DISA STIG identifier ''V-230234''), descriptions

          (detailed explanations of security requirements or vulnerability discussions),

          and version information.'
      compliance_references:
        name: compliance_references
        deprecated: Use the Compliance object with Check array instead.
      compliance_standards:
        name: compliance_standards
        deprecated: Use the Compliance object with Check array instead.
      control:
        name: control
        description: 'A Control is a prescriptive, actionable set of specifications
          that strengthens

          device posture. The control specifies required security measures, while
          the

          specific implementation values are defined in control_parameters. E.g.,
          CIS AWS

          Foundations Benchmark 1.2.0 - Control 2.1 - Ensure CloudTrail is enabled
          in all

          regions'
        recommended: true
      control_parameters:
        name: control_parameters
        description: 'The list of control parameters evaluated in a Compliance check.
          E.g.,

          parameters for CloudTrail configuration might include

          <code>multiRegionTrailEnabled: true</code>, <code>logFileValidationEnabled:

          true</code>, and <code>requiredRegions: [us-east-1, us-west-2]</code>'
      desc:
        name: desc
        description: The description or criteria of a control.
      requirements:
        name: requirements
        description: 'The specific compliance requirements being evaluated. E.g.,
          <code>PCI DSS

          Requirement 8.2.3 - Passwords must meet minimum complexity requirements</code>

          or <code>HIPAA Security Rule 164.312(a)(2)(iv) - Implement encryption and

          decryption mechanisms</code>'
      standards:
        name: standards
        description: The regulatory or industry standards being evaluated for compliance.
        recommended: true
      status:
        name: status
        description: 'The resultant status of the compliance check normalized to the
          caption of the

          <code>status_id</code> value. In the case of ''Other'', it is defined by
          the

          event source.'
        recommended: true
      status_code:
        name: status_code
        description: The resultant status code of the compliance check.
      status_detail:
        name: status_detail
        description: The contextual description of the <code>status, status_code</code>
          values.
        deprecated: Use the <code> status_details </code> attribute instead.
      status_details:
        name: status_details
        description: 'A list of contextual descriptions of the <code>status, status_code</code>

          values.'
      status_id:
        name: status_id
        description: The normalized status identifier of the compliance check.
        range: ComplianceStatusIdEnum
        recommended: true
    class_uri: ocsf:Compliance
  Container:
    name: Container
    definition_uri: https://w3id.org/lmodel/ocsf/Container
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["uid", "name"]}'
      observable_id:
        tag: observable_id
        value: 27
    description: 'The Container object describes an instance of a specific container.
      A container

      is a prepackaged, portable system image that runs isolated on an existing

      system using a container runtime like containerd.'
    notes:
    - "D3FEND\u2122 Ontology d3f:ContainerProcess. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:ContainerProcess/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:ContainerProcess/
    aliases:
    - Container
    related_mappings:
    - uco_master:Software
    is_a: Object
    slots:
    - Container_hash
    - Container_image
    - Container_labels
    - Container_name
    - network_driver
    - orchestrator
    - pod_uuid
    - runtime
    - Container_size
    - Container_tag
    - Container_tags
    - Container_uid
    slot_usage:
      hash:
        name: hash
        description: 'Commit hash of image created for docker or the SHA256 hash of
          the container.

          For example:

          <code>13550340a8681c84c861aac2e5b440161c2b33a3e4f302ac680ca5b686de48de</code>.'
        recommended: true
      image:
        name: image
        description: The container image used as a template to run the container.
        recommended: true
      labels:
        name: labels
        description: The list of labels associated to the container.
      name:
        name: name
        description: The container name.
        recommended: true
      size:
        name: size
        description: The size of the container image.
        recommended: true
      tag:
        name: tag
        description: The tag used by the container. It can indicate version, format,
          OS.
      tags:
        name: tags
        description: The list of tags; <code>{key:value}</code> pairs associated to
          the container.
      uid:
        name: uid
        description: 'The full container unique identifier for this instantiation
          of the container.

          For example:

          <code>ac2ea168264a08f9aaca0dfc82ff3551418dfd22d02b713142a6843caa2f61bf</code>.'
        recommended: true
    class_uri: ocsf:Container
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            uid:
              name: uid
              required: true
        - slot_conditions:
            name:
              name: name
              required: true
      description: 'OCSF at_least_one: at least one of [''uid'', ''name''] must be
        set.'
  Cve:
    name: Cve
    definition_uri: https://w3id.org/lmodel/ocsf/Cve
    description: 'The Common Vulnerabilities and Exposures (CVE) object represents
      publicly

      disclosed cybersecurity vulnerabilities defined in CVE Program catalog (<a

      target=''_blank'' href=''https://cve.mitre.org/''>CVE</a>). There is one CVE
      Record

      for each vulnerability in the catalog.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - CVE
    exact_mappings:
    - cve:CVERecord
    close_mappings:
    - kev_catalog:KevEntry
    - nvd:NVDEntry
    - stix:Vulnerability
    - core:Vulnerability
    is_a: Object
    slots:
    - Cve_created_time
    - Cve_cvss
    - Cve_cwe
    - cwe_uid
    - cwe_url
    - Cve_desc
    - epss
    - Cve_modified_time
    - Cve_product
    - Cve_references
    - Cve_related_cwes
    - Cve_title
    - Cve_type
    - Cve_uid
    slot_usage:
      created_time:
        name: created_time
        description: 'The Record Creation Date identifies when the CVE ID was issued
          to a CVE

          Numbering Authority (CNA) or the CVE Record was published on the CVE List.
          Note

          that the Record Creation Date does not necessarily indicate when this

          vulnerability was discovered, shared with the affected vendor, publicly

          disclosed, or updated in CVE.'
        recommended: true
      cvss:
        name: cvss
        recommended: true
      cwe:
        name: cwe
        deprecated: Use <code>related_cwes</code> attribute instead.
      desc:
        name: desc
        description: A brief description of the CVE Record.
      modified_time:
        name: modified_time
        description: The Record Modified Date identifies when the CVE record was last
          updated.
      product:
        name: product
        description: The product where the vulnerability was discovered.
      references:
        name: references
        description: A list of reference URLs with additional information about the
          CVE Record.
        recommended: true
      related_cwes:
        name: related_cwes
        description: 'Describes the Common Weakness Enumeration <a target=''_blank''

          href=''https://cwe.mitre.org/''>(CWE)</a> details related to the CVE Record.'
      title:
        name: title
        description: A title or a brief phrase summarizing the CVE record.
        recommended: true
      type:
        name: type
        description: '<p>The vulnerability type as selected from a large dropdown
          menu during CVE

          refinement.</p>Most frequently used vulnerability types are: <code>DoS</code>,

          <code>Code Execution</code>, <code>Overflow</code>, <code>Memory

          Corruption</code>, <code>Sql Injection</code>, <code>XSS</code>,

          <code>Directory Traversal</code>, <code>Http Response Splitting</code>,

          <code>Bypass something</code>, <code>Gain Information</code>, <code>Gain

          Privileges</code>, <code>CSRF</code>, <code>File Inclusion</code>. For more

          information see <a target=''_blank''

          href=''https://www.cvedetails.com/vulnerabilities-by-types.php''>Vulnerabilities

          By Type</a> distributions.'
        recommended: true
      uid:
        name: uid
        description: 'The Common Vulnerabilities and Exposures unique number assigned
          to a specific

          computer vulnerability. A CVE Identifier begins with 4 digits representing
          the

          year followed by a sequence of digits that acts as a unique identifier.
          For

          example: <code>CVE-2021-12345</code>.'
        required: true
    class_uri: ocsf:Cve
  Cvss:
    name: Cvss
    definition_uri: https://w3id.org/lmodel/ocsf/Cvss
    description: 'The Common Vulnerability Scoring System (<a target=''_blank''

      href=''https://www.first.org/cvss/''>CVSS</a>) object provides a way to capture

      the principal characteristics of a vulnerability and produce a numerical score

      reflecting its severity.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - CVSS Score
    exact_mappings:
    - nvd:CVSSMetric
    close_mappings:
    - core:Impact
    related_mappings:
    - cve:CnaContainer
    is_a: Object
    slots:
    - Cvss_base_score
    - Cvss_depth
    - Cvss_metrics
    - Cvss_overall_score
    - Cvss_severity
    - Cvss_src_url
    - vector_string
    - Cvss_vendor_name
    - Cvss_version
    slot_usage:
      base_score:
        name: base_score
        description: 'The CVSS base score. For example: <code>9.1</code>.'
        required: true
      depth:
        name: depth
        recommended: true
      metrics:
        name: metrics
        description: 'The Common Vulnerability Scoring System metrics. This attribute
          contains

          information on the CVE''s impact. If the CVE has been analyzed, this attribute

          will contain any CVSSv2 or CVSSv3 information associated with the

          vulnerability. For example: <code>{ {"Access Vector", "Network"}, {"Access

          Complexity", "Low"}, ...}</code>.'
      overall_score:
        name: overall_score
        description: 'The CVSS overall score, impacted by base, temporal, and environmental
          metrics.

          For example: <code>9.1</code>.'
        recommended: true
      severity:
        name: severity
        description: "<p>The Common Vulnerability Scoring System (CVSS) Qualitative\
          \ Severity Rating.\nA textual representation of the numeric score.</p><strong>CVSS\n\
          v2.0</strong><ul><li>Low (0.0 \u2013 3.9)</li><li>Medium (4.0 \u2013 6.9)</li><li>High\n\
          (7.0 \u2013 10.0)</li></ul></p><strong>CVSS v3.0</strong><ul><li>None\n\
          (0.0)</li><li>Low (0.1 - 3.9)</li><li>Medium (4.0 - 6.9)</li><li>High (7.0\
          \ -\n8.9)</li><li>Critical (9.0 - 10.0)</li></ul>"
      src_url:
        name: src_url
        description: 'The source URL for the CVSS score. For example:

          <code>https://nvd.nist.gov/vuln/detail/CVE-2021-44228</code>'
      vendor_name:
        name: vendor_name
        description: 'The vendor that provided the CVSS score. For example: <code>NVD,
          REDHAT</code>

          etc.'
        recommended: true
      version:
        name: version
        description: 'The CVSS version. For example: <code>3.1</code>.'
        required: true
    class_uri: ocsf:Cvss
  Cwe:
    name: Cwe
    definition_uri: https://w3id.org/lmodel/ocsf/Cwe
    description: 'The CWE object represents a weakness in a software system that can
      be exploited

      by a threat actor to perform an attack. The CWE object is based on the <a

      target=''_blank'' href=''https://cwe.mitre.org/''>Common Weakness Enumeration

      (CWE)</a> catalog.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - CWE
    exact_mappings:
    - cwe:Weakness
    - core:Weakness
    close_mappings:
    - nvd:NVDWeakness
    is_a: Object
    slots:
    - Cwe_caption
    - Cwe_src_url
    - Cwe_uid
    slot_usage:
      caption:
        name: caption
        description: The caption assigned to the Common Weakness Enumeration unique
          identifier.
      src_url:
        name: src_url
        description: 'URL pointing to the CWE Specification. For more information
          see <a

          target=''_blank'' href=''https://cwe.mitre.org/''>CWE.</a>'
      uid:
        name: uid
        description: 'The Common Weakness Enumeration unique number assigned to a
          specific weakness.

          A CWE Identifier begins "CWE" followed by a sequence of digits that acts
          as a

          unique identifier. For example: <code>CWE-123</code>.'
        required: true
    class_uri: ocsf:Cwe
  D3fTactic:
    name: D3fTactic
    definition_uri: https://w3id.org/lmodel/ocsf/D3fTactic
    description: "The MITRE D3FEND\u2122 Tactic object describes the tactic ID and/or\
      \ name that is\nassociated to an attack."
    notes:
    - "D3FEND\u2122 Matrix \u2014 https://d3fend.mitre.org"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org
    aliases:
    - "MITRE D3FEND\u2122 Tactic"
    is_a: Entity
    slots:
    - name
    - D3fTactic_src_url
    - uid
    - D3fTactic_name
    - D3fTactic_uid
    slot_usage:
      name:
        name: name
        description: 'The tactic name that is associated with the defensive technique.
          For example:

          <code>Isolate</code>.'
      src_url:
        name: src_url
        description: 'The versioned permalink of the defensive tactic. For example:

          <code>https://d3fend.mitre.org/tactic/d3f:Isolate/</code>.'
      uid:
        name: uid
        description: The unique identifier of the defensive tactic.
    class_uri: ocsf:D3fTactic
  D3fTechnique:
    name: D3fTechnique
    definition_uri: https://w3id.org/lmodel/ocsf/D3fTechnique
    description: "The MITRE D3FEND\u2122 Technique object describes the leaf defensive\
      \ technique ID\nand/or name associated to a countermeasure."
    notes:
    - "D3FEND\u2122 Matrix \u2014 href='https://d3fend.mitre.org"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - "MITRE D3FEND\u2122 Technique"
    is_a: Entity
    slots:
    - name
    - D3fTechnique_src_url
    - uid
    - D3fTechnique_name
    - D3fTechnique_uid
    slot_usage:
      name:
        name: name
        description: 'The name of the defensive technique. For example: <code>IO Port

          Restriction</code>.'
      src_url:
        name: src_url
        description: 'The versioned permalink of the defensive technique. For example:

          <code>https://d3fend.mitre.org/technique/d3f:IOPortRestriction/</code>.'
      uid:
        name: uid
        description: 'The unique identifier of the defensive technique. For example:

          <code>D3-IOPR</code>.'
    class_uri: ocsf:D3fTechnique
  D3fend:
    name: D3fend
    definition_uri: https://w3id.org/lmodel/ocsf/D3fend
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["d3f_tactic", "d3f_technique"]}'
    description: "The MITRE D3FEND\u2122 object describes the tactic & technique associated\
      \ with a\ncountermeasure."
    notes:
    - "D3FEND\u2122 Matrix \u2014 https://d3fend.mitre.org"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org
    aliases:
    - "MITRE D3FEND\u2122"
    is_a: Object
    slots:
    - D3fend_d3f_tactic
    - D3fend_d3f_technique
    - D3fend_version
    slot_usage:
      d3f_tactic:
        name: d3f_tactic
        description: 'The Tactic object describes the tactic ID and/or name that is
          associated with a

          countermeasure.'
        recommended: true
      d3f_technique:
        name: d3f_technique
        description: 'The Technique object describes the technique ID and/or name
          associated with a

          countermeasure.'
        recommended: true
      version:
        name: version
        description: "The D3FEND\u2122 Matrix version."
        recommended: true
    class_uri: ocsf:D3fend
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            d3f_tactic:
              name: d3f_tactic
              required: true
        - slot_conditions:
            d3f_technique:
              name: d3f_technique
              required: true
      description: 'OCSF at_least_one: at least one of [''d3f_tactic'', ''d3f_technique'']
        must be set.'
  DataClassification:
    name: DataClassification
    definition_uri: https://w3id.org/lmodel/ocsf/DataClassification
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["category_id", "confidentiality_id"]}'
    description: 'The Data Classification object includes information about data classification

      levels and data category types.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Data Classification
    close_mappings:
    - uco_master:MarkingDefinition
    is_a: Object
    slots:
    - DataClassification_category
    - DataClassification_category_id
    - DataClassification_classifier_details
    - confidentiality
    - DataClassification_confidentiality_id
    - DataClassification_discovery_details
    - DataClassification_policy
    - DataClassification_size
    - DataClassification_src_url
    - DataClassification_status
    - DataClassification_status_details
    - DataClassification_status_id
    - DataClassification_total
    - DataClassification_uid
    slot_usage:
      category:
        name: category
        description: 'The name of the data classification category that data matched
          into, e.g.

          Financial, Personal, Governmental, etc.'
      category_id:
        name: category_id
        description: The normalized identifier of the data classification category.
        range: DataClassificationCategoryIdEnum
        recommended: true
      classifier_details:
        name: classifier_details
        recommended: true
      confidentiality_id:
        name: confidentiality_id
        recommended: true
      discovery_details:
        name: discovery_details
        description: Details about the data discovered by classification job.
      policy:
        name: policy
        description: 'Details about the data policy that governs data handling and
          security measures

          related to classification.'
      size:
        name: size
        description: Size of the data classified.
      src_url:
        name: src_url
        description: The source URL pointing towards the full classification job details.
      status:
        name: status
        description: 'The resultant status of the classification job normalized to
          the caption of the

          <code>status_id</code> value. In the case of ''Other'', it is defined by
          the

          event source.'
        recommended: true
      status_details:
        name: status_details
        description: The contextual description of the <code>status, status_id</code>
          value.
      status_id:
        name: status_id
        description: The normalized status identifier of the classification job.
        range: DataClassificationStatusIdEnum
        recommended: true
      total:
        name: total
        description: The total count of discovered entities, by the classification
          job.
      uid:
        name: uid
        description: The unique identifier of the classification job.
    class_uri: ocsf:DataClassification
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            category_id:
              name: category_id
              required: true
        - slot_conditions:
            confidentiality_id:
              name: confidentiality_id
              required: true
      description: 'OCSF at_least_one: at least one of [''category_id'', ''confidentiality_id'']
        must

        be set.'
  DataSecurity:
    name: DataSecurity
    definition_uri: https://w3id.org/lmodel/ocsf/DataSecurity
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["data_lifecycle_state_id", "detection_pattern",

          "detection_system_id", "policy"]}'
    description: 'The Data Security object describes the characteristics, techniques
      and content

      of a Data Loss Prevention (DLP), Data Loss Detection (DLD), Data

      Classification, or similar tools'' finding, alert, or detection mechanism(s).'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Data Security
    is_a: DataClassification
    slots:
    - DataClassification_category
    - DataClassification_category_id
    - DataClassification_classifier_details
    - confidentiality
    - DataClassification_confidentiality_id
    - DataClassification_discovery_details
    - DataClassification_size
    - DataClassification_src_url
    - DataClassification_status
    - DataClassification_status_details
    - DataClassification_status_id
    - DataClassification_total
    - DataClassification_uid
    - data_lifecycle_state
    - DataSecurity_data_lifecycle_state_id
    - DataSecurity_detection_pattern
    - detection_system
    - DataSecurity_detection_system_id
    - pattern_match
    - policy
    - DataSecurity_policy
    slot_usage:
      data_lifecycle_state_id:
        name: data_lifecycle_state_id
        recommended: true
      detection_pattern:
        name: detection_pattern
        recommended: true
      detection_system_id:
        name: detection_system_id
        recommended: true
      policy:
        name: policy
        description: Details about the policy that triggered the finding.
        recommended: true
    class_uri: ocsf:DataSecurity
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            data_lifecycle_state_id:
              name: data_lifecycle_state_id
              required: true
        - slot_conditions:
            detection_pattern:
              name: detection_pattern
              required: true
        - slot_conditions:
            detection_system_id:
              name: detection_system_id
              required: true
        - slot_conditions:
            policy:
              name: policy
              required: true
      description: 'OCSF at_least_one: at least one of [''data_lifecycle_state_id'',

        ''detection_pattern'', ''detection_system_id'', ''policy''] must be set.'
  Database:
    name: Database
    definition_uri: https://w3id.org/lmodel/ocsf/Database
    description: 'The database object is used for databases which are typically datastore

      services that contain an organized collection of structured and unstructured

      data or a types of data.'
    notes:
    - "D3FEND\u2122 Ontology d3f:Database. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:Database/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:Database/
    aliases:
    - Database
    is_a: Entity
    mixins:
    - DataClassificationProfile
    slots:
    - Database_created_time
    - Database_desc
    - Database_embedding_model
    - Database_groups
    - Database_modified_time
    - name
    - Database_size
    - Database_type
    - Database_type_id
    - uid
    - Database_name
    - Database_uid
    - DataClassificationProfile_data_classification
    - DataClassificationProfile_data_classifications
    slot_usage:
      created_time:
        name: created_time
        description: The time when the database was known to have been created.
      desc:
        name: desc
        description: The description of the database.
      embedding_model:
        name: embedding_model
        description: 'Model used for creating embeddings (if applicable). For example:

          <code>text-embedding-ada-002</code> or <code>all-MiniLM-L6-v2</code>.'
      groups:
        name: groups
        description: The group names to which the database belongs.
      modified_time:
        name: modified_time
        description: 'The most recent time when any changes, updates, or modifications
          were made

          within the database.'
      name:
        name: name
        description: The database name, ordinarily as assigned by a database administrator.
      size:
        name: size
        description: The size of the database in bytes.
      type:
        name: type
        description: The database type.
        recommended: true
      type_id:
        name: type_id
        description: The normalized identifier of the database type.
        range: DatabaseTypeIdEnum
        required: true
      uid:
        name: uid
        description: The unique identifier of the database.
    class_uri: ocsf:Database
  Databucket:
    name: Databucket
    definition_uri: https://w3id.org/lmodel/ocsf/Databucket
    description: 'The databucket object is a basic container that holds data, typically
      organized

      through the use of data partitions.'
    notes:
    - "D3FEND\u2122 Ontology d3f:CloudStorage. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:CloudStorage/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:CloudStorage/
    aliases:
    - Databucket
    is_a: Resource
    mixins:
    - DataClassificationProfile
    - CloudProfile
    slots:
    - Resource_data
    - Resource_labels
    - Resource_tags
    - Resource_uid_alt
    - DataClassificationProfile_data_classification
    - DataClassificationProfile_data_classifications
    - agent_list
    - Databucket_cloud_partition
    - created_time
    - Databucket_criticality
    - Databucket_desc
    - Databucket_encryption_details
    - Databucket_file
    - Databucket_group
    - Databucket_groups
    - Databucket_hostname
    - Databucket_ip
    - is_backed_up
    - Databucket_is_encrypted
    - Databucket_is_public
    - modified_time
    - Databucket_name
    - Databucket_namespace
    - Databucket_owner
    - Databucket_region
    - Databucket_resource_relationship
    - Databucket_size
    - type
    - Databucket_type_id
    - Databucket_uid
    - Databucket_version
    - Databucket_zone
    - Databucket_created_time
    - Databucket_modified_time
    - Databucket_type
    - CloudProfile_api
    - CloudProfile_cloud
    slot_usage:
      cloud_partition:
        name: cloud_partition
        description: 'The logical grouping or isolated segment within a cloud provider''s

          infrastructure where the databucket is located.'
      created_time:
        name: created_time
        description: The time when the databucket was known to have been created.
      criticality:
        name: criticality
        description: The criticality of the databucket as defined by the event source.
      desc:
        name: desc
        description: The description of the databucket.
      encryption_details:
        name: encryption_details
        description: 'The encryption details of the databucket. Should be populated
          if the databucket

          is encrypted.'
      file:
        name: file
        description: Details about the file/object within a databucket.
      group:
        name: group
        description: The name of the related resource group.
        deprecated: Use the <code>groups</code> attribute instead.
      groups:
        name: groups
        description: The group names to which the databucket belongs.
      hostname:
        name: hostname
        description: The fully qualified hostname of the databucket.
        recommended: true
      ip:
        name: ip
        description: The IP address of the resource, in either IPv4 or IPv6 format.
        recommended: true
      is_encrypted:
        name: is_encrypted
        description: Indicates if the databucket is encrypted.
      is_public:
        name: is_public
        description: Indicates if the databucket is publicly accessible.
        recommended: true
      modified_time:
        name: modified_time
        description: 'The most recent time when any changes, updates, or modifications
          were made

          within the databucket.'
      name:
        name: name
        description: The databucket name.
      namespace:
        name: namespace
        description: 'The namespace is useful when similar entities exist that you
          need to keep

          separate.'
      owner:
        name: owner
        description: The identity of the service or user account that owns the databucket.
        recommended: true
      region:
        name: region
        description: The cloud region of the databucket.
      resource_relationship:
        name: resource_relationship
        description: 'A graph representation showing how this databucket relates to
          and interacts

          with other entities in the environment. This can include parent/child

          relationships, dependencies, or other connections.'
      size:
        name: size
        description: The size of the databucket in bytes.
      type:
        name: type
        description: The databucket type.
        recommended: true
      type_id:
        name: type_id
        description: The normalized identifier of the databucket type.
        range: DatabucketTypeIdEnum
        required: true
      uid:
        name: uid
        description: The unique identifier of the databucket.
      version:
        name: version
        description: The version of the resource. For example <code>1.2.3</code>.
      zone:
        name: zone
        description: 'The specific availability zone within a cloud region where the
          databucket is

          located.'
    class_uri: ocsf:Databucket
  DceRpc:
    name: DceRpc
    definition_uri: https://w3id.org/lmodel/ocsf/DceRpc
    description: 'The DCE/RPC, or Distributed Computing Environment/Remote Procedure
      Call, object

      describes the remote procedure call system for distributed computing

      environments.'
    notes:
    - "D3FEND\u2122 Ontology d3f:RemoteProcedureCall. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:RemoteProcedureCall/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:RemoteProcedureCall/
    aliases:
    - DCE/RPC
    is_a: Object
    slots:
    - DceRpc_command
    - DceRpc_command_response
    - DceRpc_flags
    - DceRpc_opnum
    - DceRpc_rpc_interface
    slot_usage:
      command:
        name: command
        description: The request command (e.g. REQUEST, BIND).
        recommended: true
      command_response:
        name: command_response
        description: The reply to the request command (e.g. RESPONSE, BINDACK or FAULT).
        recommended: true
      flags:
        name: flags
        description: The list of interface flags.
        required: true
      opnum:
        name: opnum
        recommended: true
      rpc_interface:
        name: rpc_interface
        required: true
    class_uri: ocsf:DceRpc
  DeviceHwInfo:
    name: DeviceHwInfo
    definition_uri: https://w3id.org/lmodel/ocsf/DeviceHwInfo
    description: 'The Device Hardware Information object contains details and specifications
      of

      the physical components that make up a device. This information provides an

      overview of the hardware capabilities, configuration, and characteristics of

      the device.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Device Hardware Info
    is_a: Object
    slots:
    - bios_date
    - bios_manufacturer
    - bios_ver
    - chassis
    - cpu_architecture
    - cpu_architecture_id
    - cpu_bits
    - cpu_cores
    - cpu_count
    - cpu_speed
    - cpu_type
    - desktop_display
    - gpu_count
    - DeviceHwInfo_gpu_info_list
    - keyboard_info
    - ram_size
    - DeviceHwInfo_serial_number
    - DeviceHwInfo_uuid
    - DeviceHwInfo_vendor_name
    slot_usage:
      gpu_info_list:
        name: gpu_info_list
        description: 'A list of GPU objects describing the hardware properties of
          each graphics

          processor installed on the device.'
      serial_number:
        name: serial_number
        description: The device manufacturer serial number.
      uuid:
        name: uuid
        description: 'The device manufacturer assigned universally unique hardware
          identifier. For

          SMBIOS compatible devices such as those running Linux and Windows, it is
          the

          UUID member of the System Information structure in the SMBIOS information.
          For

          macOS devices, it is the Hardware UUID (also known as IOPlatformUUID in
          the I/O

          Registry).'
      vendor_name:
        name: vendor_name
        description: The device manufacturer.
    class_uri: ocsf:DeviceHwInfo
  DigitalSignature:
    name: DigitalSignature
    definition_uri: https://w3id.org/lmodel/ocsf/DigitalSignature
    description: 'The Digital Signature object contains information about the cryptographic

      mechanism used to verify the authenticity, integrity, and origin of the file
      or

      application.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Digital Signature
    is_a: Object
    slots:
    - DigitalSignature_algorithm
    - DigitalSignature_algorithm_id
    - DigitalSignature_certificate
    - DigitalSignature_created_time
    - developer_uid
    - digest
    - DigitalSignature_state
    - DigitalSignature_state_id
    slot_usage:
      algorithm:
        name: algorithm
        description: 'The digital signature algorithm used to create the signature,
          normalized to the

          caption of ''algorithm_id''. In the case of ''Other'', it is defined by
          the event

          source.'
      algorithm_id:
        name: algorithm_id
        description: The identifier of the normalized digital signature algorithm.
        range: DigitalSignatureAlgorithmIdEnum
        required: true
      certificate:
        name: certificate
        recommended: true
      created_time:
        name: created_time
        description: The time when the digital signature was created.
      state:
        name: state
        description: 'The digital signature state defines the signature state, normalized
          to the

          caption of ''state_id''. In the case of ''Other'', it is defined by the
          event

          source.'
      state_id:
        name: state_id
        description: The normalized identifier of the signature state.
        range: DigitalSignatureStateIdEnum
    class_uri: ocsf:DigitalSignature
  DiscoveryDetails:
    name: DiscoveryDetails
    definition_uri: https://w3id.org/lmodel/ocsf/DiscoveryDetails
    description: The Discovery Details object describes results of a discovery task/job.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Discovery Details
    is_a: Object
    slots:
    - DiscoveryDetails_count
    - DiscoveryDetails_occurrence_details
    - DiscoveryDetails_occurrences
    - DiscoveryDetails_type
    - DiscoveryDetails_value
    slot_usage:
      count:
        name: count
        description: The number of discovered entities of the specified type.
        recommended: true
      occurrence_details:
        name: occurrence_details
        description: 'Details about where in the target entity, specified information
          was discovered.

          Only the attributes, relevant to the target entity type should be populated.'
        deprecated: Use <code>occurrences</code> instead.
      occurrences:
        name: occurrences
        description: 'Details about where in the target entity, specified information
          was discovered.

          Only the attributes, relevant to the target entity type should be populated.'
      type:
        name: type
        description: 'The specific type of information that was discovered. e.g.<code>
          name,

          phone_number, etc.</code>'
        recommended: true
      value:
        name: value
        description: Optionally, the specific value of discovered information.
    class_uri: ocsf:DiscoveryDetails
  Display:
    name: Display
    definition_uri: https://w3id.org/lmodel/ocsf/Display
    description: 'The Display object contains information about the physical or virtual
      display

      connected to a computer system.'
