    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Ticket
    is_a: Object
    slots:
    - Ticket_src_url
    - Ticket_status
    - Ticket_status_details
    - Ticket_status_id
    - Ticket_title
    - Ticket_type
    - Ticket_type_id
    - Ticket_uid
    slot_usage:
      src_url:
        name: src_url
        description: The url of a ticket in the ticket system.
        recommended: true
      status:
        name: status
        description: 'The status of the ticket normalized to the caption of the

          <code>status_id</code> value. In the case of <code>99</code>, this value
          should

          as defined by the source.'
      status_details:
        name: status_details
        description: A list of contextual descriptions of the <code>status, status_id</code>
          values.
      status_id:
        name: status_id
        description: The normalized identifier for the ticket status.
        range: TicketStatusIdEnum
      title:
        name: title
        description: The title of the ticket.
      type:
        name: type
        description: 'The linked ticket type determines whether the ticket is internal
          or in an

          external ticketing system.'
      type_id:
        name: type_id
        description: The normalized identifier for the ticket type.
        range: TicketTypeIdEnum
      uid:
        name: uid
        description: Unique identifier of the ticket.
        recommended: true
