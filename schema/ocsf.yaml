    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Evidence Artifacts
    is_a: Entity
    slots:
    - Evidences_actor
    - Evidences_api
    - Evidences_connection_info
    - Evidences_container
    - Evidences_data
    - Evidences_database
    - Evidences_databucket
    - Evidences_device
    - Evidences_dst_endpoint
    - Evidences_email
    - Evidences_file
    - Evidences_http_request
    - Evidences_http_response
    - Evidences_ja4_fingerprint_list
