            unmanned_aerial_system:
              name: unmanned_aerial_system
              required: true
        - slot_conditions:
            unmanned_system_operating_area:
              name: unmanned_system_operating_area
              required: true
      description: 'OCSF at_least_one: at least one of [''aircraft'', ''unmanned_aerial_system'',

        ''unmanned_system_operating_area''] must be set.'
