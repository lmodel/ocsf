    slot_usage:
      category:
        name: category
        description: The high-level grouping or classification this trait belongs
          to.
      name:
        name: name
        description: The name of the trait.
      type:
        name: type
        description: 'The type of the trait. For example, this can be used to indicate
          if the trait

          acts as a contributing factor (increases risk/severity) or a mitigating
          factor

          (decreases risk/severity), in the context of the related finding.'
      uid:
        name: uid
        description: The unique identifier of the trait.
      values:
        name: values
        description: The values of the trait.
    class_uri: ocsf:Trait
  TransformationInfo:
