          other events with the <code>security_control</code> profile may also be
          deemed

          alertable signals and may also carry <code>is_alert = true</code> attributes.'
        recommended: true
      resources:
        name: resources
        annotations:
          group:
            tag: group
            value: primary
        description: 'Describes details about additional resources, where classified
          or sensitive

          data is stored in, or was accessed from. <p> You can populate this object,
          if

          the specific resource type objects available in the class (<code>database,

          databucket, table, file</code>) aren''t sufficient; OR <br> You can also
          choose

          to duplicate <code>uid, name</code> of the specific resources objects, for
          a

          consistent access to resource uids across all findings.'
