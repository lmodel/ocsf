  DataLifecycleStateIdEnum:
    name: DataLifecycleStateIdEnum
    definition_uri: https://w3id.org/lmodel/ocsf/DataLifecycleStateIdEnum
    description: 'The stage or state that the data was in when it was assessed or
      scanned by a

      data security tool.'
    from_schema: https://w3id.org/lmodel/ocsf/enums
    permissible_values:
      UNKNOWN:
        text: UNKNOWN
        description: The data lifecycle state is unknown.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '0'
          caption:
            tag: caption
            value: Unknown
      DATA_AT_REST:
        text: DATA_AT_REST
        description: 'The data was stored on physical or logical media and was not
          actively moving

          through the network nor was being processed. E.g., data stored in a database,

          PDF files in a file share, or EHR records in object storage.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '1'
          caption:
            tag: caption
            value: Data at-Rest
      DATA_IN_TRANSIT:
        text: DATA_IN_TRANSIT
        description: 'The data was actively moving through the network or from one
          physical or

          logical location to another. E.g., emails being send, data replication or

          Change Data Capture (CDC) streams, or sensitive data processed on an API.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '2'
          caption:
            tag: caption
            value: Data in-Transit
      DATA_IN_USE:
        text: DATA_IN_USE
        description: 'The data was being processed, accessed, or read by a system,
          making it active

          in memory or CPU. E.g., sensitive data in a Business Intelligence tool,
          ePHI

          being processed in an EHR application or a user viewing data stored in a

          spreadsheet or PDF.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '3'
          caption:
            tag: caption
            value: Data in-Use
      OTHER:
        text: OTHER
        description: 'The data lifecycle state is not mapped. See the

          <code>data_lifecycle_state</code> attribute, which contains a data source

          specific value.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '99'
          caption:
            tag: caption
            value: Other
