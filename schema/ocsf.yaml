          ocsf_uid:
            tag: ocsf_uid
            value: '1'
          caption:
            tag: caption
            value: Spawn
      FORK:
        text: FORK
        description: 'Denotes that the <code>Launch</code> event represents the "fork"
          step of Unix

          process creation, where a process creates a clone of itself in a parent-child

          relationship. WSL1 pico processes on Windows also use the 2-step Unix model.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '2'
          caption:
            tag: caption
            value: Fork
      EXEC:
        text: EXEC
        description: 'Denotes that the <code>Launch</code> event represents the "exec"
          step of Unix

          process creation, where a process replaces its executable image, command
          line,

          and environment. WSL1 pico processes on Windows also use the 2-step Unix
          model.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '3'
          caption:
            tag: caption
            value: Exec
