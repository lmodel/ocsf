          properties.
      is_directed:
        name: is_directed
        description: 'Indicates whether the edge is (<code>true</code>) or undirected

          (<code>false</code>).'
      name:
        name: name
        description: The human-readable name or label for the edge.
        recommended: true
      relation:
        name: relation
        description: The type of relationship between nodes (e.g. is-attached-to ,
          depends-on, etc).
        recommended: true
      source:
        name: source
        description: The unique identifier of the node where the edge originates.
        required: true
      target:
        name: target
        description: The unique identifier of the node where the edge terminates.
        required: true
      uid:
        name: uid
        description: Unique identifier of the edge.
        recommended: true
    class_uri: ocsf:Edge
  Email:
    name: Email
    definition_uri: https://w3id.org/lmodel/ocsf/Email
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["from", "to"]}'
      observable_id:
        tag: observable_id
        value: 22
    description: 'The Email object describes the email metadata such as sender, recipients,
      and

      direction, and can include embedded URLs and files.'
    notes:
    - "D3FEND\u2122 Ontology d3f:Email. \u2014 https://d3fend.mitre.org/dao/artifact/d3f:Email/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
