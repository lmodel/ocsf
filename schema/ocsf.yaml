  DetectionSystemIdEnum:
    name: DetectionSystemIdEnum
    definition_uri: https://w3id.org/lmodel/ocsf/DetectionSystemIdEnum
    description: 'The type of data security tool or system that the finding, detection,
      or alert

      originated from.'
    from_schema: https://w3id.org/lmodel/ocsf/enums
    permissible_values:
      UNKNOWN:
        text: UNKNOWN
        description: 'The type is not mapped. See the <code>detection_system</code>
          attribute, which

          contains a data source specific value.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '0'
          caption:
            tag: caption
            value: Unknown
      ENDPOINT:
        text: ENDPOINT
        description: 'A dedicated agent or sensor installed on a device, either a
          dedicated data

          security tool or an Endpoint Detection & Response (EDR) tool that can detect

          sensitive data and/or enforce data security policies. E.g., Forcepoint DLP,

          Symantec DLP, Microsoft Defender for Endpoint (MDE).'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '1'
          caption:
            tag: caption
            value: Endpoint
      DLP_GATEWAY:
        text: DLP_GATEWAY
        description: 'A Data Loss Prevention (DLP) gateway that is positioned in-line
          of an

          information store such as a network share, a database, or otherwise that
          can

          detect sensitive data and/or enforce data security policies.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '2'
          caption:
            tag: caption
            value: DLP Gateway
      MOBILE_DEVICE_MANAGEMENT:
        text: MOBILE_DEVICE_MANAGEMENT
        description: 'A Mobile Device Management (MDM) or Enterprise Mobility Management
          (EMM) tool

          that can detect sensitive data and/or enforce data security policies on
          mobile

          devices (e.g., cellphones, tablets, End User Devices [EUDs]).'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '3'
          caption:
            tag: caption
            value: Mobile Device Management
      DATA_DISCOVERY_CLASSIFICATION:
        text: DATA_DISCOVERY_CLASSIFICATION
        description: 'A tool that actively identifies and classifies sensitive data
          in digital media

          and information stores in accordance with a policy or automated functionality.

          E.g, Amazon Macie, Microsoft Purview.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '4'
          caption:
            tag: caption
            value: Data Discovery & Classification
      SECURE_WEB_GATEWAY:
        text: SECURE_WEB_GATEWAY
        description: 'A Secure Web Gateway (SWG) is any tool that can detect sensitive
          data and/or

          enforce data security policies at a network-edge such as within a proxy
          or

          firewall service.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '5'
          caption:
            tag: caption
            value: Secure Web Gateway
      SECURE_EMAIL_GATEWAY:
        text: SECURE_EMAIL_GATEWAY
        description: 'A Secure Email Gateway (SEG) is any tool that can detect sensitive
          data and/or

          enforce data security policies within email systems. E.g., Microsoft Defender

          for Office, Google Workspaces.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '6'
          caption:
            tag: caption
            value: Secure Email Gateway
      DIGITAL_RIGHTS_MANAGEMENT:
        text: DIGITAL_RIGHTS_MANAGEMENT
        description: 'A Digital Rights Management (DRM) or a dedicated Information
          Rights Management

          (IRM) are tools which can detect sensitive data and/or enforce data security

          policies on digital media via policy or user access rights.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '7'
          caption:
            tag: caption
            value: Digital Rights Management
      CLOUD_ACCESS_SECURITY_BROKER:
        text: CLOUD_ACCESS_SECURITY_BROKER
        description: 'A Cloud Access Security Broker (CASB) that can detect sensitive
          data and/or

          enforce data security policies in-line to cloud systems such as the public

          cloud or Software-as-a-Service (SaaS) tool. E.g., Forcepoint CASB, SkyHigh

          Security.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '8'
          caption:
            tag: caption
            value: Cloud Access Security Broker
      DATABASE_ACTIVITY_MONITORING:
        text: DATABASE_ACTIVITY_MONITORING
        description: 'A Database Activity Monitoring (DAM) tool that can detect sensitive
          data and/or

          enforce data security policies as part of a dedicated database or warehouse

          monitoring solution.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '9'
          caption:
            tag: caption
            value: Database Activity Monitoring
      APPLICATION_LEVEL_DLP:
        text: APPLICATION_LEVEL_DLP
        description: 'A built in Data Loss Prevention (DLP) or other data security
          capability within

          a tool or platform such as an Enterprise Resource Planning (ERP) or Customer

          Relations Management (CRM) tool that can detect sensitive data and/or enforce

          data security policies.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '10'
          caption:
            tag: caption
            value: Application-Level DLP
      DEVELOPER_SECURITY:
        text: DEVELOPER_SECURITY
        description: 'Any Developer Security tool such as an Infrastructure-as-Code
          (IAC) security

          scanner, Secrets Detection, or Secure Software Development Lifecycle (SSDLC)

          tool that can detect sensitive data and/or enforce data security policies.

          E.g., TruffleHog, GitGuardian, Git-Secrets.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '11'
          caption:
            tag: caption
            value: Developer Security
      DATA_SECURITY_POSTURE_MANAGEMENT:
        text: DATA_SECURITY_POSTURE_MANAGEMENT
        description: 'A Data Security Posture Management (DSPM) tool is a continuous
          monitoring and

          data discovery solution that can detect sensitive data and/or enforce data

          security policies for local and cloud environments. E.g., Cyera, Sentra,
          IBM

          Polar Security.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '12'
          caption:
            tag: caption
            value: Data Security Posture Management
      OTHER:
        text: OTHER
        description: 'Any other type of detection system or a multi-variate system
          made up of several

          other systems.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '99'
          caption:
            tag: caption
            value: Other
  DirectionIdEnum:
    name: DirectionIdEnum
    definition_uri: https://w3id.org/lmodel/ocsf/DirectionIdEnum
    description: 'The normalized identifier of the direction of the initiated connection,

      traffic, or email.'
    from_schema: https://w3id.org/lmodel/ocsf/enums
    permissible_values:
      UNKNOWN:
        text: UNKNOWN
        description: The connection direction is unknown.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '0'
          caption:
            tag: caption
            value: Unknown
      INBOUND:
        text: INBOUND
        description: 'Inbound network connection. The connection originated from the
          Internet or

          outside network, destined for services on the inside network.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '1'
          caption:
            tag: caption
            value: Inbound
      OUTBOUND:
        text: OUTBOUND
        description: 'Outbound network connection. The connection originated from
          inside the network,

          destined for services on the Internet or outside network.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '2'
          caption:
            tag: caption
            value: Outbound
      LATERAL:
        text: LATERAL
        description: 'Lateral network connection. The connection originated from inside
          the network,

          destined for services on the inside network.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '3'
          caption:
            tag: caption
            value: Lateral
      LOCAL:
        text: LOCAL
        description: 'Local network connection (<code>localhost</code>). The connection
          is

          intra-device, originating from and destined for services running on the
          same

          device.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '4'
          caption:
            tag: caption
            value: Local
      OTHER:
        text: OTHER
        description: 'The direction is not mapped. See the <code>direction</code>
          attribute, which

          contains a data source specific value.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '99'
          caption:
            tag: caption
            value: Other
  DispositionIdEnum:
    name: DispositionIdEnum
    definition_uri: https://w3id.org/lmodel/ocsf/DispositionIdEnum
    description: 'Describes the outcome or action taken by a security control, such
      as access

      control checks, malware detections or various types of policy violations.'
    from_schema: https://w3id.org/lmodel/ocsf/enums
    permissible_values:
      UNKNOWN:
        text: UNKNOWN
        description: The disposition is unknown.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '0'
          caption:
            tag: caption
            value: Unknown
      ALLOWED:
        text: ALLOWED
        description: Granted access or allowed the action to the protected resource.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '1'
          caption:
            tag: caption
            value: Allowed
      BLOCKED:
        text: BLOCKED
        description: Denied access or blocked the action to the protected resource.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '2'
          caption:
            tag: caption
            value: Blocked
      QUARANTINED:
        text: QUARANTINED
        description: A suspicious file or other content was moved to a benign location.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '3'
          caption:
            tag: caption
            value: Quarantined
      ISOLATED:
        text: ISOLATED
        description: A session was isolated on the network or within a browser.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '4'
          caption:
            tag: caption
            value: Isolated
      DELETED:
        text: DELETED
        description: A file or other content was deleted.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '5'
          caption:
            tag: caption
            value: Deleted
      DROPPED:
        text: DROPPED
        description: 'The request was detected as a threat and resulted in the connection
          being

          dropped.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '6'
          caption:
            tag: caption
            value: Dropped
      CUSTOM_ACTION:
        text: CUSTOM_ACTION
        description: 'A custom action was executed such as running of a command script.
          Use the

          <code>message</code> attribute of the base class for details.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '7'
          caption:
            tag: caption
            value: Custom Action
      APPROVED:
        text: APPROVED
        description: 'A request or submission was approved. For example, when a form
          was properly

          filled out and submitted. This is distinct from <code>1</code> ''Allowed''.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '8'
          caption:
            tag: caption
            value: Approved
      RESTORED:
        text: RESTORED
        description: A quarantined file or other content was restored to its original
          location.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '9'
          caption:
            tag: caption
            value: Restored
      EXONERATED:
        text: EXONERATED
        description: A suspicious or risky entity was deemed to no longer be suspicious
          (re-scored).
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '10'
          caption:
            tag: caption
            value: Exonerated
      CORRECTED:
        text: CORRECTED
        description: A corrupt file or configuration was corrected.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '11'
          caption:
            tag: caption
            value: Corrected
      PARTIALLY_CORRECTED:
        text: PARTIALLY_CORRECTED
        description: A corrupt file or configuration was partially corrected.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '12'
          caption:
            tag: caption
            value: Partially Corrected
      UNCORRECTED:
        text: UNCORRECTED
        description: A corrupt file or configuration was not corrected.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '13'
          caption:
            tag: caption
            value: Uncorrected
      DELAYED:
        text: DELAYED
        description: 'An operation was delayed, for example if a restart was required
          to finish the

          operation.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '14'
          caption:
            tag: caption
            value: Delayed
      DETECTED:
        text: DETECTED
        description: Suspicious activity or a policy violation was detected without
          further action.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '15'
          caption:
            tag: caption
            value: Detected
      NO_ACTION:
        text: NO_ACTION
        description: The outcome of an operation had no action taken.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '16'
          caption:
            tag: caption
            value: No Action
      LOGGED:
        text: LOGGED
        description: The operation or action was logged without further action.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '17'
          caption:
            tag: caption
            value: Logged
      TAGGED:
        text: TAGGED
        description: A file or other entity was marked with extended attributes.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '18'
          caption:
            tag: caption
            value: Tagged
      ALERT:
        text: ALERT
        description: 'The request or activity was detected as a threat and resulted
          in a notification

          but request was not blocked.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '19'
          caption:
            tag: caption
            value: Alert
      COUNT:
        text: COUNT
        description: 'Counted the request or activity but did not determine whether
          to allow it or

          block it.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '20'
          caption:
            tag: caption
            value: Count
      RESET:
        text: RESET
        description: 'The request was detected as a threat and resulted in the connection
          being

          reset.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '21'
          caption:
            tag: caption
            value: Reset
      CAPTCHA:
        text: CAPTCHA
        description: 'Required the end user to solve a CAPTCHA puzzle to prove that
          a human being is

          sending the request.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '22'
          caption:
            tag: caption
            value: Captcha
      CHALLENGE:
        text: CHALLENGE
        description: 'Ran a silent challenge that required the client session to verify
          that it''s a

          browser, and not a bot.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '23'
          caption:
            tag: caption
            value: Challenge
      ACCESS_REVOKED:
        text: ACCESS_REVOKED
        description: 'The requestor''s access has been revoked due to security policy
          enforcements.

          Note: use the <code>Host</code> profile if the <code>User</code> or

          <code>Actor</code> requestor is not present in the event class.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '24'
          caption:
            tag: caption
            value: Access Revoked
      REJECTED:
        text: REJECTED
        description: 'A request or submission was rejected.  For example, when a form
          was improperly

          filled out and submitted. This is distinct from <code>2</code> ''Blocked''.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '25'
          caption:
            tag: caption
            value: Rejected
      UNAUTHORIZED:
        text: UNAUTHORIZED
        description: 'An attempt to access a resource was denied due to an authorization
          check that

          failed. This is a more specific disposition than <code>2</code> ''Blocked''
          and

          can be complemented with the <code>authorizations</code> attribute for more

          detail.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '26'
          caption:
            tag: caption
            value: Unauthorized
      ERROR:
        text: ERROR
        description: 'An error occurred during the processing of the activity or request.
          Use the

          <code>message</code> attribute of the base class for details.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '27'
          caption:
            tag: caption
            value: Error
      OTHER:
        text: OTHER
        description: 'The disposition is not mapped. See the <code>disposition</code>
          attribute,

          which contains a data source specific value.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '99'
          caption:
            tag: caption
            value: Other
