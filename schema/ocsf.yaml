        range: DroneFlightsActivityActivityIdEnum
        required: true
      auth_protocol:
        name: auth_protocol
        annotations:
          group:
            tag: group
            value: context
        description: 'The authentication type as defined by the caption of

          <code>auth_protocol_id</code>. In the case of ''Other'', it is defined by
          the

