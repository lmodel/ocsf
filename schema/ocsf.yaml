        annotations:
          group:
            tag: group
            value: context
        description: 'The destination network endpoint for the ADS-B system, if telemetry
          is being

          remotely broadcasted.'
      protocol_name:
        name: protocol_name
        annotations:
          group:
            tag: group
            value: primary
        description: 'The specific protocol associated with the ADS-B system. E.g.
          <code>ADS-B

          UAT</code> or <code>ADS-B ES</code>.'
        recommended: true
      rssi:
        name: rssi
        annotations:
          group:
            tag: group
            value: context
        description: 'Recent average RSSI (signal power) measured in dbFS. This value
          will always be

          negative, e.g., <code>-87.13</code>.'
      src_endpoint:
        name: src_endpoint
        annotations:
          group:
            tag: group
            value: context
        description: The source network endpoint for the ADS-B system.
      traffic:
        name: traffic
        annotations:
          group:
            tag: group
            value: context
        description: 'Traffic refers to the amount of data transmitted from a ADS-B
          remote monitoring

          system at a given point of time. Ex: <code>bytes_in</code> and

          <code>bytes_out</code>.'
