    from_schema: https://w3id.org/lmodel/ocsf/enums
    permissible_values:
      ISOLATE:
        text: ISOLATE
        description: "Creates logical or physical barriers in a system which reduces\
          \ opportunities\nfor adversaries to create further accesses. Defined by\
          \ D3FEND\u2122 <a\ntarget='_blank'\nhref='https://d3fend.mitre.org/tactic/d3f:Isolate/'>d3f:Isolate</a>."
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '1'
          caption:
            tag: caption
            value: Isolate
      EVICT:
        text: EVICT
        description: "Removes an adversary or malicious resource from a device or\
          \ computer network.\nDefined by D3FEND\u2122 <a target='_blank'\nhref='https://d3fend.mitre.org/tactic/d3f:Evict/'>d3f:Evict</a>."
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '2'
          caption:
            tag: caption
            value: Evict
      RESTORE:
        text: RESTORE
        description: "Returns the system to a better state. Defined by D3FEND\u2122\
          \ <a target='_blank'\nhref='https://d3fend.mitre.org/tactic/d3f:Restore/'>d3f:Restore</a>."
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '3'
          caption:
            tag: caption
            value: Restore
      HARDEN:
        text: HARDEN
        description: "Increases the opportunity cost of computer network exploitation.\
          \ Defined by\nD3FEND\u2122 <a target='_blank'\nhref='https://d3fend.mitre.org/tactic/d3f:Harden/'>d3f:Harden</a>."
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '4'
          caption:
            tag: caption
            value: Harden
      DETECT:
        text: DETECT
        description: "Further identify adversary access to or unauthorized activity\
          \ on computer\nnetworks. Defined by D3FEND\u2122 <a target='_blank'\nhref='https://d3fend.mitre.org/tactic/d3f:Detect/'>d3f:Detect</a>."
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '5'
          caption:
            tag: caption
            value: Detect
      UNKNOWN:
        text: UNKNOWN
        description: The event activity is unknown.
        annotations:
