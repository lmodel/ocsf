    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Security State
    is_a: Object
    slots:
    - SecurityState_state
    - SecurityState_state_id
    slot_usage:
      state:
        name: state
        description: 'The security state, normalized to the caption of the state_id
          value. In the

          case of ''Other'', it is defined by the source.'
      state_id:
        name: state_id
        description: The security state of the managed entity.
        range: SecurityStateStateIdEnum
        recommended: true
    class_uri: ocsf:SecurityState
  ServicePrivilegeAnalysis:
    name: ServicePrivilegeAnalysis
    definition_uri: https://w3id.org/lmodel/ocsf/ServicePrivilegeAnalysis
    description: 'The Service Privilege Analysis object describes privilege analysis
      results for

      a single cloud service or resource namespace. It provides metrics on privilege

      usage, counts by type, and mappings to potential attack techniques.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Service Privilege Analysis
    is_a: Object
    slots:
    - ServicePrivilegeAnalysis_all_privileges_unused
    - ServicePrivilegeAnalysis_analyzed_privileges_count
    - ServicePrivilegeAnalysis_execute_count
    - ServicePrivilegeAnalysis_last_used_time
    - ServicePrivilegeAnalysis_name
    - ServicePrivilegeAnalysis_privilege_attack_info_list
    - ServicePrivilegeAnalysis_read_count
    - ServicePrivilegeAnalysis_unused_privileges_count
    - ServicePrivilegeAnalysis_write_count
    slot_usage:
      all_privileges_unused:
        name: all_privileges_unused
        description: Indicates whether all privileges within this service are unused.
      analyzed_privileges_count:
        name: analyzed_privileges_count
        description: The total count of privileges analyzed within this service.
      execute_count:
        name: execute_count
        description: The count of execute-type privileges within this service.
      last_used_time:
        name: last_used_time
        description: The most recent time any privilege in this service was used.
      name:
        name: name
        description: 'The service or namespace identifier. Examples: <code>s3</code>,

          <code>ec2</code> (AWS); <code>Microsoft.Storage</code> (Azure);

          <code>storage</code> (GCP).'
        required: true
      privilege_attack_info_list:
        name: privilege_attack_info_list
        description: The list of privilege-to-attack mappings for this service.
      read_count:
        name: read_count
        description: The count of read-type privileges within this service.
      unused_privileges_count:
        name: unused_privileges_count
        description: The count of unused privileges within this service.
      write_count:
        name: write_count
        description: The count of write-type privileges within this service.
    class_uri: ocsf:ServicePrivilegeAnalysis
  Session:
    name: Session
    definition_uri: https://w3id.org/lmodel/ocsf/Session
    description: 'The Session object describes details about an authenticated session.
      e.g.

      Session Creation Time, Session Issuer.'
    notes:
    - "D3FEND\u2122 Ontology d3f:Session \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:Session/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:Session/
    aliases:
    - Session
    is_a: Object
    slots:
    - Session_count
    - Session_created_time
    - credential_uid
    - Session_expiration_reason
    - Session_expiration_time
    - is_mfa
    - Session_is_remote
    - is_vpn
    - Session_issuer
    - Session_terminal
    - Session_uid
    - Session_uid_alt
    - Session_uuid
    slot_usage:
      count:
        name: count
        description: 'The number of identical sessions spawned from the same source
          IP, destination

          IP, application, and content/threat type seen over a period of time.'
      created_time:
        name: created_time
        description: The time when the session was created.
        recommended: true
      expiration_reason:
        name: expiration_reason
        description: The reason which triggered the session expiration.
      expiration_time:
        name: expiration_time
        description: The session expiration time.
      is_remote:
        name: is_remote
        recommended: true
      issuer:
        name: issuer
