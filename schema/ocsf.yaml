    - NetworkProxyProfile_proxy_connection_info
    - NetworkProxyProfile_proxy_endpoint
    - NetworkProxyProfile_proxy_http_request
    - NetworkProxyProfile_proxy_http_response
    - NetworkProxyProfile_proxy_tls
    - NetworkProxyProfile_proxy_traffic
    - LoadBalancerProfile_load_balancer
    slot_usage:
      app_name:
        name: app_name
        annotations:
          group:
            tag: group
            value: context
        description: 'The network application name identified by tools such as NBAR
          or App ID (e.g.,

          youtube, facebook, webex). This represents a specific network application
          that

          uses standard protocols (such as https or quic) to deliver its service.'
      app_protocol_name:
        name: app_protocol_name
        annotations:
          group:
            tag: group
            value: context
        description: 'The application-layer (Layer 7) protocol name identified by
          deep packet inspection or packet parsing (e.g., <code>https</code>, <code>quic</code>,
          <code>ssh</code>, <code>dns</code>), expressed as an IANA-registered service
          name from the IANA Service Name and Transport Protocol Port Number Registry.


          <p><b>Note:</b> Port numbers alone are not always a reliable indicator of
          the actual application protocol in use.</p>'
      connection_info:
        name: connection_info
        annotations:
          group:
            tag: group
            value: primary
        recommended: true
      cumulative_traffic:
        name: cumulative_traffic
        annotations:
          group:
            tag: group
            value: context
        description: 'The cumulative (running total) network traffic aggregated from
          the start of a

          flow or session. Use when reporting: (1) total accumulated bytes/packets
          since

          flow initiation, (2) combined aggregation models where both incremental
          deltas

          and running totals are reported together (populate both <code>traffic</code>

          for the delta and this attribute for the cumulative total), or (3) final

          summary metrics when a long-lived connection closes. This represents the
          sum of

          all activity from flow start to the current observation, not a delta or

          point-in-time value.'
      dst_endpoint:
        name: dst_endpoint
        annotations:
          group:
            tag: group
            value: primary
        description: The responder (server) in a network connection.
        recommended: true
      ja4_fingerprint_list:
        name: ja4_fingerprint_list
        annotations:
          group:
            tag: group
            value: context
      network_observation_point:
        name: network_observation_point
        annotations:
          group:
            tag: group
            value: context
        description: 'The network endpoint that observes or inspects network traffic
          as a third-party

          system, used when the observer is neither the source nor the destination
          of the

          communication (when <code>observation_point_id</code> = 3). Examples include

          network taps, span ports, inline security devices, or packet capture systems

          that monitor traffic between other endpoints.'
      observation_point:
        name: observation_point
        description: 'Indicates whether the source network endpoint, destination network
          endpoint, or

          neither served as the observation point for the activity. The value is

          normalized to the caption of the <code>observation_point_id</code>.'
      observation_point_id:
        name: observation_point_id
        description: 'The normalized identifier of the observation point. The observation
          point

          identifier indicates whether the source network endpoint, destination network

          endpoint, or neither served as the observation point for the activity.'
        range: NetworkEventObservationPointIdEnum
      packet_list:
        name: packet_list
        annotations:
          group:
            tag: group
            value: context
      proxy:
        name: proxy
        annotations:
          group:
            tag: group
            value: primary
        recommended: true
      src_endpoint:
        name: src_endpoint
        annotations:
          group:
            tag: group
            value: primary
        description: The initiator (client) of the network connection.
        recommended: true
      tls:
        name: tls
        annotations:
          group:
            tag: group
            value: context
      traffic:
        name: traffic
        annotations:
          group:
            tag: group
            value: primary
        description: 'The network traffic for this observation period. Use when reporting:
          (1) delta

          values (bytes/packets transferred since the last observation), (2)

          instantaneous measurements at a specific point in time, or (3) standalone

          single-event metrics. This attribute represents a point-in-time measurement
          or

          incremental change, not a running total. For accumulated totals across multiple

          observations or the lifetime of a flow, use <code>cumulative_traffic</code>

          instead.'
        recommended: true
    class_uri: ocsf:NetworkEvent
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            dst_endpoint:
              name: dst_endpoint
              required: true
        - slot_conditions:
            src_endpoint:
              name: src_endpoint
              required: true
      description: 'OCSF at_least_one: at least one of [''dst_endpoint'', ''src_endpoint'']
        must be

        set.'
