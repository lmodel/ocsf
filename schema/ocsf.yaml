    - capec:Technique
    is_a: Entity
    slots:
    - name
    - Technique_src_url
    - uid
    - Technique_name
    - Technique_uid
    slot_usage:
      name:
        name: name
        description: 'The name of the attack technique. For example: <code>Active
          Scanning</code> or

