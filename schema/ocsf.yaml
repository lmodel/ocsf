              required: true
        - slot_conditions:
            unmanned_system_operator:
              name: unmanned_system_operator
              required: true
        - slot_conditions:
            unmanned_system_operating_area:
              name: unmanned_system_operating_area
              required: true
      description: 'OCSF at_least_one: at least one of [''src_endpoint'', ''unmanned_aerial_system'',

        ''unmanned_system_operator'', ''unmanned_system_operating_area''] must be
        set.'
