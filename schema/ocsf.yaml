    - Service_name
    - Service_uid
    slot_usage:
      labels:
        name: labels
        description: The list of labels associated with the service.
      name:
        name: name
        description: The name of the service.
      tags:
        name: tags
        description: The list of tags; <code>{key:value}</code> pairs associated to
          the service.
      uid:
        name: uid
        description: The unique identifier of the service.
      version:
        name: version
        description: The version of the service.
        recommended: true
    class_uri: ocsf:Service
  SubTechnique:
    name: SubTechnique
    definition_uri: https://w3id.org/lmodel/ocsf/SubTechnique
    description: "The MITRE Sub-technique object describes the ATT&CK\xAE or ATLAS\u2122\
      \ Sub-technique ID\nand/or name associated to an attack."
    notes:
    - "ATT&CK\xAE Matrix \u2014 https://attack.mitre.org"
    - "ATLAS\u2122 Matrix \u2014 https://atlas.mitre.org/matrices/ATLAS"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://attack.mitre.org
