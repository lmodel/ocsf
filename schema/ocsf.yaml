        name: unmanned_aerial_system
        annotations:
          group:
            tag: group
            value: primary
        required: true
      unmanned_system_operating_area:
        name: unmanned_system_operating_area
        annotations:
          group:
            tag: group
            value: primary
        recommended: true
      unmanned_system_operator:
        name: unmanned_system_operator
        annotations:
          group:
            tag: group
            value: primary
        required: true
