      description: 'OCSF at_least_one: at least one of [''actor'', ''api'', ''connection_info'',
        ''data'',

        ''database'', ''databucket'', ''device'', ''dst_endpoint'', ''email'', ''file'',
        ''process'',

        ''query'', ''resources'', ''src_endpoint'', ''url'', ''user'', ''job'', ''script'']
        must be

        set.'
  Extension:
    name: Extension
    definition_uri: https://w3id.org/lmodel/ocsf/Extension
    description: 'The OCSF Schema Extension object provides detailed information about
      the schema

      extension used to construct the event. The schema extensions are registered
      in

      the <a target=''_blank''

      href=''https://github.com/ocsf/ocsf-schema/blob/main/extensions.md''>extensions.md</a>

      file.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Schema Extension
    is_a: Entity
    slots:
    - name
    - uid
    - Extension_version
    - Extension_name
    - Extension_uid
    slot_usage:
      name:
        name: name
        description: 'The schema extension name. For example: <code>dev</code>.'
      uid:
        name: uid
        description: 'The schema extension unique identifier. For example: <code>999</code>.'
      version:
        name: version
        description: 'The schema extension version. For example: <code>1.0.0-alpha.2</code>.'
        required: true
    class_uri: ocsf:Extension
  Feature:
    name: Feature
    definition_uri: https://w3id.org/lmodel/ocsf/Feature
    description: 'The Feature object provides information about the software product
      feature that

      generated a specific event. It encompasses details related to the capabilities,

      components, user interface (UI) design, and performance upgrades associated

      with the feature.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Feature
    is_a: Entity
    slots:
    - name
    - uid
    - Feature_version
    - Feature_name
    - Feature_uid
    slot_usage:
      name:
        name: name
        description: The name of the feature.
      uid:
        name: uid
        description: The unique identifier of the feature.
      version:
        name: version
        description: The version of the feature.
        recommended: true
    class_uri: ocsf:Feature
  File:
    name: File
    definition_uri: https://w3id.org/lmodel/ocsf/File
    annotations:
      observable_id:
        tag: observable_id
        value: 24
    description: 'The File object represents the metadata associated with a file stored
      in a

      computer system. It encompasses information about the file itself, including

      its attributes, properties, and organizational details.'
    notes:
    - "D3FEND\u2122 Ontology d3f:File \u2014\nhttps://next.d3fend.mitre.org/dao/artifact/d3f:File/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://next.d3fend.mitre.org/dao/artifact/d3f:File/
    aliases:
    - File
    exact_mappings:
    - stix:File
    - uco_master:File
    is_a: Entity
    mixins:
    - DataClassificationProfile
    slots:
    - accessed_time
    - accessor
    - attributes
    - company_name
    - confidentiality
    - confidentiality_id
    - File_created_time
    - File_creator
    - File_desc
    - drive_type
    - drive_type_id
    - File_encryption_details
    - File_ext
    - File_hashes
    - imported_symbols
    - File_internal_name
    - File_is_deleted
    - File_is_encrypted
    - File_is_public
    - File_is_readonly
    - is_system
    - mime_type
    - File_modified_time
    - File_modifier
    - name
    - owner
    - parent_folder
    - File_path
    - File_product
    - security_descriptor
    - File_signature
    - signatures
    - size
    - File_storage_class
    - File_tags
    - File_type
    - File_type_id
    - uid
    - File_uri
    - File_url
    - File_version
    - File_volume
    - xattributes
    - File_name
    - File_uid
    - DataClassificationProfile_data_classification
    - DataClassificationProfile_data_classifications
    slot_usage:
      created_time:
        name: created_time
        description: The time when the file was created.
      creator:
        name: creator
        description: The user that created the file.
      desc:
        name: desc
        description: 'The description of the file, as returned by file system. For
          example: the

          description as returned by the Unix file command or the Windows file type.'
      encryption_details:
        name: encryption_details
        description: 'The encryption details of the file. Should be populated if the
          file is

          encrypted.'
      ext:
        name: ext
        description: 'The extension of the file, excluding the leading dot. For example:

          <code>exe</code> from <code>svchost.exe</code>, or <code>gz</code> from

          <code>export.tar.gz</code>.'
        recommended: true
      hashes:
        name: hashes
        recommended: true
      internal_name:
        name: internal_name
        description: 'The name of the file as identified within the file itself. This
          contrasts with

          the name by which the file is known on disk. Where available, the internal
          name

          is widely used by security practitioners and detection content because the

          on-disk file name is not reliable. On the Windows OS, most PE files contain
          a

          <a

          href="https://learn.microsoft.com/en-us/windows/win32/menurc/versioninfo-resource">VERSIONINFO</a>

          resource from which the internal name can be obtained. On macOS, binaries
          can

          optionally embed a copy of the application''s Info.plist file which in turn

          contains the name of the executable.'
      is_deleted:
        name: is_deleted
        description: Indicates if the file was deleted from the filesystem.
      is_encrypted:
        name: is_encrypted
        description: Indicates if the file is encrypted.
      is_public:
        name: is_public
        description: 'Indicates if the file is publicly accessible. For example in
          an object''s public

          access in AWS S3'
      is_readonly:
        name: is_readonly
        description: Indicates that the file cannot be modified.
      modified_time:
        name: modified_time
        description: The time when the file was last modified.
      modifier:
        name: modifier
        description: The user that last modified the file.
      name:
        name: name
        description: 'The name of the file. For example: <code>svchost.exe</code>'
        required: true
      path:
        name: path
        description: 'The full path to the file. For example:

          <code>c:\windows\system32\svchost.exe</code>.'
        recommended: true
      product:
        name: product
        description: The product that created or installed the file.
      signature:
        name: signature
        deprecated: Use the <code>signatures</code> attribute.
      storage_class:
        name: storage_class
        description: 'The storage class of the file. For example in AWS S3: <code>STANDARD,

          STANDARD_IA, GLACIER</code>.'
      tags:
        name: tags
        description: The list of tags; <code>{key:value}</code> pairs associated to
          the file.
      type:
        name: type
        description: The file type.
      type_id:
        name: type_id
        description: 'The file type ID. Note the distinction between a <code>Regular
          File</code> and

          an <code>Executable File</code>. If the distinction is not known, or not

          indicated by the log, use <code>Regular File</code>. In this case, it should

          not be assumed that a Regular File is not executable.'
        range: FileTypeIdEnum
        required: true
      uid:
        name: uid
        description: 'The unique identifier of the file as defined by the storage
          system, such the

          file system file ID.'
      uri:
        name: uri
        description: 'The file URI, such as those reporting by static analysis tools.
          E.g.,

          <code>file:///C:/dev/sarif/sarif-tutorials/samples/Introduction/simple-example.js</code>'
      url:
        name: url
        description: The URL of the file, when applicable.
      version:
        name: version
        description: 'The file version. For example: <code>8.0.7601.17514</code>.'
      volume:
        name: volume
        description: The volume on the storage device where the file is located.
    class_uri: ocsf:File
  FindingObject:
    name: FindingObject
    definition_uri: https://w3id.org/lmodel/ocsf/FindingObject
    description: 'The Finding object describes metadata related to a security finding
      generated

      by a security tool or system.'
    deprecated: Use the new <code>finding_info</code> object. (since 1.0.0)
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Finding
    is_a: Object
    slots:
    - FindingObject_created_time
    - FindingObject_desc
    - FindingObject_first_seen_time
    - FindingObject_last_seen_time
    - FindingObject_modified_time
    - FindingObject_product
    - FindingObject_product_uid
    - related_events
    - remediation
    - FindingObject_src_url
    - supporting_data
    - FindingObject_title
    - FindingObject_types
    - FindingObject_uid
    slot_usage:
      created_time:
        name: created_time
        description: The time when the finding was created.
      desc:
        name: desc
        description: The description of the reported finding.
      first_seen_time:
        name: first_seen_time
        description: The time when the finding was first observed.
      last_seen_time:
        name: last_seen_time
        description: The time when the finding was most recently observed.
      modified_time:
        name: modified_time
        description: The time when the finding was last modified.
      product:
        name: product
        description: Details about the product that reported the finding.
      product_uid:
        name: product_uid
        description: The unique identifier of the product that reported the finding.
      src_url:
        name: src_url
        description: The URL pointing to the source of the finding.
      title:
        name: title
        description: A title or a brief phrase summarizing the reported finding.
        required: true
      types:
        name: types
        description: One or more types of the reported finding.
      uid:
        name: uid
        description: The unique identifier of the reported finding.
        required: true
    class_uri: ocsf:FindingObject
  FindingInfo:
    name: FindingInfo
    definition_uri: https://w3id.org/lmodel/ocsf/FindingInfo
    description: 'The Finding Information object describes metadata related to a security
      finding

      generated by a security tool or system.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Finding Information
    is_a: Object
    slots:
    - FindingInfo_analytic
    - FindingInfo_attack_graph
    - FindingInfo_attacks
    - FindingInfo_created_time
    - data_sources
    - FindingInfo_desc
    - FindingInfo_first_seen_time
    - kill_chain
    - FindingInfo_last_seen_time
    - FindingInfo_modified_time
    - FindingInfo_product
    - FindingInfo_product_uid
    - FindingInfo_related_analytics
    - related_events
    - related_events_count
    - FindingInfo_src_url
    - FindingInfo_tags
    - FindingInfo_title
    - FindingInfo_traits
    - FindingInfo_types
    - FindingInfo_uid
    - FindingInfo_uid_alt
    slot_usage:
      analytic:
        name: analytic
        recommended: true
      attack_graph:
        name: attack_graph
        annotations:
          group:
            tag: group
            value: context
      attacks:
        name: attacks
        description: "The <a target='_blank' href='https://attack.mitre.org'>MITRE\
          \ ATT&CK\xAE</a>\ntechnique and associated tactics related to the finding."
      created_time:
        name: created_time
        description: The time when the finding was created.
      desc:
        name: desc
        description: The description of the reported finding.
      first_seen_time:
        name: first_seen_time
        description: 'The time when the finding was first observed. e.g. The time
          when a

          vulnerability was first observed. <p>It can differ from the

          <code>created_time</code> timestamp, which reflects the time this finding
          was

          created.</p>'
      last_seen_time:
        name: last_seen_time
        description: 'The time when the finding was most recently observed. e.g. The
          time when a

          vulnerability was most recently observed. <p>It can differ from the

          <code>modified_time</code> timestamp, which reflects the time this finding
          was

          last modified.</p>'
      modified_time:
        name: modified_time
        description: The time when the finding was last modified.
      product:
        name: product
        description: Details about the product that reported the finding.
      product_uid:
        name: product_uid
        description: The unique identifier of the product that reported the finding.
      related_analytics:
        name: related_analytics
        description: Other analytics related to this finding.
      src_url:
        name: src_url
        description: The URL pointing to the source of the finding.
      tags:
        name: tags
        description: The list of tags; <code>{key:value}</code> pairs associated with
          the finding.
      title:
        name: title
        description: A title or a brief phrase summarizing the reported finding.
        recommended: true
      traits:
        name: traits
        description: The list of key traits or characteristics extracted from the
          finding.
      types:
        name: types
        description: One or more types of the reported finding.
      uid:
        name: uid
        description: The unique identifier of the reported finding.
        required: true
      uid_alt:
        name: uid_alt
        description: The alternative unique identifier of the reported finding.
    class_uri: ocsf:FindingInfo
  Fingerprint:
    name: Fingerprint
    definition_uri: https://w3id.org/lmodel/ocsf/Fingerprint
    annotations:
      observable_id:
        tag: observable_id
        value: 30
    description: 'The Fingerprint object provides detailed information about a fingerprint,
      which

      is a compact representation of data used to identify a longer piece of

      information, such as a public key, file content, or application implementation.

      It contains the algorithm or scheme and value of the fingerprint, enabling

      efficient and reliable identification of the associated data.'
    notes:
    - "D3FEND\u2122 Ontology d3f:DigitalFingerprint. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:DigitalFingerprint/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:DigitalFingerprint/
    aliases:
    - Fingerprint
    exact_mappings:
    - uco_master:Hash
    is_a: Object
    slots:
    - Fingerprint_algorithm
    - Fingerprint_algorithm_id
    - Fingerprint_value
    slot_usage:
      algorithm:
        name: algorithm
        description: 'The algorithm or scheme used to create the fingerprint, normalized
          to the

          caption of <code>algorithm_id</code>. In the case of <code>Other</code>,
          it is

          defined by the event source.'
      algorithm_id:
        name: algorithm_id
        description: 'The identifier of the normalized algorithm or scheme, which
          was used to create

          the fingerprint.'
        range: FingerprintAlgorithmIdEnum
        required: true
      value:
        name: value
        description: 'The fingerprint value.<p><b>Note:</b> This uses type <code>file_hash_t</code>

          (&quot;Hash&quot;), which has been generalized for all fingerprints but
          retains

          the same name and caption for backwards compatibility.</p>'
        required: true
    class_uri: ocsf:Fingerprint
  FunctionInvocation:
    name: FunctionInvocation
    definition_uri: https://w3id.org/lmodel/ocsf/FunctionInvocation
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["parameters", "return_value", "error"]}'
    description: 'The Function Invocation object provides details regarding the invocation
      of a

      function.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Function Invocation
    is_a: Object
    slots:
    - FunctionInvocation_error
    - parameters
    - return_value
    slot_usage:
      error:
        name: error
        description: 'The error indication returned from the function. This may differ
          from the

          return value (e.g. when <code>errno</code> is used).'
    class_uri: ocsf:FunctionInvocation
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            parameters:
              name: parameters
              required: true
        - slot_conditions:
            return_value:
              name: return_value
              required: true
        - slot_conditions:
            error:
              name: error
              required: true
      description: 'OCSF at_least_one: at least one of [''parameters'', ''return_value'',
        ''error''] must

        be set.'
  GpuInfo:
    name: GpuInfo
    definition_uri: https://w3id.org/lmodel/ocsf/GpuInfo
    description: 'The GPU information object contains attributes describing graphical
      processing

      hardware.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - GPU Information
    is_a: Object
    slots:
    - bus_type
    - GpuInfo_bus_type_id
    - cores
    - GpuInfo_model
    - GpuInfo_vendor_name
    - GpuInfo_vram_mode
    - GpuInfo_vram_mode_id
    - GpuInfo_vram_size
    slot_usage:
      bus_type_id:
        name: bus_type_id
        description: The normalized identifier of the attachment bus or interface
          standard.
        range: GpuInfoBusTypeIdEnum
      model:
        name: model
        description: 'The model name of the GPU. For example: <code>GeForce RTX A6000</code>,

          <code>Radeon PRO W7900</code>, or <code>Intel Data Center GPU Max 1550</code>.'
        recommended: true
      vendor_name:
        name: vendor_name
        description: 'The name of the vendor of the GPU. For example: <code>NVIDIA</code>,

          <code>AMD</code>, or <code>Intel</code>.'
        recommended: true
      vram_mode:
        name: vram_mode
        recommended: true
      vram_mode_id:
        name: vram_mode_id
        range: GpuInfoVramModeIdEnum
        recommended: true
      vram_size:
        name: vram_size
        recommended: true
    class_uri: ocsf:GpuInfo
  Graph:
    name: Graph
    definition_uri: https://w3id.org/lmodel/ocsf/Graph
    description: A graph data structure representation with nodes and edges.
    notes:
    - "JSON graph specification. \u2014\nhttps://github.com/jsongraph/json-graph-specification/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://github.com/jsongraph/json-graph-specification/
    aliases:
    - Graph
    is_a: Entity
    slots:
    - Graph_desc
    - Graph_edges
    - Graph_is_directed
    - name
    - Graph_nodes
    - Graph_query_language
    - Graph_query_language_id
    - Graph_type
    - uid
    - Graph_name
    - Graph_uid
    slot_usage:
      desc:
        name: desc
        description: 'The graph description - provides additional details about the
          graph''s purpose

          and contents.'
      edges:
        name: edges
        description: 'The edges/connections between nodes in the graph - contains
          the collection of

          <code>edge</code> objects defining relationships between nodes.'
      is_directed:
        name: is_directed
        description: 'Indicates if the graph is directed (<code>true</code>) or undirected

          (<code>false</code>).'
      name:
        name: name
        description: The graph name - a human readable identifier for the graph.
      nodes:
        name: nodes
        description: 'The nodes/vertices of the graph - contains the collection of
          <code>node</code>

          objects that make up the graph.'
        required: true
      query_language:
        name: query_language
        description: 'The graph query language, normalized to the caption of the

          <code>query_language_id</code> value.'
      query_language_id:
        name: query_language_id
        description: 'The normalized identifier of a graph query language that can
          be used to

          interact with the graph.'
        range: GraphQueryLanguageIdEnum
        recommended: true
      type:
        name: type
        description: 'The graph type. Typically useful to represent the specific type
          of graph that

          is used.'
      uid:
        name: uid
        description: Unique identifier of the graph - a unique ID to reference this
          specific graph.
    class_uri: ocsf:Graph
  Group:
    name: Group
    definition_uri: https://w3id.org/lmodel/ocsf/Group
    description: 'The Group object represents a collection or association of entities,
      such as

      users, policies, or devices. It serves as a logical grouping mechanism to

      organize and manage entities with similar characteristics or permissions within

      a system or organization, including but not limited to purposes of access

      control.'
    notes:
    - "D3FEND\u2122 Ontology d3f:AccessControlGroup. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:AccessControlGroup/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:AccessControlGroup/
    aliases:
    - Group
    is_a: Entity
    slots:
    - Group_desc
    - Group_domain
    - name
    - Group_privileges
    - Group_type
    - uid
    - Group_uid_alt
    - Group_name
    - Group_uid
    slot_usage:
      desc:
        name: desc
        description: The group description.
      domain:
        name: domain
        description: 'The domain where the group is defined. For example: the LDAP
          or Active

          Directory domain.'
      name:
        name: name
        description: The group name.
      privileges:
        name: privileges
        description: The group privileges.
      type:
        name: type
        description: The type of the group.
      uid:
        name: uid
        description: 'The unique identifier of the group. For example, for Windows
          events this is the

          security identifier (SID) of the group. Another example, pool id or desktop
          id

          that the device belongs to.'
      uid_alt:
        name: uid_alt
        description: The alternate unique identifier.
    class_uri: ocsf:Group
  Hassh:
    name: Hassh
    definition_uri: https://w3id.org/lmodel/ocsf/Hassh
    description: 'The HASSH object contains SSH network fingerprinting values for
      specific

      client/server implementations. It provides a standardized way of identifying

      and categorizing SSH connections based on their unique characteristics and

      behavior.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - HASSH
    is_a: Object
    slots:
    - Hassh_algorithm
    - Hassh_fingerprint
    slot_usage:
      algorithm:
        name: algorithm
        description: 'The concatenation of key exchange, encryption, authentication
          and compression

          algorithms (separated by '';''). NOTE: This is not the underlying algorithm
          for

          the hash implementation.'
        recommended: true
      fingerprint:
        name: fingerprint
        description: 'The hash of the key exchange, encryption, authentication and
          compression

          algorithms.'
        required: true
    class_uri: ocsf:Hassh
  HttpCookie:
    name: HttpCookie
    definition_uri: https://w3id.org/lmodel/ocsf/HttpCookie
    description: 'The HTTP Cookie object, also known as a web cookie or browser cookie,
      contains

      details and values pertaining to a small piece of data that a server sends to
      a

      user''s web browser. This data is then stored by the browser and sent back to

      the server with subsequent requests, allowing the server to remember and track

      certain information about the user''s browsing session or preferences.'
    notes:
    - "D3FEND\u2122 Ontology d3f:SessionCookie. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:SessionCookie/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:SessionCookie/
    aliases:
    - HTTP Cookie
    exact_mappings:
    - uco_master:BrowserCookie
    is_a: Object
    slots:
    - HttpCookie_domain
    - HttpCookie_expiration_time
    - http_only
    - is_http_only
    - is_secure
    - HttpCookie_name
    - HttpCookie_path
    - samesite
    - secure
    - HttpCookie_value
    slot_usage:
      domain:
        name: domain
        description: The domain name for the server from which the http_cookie is
          served.
      expiration_time:
        name: expiration_time
        description: The expiration time of the HTTP cookie.
      name:
        name: name
        description: The HTTP cookie name.
        required: true
      path:
        name: path
        description: The path of the HTTP cookie.
      value:
        name: value
        description: The HTTP cookie value.
        required: true
    class_uri: ocsf:HttpCookie
  HttpHeader:
    name: HttpHeader
    definition_uri: https://w3id.org/lmodel/ocsf/HttpHeader
    description: 'The HTTP Header object represents the headers sent in an HTTP request
      or

      response. HTTP headers are key-value pairs that convey additional information

      about the HTTP message, including details about the content, caching,

      authentication, encoding, and other aspects of the communication.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - HTTP Header
    is_a: Object
    slots:
    - HttpHeader_name
    - HttpHeader_value
    slot_usage:
      name:
        name: name
        description: The name of the HTTP header.
        required: true
      value:
        name: value
        description: The value of the HTTP header.
        required: true
    class_uri: ocsf:HttpHeader
  HttpRequest:
    name: HttpRequest
    definition_uri: https://w3id.org/lmodel/ocsf/HttpRequest
    description: 'The HTTP Request object represents the attributes of a request made
      to a web

      server. It encapsulates the details and metadata associated with an HTTP

      request, including the request method, headers, URL, query parameters, body

      content, and other relevant information.'
    notes:
    - "D3FEND\u2122 Ontology d3f:OutboundInternetNetworkTraffic. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:OutboundInternetNetworkTraffic/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:OutboundInternetNetworkTraffic/
    aliases:
    - HTTP Request
    close_mappings:
    - uco_master:HTTPConnection
    is_a: Object
    slots:
    - args
    - HttpRequest_body_length
    - HttpRequest_http_headers
    - HttpRequest_http_method
    - HttpRequest_length
    - referrer
    - HttpRequest_uid
    - HttpRequest_url
    - HttpRequest_user_agent
    - HttpRequest_version
    - x_forwarded_for
    slot_usage:
      body_length:
        name: body_length
        description: 'The actual length of the HTTP request body, in number of bytes,
          independent of

          a potentially existing Content-Length header.'
      http_headers:
        name: http_headers
        recommended: true
      http_method:
        name: http_method
        description: 'The <a target=''_blank''

          href=''https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods''>HTTP
          request

          method</a> indicates the desired action to be performed for a given resource.'
        range: HttpRequestHttpMethodEnum
        recommended: true
      length:
        name: length
        description: The length of the entire HTTP request, in number of bytes.
      uid:
        name: uid
        description: The unique identifier of the http request.
      url:
        name: url
        description: The URL object that pertains to the request.
        recommended: true
      user_agent:
        name: user_agent
        recommended: true
      version:
        name: version
        description: The Hypertext Transfer Protocol (HTTP) version.
        recommended: true
    class_uri: ocsf:HttpRequest
  HttpResponse:
    name: HttpResponse
    definition_uri: https://w3id.org/lmodel/ocsf/HttpResponse
    description: 'The HTTP Response object contains detailed information about the
      response sent

      from a web server to the requester. It encompasses attributes and metadata that

      describe the response status, headers, body content, and other relevant

      information.'
    notes:
    - "D3FEND\u2122 Ontology d3f:InboundInternetNetworkTraffic. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:InboundInternetNetworkTraffic/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:InboundInternetNetworkTraffic/
    aliases:
    - HTTP Response
    close_mappings:
    - uco_master:HTTPConnection
    is_a: Object
    slots:
    - HttpResponse_body_length
    - HttpResponse_code
    - content_type
    - HttpResponse_http_headers
    - latency
    - HttpResponse_length
    - message
    - HttpResponse_status
    slot_usage:
      body_length:
        name: body_length
        description: 'The actual length of the HTTP response body, in number of bytes,
          independent of

          a potentially existing Content-Length header.'
      code:
        name: code
        description: 'The Hypertext Transfer Protocol (HTTP) status code returned
          from the web server

          to the client. For example, 200.'
        required: true
      http_headers:
        name: http_headers
        recommended: true
      length:
        name: length
        description: The length of the entire HTTP response, in number of bytes.
      status:
        name: status
        description: 'The response status. For example: A successful HTTP status of
          ''OK'' which

          corresponds to a code of 200.'
    class_uri: ocsf:HttpResponse
  IdentityActivityMetrics:
    name: IdentityActivityMetrics
    definition_uri: https://w3id.org/lmodel/ocsf/IdentityActivityMetrics
    description: 'The Identity Activity Metrics object captures usage patterns, authentication

      activity, credential usage and other metrics for identities across cloud and

      on-premises environments. Example identities include AWS IAM Users, Roles,

      Azure AD Principals, GCP Service Accounts, on-premises Active Directory

      accounts.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Identity Activity Metrics
    is_a: Object
    slots:
    - IdentityActivityMetrics_first_seen_time
    - IdentityActivityMetrics_last_authentication_time
    - IdentityActivityMetrics_last_seen_time
    - IdentityActivityMetrics_password_last_used_time
    - IdentityActivityMetrics_programmatic_credentials
    slot_usage:
      first_seen_time:
        name: first_seen_time
        description: 'The timestamp when this identity was first observed or created
          in the system.

          This helps establish the identity''s age and lifecycle stage for risk

          assessment.'
      last_authentication_time:
        name: last_authentication_time
        description: 'The timestamp when this identity last successfully authenticated
          to any system

          or service. This differs from <code>last_seen_time</code> as it specifically

          tracks authentication events rather than all activities.'
      last_seen_time:
        name: last_seen_time
        description: 'The timestamp of the most recent activity performed by this
          identity, including

          authentication, resource access, or API calls. This is the most comprehensive

          indicator of identity usage recency.'
        recommended: true
      password_last_used_time:
        name: password_last_used_time
        description: 'The timestamp when password-based authentication was last used
          by this

          identity. This helps distinguish between password and other authentication

          methods (MFA, SSO, certificates) and identify password-specific usage patterns.'
      programmatic_credentials:
        name: programmatic_credentials
        description: 'Details about the programmatic credentials associated with this
          identity, such

          as API keys, service account keys, access tokens, and client certificates
          used

          for automated access.'
    class_uri: ocsf:IdentityActivityMetrics
  Idp:
    name: Idp
    definition_uri: https://w3id.org/lmodel/ocsf/Idp
    description: 'The Identity Provider object contains detailed information about
      a provider

      responsible for creating, maintaining, and managing identity information while

      offering authentication services to applications. An Identity Provider (IdP)

      serves as a trusted authority that verifies the identity of users and issues

      authentication tokens or assertions to enable secure access to applications
      or

      services.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Identity Provider
    is_a: Entity
    slots:
    - Idp_auth_factors
    - Idp_domain
    - Idp_fingerprint
    - Idp_has_mfa
    - Idp_issuer
    - name
    - Idp_protocol_name
    - scim
    - sso
    - Idp_state
    - Idp_state_id
    - Idp_tenant_uid
    - uid
    - Idp_url_string
    - Idp_name
    - Idp_uid
    slot_usage:
      auth_factors:
        name: auth_factors
        description: 'The Authentication Factors object describes the different types
          of Multi-Factor

          Authentication (MFA) methods and/or devices supported by the Identity Provider.'
      domain:
        name: domain
        description: The primary domain associated with the Identity Provider.
      fingerprint:
        name: fingerprint
        description: The fingerprint of the X.509 certificate used by the Identity
          Provider.
      has_mfa:
        name: has_mfa
        description: The Identity Provider enforces Multi Factor Authentication (MFA).
      issuer:
        name: issuer
        description: 'The unique identifier (often a URL) used by the Identity Provider
          as its

          issuer.'
      name:
        name: name
        description: The name of the Identity Provider.
        recommended: true
      protocol_name:
        name: protocol_name
        description: 'The supported protocol of the Identity Provider. E.g., <code>SAML</code>,

          <code>OIDC</code>, or <code>OAuth2</code>.'
      state:
        name: state
        description: 'The configuration state of the Identity Provider, normalized
          to the caption of

          the <code>state_id</code> value. In the case of <code>Other</code>, it is

          defined by the event source.'
      state_id:
        name: state_id
        description: 'The normalized state ID of the Identity Provider to reflect
          its configuration

          or activation status.'
        range: IdpStateIdEnum
      tenant_uid:
        name: tenant_uid
        description: The tenant ID associated with the Identity Provider.
      uid:
        name: uid
        description: The unique identifier of the Identity Provider.
        recommended: true
      url_string:
        name: url_string
        description: The URL for accessing the configuration or metadata of the Identity
          Provider.
    class_uri: ocsf:Idp
  Image:
    name: Image
    definition_uri: https://w3id.org/lmodel/ocsf/Image
    description: 'The Image object provides a description of a specific Virtual Machine
      (VM) or

      Container image.'
    notes:
    - "D3FEND\u2122 Ontology d3f:ContainerImage \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:ContainerImage/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:ContainerImage/
    aliases:
    - Image
    related_mappings:
    - uco_master:RasterPicture
    is_a: Entity
    slots:
    - Image_labels
    - name
    - Image_path
    - tag
    - Image_tags
    - uid
    - Image_name
    - Image_uid
    slot_usage:
      labels:
        name: labels
        description: The list of labels associated to the image.
      name:
        name: name
        description: 'The image name. For example: <code>elixir</code>.'
      path:
        name: path
        description: The full path to the image file.
      tags:
        name: tags
        description: The list of tags; <code>{key:value}</code> pairs associated to
          the image.
      uid:
        name: uid
        description: 'The unique image ID. For example: <code>77af4d6b9913</code>.'
        required: true
    class_uri: ocsf:Image
  Ja4Fingerprint:
    name: Ja4Fingerprint
    definition_uri: https://w3id.org/lmodel/ocsf/Ja4Fingerprint
    description: 'The JA4+ fingerprint object provides detailed fingerprint information
      about

      various aspects of network traffic which is both machine and human readable.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - JA4+ Fingerprint
    is_a: Object
    slots:
    - section_a
    - section_b
    - section_c
    - section_d
    - Ja4Fingerprint_type
    - Ja4Fingerprint_type_id
    - Ja4Fingerprint_value
    slot_usage:
      type:
        name: type
        description: 'The JA4+ fingerprint type as defined by <a

          href=''https://blog.foxio.io/ja4+-network-fingerprinting

          target=''_blank''>FoxIO</a>, normalized to the caption of ''type_id''. In
          the case

          of ''Other'', it is defined by the event source.'
      type_id:
        name: type_id
        description: The identifier of the JA4+ fingerprint type.
        range: Ja4FingerprintTypeIdEnum
        required: true
      value:
        name: value
        description: The JA4+ fingerprint value.
        required: true
    class_uri: ocsf:Ja4Fingerprint
  Job:
    name: Job
    definition_uri: https://w3id.org/lmodel/ocsf/Job
    description: 'The Job object provides information about a scheduled job or task,
      including

      its name, command line, and state. It encompasses attributes that describe the

      properties and status of the scheduled job.'
    notes:
    - "D3FEND\u2122 Ontology d3f:ScheduledJob. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:ScheduledJob/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:ScheduledJob/
    aliases:
    - Job
    is_a: Object
    slots:
    - Job_cmd_line
    - Job_created_time
    - Job_desc
    - Job_file
    - Job_last_run_time
    - Job_name
    - Job_next_run_time
    - Job_run_state
    - Job_run_state_id
    - Job_user
    slot_usage:
      cmd_line:
        name: cmd_line
        description: The job command line.
        recommended: true
      created_time:
        name: created_time
        description: The time when the job was created.
        recommended: true
      desc:
        name: desc
        description: The description of the job.
        recommended: true
      file:
        name: file
        description: The file that pertains to the job.
      last_run_time:
        name: last_run_time
        description: The time when the job was last run.
        recommended: true
      name:
        name: name
        description: The name of the job.
        required: true
      next_run_time:
        name: next_run_time
        description: The time when the job will next be run.
      run_state:
        name: run_state
        description: The run state of the job.
      run_state_id:
        name: run_state_id
        description: The run state ID of the job.
        range: JobRunStateIdEnum
        recommended: true
      user:
        name: user
        description: The user that created the job.
    class_uri: ocsf:Job
  KbArticle:
    name: KbArticle
    definition_uri: https://w3id.org/lmodel/ocsf/KbArticle
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["uid", "src_url"]}'
    description: The KB Article object contains metadata that describes the patch
      or update.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - KB Article
    is_a: Object
    slots:
    - KbArticle_avg_timespan
    - KbArticle_bulletin
    - KbArticle_classification
    - KbArticle_created_time
    - KbArticle_install_state
    - KbArticle_install_state_id
    - KbArticle_is_superseded
    - KbArticle_os
    - KbArticle_product
    - KbArticle_severity
    - KbArticle_size
    - KbArticle_src_url
    - KbArticle_title
    - KbArticle_uid
    slot_usage:
      avg_timespan:
        name: avg_timespan
        description: The average time to patch.
      bulletin:
        name: bulletin
        description: The kb article bulletin identifier.
      classification:
        name: classification
        description: The vendors classification of the kb article.
      created_time:
        name: created_time
        description: The date the kb article was released by the vendor.
      install_state:
        name: install_state
        description: The install state of the kb article.
        recommended: true
      install_state_id:
        name: install_state_id
        description: The normalized install state ID of the kb article.
        recommended: true
      is_superseded:
        name: is_superseded
        description: The kb article has been replaced by another.
      os:
        name: os
        description: The operating system the kb article applies.
        recommended: true
      product:
        name: product
        description: The product details the kb article applies.
      severity:
        name: severity
        description: The severity of the kb article.
        recommended: true
      size:
        name: size
        description: The size in bytes for the kb article.
      src_url:
        name: src_url
        description: The kb article link from the source vendor.
      title:
        name: title
        description: The title of the kb article.
        recommended: true
      uid:
        name: uid
        description: The unique identifier for the kb article.
        recommended: true
    class_uri: ocsf:KbArticle
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            uid:
              name: uid
              required: true
        - slot_conditions:
            src_url:
              name: src_url
              required: true
      description: 'OCSF at_least_one: at least one of [''uid'', ''src_url''] must
        be set.'
  Kernel:
    name: Kernel
    definition_uri: https://w3id.org/lmodel/ocsf/Kernel
    description: 'The Kernel Resource object provides information about a specific
      kernel

      resource, including its name and type. It describes essential attributes

      associated with a resource managed by the kernel of an operating system.'
    notes:
    - "D3FEND\u2122 Ontology d3f:Kernel \u2014 https://d3fend.mitre.org/dao/artifact/d3f:Kernel/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:Kernel/
    aliases:
    - Kernel Resource
    related_mappings:
    - uco_master:OperatingSystem
    is_a: Object
    slots:
    - is_system
    - Kernel_name
    - Kernel_path
    - system_call
    - Kernel_type
    - Kernel_type_id
    slot_usage:
      name:
        name: name
        description: The name of the kernel resource.
        required: true
      path:
        name: path
        description: The full path of the kernel resource.
      type:
        name: type
        description: The type of the kernel resource.
      type_id:
        name: type_id
        description: The type of the kernel resource.
        range: KernelTypeIdEnum
        required: true
    class_uri: ocsf:Kernel
  KernelDriver:
    name: KernelDriver
    definition_uri: https://w3id.org/lmodel/ocsf/KernelDriver
    description: 'The Kernel Extension object describes a kernel driver that has been
      loaded or

      unloaded into the operating system (OS) kernel.'
    notes:
    - "D3FEND\u2122 Ontology d3f:KernelModule \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:KernelModule/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:KernelModule/
    aliases:
    - Kernel Extension
    close_mappings:
    - uco_master:Library
    is_a: Object
    slots:
    - KernelDriver_file
    slot_usage:
      file:
        name: file
        annotations:
          group:
            tag: group
            value: primary
        description: The driver/extension file object.
        required: true
    class_uri: ocsf:KernelDriver
  KeyValueObject:
    name: KeyValueObject
    definition_uri: https://w3id.org/lmodel/ocsf/KeyValueObject
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["value", "values"]}'
    description: A generic object allowing to define a <code>{key:value}</code> pair.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Key:Value object
    is_a: Object
    slots:
    - KeyValueObject_name
    - KeyValueObject_value
    - KeyValueObject_values
    slot_usage:
      name:
        name: name
        description: The name of the key.
        required: true
      value:
        name: value
        description: The value associated to the key.
        recommended: true
      values:
        name: values
        description: 'Optional, the values associated to the key. You can populate
          this attribute,

          when you have multiple values for the same key.'
        recommended: true
    class_uri: ocsf:KeyValueObject
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            value:
              name: value
              required: true
        - slot_conditions:
            values:
              name: values
              required: true
      description: 'OCSF at_least_one: at least one of [''value'', ''values''] must
        be set.'
  KeyboardInfo:
    name: KeyboardInfo
    definition_uri: https://w3id.org/lmodel/ocsf/KeyboardInfo
    description: 'The Keyboard Information object contains details and attributes
      related to a

      computer or device keyboard. It encompasses information that describes the

      characteristics, capabilities, and configuration of the keyboard.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Keyboard Information
    is_a: Object
    slots:
    - function_keys
    - ime
    - keyboard_layout
    - keyboard_subtype
    - keyboard_type
    class_uri: ocsf:KeyboardInfo
  KillChainPhase:
    name: KillChainPhase
    definition_uri: https://w3id.org/lmodel/ocsf/KillChainPhase
    description: "The Kill Chain Phase object represents a single phase of a cyber\
      \ attack,\nincluding the initial reconnaissance and planning stages up to the\
      \ final\nobjective of the attacker. It provides a detailed description of each\
      \ phase and\nits associated activities within the broader context of a cyber\
      \ attack. See <a\ntarget='_blank'\nhref='https://www.lockheedmartin.com/en-us/capabilities/cyber/cyber-kill-chain.html'>Cyber\n\
      Kill Chain\xAE</a>."
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Kill Chain Phase
    close_mappings:
    - attack:KillChainPhase
    is_a: Object
    slots:
    - KillChainPhase_phase
    - KillChainPhase_phase_id
    slot_usage:
      phase:
        name: phase
        recommended: true
      phase_id:
        name: phase_id
        required: true
    class_uri: ocsf:KillChainPhase
  LdapPerson:
    name: LdapPerson
    definition_uri: https://w3id.org/lmodel/ocsf/LdapPerson
    description: The additional LDAP attributes that describe a person.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - LDAP Person
    close_mappings:
    - uco_master:Person
    is_a: Object
    slots:
    - cost_center
    - LdapPerson_created_time
    - deleted_time
    - LdapPerson_department
    - LdapPerson_display_name
    - email_addrs
    - employee_uid
    - given_name
    - hire_time
    - job_title
    - LdapPerson_labels
    - last_login_time
    - ldap_cn
    - ldap_dn
    - leave_time
    - LdapPerson_location
    - manager
    - LdapPerson_modified_time
    - office_location
    - LdapPerson_phone_number
    - surname
    - LdapPerson_tags
    slot_usage:
      created_time:
        name: created_time
        description: The timestamp when the user was created.
      department:
        name: department
        description: The name of the department in which the user works.
      display_name:
        name: display_name
        description: 'The display name of the LDAP person. According to RFC 2798,
          this is the

          preferred name of a person to be used when displaying entries.'
      labels:
        name: labels
        description: 'The labels associated with the user. For example in AD this
          could be the

          <code>userType</code>, <code>employeeType</code>. For example: <code>Member,

          Employee</code>.'
      location:
        name: location
        description: 'The geographical location associated with a user. This is typically
          the user''s

          usual work location.'
      modified_time:
        name: modified_time
        description: The timestamp when the user entry was last modified.
      phone_number:
        name: phone_number
        description: 'The telephone number of the user. Corresponds to the LDAP

          <code>Telephone-Number</code> CN.'
      tags:
        name: tags
        description: The list of tags; <code>{key:value}</code> pairs associated to
          the user.
    class_uri: ocsf:LdapPerson
  LoadBalancer:
    name: LoadBalancer
    definition_uri: https://w3id.org/lmodel/ocsf/LoadBalancer
    description: 'The load balancer object describes the load balancer entity and
      contains

      additional information regarding the distribution of traffic across a network.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Load Balancer
    is_a: Entity
    slots:
    - LoadBalancer_classification
    - LoadBalancer_code
    - LoadBalancer_dst_endpoint
    - LoadBalancer_endpoint_connections
    - LoadBalancer_error_message
    - LoadBalancer_ip
    - LoadBalancer_message
    - LoadBalancer_metrics
    - name
    - LoadBalancer_status_detail
    - uid
    - LoadBalancer_name
    - LoadBalancer_uid
    slot_usage:
      classification:
        name: classification
        description: The request classification as defined by the load balancer.
      code:
        name: code
        description: 'The numeric response status code detailing the connection from
          the load

          balancer to the destination target.'
        recommended: true
      dst_endpoint:
        name: dst_endpoint
        description: The destination to which the load balancer is distributing traffic.
        recommended: true
      endpoint_connections:
        name: endpoint_connections
        description: An object detailing the load balancer connection attempts and
          responses.
        recommended: true
      error_message:
        name: error_message
        description: The load balancer error message.
      ip:
        name: ip
        description: 'The IP address of the load balancer node that handled the client
          request. Note:

          the load balancer may have other IP addresses, and this is not an IP address
          of

          the target/distribution endpoint - see <code>dst_endpoint</code>.'
      message:
        name: message
        description: The load balancer message.
      metrics:
        name: metrics
        description: General purpose metrics associated with the load balancer.
      name:
        name: name
        description: The name of the load balancer.
      status_detail:
        name: status_detail
        description: 'The status detail contains additional status information about
          the load

          balancer distribution event.'
      uid:
        name: uid
        description: The unique identifier for the load balancer.
    class_uri: ocsf:LoadBalancer
  Location:
    name: Location
    definition_uri: https://w3id.org/lmodel/ocsf/Location
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["city", "country", "postal_code", "region"]}'
      observable_id:
        tag: observable_id
        value: 26
    description: 'The Geo Location object describes a geographical location, usually
      associated

      with an IP address.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Geo Location
    exact_mappings:
    - uco_master:Location
    is_a: Object
    slots:
    - aerial_height
    - Location_city
    - Location_continent
    - coordinates
    - Location_country
    - Location_desc
    - geodetic_altitude
    - geodetic_vertical_accuracy
    - geohash
    - horizontal_accuracy
    - is_on_premises
    - Location_isp
    - lat
    - long
    - postal_code
    - pressure_altitude
    - Location_provider
    - Location_region
    slot_usage:
      city:
        name: city
        recommended: true
      continent:
        name: continent
        recommended: true
      country:
        name: country
        recommended: true
      desc:
        name: desc
        description: The description of the geographical location.
      isp:
        name: isp
        deprecated: 'Utilize <code>isp</code> attribute available in <code>network_endpoint,

          whois</code> objects according to your use-case.'
      provider:
        name: provider
        description: The provider of the geographical location data.
      region:
        name: region
        description: 'The alphanumeric code that identifies the principal subdivision
          (e.g. province

          or state) of the country. For example, ''CH-VD'' for the Canton of Vaud,

          Switzerland'
    class_uri: ocsf:Location
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            city:
              name: city
              required: true
        - slot_conditions:
            country:
              name: country
              required: true
        - slot_conditions:
            postal_code:
              name: postal_code
              required: true
        - slot_conditions:
            region:
              name: region
              required: true
      description: 'OCSF at_least_one: at least one of [''city'', ''country'', ''postal_code'',
        ''region'']

        must be set.'
  Logger:
    name: Logger
    definition_uri: https://w3id.org/lmodel/ocsf/Logger
    description: 'The Logger object represents the device and product where events
      are stored

      with times for receipt and transmission.  This may be at the source device

      where the event occurred, a remote scanning device, intermediate hops, or the

      ultimate destination.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Logger
    is_a: Entity
    slots:
    - Logger_device
    - Logger_event_uid
    - Logger_is_truncated
    - Logger_log_format
    - Logger_log_level
    - Logger_log_name
    - Logger_log_provider
    - Logger_log_version
    - Logger_logged_time
    - name
    - Logger_product
    - Logger_transmit_time
    - uid
    - Logger_untruncated_size
    - Logger_version
    - Logger_name
    - Logger_uid
    slot_usage:
      device:
        name: device
        description: The device where the events are logged.
        recommended: true
      event_uid:
        name: event_uid
        description: The unique identifier of the event assigned by the logger.
      is_truncated:
        name: is_truncated
        description: 'Indicates whether the OCSF event data has been truncated due
          to size

          limitations. When <code>true</code>, some event data may have been omitted
          to

          fit within system constraints.'
      log_format:
        name: log_format
        description: The format of data in the log. For example JSON, syslog or CSV.
      log_level:
        name: log_level
        description: 'The level at which an event was logged. This can be log provider
          specific. For

          example the audit level.'
      log_name:
        name: log_name
        description: 'The log name for the logging provider log, or the file name
          of the system log.

          This may be an intermediate store-and-forward log or a vendor destination
          log.

          For example /archive/server1/var/log/messages.0 or /var/log/.'
        recommended: true
      log_provider:
        name: log_provider
        description: 'The logging provider or logging service that logged the event.
          This may be an

          intermediate application store-and-forward log or a vendor destination log.'
        recommended: true
      log_version:
        name: log_version
        description: 'The event log schema version of the original event. For example
          the syslog

          version or the Cisco Log Schema version'
      logged_time:
        name: logged_time
        recommended: true
      name:
        name: name
        description: The name of the logging product instance.
        recommended: true
      product:
        name: product
        description: 'The product logging the event.  This may be the event source
          product, a

          management server product, a scanning product, a SIEM, etc.'
        recommended: true
      transmit_time:
        name: transmit_time
        description: 'The time when the event was transmitted from the logging device
          to it''s next

          destination.'
        recommended: true
      uid:
        name: uid
        description: The unique identifier of the logging product instance.
        recommended: true
      untruncated_size:
        name: untruncated_size
        description: 'The original size of the OCSF event data in kilobytes before
          any truncation

          occurred. This field is typically populated when <code>is_truncated</code>
          is

          <code>true</code> to indicate the full size of the original event.'
      version:
        name: version
        description: The version of the logging provider.
    class_uri: ocsf:Logger
  LongString:
    name: LongString
    definition_uri: https://w3id.org/lmodel/ocsf/LongString
    description: 'This object is a used to capture strings which may be truncated
      by a security

      product due to their length.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Long String
    is_a: Object
    slots:
    - LongString_is_truncated
    - LongString_untruncated_size
    - LongString_value
    slot_usage:
      is_truncated:
        name: is_truncated
        description: 'Indicates that <code>value</code> has been truncated. May be
          omitted if

          truncation has not occurred.'
      untruncated_size:
        name: untruncated_size
        description: 'The size in bytes of the string represented by <code>value</code>
          before

          truncation. Should be omitted if truncation has not occurred.'
      value:
        name: value
        description: The string value, truncated if <code>is_truncated</code> is <code>true</code>.
        required: true
    class_uri: ocsf:LongString
  Malware:
    name: Malware
    definition_uri: https://w3id.org/lmodel/ocsf/Malware
    description: 'The Malware object describes the classification of known malicious
      software,

      which is intentionally designed to cause damage to a computer, server, client,

      or computer network.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Malware
    exact_mappings:
    - stix:Malware
    close_mappings:
    - attack:Software
    - uco_master:MaliciousTool
    related_mappings:
    - capec:AttackPattern
    is_a: Entity
    slots:
    - Malware_classification_ids
    - Malware_classifications
    - Malware_cves
    - Malware_files
    - name
    - Malware_num_infected
    - Malware_path
    - Malware_provider
    - Malware_severity
    - Malware_severity_id
    - uid
    - Malware_name
    - Malware_uid
    slot_usage:
      classification_ids:
        name: classification_ids
        description: The list of normalized identifiers of the malware classifications.
        range: MalwareClassificationIdsEnum
        required: true
      classifications:
        name: classifications
        description: 'The list of malware classifications, normalized to the captions
          of the

          <code>classification_ids</code> values. In the case of ''Other'', they are

          defined by the event source.'
      cves:
        name: cves
        description: 'The list of Common Vulnerabilities and Exposures (CVE) identifiers
          associated

          with the malware. Reference: <a target=''_blank''

          href=''https://cve.mitre.org/''>CVE</a>'
      files:
        name: files
        description: 'The list of file objects representing files that were identified
          as infected by

          the malware.'
      name:
        name: name
        description: The malware name, as reported by the detection engine.
      num_infected:
        name: num_infected
        description: The number of files that were identified to be infected by the
          malware.
      path:
        name: path
        description: The filesystem path of the malware that was observed.
        deprecated: Use <code>file.path</code> attribute available via <code>files</code>.
        recommended: true
      provider:
        name: provider
        description: 'The name or identifier of the security solution or service that
          provided the

          malware detection information.'
        recommended: true
      severity:
        name: severity
        description: 'The severity of the malware, normalized to the captions of the

          <code>severity_id</code> values. In the case of ''Other'', they are defined
          by

          the event source.'
      severity_id:
        name: severity_id
        description: The normalized identifier of the malware severity.
        recommended: true
      uid:
        name: uid
        description: 'A unique identifier for the specific malware instance, as assigned
          by the

          detection engine (e.g., virus signature ID or IPS rule ID).'
    class_uri: ocsf:Malware
  ManagedEntity:
    name: ManagedEntity
    definition_uri: https://w3id.org/lmodel/ocsf/ManagedEntity
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["name", "uid", "device", "group", "org", "policy",
          "user"]}'
    description: 'The Managed Entity object describes the type and version of an entity,
      such as

      a user, device, or policy.  For types in the <code>type_id</code> enum list,
      an

      associated attribute should be populated.  If the type of entity is not in the

      <code>type_id</code> list, information can be put into the <code>data</code>

      attribute, <code>type_id</code> should be ''Other'' and the <code>type</code>

      attribute should label the entity type.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Managed Entity
    is_a: Entity
    slots:
    - ManagedEntity_data
    - ManagedEntity_device
    - ManagedEntity_email
    - ManagedEntity_group
    - location
    - name
    - ManagedEntity_org
    - ManagedEntity_policy
    - ManagedEntity_type
    - ManagedEntity_type_id
    - uid
    - ManagedEntity_user
    - ManagedEntity_version
    - ManagedEntity_name
    - ManagedEntity_uid
    slot_usage:
      data:
        name: data
        description: The managed entity content as a JSON object.
      device:
        name: device
        recommended: true
      email:
        name: email
        recommended: true
      group:
        name: group
        recommended: true
      name:
        name: name
        description: 'The name of the managed entity. It should match the name of
          the specific entity

          object''s name if populated, or the name of the managed entity if the

          <code>type_id</code> is ''Other''.'
      org:
        name: org
        description: 'The Organization object containing details about the managed
          organizational

          entity. This object includes properties such as the organization name, unique

          identifier, type, and other organizational metadata. This attribute should
          be

          populated when <code>type_id</code> is <code>4</code> (Organization).'
        recommended: true
      policy:
        name: policy
        description: Describes details of a managed policy.
        recommended: true
      type:
        name: type
        description: 'The managed entity type. For example: <code>Policy</code>, <code>User</code>,

          <code>Organization</code>, <code>Device</code>.'
        recommended: true
      type_id:
        name: type_id
        description: 'The type of the Managed Entity. It is recommended to also populate
          the

          <code>type</code> attribute with the associated label, or the source specific

          name if <code>Other</code>.'
        range: ManagedEntityTypeIdEnum
        recommended: true
      uid:
        name: uid
        description: 'The identifier of the managed entity. It should match the <code>uid</code>
          of

          the specific entity''s object UID if populated, or the source specific ID
          if the

          <code>type_id</code> is ''Other''.'
      user:
        name: user
        recommended: true
      version:
        name: version
        description: 'The version of the managed entity. For example: <code>1.2.3</code>.'
        recommended: true
    class_uri: ocsf:ManagedEntity
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            uid:
              name: uid
              required: true
        - slot_conditions:
            device:
              name: device
              required: true
        - slot_conditions:
            group:
              name: group
              required: true
        - slot_conditions:
            org:
              name: org
              required: true
        - slot_conditions:
            policy:
              name: policy
              required: true
        - slot_conditions:
            user:
              name: user
              required: true
      description: 'OCSF at_least_one: at least one of [''name'', ''uid'', ''device'',
        ''group'', ''org'',

        ''policy'', ''user''] must be set.'
  MessageContext:
    name: MessageContext
    definition_uri: https://w3id.org/lmodel/ocsf/MessageContext
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["application", "service"]}'
    description: 'Communication context for AI system interactions including protocols,
      roles,

      clients, and session information for MCP and other AI communication systems.'
    notes:
    - "OWASP AI Security and Privacy Guide - Agent Security \u2014\nhttps://owasp.org/www-project-ai-security-and-privacy-guide/"
    - "Model Context Protocol (MCP) Specification \u2014 https://modelcontextprotocol.io/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://owasp.org/www-project-ai-security-and-privacy-guide/
    - https://modelcontextprotocol.io/
    aliases:
    - Message Context
    is_a: Entity
    slots:
    - ai_role
    - MessageContext_ai_role_id
    - MessageContext_application
    - MessageContext_completion_tokens
    - name
    - MessageContext_prompt_tokens
    - MessageContext_service
    - MessageContext_total_tokens
    - uid
    - MessageContext_name
    - MessageContext_uid
    slot_usage:
      ai_role_id:
        name: ai_role_id
        description: 'Specifies the functional role of the AI within the context of
          this message,

          such as retrieving information, assisting reasoning, executing a tool, or

          generating content.'
        range: MessageContextAiRoleIdEnum
        recommended: true
      application:
        name: application
        description: 'The initiating client application. In AI systems, this represents
          the

          client-side application or framework that initiates requests (e.g., LangChain

          application, web browser, mobile app, SDK implementation).'
        recommended: true
      completion_tokens:
        name: completion_tokens
        description: Number of tokens in the model's response/completion for this
          message.
      name:
        name: name
        description: 'The name or identifier of the message context. In AI systems,
          this could be the

          conversation ID, session name, thread identifier, or interaction name (e.g.,

          ''user-session-123'', ''conversation-abc'', ''chat-thread-456'').'
      prompt_tokens:
        name: prompt_tokens
        description: Number of tokens in the input prompt for this message.
      service:
        name: service
        description: 'The server or service handling the request. In AI systems, this
          represents the

          AI service, API endpoint, or agent that processes and responds to requests

          (e.g., OpenAI API service, Claude API service, internal AI model service).'
        recommended: true
      total_tokens:
        name: total_tokens
        description: Total number of tokens used for this message (prompt + completion).
      uid:
        name: uid
        description: 'The unique identifier of the message context. This could be
          a session ID,

          conversation ID, or other unique identifier that allows correlation of messages

          within the same context.'
    class_uri: ocsf:MessageContext
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            application:
              name: application
              required: true
        - slot_conditions:
            service:
              name: service
              required: true
      description: 'OCSF at_least_one: at least one of [''application'', ''service'']
        must be set.'
  Metadata:
    name: Metadata
    definition_uri: https://w3id.org/lmodel/ocsf/Metadata
    description: The Metadata object describes the metadata associated with the event.
    notes:
    - "D3FEND\u2122 Ontology d3f:Metadata \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:Metadata/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:Metadata/
    aliases:
    - Metadata
    is_a: Object
    mixins:
    - DataClassificationProfile
    slots:
    - Metadata_correlation_uid
    - debug
    - Metadata_event_code
    - extension
    - extensions
    - Metadata_is_truncated
    - Metadata_labels
    - Metadata_log_format
    - Metadata_log_level
    - Metadata_log_name
    - Metadata_log_provider
    - Metadata_log_source
    - Metadata_log_version
    - logged_time
    - loggers
    - Metadata_modified_time
    - Metadata_original_event_uid
    - Metadata_original_time
    - processed_time
    - Metadata_product
    - profiles
    - Metadata_reporter
    - sequence
    - Metadata_source
    - Metadata_tags
    - Metadata_tenant_uid
    - Metadata_total_queued_duration
    - transformation_info_list
    - Metadata_transmit_time
    - Metadata_type
    - Metadata_uid
    - Metadata_untruncated_size
    - Metadata_version
    - DataClassificationProfile_data_classification
    - DataClassificationProfile_data_classifications
    slot_usage:
      correlation_uid:
        name: correlation_uid
        description: 'A unique identifier used to correlate this OCSF event with other
          related OCSF

          events, distinct from the event''s <code>uid</code> value. This enables
          linking

          multiple OCSF events that are part of the same activity, transaction, or

          security incident across different systems or time periods.'
      event_code:
        name: event_code
        description: 'The identifier of the original event. For example the numerical
          Windows Event

          Code or Cisco syslog code.'
      is_truncated:
        name: is_truncated
        description: 'Indicates whether the OCSF event data has been truncated due
          to size

          limitations. When <code>true</code>, some event data may have been omitted
          to

          fit within system constraints.'
      labels:
        name: labels
        description: 'The list of labels attached to the event. For example: <code>["sample",

          "dev"]</code>'
      log_format:
        name: log_format
        description: 'The format of data in the log where the data originated. For
          example CSV, XML,

          Windows Multiline, JSON, syslog or Cisco Log Schema.'
      log_level:
        name: log_level
        description: 'The level at which an event was logged. This can be log provider
          specific. For

          example the audit level.'
      log_name:
        name: log_name
        description: 'The event log name, typically for the consumer of the event.
          For example, the

          storage bucket name, SIEM repository index name, etc.'
        recommended: true
      log_provider:
        name: log_provider
        description: 'The logging provider or logging service that logged the event.
          For example AWS

          CloudWatch or Splunk.'
      log_source:
        name: log_source
        description: 'The log system or component where the data originated. For example,
          a file

          path, syslog server name or a Windows hostname and logging subsystem such
          as

          Security.'
      log_version:
        name: log_version
        description: 'The event log schema version of the original event. For example
          the syslog

          version or the Cisco Log Schema version'
      modified_time:
        name: modified_time
        description: The time when the event was last modified or enriched.
      original_event_uid:
        name: original_event_uid
        description: 'The unique identifier assigned to the event in its original
          logging system

          before transformation to OCSF format. This field preserves the source system''s

          native event identifier, enabling traceability back to the raw log entry.
          For

          example, a Windows Event Record ID, a syslog message ID, a Splunk _cd value,
          or

          a database transaction log sequence number.'
      original_time:
        name: original_time
        recommended: true
      product:
        name: product
        required: true
      reporter:
        name: reporter
        description: The entity from which the event or finding was first reported.
        recommended: true
      source:
        name: source
        description: "The source of the event or finding. This can be any distinguishing\
          \ name for the\nlogical origin of the data \u2014 for example, 'CloudTrail\
          \ Events', or a use case\nlike 'Attack Simulations' or 'Vulnerability Scans'."
      tags:
        name: tags
        description: The list of tags; <code>{key:value}</code> pairs associated to
          the event.
      tenant_uid:
        name: tenant_uid
        recommended: true
      total_queued_duration:
        name: total_queued_duration
        description: 'The amount of time an event spent in a queue awaiting processing.
          In this case,

          the value is the difference between <code>processed_time</code> and

          <code>logged_time</code>. This duration is inclusive of all queues between
          the

          originator of the event and the intended long-term storage destination of
          the

          event.'
      transmit_time:
        name: transmit_time
        description: 'The time when the event was transmitted from the logging device
          to it''s next

          destination.'
      type:
        name: type
        description: 'The type of the event or finding as a subset of the <code>source</code>
          of the

          event. This can be any distinguishing characteristic of the data. For example

          ''Management Events'' or ''Device Penetration Test''.'
      uid:
        name: uid
        description: 'A unique identifier assigned to the OCSF event. This ID is specific
          to the OCSF

          event itself and is distinct from the original event identifier in the source

          system (see <code>original_event_uid</code>).'
      untruncated_size:
        name: untruncated_size
        description: 'The original size of the OCSF event data in kilobytes before
          any truncation

          occurred. This field is typically populated when <code>is_truncated</code>
          is

          <code>true</code> to indicate the full size of the original event.'
      version:
        name: version
        description: 'The version of the OCSF schema, using Semantic Versioning Specification
          (<a

          target=''_blank'' href=''https://semver.org''>SemVer</a>). For example:

          <code>1.0.0.</code> Event consumers use the version to determine the available

          event attributes.'
        required: true
    class_uri: ocsf:Metadata
  Metric:
    name: Metric
    definition_uri: https://w3id.org/lmodel/ocsf/Metric
    description: The Metric object defines a simple name/value pair entity for a metric.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Metric
    is_a: Object
    slots:
    - Metric_name
    - Metric_value
    slot_usage:
      name:
        name: name
        description: The name of the metric.
        required: true
      value:
        name: value
        description: The value of the metric.
        required: true
    class_uri: ocsf:Metric
  Mitigation:
    name: Mitigation
    definition_uri: https://w3id.org/lmodel/ocsf/Mitigation
    description: "The MITRE Mitigation object describes the ATT&CK\xAE or ATLAS\u2122\
      \ Mitigation ID\nand/or name that is associated to an attack."
    notes:
    - "ATT&CK\xAE Matrix \u2014 https://attack.mitre.org"
    - "ATLAS\u2122 Matrix \u2014 https://atlas.mitre.org/matrices/ATLAS"
    - "ATT&CK\xAE Mitigation to D3FEND\u2122 Technique Mappings \u2014\nhttps://d3fend.mitre.org/mappings/attack-mitigations/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://attack.mitre.org
    - https://atlas.mitre.org/matrices/ATLAS
    - https://d3fend.mitre.org/mappings/attack-mitigations/
    aliases:
    - MITRE Mitigation
    exact_mappings:
    - attack:Mitigation
    related_mappings:
    - capec:AttackPattern
    is_a: Entity
    slots:
    - Mitigation_countermeasures
    - name
    - Mitigation_src_url
    - uid
    - Mitigation_name
    - Mitigation_uid
    slot_usage:
      countermeasures:
        name: countermeasures
        description: 'The D3FEND countermeasures that are associated with the attack
          technique. For

          example: ATT&CK Technique <code>T1003</code> is addressed by Mitigation

          <code>M1027</code>, and D3FEND Technique <code>D3-OTP</code>.'
      name:
        name: name
        description: 'The Mitigation name that is associated with the attack technique.
          For example:

          <code>Password Policies</code>, or <code>Code Signing</code>.'
      src_url:
        name: src_url
        description: 'The versioned permalink of the Mitigation. For example:

          <code>https://attack.mitre.org/versions/v14/mitigations/M1027</code>.'
      uid:
        name: uid
        description: 'The Mitigation ID that is associated with the attack technique.
          For example:

          <code>M1027</code>, or <code>AML.M0013</code>.'
    class_uri: ocsf:Mitigation
  Module:
    name: Module
    definition_uri: https://w3id.org/lmodel/ocsf/Module
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["load_type_id", "function_name"]}'
    description: The Module object describes the attributes of a module.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Module
    close_mappings:
    - uco_master:Library
    is_a: Object
    slots:
    - Module_base_address
    - Module_file
    - Module_function_invocation
    - Module_function_name
    - load_type
    - Module_load_type_id
    - Module_start_address
    - Module_type
    slot_usage:
      base_address:
        name: base_address
        recommended: true
      file:
        name: file
        description: The module file object.
        recommended: true
      function_invocation:
        name: function_invocation
        description: 'Details about the invocation of the function given in

          <code>function_name</code>.'
      function_name:
        name: function_name
        description: 'The invoked function in the module. For load and unload events,
          this is the

          entry-point function of the module. The system calls the entry-point function

          whenever a process or thread loads or unloads the module.'
        recommended: true
      load_type_id:
        name: load_type_id
        description: The normalized identifier for how the module was loaded in memory.
        range: ModuleLoadTypeIdEnum
        recommended: true
      start_address:
        name: start_address
        recommended: true
      type:
        name: type
        description: The module type.
        recommended: true
    class_uri: ocsf:Module
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            load_type_id:
              name: load_type_id
              required: true
        - slot_conditions:
            function_name:
              name: function_name
              required: true
      description: 'OCSF at_least_one: at least one of [''load_type_id'', ''function_name'']
        must be

        set.'
  NetworkConnectionInfo:
    name: NetworkConnectionInfo
    definition_uri: https://w3id.org/lmodel/ocsf/NetworkConnectionInfo
    description: 'The Network Connection Information object describes characteristics
      of an OSI

      Transport Layer communication, including TCP and UDP.'
    notes:
    - "D3FEND\u2122 Ontology d3f:NetworkSession \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:NetworkSession/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:NetworkSession/
    aliases:
    - Network Connection Information
    exact_mappings:
    - uco_master:NetworkConnection
    close_mappings:
    - stix:NetworkTraffic
    is_a: Object
    slots:
    - boundary
    - NetworkConnectionInfo_boundary_id
    - community_uid
    - direction
    - NetworkConnectionInfo_direction_id
    - flag_history
    - NetworkConnectionInfo_protocol_name
    - NetworkConnectionInfo_protocol_num
    - NetworkConnectionInfo_protocol_ver
    - NetworkConnectionInfo_protocol_ver_id
    - session
    - tcp_flags
    - NetworkConnectionInfo_uid
    slot_usage:
      boundary_id:
        name: boundary_id
        recommended: true
      direction_id:
        name: direction_id
        required: true
      protocol_name:
        name: protocol_name
        description: 'The IP protocol name in lowercase, as defined by the Internet
          Assigned Numbers

          Authority (IANA). For example: <code>tcp</code> or <code>udp</code>.'
        recommended: true
      protocol_num:
        name: protocol_num
        recommended: true
      protocol_ver:
        name: protocol_ver
        description: The Internet Protocol version.
      protocol_ver_id:
        name: protocol_ver_id
        description: The Internet Protocol version identifier.
        range: NetworkConnectionInfoProtocolVerIdEnum
        recommended: true
      uid:
        name: uid
        description: The unique identifier of the connection.
        recommended: true
    class_uri: ocsf:NetworkConnectionInfo
  NetworkEndpoint:
    name: NetworkEndpoint
    definition_uri: https://w3id.org/lmodel/ocsf/NetworkEndpoint
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["ip", "uid", "name", "hostname", "svc_name", "instance_uid",

          "interface_uid", "interface_name", "domain"]}'
    description: 'The Network Endpoint object describes characteristics of a network
      endpoint.

      These can be a source or destination of a network connection.'
    notes:
    - "D3FEND\u2122 Ontology d3f:ComputerNetworkNode. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:ComputerNetworkNode/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:ComputerNetworkNode/
    aliases:
    - Network Endpoint
    is_a: Endpoint
    slots:
    - agent_list
    - Endpoint_domain
    - Endpoint_hostname
    - hw_info
    - Endpoint_instance_uid
    - Endpoint_interface_name
    - Endpoint_interface_uid
    - Endpoint_ip
    - Endpoint_location
    - Endpoint_mac
    - Endpoint_mac_vendor
    - Endpoint_os
    - Endpoint_owner
    - Endpoint_pool
    - subnet_uid
    - vlan_uid
    - vpc_uid
    - Endpoint_zone
    - Endpoint_name
    - ContainerProfile_container
    - ContainerProfile_namespace_pid
    - autonomous_system
    - NetworkEndpoint_fingerprints
    - intermediate_ips
    - isp
    - isp_org
    - network_scope
    - network_scope_id
    - NetworkEndpoint_port
    - NetworkEndpoint_proxy_endpoint
    - NetworkEndpoint_svc_name
    - type
    - type_id
    - uid
    - NetworkEndpoint_type
    - NetworkEndpoint_type_id
    slot_usage:
      fingerprints:
        name: fingerprints
        description: 'Fingerprints that identify the specific application implementation
          on this

          endpoint, such as Cisco NPF or HASSH.'
      port:
        name: port
        description: The port used for communication within the network connection.
        recommended: true
      proxy_endpoint:
        name: proxy_endpoint
        description: 'The network proxy information pertaining to a specific endpoint.
          This can be

          used to describe information pertaining to network address translation (NAT).'
      svc_name:
        name: svc_name
        recommended: true
      type:
        name: type
        description: 'The network endpoint type. For example: <code>unknown</code>,

          <code>server</code>, <code>desktop</code>, <code>laptop</code>,

          <code>tablet</code>, <code>mobile</code>, <code>virtual</code>,

          <code>browser</code>, or <code>other</code>.'
      type_id:
        name: type_id
        description: The network endpoint type ID.
    class_uri: ocsf:NetworkEndpoint
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            ip:
              name: ip
              required: true
        - slot_conditions:
            uid:
              name: uid
              required: true
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            hostname:
              name: hostname
              required: true
        - slot_conditions:
            svc_name:
              name: svc_name
              required: true
        - slot_conditions:
            instance_uid:
              name: instance_uid
              required: true
        - slot_conditions:
            interface_uid:
              name: interface_uid
              required: true
        - slot_conditions:
            interface_name:
              name: interface_name
              required: true
        - slot_conditions:
            domain:
              name: domain
              required: true
      description: 'OCSF at_least_one: at least one of [''ip'', ''uid'', ''name'',
        ''hostname'',

        ''svc_name'', ''instance_uid'', ''interface_uid'', ''interface_name'', ''domain'']
        must

        be set.'
  NetworkInterface:
    name: NetworkInterface
    definition_uri: https://w3id.org/lmodel/ocsf/NetworkInterface
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["ip", "mac", "name", "hostname", "uid"]}'
    description: 'The Network Interface object describes the type and associated attributes
      of a

      physical or virtual network interface.'
    notes:
    - "D3FEND\u2122 Ontology d3f:NetworkInterfaceCard. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:NetworkInterfaceCard/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:NetworkInterfaceCard/
    aliases:
    - Network Interface
    exact_mappings:
    - uco_master:NetworkInterface
    is_a: Entity
    slots:
    - NetworkInterface_hostname
    - NetworkInterface_ip
    - NetworkInterface_mac
    - name
    - namespace
    - open_ports
    - subnet_prefix
    - NetworkInterface_type
    - NetworkInterface_type_id
    - uid
    - NetworkInterface_name
    - NetworkInterface_uid
    slot_usage:
      hostname:
        name: hostname
        description: The hostname associated with the network interface.
        recommended: true
      ip:
        name: ip
        description: The IP address associated with the network interface.
        recommended: true
      mac:
        name: mac
        description: The MAC address of the network interface.
        recommended: true
      name:
        name: name
        description: The name of the network interface.
      type:
        name: type
        description: The type of network interface.
      type_id:
        name: type_id
        description: The network interface type identifier.
        range: NetworkInterfaceTypeIdEnum
        recommended: true
      uid:
        name: uid
        description: The unique identifier for the network interface.
    class_uri: ocsf:NetworkInterface
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            ip:
              name: ip
              required: true
        - slot_conditions:
            mac:
              name: mac
              required: true
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            hostname:
              name: hostname
              required: true
        - slot_conditions:
            uid:
              name: uid
              required: true
      description: 'OCSF at_least_one: at least one of [''ip'', ''mac'', ''name'',
        ''hostname'', ''uid'']

        must be set.'
  NetworkProxy:
    name: NetworkProxy
    definition_uri: https://w3id.org/lmodel/ocsf/NetworkProxy
    description: 'The network proxy endpoint object describes a proxy server, which
      acts as an

      intermediary between a client requesting a resource and the server providing

      that resource.'
    notes:
    - "D3FEND\u2122 Ontology d3f:ProxyServer \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:ProxyServer/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:ProxyServer/
    aliases:
    - Network Proxy Endpoint
    is_a: NetworkEndpoint
    slots:
    - agent_list
    - Endpoint_domain
    - Endpoint_hostname
    - hw_info
    - Endpoint_instance_uid
    - Endpoint_interface_name
    - Endpoint_interface_uid
    - Endpoint_ip
    - Endpoint_location
    - Endpoint_mac
    - Endpoint_mac_vendor
    - Endpoint_os
    - Endpoint_owner
    - Endpoint_pool
    - subnet_uid
    - vlan_uid
    - vpc_uid
    - Endpoint_zone
    - Endpoint_name
    - ContainerProfile_container
    - ContainerProfile_namespace_pid
    - autonomous_system
    - NetworkEndpoint_fingerprints
    - intermediate_ips
    - isp
    - isp_org
    - network_scope
    - network_scope_id
    - NetworkEndpoint_port
    - NetworkEndpoint_proxy_endpoint
    - NetworkEndpoint_svc_name
    - uid
    - NetworkEndpoint_type
    - NetworkEndpoint_type_id
    class_uri: ocsf:NetworkProxy
  NetworkTraffic:
    name: NetworkTraffic
    definition_uri: https://w3id.org/lmodel/ocsf/NetworkTraffic
    description: 'The Network Traffic object describes characteristics of network
      traffic over a

      time period. The metrics represent network data transferred between source and

      destination during an observation window.'
    notes:
    - "D3FEND\u2122 Ontology d3f:NetworkTraffic \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:NetworkTraffic/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:NetworkTraffic/
    aliases:
    - Network Traffic
    is_a: Object
    slots:
    - NetworkTraffic_bytes
    - NetworkTraffic_bytes_in
    - NetworkTraffic_bytes_missed
    - NetworkTraffic_bytes_out
    - NetworkTraffic_chunks
    - NetworkTraffic_chunks_in
    - NetworkTraffic_chunks_out
    - NetworkTraffic_end_time
    - NetworkTraffic_packets
    - NetworkTraffic_packets_in
    - NetworkTraffic_packets_out
    - NetworkTraffic_start_time
    - NetworkTraffic_timespan
    slot_usage:
      bytes:
        name: bytes
        description: 'The total number of bytes transferred in both directions (sum
          of bytes_in and

          bytes_out).'
        recommended: true
      bytes_in:
        name: bytes_in
        description: 'The number of bytes sent from the destination to the source
          (inbound

          direction).'
      bytes_missed:
        name: bytes_missed
        description: 'The number of bytes that were missed during observation, typically
          due to

          packet loss or sampling limitations.'
      bytes_out:
        name: bytes_out
        description: 'The number of bytes sent from the source to the destination
          (outbound

          direction).'
      chunks:
        name: chunks
        description: 'The total number of chunks transferred in both directions (sum
          of chunks_in and

          chunks_out).'
      chunks_in:
        name: chunks_in
        description: 'The number of chunks sent from the destination to the source
          (inbound

          direction).'
      chunks_out:
        name: chunks_out
        description: 'The number of chunks sent from the source to the destination
          (outbound

          direction).'
      end_time:
        name: end_time
        description: The end time of the observation or reporting period.
      packets:
        name: packets
        description: 'The total number of packets transferred in both directions (sum
          of packets_in

          and packets_out).'
        recommended: true
      packets_in:
        name: packets_in
        description: 'The number of packets sent from the destination to the source
          (inbound

          direction).'
      packets_out:
        name: packets_out
        description: 'The number of packets sent from the source to the destination
          (outbound

          direction).'
      start_time:
        name: start_time
        description: The start time of the observation or reporting period.
      timespan:
        name: timespan
        description: 'The time span object representing the duration of the observation
          or reporting

          period.'
    class_uri: ocsf:NetworkTraffic
  Node:
    name: Node
    definition_uri: https://w3id.org/lmodel/ocsf/Node
    description: Represents a node or a vertex in a graph structure.
    notes:
    - "JSON graph specification. \u2014\nhttps://github.com/jsongraph/json-graph-specification/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://github.com/jsongraph/json-graph-specification/
    aliases:
    - Node
    is_a: Object
    slots:
    - Node_data
    - Node_desc
    - Node_name
    - Node_type
    - Node_uid
    slot_usage:
      data:
        name: data
        description: 'Additional data about the node stored as key-value pairs. Can
          include custom

          properties specific to the node.'
      desc:
        name: desc
        description: A human-readable description of the node's purpose or meaning
          in the graph.
      name:
        name: name
        description: 'A human-readable name or label for the node. Should be descriptive
          and unique

          within the graph context.'
        recommended: true
      type:
        name: type
        description: 'Categorizes the node into a specific class or type. Useful for
          grouping and

          filtering nodes.'
      uid:
        name: uid
        description: 'A unique string or numeric identifier that distinguishes this
          node from all

          others in the graph. Must be unique across all nodes.'
        required: true
    class_uri: ocsf:Node
  Organization:
    name: Organization
    definition_uri: https://w3id.org/lmodel/ocsf/Organization
    description: 'The Organization object describes characteristics of an organization
      or company

      and its division if any. Additionally, it also describes cloud and

      Software-as-a-Service (SaaS) logical hierarchies such as AWS Organizations,

      Google Cloud Organizations, Oracle Cloud Tenancies, and similar constructs.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Organization
    exact_mappings:
    - uco_master:Organization
    is_a: Entity
    slots:
    - name
    - Organization_ou_name
    - Organization_ou_uid
    - uid
    - Organization_name
    - Organization_uid
    slot_usage:
      name:
        name: name
        description: 'The name of the organization, Oracle Cloud Tenancy, Google Cloud
          Organization,

          or AWS Organization. For example, <code> Widget, Inc. </code> or the <code>
          AWS

          Organization name </code>.'
      ou_name:
        name: ou_name
        description: 'The name of an organizational unit, Google Cloud Folder, or
          AWS Org Unit. For

          example, the <code> GCP Project Name </code>, or <code> Dev_Prod_OU </code>.'
        recommended: true
      ou_uid:
        name: ou_uid
        description: 'The unique identifier of an organizational unit, Google Cloud
          Folder, or AWS

          Org Unit. For example, an  <code> Oracle Cloud Tenancy ID </code>, <code>
          AWS

          OU ID </code>, or <code> GCP Folder ID </code>.'
      uid:
        name: uid
        description: 'The unique identifier of the organization, Oracle Cloud Tenancy,
          Google Cloud

          Organization, or AWS Organization. For example, an <code> AWS Org ID </code>
          or

          <code> Oracle Cloud Domain ID </code>.'
    class_uri: ocsf:Organization
  PeripheralDevice:
    name: PeripheralDevice
    definition_uri: https://w3id.org/lmodel/ocsf/PeripheralDevice
    description: 'The peripheral device object describes the properties of external,
      connectable,

      and detachable hardware.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Peripheral Device
    narrow_mappings:
    - uco_master:Device
    is_a: Entity
    slots:
    - PeripheralDevice_class_
    - PeripheralDevice_model
    - name
    - PeripheralDevice_serial_number
    - PeripheralDevice_type
    - PeripheralDevice_type_id
    - uid
    - PeripheralDevice_vendor_id_list
    - PeripheralDevice_vendor_name
    - PeripheralDevice_name
    - PeripheralDevice_uid
    slot_usage:
      class_:
        name: class_
        description: The class of the peripheral device.
      model:
        name: model
        description: The peripheral device model.
        recommended: true
      name:
        name: name
        description: The name of the peripheral device.
        required: true
      serial_number:
        name: serial_number
        description: The peripheral device serial number.
        recommended: true
      type:
        name: type
        description: 'The Peripheral Device type, normalized to the caption of the

          <code>type_id</code> value. In the case of ''Other'', it is defined by the

          source.'
      type_id:
        name: type_id
        description: The normalized peripheral device type ID.
        range: PeripheralDeviceTypeIdEnum
        recommended: true
      uid:
        name: uid
        description: The unique identifier of the peripheral device.
        recommended: true
      vendor_id_list:
        name: vendor_id_list
        description: The list of vendor IDs for the peripheral device.
        recommended: true
      vendor_name:
        name: vendor_name
        description: The primary vendor name for the peripheral device.
        recommended: true
    class_uri: ocsf:PeripheralDevice
  Policy:
    name: Policy
    definition_uri: https://w3id.org/lmodel/ocsf/Policy
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["name", "type", "uid"]}'
    description: 'The Policy object describes the policies that are applicable. <p>Policy

      attributes provide traceability to the operational state of the security

      product at the time that the event was captured, facilitating forensics,

      troubleshooting, and policy tuning/adjustments.</p>'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Policy
    close_mappings:
    - iso27001:InformationSecurityPolicy
    is_a: Entity
    slots:
    - Policy_data
    - Policy_desc
    - Policy_group
    - Policy_is_applied
    - name
    - Policy_type
    - uid
    - Policy_version
    - Policy_name
    - Policy_uid
    slot_usage:
      data:
        name: data
        description: 'Additional data about the policy such as the underlying JSON
          policy itself or

          other details.'
      desc:
        name: desc
        description: The description of the policy.
      group:
        name: group
        description: The policy group.
      is_applied:
        name: is_applied
        description: 'A determination if the content of a policy was applied to a
          target or request,

          or not.'
        recommended: true
      name:
        name: name
        description: 'The policy name. For example: <code>AdministratorAccess Policy</code>.'
      type:
        name: type
        description: 'The policy type. For example: <code>Identity Policy, Resource
          Policy, Service

          Control Policy, etc.</code>.'
      uid:
        name: uid
        description: A unique identifier of the policy instance.
      version:
        name: version
        description: The policy version number.
        recommended: true
    class_uri: ocsf:Policy
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            type:
              name: type
              required: true
        - slot_conditions:
            uid:
              name: uid
              required: true
      description: 'OCSF at_least_one: at least one of [''name'', ''type'', ''uid'']
        must be set.'
  ProcessEntity:
    name: ProcessEntity
    definition_uri: https://w3id.org/lmodel/ocsf/ProcessEntity
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["cmd_line", "name", "path", "pid", "uid", "cpid"]}'
    description: The Process Entity object provides critical fields for referencing
      a process.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Process Entity
    is_a: Entity
    slots:
    - ProcessEntity_cmd_line
    - ProcessEntity_cpid
    - ProcessEntity_created_time
    - name
    - ProcessEntity_path
    - ProcessEntity_pid
    - uid
    - ProcessEntity_name
    - ProcessEntity_uid
    slot_usage:
      cmd_line:
        name: cmd_line
        recommended: true
      cpid:
        name: cpid
        recommended: true
      created_time:
        name: created_time
        description: The time when the process was created/started.
        recommended: true
      name:
        name: name
        description: 'The friendly name of the process, for example: <code>Notepad++</code>.'
      path:
        name: path
        description: The process file path.
      pid:
        name: pid
        recommended: true
      uid:
        name: uid
        description: 'A unique identifier for this process assigned by the producer
          (tool).

          Facilitates correlation of a process event with other events for that process.'
    class_uri: ocsf:ProcessEntity
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            cmd_line:
              name: cmd_line
              required: true
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            path:
              name: path
              required: true
        - slot_conditions:
            pid:
              name: pid
              required: true
        - slot_conditions:
            uid:
              name: uid
              required: true
        - slot_conditions:
            cpid:
              name: cpid
              required: true
      description: 'OCSF at_least_one: at least one of [''cmd_line'', ''name'', ''path'',
        ''pid'', ''uid'',

        ''cpid''] must be set.'
  Product:
    name: Product
    definition_uri: https://w3id.org/lmodel/ocsf/Product
    description: The Product object describes characteristics of a software product.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Product
    is_a: Entity
    mixins:
    - DataClassificationProfile
    slots:
    - cpe_name
    - feature
    - lang
    - name
    - Product_path
    - uid
    - Product_url_string
    - Product_vendor_name
    - Product_version
    - Product_name
    - Product_uid
    - DataClassificationProfile_data_classification
    - DataClassificationProfile_data_classifications
    slot_usage:
      name:
        name: name
        description: The name of the product.
      path:
        name: path
        description: The installation path of the product.
      uid:
        name: uid
        description: The unique identifier of the product.
      url_string:
        name: url_string
        description: The URL pointing towards the product.
      vendor_name:
        name: vendor_name
        description: The name of the vendor of the product.
        recommended: true
      version:
        name: version
        description: 'The version of the product, as defined by the event source.
          For example:

          <code>2013.1.3-beta</code>.'
        recommended: true
    class_uri: ocsf:Product
  QueryInfo:
    name: QueryInfo
    definition_uri: https://w3id.org/lmodel/ocsf/QueryInfo
    description: 'The query info object holds information related to data access within
      a

      datastore. To access, manipulate, delete, or retrieve data from a datastore,
      a

      query must be written using a specific syntax.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Query Information
    is_a: Entity
    slots:
    - QueryInfo_bytes
    - QueryInfo_data
    - name
    - QueryInfo_query_string
    - QueryInfo_query_time
    - uid
    - QueryInfo_name
    - QueryInfo_uid
    slot_usage:
      bytes:
        name: bytes
        description: The size of the data returned from the query.
      data:
        name: data
        description: The data returned from the query execution.
      name:
        name: name
        description: The query name for a saved or scheduled query.
      query_string:
        name: query_string
        description: 'A string representing the query code being run. For example:
          <code>SELECT *

          FROM my_table</code>'
        required: true
      query_time:
        name: query_time
        description: The time when the query was run.
      uid:
        name: uid
        description: The unique identifier of the query.
    class_uri: ocsf:QueryInfo
  Reporter:
    name: Reporter
    definition_uri: https://w3id.org/lmodel/ocsf/Reporter
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["hostname", "ip", "name", "uid"]}'
    description: The entity from which an event or finding was reported.
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Reporter
    is_a: Entity
    slots:
    - Reporter_hostname
    - Reporter_ip
    - name
    - Reporter_org
    - uid
    - Reporter_name
    - Reporter_uid
    slot_usage:
      hostname:
        name: hostname
        description: The hostname of the entity from which the event or finding was
          reported.
        recommended: true
      ip:
        name: ip
        description: The IP address of the entity from which the event or finding
          was reported.
        recommended: true
      name:
        name: name
        description: The name of the entity from which the event or finding was reported.
        recommended: true
      org:
        name: org
        description: The organization properties of the entity that reported the event
          or finding.
      uid:
        name: uid
        description: 'The unique identifier of the entity from which the event or
          finding was

          reported.'
        recommended: true
    class_uri: ocsf:Reporter
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            hostname:
              name: hostname
              required: true
        - slot_conditions:
            ip:
              name: ip
              required: true
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            uid:
              name: uid
              required: true
      description: 'OCSF at_least_one: at least one of [''hostname'', ''ip'', ''name'',
        ''uid''] must be

        set.'
  ResourceDetails:
    name: ResourceDetails
    definition_uri: https://w3id.org/lmodel/ocsf/ResourceDetails
    description: 'The Resource Details object describes details about resources that
      were

      affected by the activity/event.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Resource Details
    is_a: Resource
    mixins:
    - CloudProfile
    slots:
    - Resource_created_time
    - Resource_data
    - Resource_labels
    - Resource_modified_time
    - Resource_tags
    - Resource_type
    - Resource_uid_alt
    - Resource_uid
    - DataClassificationProfile_data_classification
    - DataClassificationProfile_data_classifications
    - agent_list
    - ResourceDetails_cloud_partition
    - ResourceDetails_criticality
    - ResourceDetails_group
    - ResourceDetails_hostname
    - ResourceDetails_ip
    - is_backed_up
    - ResourceDetails_name
    - ResourceDetails_namespace
    - ResourceDetails_owner
    - ResourceDetails_provider
    - ResourceDetails_region
    - ResourceDetails_resource_relationship
    - ResourceDetails_role
    - ResourceDetails_role_id
    - ResourceDetails_version
    - ResourceDetails_zone
    - CloudProfile_api
    - CloudProfile_cloud
    slot_usage:
      cloud_partition:
        name: cloud_partition
        description: 'The logical grouping or isolated segment within a cloud provider''s

          infrastructure where the resource is located. Examples include AWS partitions

          (aws, aws-cn, aws-us-gov), Azure cloud environments (AzureCloud,

          AzureUSGovernment, AzureChinaCloud), or similar logical divisions in other

          cloud providers.'
      criticality:
        name: criticality
        description: The criticality of the resource as defined by the event source.
      group:
        name: group
        description: The name of the related resource group.
      hostname:
        name: hostname
        description: The fully qualified name of the resource.
        recommended: true
      ip:
        name: ip
        description: The IP address of the resource, in either IPv4 or IPv6 format.
        recommended: true
      name:
        name: name
        recommended: true
      namespace:
        name: namespace
        description: 'The namespace is useful when similar entities exist that you
          need to keep

          separate.'
      owner:
        name: owner
        description: 'The details of the entity that owns the resource. This object
          includes

          properties such as the owner''s name, unique identifier, type, domain, and
          other

          relevant attributes that help identify the resource owner within the

          environment.'
        recommended: true
      provider:
        name: provider
        description: 'The cloud service provider that hosts or manages the resource.
          This field is

          typically used when the resource is managed by a different provider than
          the

          one generating the event or finding. Examples include AWS, Azure, GCP (Google

          Cloud Platform), Oracle Cloud, IBM Cloud, Alibaba Cloud, or other public,

          private, or hybrid cloud providers.'
      region:
        name: region
        description: 'The cloud region where the resource is hosted, as defined by
          the cloud

          provider. This represents the physical or logical geographic area containing

          the infrastructure supporting the resource. Examples include AWS regions

          (us-east-1, eu-west-1), Azure regions (East US, West Europe), GCP regions

          (us-central1, europe-west1), or Oracle Cloud regions (us-ashburn-1,

          uk-london-1).'
      resource_relationship:
        name: resource_relationship
        description: 'A graph representation showing how this resource relates to
          and interacts with

          other entities in the environment. This can include parent/child relationships,

          dependencies, or other connections.'
      role:
        name: role
        description: 'The role of the resource in the context of the event or finding,
          normalized to

          the caption of the role_id value. In the case of ''Other'', it is defined
          by the

          event source.'
      role_id:
        name: role_id
        description: 'The normalized identifier of the resource''s role in the context
          of the event or

          finding.'
        range: ResourceDetailsRoleIdEnum
        recommended: true
      version:
        name: version
        description: The version of the resource. For example <code>1.2.3</code>.
      zone:
        name: zone
        description: 'The availability zone within a cloud region where the resource
          is located.

          Examples include AWS availability zones (us-east-1a, us-east-1b), Azure

          availability zones (1, 2, 3 within a region), GCP zones (us-central1-a,

          us-central1-b), or Oracle Cloud availability domains (AD-1, AD-2, AD-3).'
    class_uri: ocsf:ResourceDetails
  Rule:
    name: Rule
    definition_uri: https://w3id.org/lmodel/ocsf/Rule
    description: 'The Rule object describes characteristics of a rule associated with
      a policy or

      an event.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Rule
    is_a: Entity
    slots:
    - Rule_category
    - Rule_desc
    - name
    - Rule_type
    - uid
    - Rule_version
    - Rule_name
    - Rule_uid
    slot_usage:
      category:
        name: category
        description: The rule category.
      desc:
        name: desc
        description: The description of the rule that generated the event.
      name:
        name: name
        description: The name of the rule that generated the event.
      type:
        name: type
        description: The rule type.
      uid:
        name: uid
        description: The unique identifier of the rule that generated the event.
      version:
        name: version
        description: 'The rule version. For example: <code>1.1</code>.'
    class_uri: ocsf:Rule
  Scan:
    name: Scan
    definition_uri: https://w3id.org/lmodel/ocsf/Scan
    description: The Scan object describes characteristics of a proactive scan.
