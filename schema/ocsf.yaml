          or pts value.'
      uid:
        name: uid
        description: The unique identifier of the session.
        recommended: true
      uid_alt:
        name: uid_alt
        description: 'The alternate unique identifier of the session. e.g. AWS ARN
          -

          <code>arn:aws:sts::123344444444:assumed-role/Admin/example-session</code>.'
      uuid:
        name: uuid
        description: The universally unique identifier of the session.
    class_uri: ocsf:Session
  SoftwareComponent:
    name: SoftwareComponent
    definition_uri: https://w3id.org/lmodel/ocsf/SoftwareComponent
    description: 'The Software Component object describes characteristics of a software
      component

      within a software package.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Software Component
    is_a: Object
    slots:
    - SoftwareComponent_author
    - SoftwareComponent_hash
    - SoftwareComponent_license
    - SoftwareComponent_name
    - SoftwareComponent_purl
    - SoftwareComponent_related_component
    - relationship
    - SoftwareComponent_relationship_id
    - SoftwareComponent_type
    - SoftwareComponent_type_id
    - SoftwareComponent_version
    slot_usage:
      author:
        name: author
        recommended: true
      hash:
        name: hash
        description: Cryptographic hash to identify the binary instance of a software
          component.
      license:
        name: license
        description: The software license applied to this component.
      name:
        name: name
        description: The software component name.
        required: true
      purl:
        name: purl
        description: 'The Package URL (PURL) to identify the software component. This
          is a URL that

          uniquely identifies the component, including the component''s name, version,
          and

          type. The URL is used to locate and retrieve the component''s metadata and

          content.'
        recommended: true
      related_component:
        name: related_component
        recommended: true
      relationship_id:
        name: relationship_id
        recommended: true
      type:
        name: type
        description: 'The type of software component, normalized to the caption of
          the

          <code>type_id</code> value. In the case of ''Other'', it is defined by the

          source.'
      type_id:
        name: type_id
        description: The type of software component.
        range: SoftwareComponentTypeIdEnum
        recommended: true
      version:
        name: version
        description: The software component version.
        required: true
    class_uri: ocsf:SoftwareComponent
  Span:
    name: Span
    definition_uri: https://w3id.org/lmodel/ocsf/Span
    description: 'Represents a single unit of work or operation within a distributed
      trace. A

      span typically tracks the execution of a request across a service, capturing

      important details such as the operation, timestamps, and status. Spans help

      break down the overall trace into smaller, manageable parts, enabling detailed

      analysis of the performance and behavior of specific operations within the

      system. They are crucial for understanding latency, dependencies, and

      bottlenecks in complex distributed systems.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Span
    is_a: Object
    slots:
    - Span_duration
    - Span_end_time
    - Span_message
    - Span_operation
    - Span_parent_uid
    - Span_service
    - Span_start_time
    - Span_status_code
    - Span_uid
    slot_usage:
      duration:
        name: duration
        description: 'The total time, in milliseconds, that the span represents, calculated
          as the

          difference between start_time and end_time. It reflects the operation''s

          performance and latency, independent of event timestamps, and accounts for

          normalized times used by observability tools to ensure consistency across

          distributed systems.'
      end_time:
        name: end_time
        description: 'The end timestamp of the span, essential for identifying latency
          and

          performance bottlenecks. Like the start time, this timestamp is normalized

          across the observability system to ensure consistency, even when events
          are

          recorded across distributed services with unsynchronized clocks. Normalized

          time allows for accurate duration calculations and helps observability tools

          track performance across services, regardless of the individual system time

          settings.'
        required: true
      message:
        name: message
        description: 'The message in a span (often referred to as a span event) serves
          as a way to

          record significant moments or occurrences during the span''s lifecycle.
          This

          content typically manifests as log entries, annotations, or semi-structured

          events as a string, providing additional granularity and context about what

          happens at specific points during the execution of an operation.'
      operation:
        name: operation
        description: 'Describes an action performed in a span, such as API requests,
          database

          queries, or computations.'
      parent_uid:
        name: parent_uid
        description: 'The ID of the parent span for this span object, establishing
          its relationship

          in the trace hierarchy.'
      service:
        name: service
        description: 'Identifies the service or component that generates the span,
          helping trace its

          path through the distributed system.'
      start_time:
        name: start_time
        description: 'The start timestamp of the span, essential for identifying latency
          and

          performance bottlenecks. This timestamp is normalized across the observability

          system, ensuring consistency even when events occur across distributed services

          with potentially unsynchronized clocks. By using normalized time, observability

          tools can provide accurate, uniform measurements of operation performance
          and

          latency, regardless of where or when the events actually occur.'
        required: true
      status_code:
        name: status_code
        description: 'Indicates the outcome of the operation in the span, such as
          success, failure,

          or error. Issues in a span typically refer to problems such as failed

          operations, timeouts, service unavailability, or errors in processing that
          can

          negatively impact the performance or reliability of the system. Tracking
          the

          `status_code` helps pinpoint these issues, enabling quicker identification
          and

          resolution of system inefficiencies or faults.'
      uid:
        name: uid
        description: 'The unique identifier for the span, used in distributed systems
          and

          microservices architectures to track and correlate requests across different

          components of an application. It enables tracing the flow of a request through

          various services.'
        required: true
    class_uri: ocsf:Span
  Sso:
    name: Sso
    definition_uri: https://w3id.org/lmodel/ocsf/Sso
    description: 'The Single Sign-On (SSO) object provides a structure for normalizing
      SSO

      attributes, configuration, and/or settings from Identity Providers.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - SSO
    is_a: Object
    slots:
    - Sso_auth_protocol
    - Sso_auth_protocol_id
    - Sso_certificate
    - Sso_created_time
    - Sso_duration_mins
    - Sso_idle_timeout
    - Sso_login_endpoint
    - Sso_logout_endpoint
    - Sso_metadata_endpoint
    - Sso_modified_time
    - Sso_name
    - Sso_protocol_name
    - scopes
    - Sso_uid
    - Sso_vendor_name
    slot_usage:
      auth_protocol:
        name: auth_protocol
        description: 'The authorization protocol as defined by the caption of

          <code>auth_protocol_id</code>. In the case of <code>Other</code>, it is
          defined

          by the event source.'
      auth_protocol_id:
        name: auth_protocol_id
        description: 'The normalized identifier of the authentication protocol used
          by the SSO

          resource.'
      certificate:
        name: certificate
        description: 'Digital Signature associated with the SSO resource, e.g., SAML
          X.509

          certificate details.'
        recommended: true
      created_time:
        name: created_time
        description: When the SSO resource was created.
      duration_mins:
        name: duration_mins
        description: 'The duration (in minutes) for an SSO session, after which re-authentication
          is

          required.'
      idle_timeout:
        name: idle_timeout
        description: 'Duration (in minutes) of allowed inactivity before Single Sign-On
          (SSO) session

          expiration.'
      login_endpoint:
        name: login_endpoint
        description: URL for initiating an SSO login request.
      logout_endpoint:
        name: logout_endpoint
        description: 'URL for initiating an SSO logout request, allowing sessions
          to be terminated

          across applications.'
      metadata_endpoint:
        name: metadata_endpoint
        description: 'URL where metadata about the SSO configuration is available
          (e.g., for SAML

          configurations).'
      modified_time:
        name: modified_time
        description: The most recent time when the SSO resource was updated.
      name:
        name: name
        description: The name of the SSO resource.
        recommended: true
      protocol_name:
        name: protocol_name
        description: 'The supported protocol for the SSO resource. E.g., <code>SAML</code>
          or

          <code>OIDC</code>.'
      uid:
        name: uid
        description: A unique identifier for a SSO resource.
        recommended: true
      vendor_name:
        name: vendor_name
        description: 'Name of the vendor or service provider implementing SSO. E.g.,

          <code>Okta</code>, <code>Auth0</code>, <code>Microsoft</code>.'
    class_uri: ocsf:Sso
  StartupItem:
    name: StartupItem
    definition_uri: https://w3id.org/lmodel/ocsf/StartupItem
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"just_one": ["driver", "job", "process"]}'
    description: 'The startup item object describes an application component that
      has associated

      startup criteria and configurations.'
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    aliases:
    - Startup Item
    is_a: OcsfObject
    slots:
    - StartupItem_driver
