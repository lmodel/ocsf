    definition_uri: https://w3id.org/lmodel/ocsf/VulnerabilityFixCoverageIdEnum
    description: 'The normalized identifier for fix coverage, applicable to this vulnerability.

      Typically useful, when there are multiple affected packages but only a subset

      have available fixes.'
    from_schema: https://w3id.org/lmodel/ocsf/enums
    permissible_values:
      COMPLETE:
        text: COMPLETE
        description: 'All affected packages and components have available fixes or
          patches to

          remediate the vulnerability.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '1'
          caption:
            tag: caption
            value: Complete
      PARTIAL:
        text: PARTIAL
        description: 'Only some of the affected packages and components have available
          fixes or

          patches, while others remain vulnerable.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '2'
          caption:
            tag: caption
            value: Partial
      NONE:
        text: NONE
        description: 'No fixes or patches are currently available for any of the affected
          packages

          and components.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '3'
          caption:
            tag: caption
            value: None
      UNKNOWN:
        text: UNKNOWN
        description: The fix coverage is unknown.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '0'
          caption:
            tag: caption
            value: Unknown
      OTHER:
        text: OTHER
        description: 'The fix coverage is not mapped. See the <code>fix_coverage</code>
          attribute,

          which contains a data source specific value.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '99'
          caption:
            tag: caption
            value: Other
