        description: 'The class of DNS data contained in this resource record. See
          <a target=''_blank''

          href=''https://www.rfc-editor.org/rfc/rfc1035.txt''>RFC1035</a>. For example:

          <code>IN</code>.'
        recommended: true
      flag_ids:
