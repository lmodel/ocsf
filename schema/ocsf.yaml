name: ocsf
annotations:
  copyright:
    tag: copyright
    value: "\xA9 OCSF a Series of LF Projects, LLC"
description: "Open Cybersecurity Schema Framework (OCSF) \u2014 LinkML schema. Generated\
  \ from\nupstream OCSF JSON at version 1.9.0-dev. Each top-level concern is one module:\n\
  types, dictionary (slots), enums, categories, objects, profiles, events,\nextensions."
title: "Open Cybersecurity Schema Framework (OCSF) \u2014 LinkML Schema"
source: https://github.com/ocsf/ocsf-schema/tree/main
see_also:
- https://lmodel.github.io/ocsf
- https://schema.ocsf.io/
- https://github.com/ocsf/ocsf-schema
id: https://w3id.org/lmodel/ocsf
version: 1.9.0-dev
imports:
- linkml:types
- ./types
- ./enums
- ./dictionary
- ./categories
- ./objects
- ./profiles
- ./events
- ./extensions
license: Apache-2.0
prefixes:
  ocsf:
    prefix_prefix: ocsf
    prefix_reference: https://w3id.org/lmodel/ocsf/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  xsd:
    prefix_prefix: xsd
    prefix_reference: http://www.w3.org/2001/XMLSchema#
  rdfs:
    prefix_prefix: rdfs
    prefix_reference: http://www.w3.org/2000/01/rdf-schema#
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  skos:
    prefix_prefix: skos
    prefix_reference: http://www.w3.org/2004/02/skos/core#
  attack:
    prefix_prefix: attack
    prefix_reference: https://lmodel.github.io/attack/
  stix:
    prefix_prefix: stix
    prefix_reference: https://lmodel.github.io/stix/
  uco_master:
    prefix_prefix: uco_master
    prefix_reference: https://lmodel.github.io/uco-master/
  capec:
    prefix_prefix: capec
    prefix_reference: https://w3id.org/lmodel/capec/
  cve:
    prefix_prefix: cve
    prefix_reference: https://w3id.org/lmodel/cve/
  cwe:
    prefix_prefix: cwe
    prefix_reference: https://w3id.org/lmodel/cwe/
  iso27001:
    prefix_prefix: iso27001
    prefix_reference: https://w3id.org/lmodel/iso27001/
  kev_catalog:
    prefix_prefix: kev_catalog
    prefix_reference: https://w3id.org/lmodel/kev-catalog/
  nvd:
    prefix_prefix: nvd
    prefix_reference: https://w3id.org/lmodel/nist-nvd/
  core:
    prefix_prefix: core
    prefix_reference: https://w3id.org/lmodel/vulnerability-core/
default_prefix: ocsf
default_range: string
subsets:
  application:
    name: application
    definition_uri: https://w3id.org/lmodel/ocsf/Application
    description: 'Application Activity events report detailed information about the
      behavior of

      applications and services.'
    from_schema: https://w3id.org/lmodel/ocsf
  discovery:
    name: discovery
    definition_uri: https://w3id.org/lmodel/ocsf/Discovery
    description: 'Discovery events report the existence and state of devices, files,

      configurations, processes, registry keys, and other objects.'
    from_schema: https://w3id.org/lmodel/ocsf
  findings:
    name: findings
    definition_uri: https://w3id.org/lmodel/ocsf/Findings
    description: 'Findings events report findings, detections, and possible resolutions
      of

      malware, anomalies, or other actions performed by security products.'
    from_schema: https://w3id.org/lmodel/ocsf
  iam:
    name: iam
    definition_uri: https://w3id.org/lmodel/ocsf/Iam
    description: 'Identity & Access Management (IAM) events relate to the supervision
      of the

      system''s authentication and access control model. Examples of such events are

      the success or failure of authentication, granting of authority, password

      change, entity change, privileged use etc.'
    from_schema: https://w3id.org/lmodel/ocsf
  network:
    name: network
    definition_uri: https://w3id.org/lmodel/ocsf/Network
    description: Network Activity events.
    from_schema: https://w3id.org/lmodel/ocsf
  remediation:
    name: remediation
    definition_uri: https://w3id.org/lmodel/ocsf/Remediation
    description: 'Remediation events report the results of remediation commands targeting
      files,

      processes, and other objects.'
    from_schema: https://w3id.org/lmodel/ocsf
  system:
    name: system
    definition_uri: https://w3id.org/lmodel/ocsf/System
    description: System Activity events.
    from_schema: https://w3id.org/lmodel/ocsf
  unmanned_systems:
    name: unmanned_systems
    definition_uri: https://w3id.org/lmodel/ocsf/UnmannedSystems
    description: 'Unmanned Systems events report the activity, existence, and/or state
      of

      unmanned systems for tracking, mission planning, and other related activities.'
    from_schema: https://w3id.org/lmodel/ocsf
  objects:
    name: objects
    definition_uri: https://w3id.org/lmodel/ocsf/Objects
    description: Reusable OCSF object definitions (mirrors upstream objects/ directory).
    from_schema: https://w3id.org/lmodel/ocsf
  ai_operation_profile:
    name: ai_operation_profile
    definition_uri: https://w3id.org/lmodel/ocsf/AiOperationProfile
    description: 'AI-specific attributes for model operations, retrieval systems,
      and agent

      activities. e.g. model_name, total_token_counts etc.'
    from_schema: https://w3id.org/lmodel/ocsf
  cloud_profile:
    name: cloud_profile
    definition_uri: https://w3id.org/lmodel/ocsf/CloudProfile
    description: 'The attributes that describe information specific to Cloud

      services/applications.'
    from_schema: https://w3id.org/lmodel/ocsf
  container_profile:
    name: container_profile
    definition_uri: https://w3id.org/lmodel/ocsf/ContainerProfile
    description: The container context for a process.
    from_schema: https://w3id.org/lmodel/ocsf
  data_classification_profile:
    name: data_classification_profile
    definition_uri: https://w3id.org/lmodel/ocsf/DataClassificationProfile
    description: 'The Data Classification profile adds attributes to specific resource
      objects,

      allowing users to describe information about classifiers & data classification

      results.'
    from_schema: https://w3id.org/lmodel/ocsf
  datetime_profile:
    name: datetime_profile
    definition_uri: https://w3id.org/lmodel/ocsf/DatetimeProfile
    description: 'This profile defines date/time attributes as defined in RFC-3339.
      For example

      1985-04-12T23:20:50.52Z.'
    from_schema: https://w3id.org/lmodel/ocsf
  host_profile:
    name: host_profile
    definition_uri: https://w3id.org/lmodel/ocsf/HostProfile
    description: The attributes that identify host/device attributes.
    from_schema: https://w3id.org/lmodel/ocsf
  incident_profile:
    name: incident_profile
    definition_uri: https://w3id.org/lmodel/ocsf/IncidentProfile
    description: The attributes that add incident handling semantics to a Finding.
    from_schema: https://w3id.org/lmodel/ocsf
  load_balancer_profile:
    name: load_balancer_profile
    definition_uri: https://w3id.org/lmodel/ocsf/LoadBalancerProfile
    description: The attributes that describe information specific to load balancers.
    from_schema: https://w3id.org/lmodel/ocsf
  network_proxy_profile:
    name: network_proxy_profile
    definition_uri: https://w3id.org/lmodel/ocsf/NetworkProxyProfile
    description: The attributes that identify network proxy attributes.
    from_schema: https://w3id.org/lmodel/ocsf
  osint_profile:
    name: osint_profile
    definition_uri: https://w3id.org/lmodel/ocsf/OsintProfile
    description: 'The OSINT (Open Source Intelligence) profile contains one or more
      indicators

      and associated analysis and details, such as registrar (WHOIS) information and

      commentary about a hostname, or information about a digital certificate and
      its

      usage within a campaign. This information can be used to further enrich a

      detection or finding by providing decisioning support to other analysts and

      engineers within the profile itself.'
    from_schema: https://w3id.org/lmodel/ocsf
  security_control_profile:
    name: security_control_profile
    definition_uri: https://w3id.org/lmodel/ocsf/SecurityControlProfile
    description: 'The attributes including disposition that represent the outcome
      of a security

      control including but not limited to access control, malware or policy

      violation, network proxy, intrusion detection, firewall, or data control.  The

      profile is intended to augment activities or findings with an outcome when a

      security control has observed or intervened. If the control detected a security

      violation, and the <code>disposition_id</code> or <code>action_id</code> is
      an

      alertable outcome or action, the <code>is_alert</code> flag may be set to

      <code>true</code>.'
    from_schema: https://w3id.org/lmodel/ocsf
  trace_profile:
    name: trace_profile
    definition_uri: https://w3id.org/lmodel/ocsf/TraceProfile
    description: 'The Trace Profile extends the OCSF framework to capture and standardize

      observability events, specifically targeting trace-level data. This profile

      enables integration and normalization of distributed tracing information,

      allowing OCSF events to retain essential trace context such as trace IDs, span

      relationships, and service dependencies.'
    from_schema: https://w3id.org/lmodel/ocsf
  linux_extension:
    name: linux_extension
    definition_uri: https://w3id.org/lmodel/ocsf/LinuxExtension
    description: 'The Linux extension defines Linux specific attributes, profiles,
      objects, and

      classes.'
    from_schema: https://w3id.org/lmodel/ocsf
  macos_extension:
    name: macos_extension
    definition_uri: https://w3id.org/lmodel/ocsf/MacosExtension
    description: 'The macOS extension defines macOS specific attributes, profiles,
      objects, and

      classes.'
    from_schema: https://w3id.org/lmodel/ocsf
  windows_extension:
    name: windows_extension
    definition_uri: https://w3id.org/lmodel/ocsf/WindowsExtension
    description: 'The Windows extension defines Windows specific attributes, objects,
      and

      classes.'
    from_schema: https://w3id.org/lmodel/ocsf
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  TimestampT:
    name: TimestampT
    definition_uri: https://w3id.org/lmodel/ocsf/TimestampT
    description: 'A UNIX timestamp, in milliseconds since the Unix Epoch (1 Jan 1970
      00:00:00

      UTC).'
    from_schema: https://w3id.org/lmodel/ocsf/types
    typeof: integer
    base: int
    uri: xsd:long
  UrlT:
    name: UrlT
    definition_uri: https://w3id.org/lmodel/ocsf/UrlT
    description: A Uniform Resource Locator (URL).
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: str
    uri: xsd:anyURI
  IpT:
    name: IpT
    definition_uri: https://w3id.org/lmodel/ocsf/IpT
    description: An IP address, in either IPv4 or IPv6 format.
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: str
    uri: xsd:string
    pattern: ^((\d{1,3}\.){3}\d{1,3}|[0-9a-fA-F:]{2,39})$
  MacT:
    name: MacT
    definition_uri: https://w3id.org/lmodel/ocsf/MacT
    description: A MAC (Media Access Control) address.
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: str
    uri: xsd:string
    pattern: ^([0-9a-fA-F]{2}[:\-]){5}[0-9a-fA-F]{2}$
  EmailT:
    name: EmailT
    definition_uri: https://w3id.org/lmodel/ocsf/EmailT
    description: An email address.
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: str
    uri: xsd:string
    pattern: ^[\w.+\-]+@[\w\-]+(\.[\w\-]+)+$
  HostnameT:
    name: HostnameT
    definition_uri: https://w3id.org/lmodel/ocsf/HostnameT
    description: A fully qualified domain name (FQDN).
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: str
    uri: xsd:string
  UsernameT:
    name: UsernameT
    definition_uri: https://w3id.org/lmodel/ocsf/UsernameT
    description: A user name.
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: str
    uri: xsd:string
  FileNameT:
    name: FileNameT
    definition_uri: https://w3id.org/lmodel/ocsf/FileNameT
    description: A file name.
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: str
    uri: xsd:string
  FilePathT:
    name: FilePathT
    definition_uri: https://w3id.org/lmodel/ocsf/FilePathT
    description: A file path.
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: str
    uri: xsd:string
  PortT:
    name: PortT
    definition_uri: https://w3id.org/lmodel/ocsf/PortT
    description: A TCP/UDP port number (0-65535).
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: int
    uri: xsd:integer
    minimum_value: 0
    maximum_value: 65535
  UuidT:
    name: UuidT
    definition_uri: https://w3id.org/lmodel/ocsf/UuidT
    description: A Universally Unique Identifier (UUID).
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: str
    uri: xsd:string
    pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
  SubnetT:
    name: SubnetT
    definition_uri: https://w3id.org/lmodel/ocsf/SubnetT
    description: An IP subnet in CIDR notation.
    from_schema: https://w3id.org/lmodel/ocsf/types
    base: str
    uri: xsd:string
    pattern: ^((\d{1,3}\.){3}\d{1,3}|[0-9a-fA-F:]{2,39})/(\d|[1-9]\d|1[0-1]\d|12[0-8])$
enums:
  AccountSwitchTypeIdEnum:
    name: AccountSwitchTypeIdEnum
    definition_uri: https://w3id.org/lmodel/ocsf/AccountSwitchTypeIdEnum
    description: The normalized identifier of the account switch method.
    from_schema: https://w3id.org/lmodel/ocsf/enums
    permissible_values:
      UNKNOWN:
        text: UNKNOWN
        description: The account switch type is unknown.
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '0'
          caption:
            tag: caption
            value: Unknown
      SUBSTITUTE_USER:
        text: SUBSTITUTE_USER
        description: 'A utility like <code>sudo</code>, <code>su</code>, or equivalent
          was used to

          perform actions in the context of another user.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '1'
          caption:
            tag: caption
            value: Substitute User
      IMPERSONATE:
        text: IMPERSONATE
        description: 'An API like <code>ImpersonateLoggedOnUser()</code> or equivalent
          was used to

          perform actions in the context of another user.'
        annotations:
          ocsf_uid:
            tag: ocsf_uid
            value: '2'
          caption:
            tag: caption
            value: Impersonate
