  Endpoint:
    name: Endpoint
    definition_uri: https://w3id.org/lmodel/ocsf/Endpoint
    annotations:
      ocsf_constraints:
        tag: ocsf_constraints
        value: '{"at_least_one": ["ip", "uid", "name", "hostname", "instance_uid",

          "interface_uid", "interface_name"]}'
      observable_id:
        tag: observable_id
        value: 20
    description: "The Endpoint object describes a physical or virtual device that\
      \ connects to and\nexchanges information with a computer network. Some examples\
      \ of endpoints are\nmobile devices, desktop computers, virtual machines, embedded\
      \ devices, and\nservers. Internet-of-Things devices\u2014like cameras, lighting,\
      \ refrigerators,\nsecurity systems, smart speakers, and thermostats\u2014are\
      \ also endpoints."
    notes:
    - "D3FEND\u2122 Ontology d3f:Host. \u2014\nhttps://d3fend.mitre.org/dao/artifact/d3f:ComputerNetworkNode/"
    in_subset:
    - objects
    from_schema: https://w3id.org/lmodel/ocsf/objects
    see_also:
    - https://d3fend.mitre.org/dao/artifact/d3f:ComputerNetworkNode/
    aliases:
    - Endpoint
    broad_mappings:
    - stix:Host
    - uco_master:Device
    is_a: Entity
    mixins:
    - ContainerProfile
    slots:
    - agent_list
    - Endpoint_domain
    - Endpoint_hostname
    - hw_info
    - Endpoint_instance_uid
    - Endpoint_interface_name
    - Endpoint_interface_uid
    - Endpoint_ip
    - Endpoint_location
    - Endpoint_mac
    - Endpoint_mac_vendor
    - name
    - Endpoint_os
    - Endpoint_owner
    - Endpoint_pool
    - subnet_uid
    - Endpoint_type
    - Endpoint_type_id
    - uid
    - vlan_uid
    - vpc_uid
    - Endpoint_zone
    - Endpoint_name
    - Endpoint_uid
    - ContainerProfile_container
    - ContainerProfile_namespace_pid
    slot_usage:
      domain:
        name: domain
        description: 'The name of the domain that the endpoint belongs to or that
          corresponds to the

          endpoint.'
      hostname:
        name: hostname
        description: The fully qualified name of the endpoint.
        recommended: true
      instance_uid:
        name: instance_uid
        recommended: true
      interface_name:
        name: interface_name
        recommended: true
      interface_uid:
        name: interface_uid
        recommended: true
      ip:
        name: ip
        description: The IP address of the endpoint, in either IPv4 or IPv6 format.
        recommended: true
      location:
        name: location
        description: The geographical location of the endpoint.
      mac:
        name: mac
        description: The Media Access Control (MAC) address of the endpoint.
      mac_vendor:
        name: mac_vendor
        description: 'The vendor or manufacturer of the endpoint''s network interface
          controller

          (NIC), as identified from the MAC address.'
      name:
        name: name
        description: The short name of the endpoint.
      os:
        name: os
        description: The endpoint operating system.
      owner:
        name: owner
        description: 'The identity of the service or user account that owns the endpoint
          or was last

          logged into it.'
        recommended: true
      pool:
        name: pool
        description: The pool of desktops or virtual machines to which the endpoint
          belongs.
      type:
        name: type
        description: 'The endpoint type. For example: <code>unknown</code>, <code>server</code>,

          <code>desktop</code>, <code>laptop</code>, <code>tablet</code>,

          <code>mobile</code>, <code>virtual</code>, <code>browser</code>, or

          <code>other</code>.'
      type_id:
        name: type_id
        description: The endpoint type ID.
        range: EndpointTypeIdEnum
        recommended: true
      uid:
        name: uid
        description: The unique identifier of the endpoint.
      zone:
        name: zone
        description: The network zone or LAN segment.
    class_uri: ocsf:Endpoint
    rules:
    - postconditions:
        any_of:
        - slot_conditions:
            ip:
              name: ip
              required: true
        - slot_conditions:
            uid:
              name: uid
              required: true
        - slot_conditions:
            name:
              name: name
              required: true
        - slot_conditions:
            hostname:
              name: hostname
              required: true
        - slot_conditions:
            instance_uid:
              name: instance_uid
              required: true
        - slot_conditions:
            interface_uid:
              name: interface_uid
              required: true
        - slot_conditions:
            interface_name:
              name: interface_name
              required: true
      description: 'OCSF at_least_one: at least one of [''ip'', ''uid'', ''name'',
        ''hostname'',

        ''instance_uid'', ''interface_uid'', ''interface_name''] must be set.'
  EndpointConnection:
    name: EndpointConnection
    definition_uri: https://w3id.org/lmodel/ocsf/EndpointConnection
