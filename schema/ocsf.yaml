    - Table_groups
    - Table_modified_time
    - name
    - Table_size
    - uid
    - Table_name
    - Table_uid
    slot_usage:
      created_time:
        name: created_time
        description: The time when the table was known to have been created.
      desc:
        name: desc
        description: The description of the table.
      groups:
        name: groups
        description: The group names to which the table belongs.
      modified_time:
        name: modified_time
        description: 'The most recent time when any changes, updates, or modifications
          were made

          within the table.'
      name:
        name: name
        description: The table name, ordinarily as assigned by a database administrator.
      size:
        name: size
        description: The size of the data table in bytes.
      uid:
        name: uid
        description: The unique identifier of the table.
    class_uri: ocsf:Table
  Tactic:
    name: Tactic
    definition_uri: https://w3id.org/lmodel/ocsf/Tactic
    description: "The MITRE Tactic object describes the ATT&CK\xAE or ATLAS\u2122\
      \ Tactic ID and/or name\nthat is associated to an attack."
