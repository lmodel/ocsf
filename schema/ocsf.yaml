        recommended: true
      end_time:
        name: end_time
        description: 'The date and time at which a group or an Intent-Based Network
          Participant

          operation ends. (This field is only applicable to Network Remote ID.)'
      locations:
        name: locations
        description: 'A list of Position Location Information (PLI) (latitude/longitude
